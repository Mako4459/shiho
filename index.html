としての競売":["注意点（伊藤塾2022プレ模試）：不動産所有者＝第三者異議の訴え可能。請求異議は不可。質権の実行としての動産競売＝一般先取特権者も配当要求可能。債権その他の財産権＝担保権の存在証する文書提出された時に限り実行開始。","注意点：不動産担保権の実行＝債務名義不要→確定判決の謄本・記録例事項証明書、公正証書謄本、登記簿、一般先取特権は存在証する文書提出必要。相続発生時の承継文書は私文書でもOK。その他承継は転付命令や公正証書必要。抵当不動産の買受人が代金納付＝納付前に抵当権消滅していても不動産取得する。動産競売の要件＝担保権の存在を証する文書の提出した債権者の申立て＝執行裁判所は動産競売開始の許可する。執行異議の申立て＝担保権の不存在・消滅、担保債権の一部の消滅理由とできる。","ポイント：不動産所有者は第三者意義の訴えOK。請求意義はNG。 / 代金納付で買受人は担保の不存在または消滅関係しない / 質権の実行としての動産執行・一般先取権者は配当要求できる / 債権及びその他財産権の担保権実行は存在証する文書提出された時に限り開始する"],"民執法::担保権の実行としての競売":["注意点（伊藤塾2022プレ模試）：不動産所有者＝第三者異議の訴え可能。請求異議は不可。質権の実行としての動産競売＝一般先取特権者も配当要求可能。債権その他の財産権＝担保権の存在証する文書提出された時に限り実行開始。","注意点：不動産担保権の実行＝債務名義不要→確定判決の謄本・記録例事項証明書、公正証書謄本、登記簿、一般先取特権は存在証する文書提出必要。相続発生時の承継文書は私文書でもOK。その他承継は転付命令や公正証書必要。抵当不動産の買受人が代金納付＝納付前に抵当権消滅していても不動産取得する。動産競売の要件＝担保権の存在を証する文書の提出した債権者の申立て＝執行裁判所は動産競売開始の許可する。執行異議の申立て＝担保権の不存在・消滅、担保債権の一部の消滅理由とできる。"],"民執法::請求異議の訴え及び第三者異議の訴え":["注意点（伊藤塾2023公開模試）：仮執行宣言付された判決を債務名義とする強制執行＝債務者は判決確定前に請求異議の訴え不可。 強制執行受けた債務者＝権利の放棄・不執行の合意主張＝請求異議の訴え 債権者は第三者異議の訴えで敗訴しても同一の債務名義で他の財産に強制執行可能。 第三者異議の訴え＝口頭弁論必要。強制執行の不許求めるものだから、執行終了後は訴えの利益ない。"],"請求異議の訴え及び第三者異議の訴え":["注意点（伊藤塾2023公開模試）：仮執行宣言付された判決を債務名義とする強制執行＝債務者は判決確定前に請求異議の訴え不可。 強制執行受けた債務者＝権利の放棄・不執行の合意主張＝請求異議の訴え 債権者は第三者異議の訴えで敗訴しても同一の債務名義で他の財産に強制執行可能。 第三者異議の訴え＝口頭弁論必要。強制執行の不許求めるものだから、執行終了後は訴えの利益ない。"],"民執法::執行異議":["注意点（伊藤塾2023公開模試2）：財産開示手続決定＝執行抗告できるから執行異議できない。民事執行取り消す執行官の処分に対する執行異議の申立て却下裁判に執行抗告可能。期日以外は書面で必要。執行抗告は1週間の不変期間・執行異議は期間制限なし。 執行異議の裁判は口頭弁論不要"],"執行異議":["注意点（伊藤塾2023公開模試2）：財産開示手続決定＝執行抗告できるから執行異議できない。民事執行取り消す執行官の処分に対する執行異議の申立て却下裁判に執行抗告可能。期日以外は書面で必要。執行抗告は1週間の不変期間・執行異議は期間制限なし。 執行異議の裁判は口頭弁論不要"],"民執法::債権執行":["注意点（令和4年LEC直前予想模試）：差押に係る証書＝差押債権者に証書引渡必要。差押債権の額が債権及び執行費用超える場合も全額差押え可能（さらに差押えは不可）","注意点（伊藤塾2018公開模試２）：執行裁判所＝債務者の普通裁判籍の地裁or無い時債権の所在地の地裁。差押命令＝審尋無しで送達。 第三債務者に対する陳述の催告あり＝ちゃんとしないと損賠あり。 転付命令確定後、第三債務者の資力不足で弁済不可＝差押債権者は債務者に残額請求不可。 先取特権者＝第三債務者供託までに書面で証明して配当要求すれば配当受けられる"],"債権執行":["注意点（令和4年LEC直前予想模試）：差押に係る証書＝差押債権者に証書引渡必要。差押債権の額が債権及び執行費用超える場合も全額差押え可能（さらに差押えは不可）","注意点（伊藤塾2018公開模試２）：執行裁判所＝債務者の普通裁判籍の地裁or無い時債権の所在地の地裁。差押命令＝審尋無しで送達。 第三債務者に対する陳述の催告あり＝ちゃんとしないと損賠あり。 転付命令確定後、第三債務者の資力不足で弁済不可＝差押債権者は債務者に残額請求不可。 先取特権者＝第三債務者供託までに書面で証明して配当要求すれば配当受けられる"],"金銭債権に対する強制執行":["注意点（伊藤塾2019プレ模試）：抵当権に基づき物上代位権行使＝他の債権者の差押えで配当要求不可。 継続的給付に係る差押え＝差押え後の給料・賃料債権に及ぶ。差押え送達１週間後取り立て可能。","注意点（伊藤塾2021プレ模試）：差押執行受けてる債権にも可能。少額訴訟債権執行＝簡易裁判所の裁判書書記官に対して申立て"],"民執法::金銭債権に対する強制執行":["注意点（伊藤塾2019プレ模試）：抵当権に基づき物上代位権行使＝他の債権者の差押えで配当要求不可。 継続的給付に係る差押え＝差押え後の給料・賃料債権に及ぶ。差押え送達１週間後取り立て可能。","注意点（伊藤塾2021プレ模試）：差押執行受けてる債権にも可能。少額訴訟債権執行＝簡易裁判所の裁判書書記官に対して申立て"],"民執法::強制執行に対する不服申立て":["注意点（伊藤塾2021公開模試）：強制競売申立却下＝執行抗告可能。開始決定＝執行異議。執行抗告に理由がある＝原裁判所は更正。 執行抗告＝1週間以内。執行異議＝期間なし。請求異議＝強制執行終了前に提起必要。 第三者異議の原告＝訴えに併合して債務者に対する目的物に対する訴え可能。","注意点：強制競売の開始決定＝執行異議可能。条件成就執行文に異議＝執行文付与に対する異議申立てOR執行文付与に対する異議の訴えを任意で選択。請求異議の訴え＝執行文付与前・執行開始前にも可能。執行文付与に対する訴え・請求異議の訴え＝異議の事由同時に主張必要。"],"強制執行に対する不服申立て":["注意点（伊藤塾2021公開模試）：強制競売申立却下＝執行抗告可能。開始決定＝執行異議。執行抗告に理由がある＝原裁判所は更正。 執行抗告＝1週間以内。執行異議＝期間なし。請求異議＝強制執行終了前に提起必要。 第三者異議の原告＝訴えに併合して債務者に対する目的物に対する訴え可能。","注意点：強制競売の開始決定＝執行異議可能。条件成就執行文に異議＝執行文付与に対する異議申立てOR執行文付与に対する異議の訴えを任意で選択。請求異議の訴え＝執行文付与前・執行開始前にも可能。執行文付与に対する訴え・請求異議の訴え＝異議の事由同時に主張必要。"],"民執法::強制競売":["注意点（2020年TAC予想問題集）：執行抗告＝開始決定に対するのは強制管理のみ。強制競売は売却決定時に執行抗告できるから。","注意点（2021年TAC予想問題集）：強制競売開始決定→ただちに差押嘱託→登記を執行裁判所へ送付。通常使用は可能。 買受人の抵当権者等から申出あったら、所有権移転登記は司法書士に嘱託情報提供して登記所に提供させる方法でする。","注意点（2023年TAC予想問題集）：執行裁判所は評価人選任必要。担保不動産競売＝事前に保全可能→不動産強制競売は差押さえするまで保全不可能。執行裁判所が代金納付しない者に支払い命ずること不可"],"強制競売":["注意点（2020年TAC予想問題集）：執行抗告＝開始決定に対するのは強制管理のみ。強制競売は売却決定時に執行抗告できるから。","注意点（2021年TAC予想問題集）：強制競売開始決定→ただちに差押嘱託→登記を執行裁判所へ送付。通常使用は可能。 買受人の抵当権者等から申出あったら、所有権移転登記は司法書士に嘱託情報提供して登記所に提供させる方法でする。","注意点（2023年TAC予想問題集）：執行裁判所は評価人選任必要。担保不動産競売＝事前に保全可能→不動産強制競売は差押さえするまで保全不可能。執行裁判所が代金納付しない者に支払い命ずること不可"],"民執法::不動産の強制競売":["注意点（2019年TAC予想問題集）：留置権は強制競売で消滅しない。開始決定で書記官直ちに嘱託必要→登記を執行裁判所に送付。 不動産の滅失等移転妨げる事情あり＝執行裁判所は競売取消必要。 強制競売取下げ＝登記官は開始決定抹消嘱託。","注意点：裁判所書記官により差押登記の嘱託と配当要求の終期決定、物件明細書作成、売却実施命令、代金納付期限の指定、配当表の作成"],"不動産の強制競売":["注意点（2019年TAC予想問題集）：留置権は強制競売で消滅しない。開始決定で書記官直ちに嘱託必要→登記を執行裁判所に送付。 不動産の滅失等移転妨げる事情あり＝執行裁判所は競売取消必要。 強制競売取下げ＝登記官は開始決定抹消嘱託。","注意点：裁判所書記官により差押登記の嘱託と配当要求の終期決定、物件明細書作成、売却実施命令、代金納付期限の指定、配当表の作成"],"民執法::仮差押命令":["注意点（2018年TAC予想問題集）：被保全権利が期限・条件付きでも可能。動産の仮差押え命令なら目的物特定せずにOK。 仮処分なら償うことができない損害で命令取消あり（仮執行はNG）"],"不登法::要役権の登記":["注意点（令和5年LEC直前予想模試）：地役権の工作物の設置義務＝要役地には記録されない。地代増額しない＝登記事項。排水目的で建物に地役権不可。 採石権＝存続期間常に登記。採石権＝目的は登記事項じゃない。賃借権の存続期間＝任意的事項。 永小作権＝永小作権者・存続期間・譲渡賃貸禁止＝任意事項。地役権目的「庭園眺望」OK。 採石権者・存続期間＝絶対登記事項。建物所有目的賃借権＝「建物所有」「借地借家法第22条の特約」＝50年以上・更新・買取なし"],"要役権の登記":["注意点（令和5年LEC直前予想模試）：地役権の工作物の設置義務＝要役地には記録されない。地代増額しない＝登記事項。排水目的で建物に地役権不可。 採石権＝存続期間常に登記。採石権＝目的は登記事項じゃない。賃借権の存続期間＝任意的事項。 永小作権＝永小作権者・存続期間・譲渡賃貸禁止＝任意事項。地役権目的「庭園眺望」OK。 採石権者・存続期間＝絶対登記事項。建物所有目的賃借権＝「建物所有」「借地借家法第22条の特約」＝50年以上・更新・買取なし"],"用益権の登記":["注意点：地役権＝存続期間の定め登記不可。採石権の場合は存続期間かならず登記必要。地役権が要役地とともに移転しない特約で抹消する時＝義務者が地役権設定当時の溶液地の所有権名義人であること証する情報の提供必要。"],"不登法::用益権の登記":["注意点：地役権＝存続期間の定め登記不可。採石権の場合は存続期間かならず登記必要。地役権が要役地とともに移転しない特約で抹消する時＝義務者が地役権設定当時の溶液地の所有権名義人であること証する情報の提供必要。"],"抹消回復登記":["注意点（伊藤塾2021公開模試2）：混同で消滅しない抵当権誤って消滅登記＝登記官職権で回復不可＝当事者の申請で回復＝回復も1000円 誤って混同の抵当権抹消・根抵当抹消＝抹消前の後順位抵当権者→回復登記の利害関係人にあたらない。","ポイント：抹消された抵当権の回復＝現在の所有権登記名義人が義務者 / 抹消された所有権移転請求権保全の仮登記の回復＝既に登記されていた次順位所有権移転の仮登記名義人＝利害関係人 / 登記事項の一部抹消の回復＝付記 全部なら主登記 / 誤ってされた混同の抹消回復＝当事者申請。 後順位抵当権者は利害関係有しない"],"不登法::抹消回復登記":["注意点（伊藤塾2021公開模試2）：混同で消滅しない抵当権誤って消滅登記＝登記官職権で回復不可＝当事者の申請で回復＝回復も1000円 誤って混同の抵当権抹消・根抵当抹消＝抹消前の後順位抵当権者→回復登記の利害関係人にあたらない。"],"本人確認情報":["注意点（2021年TAC予想問題集）：外国在住で識別提供なし＝署名証明書を提供しても事前通知される。破産管財人代理も本人確認の対象にできる。 代理人作成の本人確認情報で複代理人は登記申請できない。 識別提出不可理由＝事実と異なったら書士作成本人確認で登記官相当と認めても省略不可。"],"不登法::本人確認情報":["注意点（2021年TAC予想問題集）：外国在住で識別提供なし＝署名証明書を提供しても事前通知される。破産管財人代理も本人確認の対象にできる。 代理人作成の本人確認情報で複代理人は登記申請できない。 識別提出不可理由＝事実と異なったら書士作成本人確認で登記官相当と認めても省略不可。"],"不登法::法定相続情報一覧図":["注意点（2022年TAC予想問題集）：再交付の申出＝当初の申出行った登記所&当初の申出人のみ可能→本人確認書面添付必要。","注意点（2019年TAC予想問題集）：登記官に法定相続情報一覧図の写しの交付請求＝根抵当権の債務者の相続人も可能。"],"法定相続情報一覧図":["注意点（2022年TAC予想問題集）：再交付の申出＝当初の申出行った登記所&当初の申出人のみ可能→本人確認書面添付必要。","注意点（2019年TAC予想問題集）：登記官に法定相続情報一覧図の写しの交付請求＝根抵当権の債務者の相続人も可能。"],"変更の登記または更正の登記":["注意点：判決正本に登記上の住所と現住所併記されてても前提として名変省略不可。共有者の住所更正登記は一括対応可能。"],"不登法::変更の登記または更正の登記":["注意点：判決正本に登記上の住所と現住所併記されてても前提として名変省略不可。共有者の住所更正登記は一括対応可能。"],"不登法::敷地権付き区分建物の登記":["注意点（2022年TAC予想問題集）：敷地権が地上権→分離処分禁止は地上権。所有権は自由に移転可能。一般の先取特権保存＝敷地権発生前後問わず不可能。処分禁止の仮登記は前後問わずOK。賃借権・特別の先取特権・仮処分・敷地権が賃借権である場合の抵当権＝建物のみ可能"],"敷地権付き区分建物の登記":["注意点（2022年TAC予想問題集）：敷地権が地上権→分離処分禁止は地上権。所有権は自由に移転可能。一般の先取特権保存＝敷地権発生前後問わず不可能。処分禁止の仮登記は前後問わずOK。賃借権・特別の先取特権・仮処分・敷地権が賃借権である場合の抵当権＝建物のみ可能"],"不登法::付記登記":["注意点：根抵当件の優先の定め=常に付記登記。地上権の持分の更正=必ず利害関係人の承諾必要=付記登記"],"付記登記":["注意点：根抵当件の優先の定め=常に付記登記。地上権の持分の更正=必ず利害関係人の承諾必要=付記登記"],"不登法::判決による登記":["注意点（令和5年LEC直前予想模試）：判決主文に原因明示あれば、中間省略登記も可能。 契約不存在無効判決確定後に承継あっても、口頭弁論終結後の承継人に執行文の付与受けて抹消可能＝一般賞継承する情報または代位原因証明でOK。口頭弁論終結後の所有権二重譲受人＝対抗問題なので承継執行文不可。 仲裁判断による登記＝執行決定必要 単独申請のための判決＝給付判決必要。仮執行宣言付判決（確定前に強制執行を許す判決）で申請不可。抹消登記単独で申請する場合も利害関係人の承諾…","注意点（2018年TAC予想問題集）：売主が分筆登記に協力しない場合も、分筆の訴え提起できない（所有権移転請求権保全のために、売主に代位して分筆登記請求する。）共同相続登記後、遺産分割による持分全部移転登記は単独不可。A→BCでB分が調停で持分移転登記抹消判決得たら、一部移転更正の登記可能。所有権移転請求権仮登記が無効で相続人に抹消判決＝相続登記せず仮登記抹消可能。"],"判決による登記":["注意点（令和5年LEC直前予想模試）：判決主文に原因明示あれば、中間省略登記も可能。 契約不存在無効判決確定後に承継あっても、口頭弁論終結後の承継人に執行文の付与受けて抹消可能＝一般賞継承する情報または代位原因証明でOK。口頭弁論終結後の所有権二重譲受人＝対抗問題なので承継執行文不可。 仲裁判断による登記＝執行決定必要 単独申請のための判決＝給付判決必要。仮執行宣言付判決（確定前に強制執行を許す判決）で申請不可。抹消登記単独で申請する場合も利害関係人の承諾…","注意点（2018年TAC予想問題集）：売主が分筆登記に協力しない場合も、分筆の訴え提起できない（所有権移転請求権保全のために、売主に代位して分筆登記請求する。）共同相続登記後、遺産分割による持分全部移転登記は単独不可。A→BCでB分が調停で持分移転登記抹消判決得たら、一部移転更正の登記可能。所有権移転請求権仮登記が無効で相続人に抹消判決＝相続登記せず仮登記抹消可能。","ポイント：和解調書・認諾調書も確定判決に含まれる / 仲裁判断には執行決定を要する","ポイント：仮執行宣言付判決で申請不可 / 判決書正本＋確定証明書 / 判決による登記でも登記上の利害関係人の承諾証明情報必要","ポイント：更正の登記は判決でも同一性無いと不可 / 判決後売主死亡して相続。承継執行文を受けて移転 / 口頭弁論終結前の承継人に判決効果及ばない"],"不登法::買戻特約の登記":["注意点（2023年TAC予想問題集）：敷地権付区分建物＝専有部分と敷地権で一括して定めた金額を提供。抹消時は差押権者等の承諾必要。 代物弁済契約不可。増額更正・減額変更可能。増額変更は不可。「契約費用 なし」で記載必要。 買戻権についてる質権は職権抹消。買戻権抹消時の買戻権者の住所変更不要 未登記不動産売買＝買主が表題登記義務を負う＝所有権保存登記と同時に買戻登記可能。契約の日から10年経過で単独抹消可能。代金増額の更正登記＝買戻権者が義務者＝印鑑証明必要…"],"買戻特約の登記":["注意点（2023年TAC予想問題集）：敷地権付区分建物＝専有部分と敷地権で一括して定めた金額を提供。抹消時は差押権者等の承諾必要。 代物弁済契約不可。増額更正・減額変更可能。増額変更は不可。「契約費用 なし」で記載必要。 買戻権についてる質権は職権抹消。買戻権抹消時の買戻権者の住所変更不要 未登記不動産売買＝買主が表題登記義務を負う＝所有権保存登記と同時に買戻登記可能。契約の日から10年経過で単独抹消可能。代金増額の更正登記＝買戻権者が義務者＝印鑑証明必要…"],"配偶者居住権の登記":["注意点：存続期間の延長・更新は不可、短縮は可能。相続不可＝遺贈。前提所有権移転必要なら遺言執行者が義務者になれる。「死亡による消滅」。延長や更新は不可。短縮は可能。登記原因証明情報として、必ずしも住民票等を提供する必要はない"],"不登法::配偶者居住権の登記":["注意点：存続期間の延長・更新は不可、短縮は可能。相続不可＝遺贈。前提所有権移転必要なら遺言執行者が義務者になれる。「死亡による消滅」。延長や更新は不可。短縮は可能。登記原因証明情報として、必ずしも住民票等を提供する必要はない"],"農地法所定の許可":["注意点（令和5年LEC直前予想模試）：会社分割・移転錯誤抹消・電線路の施設＝許可不要。遺産分割贈与・車両通行地役権＝許可必要。"],"不登法::農地法所定の許可":["注意点（令和5年LEC直前予想模試）：会社分割・移転錯誤抹消・電線路の施設＝許可不要。遺産分割贈与・車両通行地役権＝許可必要。"],"不登法::農地についての所有権の登記":["注意点（令和4年LEC直前予想模試）：判決理由中に農地法許可認定or許可要しない旨＝許可情報提供不要"],"農地についての所有権の登記":["注意点（令和4年LEC直前予想模試）：判決理由中に農地法許可認定or許可要しない旨＝許可情報提供不要"],"不登法::特定承継による所有権移転の登記":["注意点（伊藤塾2019公開模試2）：死亡条件所有権失効の付記登記＝相続人と共同して所有権移転必要。"],"特定承継による所有権移転の登記":["注意点（伊藤塾2019公開模試2）：死亡条件所有権失効の付記登記＝相続人と共同して所有権移転必要。"],"登録免許税":["注意点（2021年TAC予想問題集）：全部譲渡による元本確定前の根抵当権移転＝極度額に1000分の2 遺産分割による贈与（代償分割）＝普通に1000分の20。賃借権転貸＝1000分の10 仮登記された所有権移転請求権の移転＝不動産1個につき1000円。 仮登記所有権移転請求権の移転＝1000円。仮登記所有権の所有権移転の仮登記（主登記の仮登記）＝1000分の10 同一不動産の1番2番に同一債権者＝抹消は1000円で可能。契約解除で仮登記と本登記抹消＝100…","注意点（伊藤塾2022プレ模試）：一般財団法人設立＝6万円。初めてする外国会社の登記＝日本に営業所ない６万・ある9万。未成年者の営業開始1.8万円。合資会社＝新設分割関わらず6万円。株式交付＝最低3万円","注意点：本支店移転＝ツで３万円。会社継続＝ソで３万円。合同会社の社員加入と資本金増加＝変更分と増加分両方必要","注意点：支配人の選任と代理権の消滅＝３万✖️２＝６万円。設立と同時に支店設置なら支店分の免許税不要","ポイント：担保不動産競売に係る差押と収益失効開始決定に係る差押が同時に嘱託＝それぞれ1000分の4 / 確定根抵当権の一部弁済＝代位弁済額OR極度額 / 破産手続開始の登記の抹消＝裁判所書記官の嘱託。登録免許税かからない。","ポイント：国が代位して登記＝免許税非課税 / 墳墓地に関する登記＝非課税（地目が墓地である必要あり）"],"不登法::登録免許税":["注意点（2021年TAC予想問題集）：全部譲渡による元本確定前の根抵当権移転＝極度額に1000分の2 遺産分割による贈与（代償分割）＝普通に1000分の20。賃借権転貸＝1000分の10 仮登記された所有権移転請求権の移転＝不動産1個につき1000円。 仮登記所有権移転請求権の移転＝1000円。仮登記所有権の所有権移転の仮登記（主登記の仮登記）＝1000分の10 同一不動産の1番2番に同一債権者＝抹消は1000円で可能。契約解除で仮登記と本登記抹消＝100…"],"登記名義人等の氏名等の変更の登記":["注意点（伊藤塾2023公開模試）：所有権移転の仮登記の抹消＝氏名住所更正省略して抹消可能。 抵当権実行による差押え＝抵当権者は設定者に代位して設定者の住所変更可能。債務者の住所変更は不可（共同申請必要）抵当証券ある場合の債務者単独での住所変更＝抵当証券提供不要 所有権移転の義務者死亡でも前提として名変必要。 抵当証券発行されている場合の債務者の名変＝抵当証券の提供不要。識別情報の失効申出で前提名変不要。 数回に渡る持分の取得＝移転時はすべての持分について住…"],"不登法::登記名義人等の氏名等の変更の登記":["注意点（伊藤塾2023公開模試）：所有権移転の仮登記の抹消＝氏名住所更正省略して抹消可能。 抵当権実行による差押え＝抵当権者は設定者に代位して設定者の住所変更可能。債務者の住所変更は不可（共同申請必要）抵当証券ある場合の債務者単独での住所変更＝抵当証券提供不要 所有権移転の義務者死亡でも前提として名変必要。 抵当証券発行されている場合の債務者の名変＝抵当証券の提供不要。識別情報の失効申出で前提名変不要。 数回に渡る持分の取得＝移転時はすべての持分について住…"],"登記申請人":["注意点（令和5年LEC直前予想模試）：不適法抹消での抵当権回復＝登記義務者は現在の登記名義人 A→Bへの所移仮登記。A→Cへの所移後、仮登記共同抹消＝権利者はAでもCでもいい"],"不登法::登記申請人":["注意点（令和5年LEC直前予想模試）：不適法抹消での抵当権回復＝登記義務者は現在の登記名義人 A→Bへの所移仮登記。A→Cへの所移後、仮登記共同抹消＝権利者はAでもCでもいい"],"不登法::登記申請する際の添付情報":["注意点（伊藤塾2019プレ模試）：職務代行者が不動産贈与＝裁判所の許可証提供必要。不在者の財産管理人が遺産分割協議＝家裁の許可必要 親子共有名義不動産で第三者の債務担保＝利益相反に当たらない。"],"登記申請する際の添付情報":["注意点（伊藤塾2019プレ模試）：職務代行者が不動産贈与＝裁判所の許可証提供必要。不在者の財産管理人が遺産分割協議＝家裁の許可必要 親子共有名義不動産で第三者の債務担保＝利益相反に当たらない。"],"不登法::登記上の利害関係を有する第三者の承諾を証する情報":["注意点（伊藤塾2022プレ模試）：転抵当権の抵当権の順位譲渡＝承諾不要（転抵当権者の財産確保後に順位譲渡当事者間の問題だから影響ない）地上権の地代減額→後順位抵当権・所有権者（請求権含む）。 根抵当権設定→AからBへ所移→極度額増額→所移抹消→根抵当権者利害関係人。（極度額変更も職権抹消されるから）"],"登記上の利害関係を有する第三者の承諾を証する情報":["注意点（伊藤塾2022プレ模試）：転抵当権の抵当権の順位譲渡＝承諾不要（転抵当権者の財産確保後に順位譲渡当事者間の問題だから影響ない）地上権の地代減額→後順位抵当権・所有権者（請求権含む）。 根抵当権設定→AからBへ所移→極度額増額→所移抹消→根抵当権者利害関係人。（極度額変更も職権抹消されるから）"],"登記所の図面":["注意点：地図＝各土地の区画を明確にし、地番を表示。建物所在図＝位置及び家屋番号を表示。 土地所在図等＝電磁記録で保存OK。","ポイント：建物所在図＝地図と違って明確にとは規定されていない / 登記簿、地図等、付属書類は事変避ける場合のぞき持ち出し厳禁 / 登記官は、裁判所から地図測量図含む付属書類の送付命令または嘱託あった場合、その関係部分に限り送付可能"],"不登法::登記所の図面":["注意点：地図＝各土地の区画を明確にし、地番を表示。建物所在図＝位置及び家屋番号を表示。 土地所在図等＝電磁記録で保存OK。"],"登記識別情報の失効・有効証明請求":["注意点（伊藤塾2018公開模試）：失効申出時添付の印鑑証明還付不可。有効証明なら可能。"],"不登法::登記識別情報の失効・有効証明請求":["注意点（伊藤塾2018公開模試）：失効申出時添付の印鑑証明還付不可。有効証明なら可能。"],"登記識別情報":["注意点（2021年TAC予想問題集）：証明＝ネットならネットで送信・ダウンロード。司法書士が相続情報なく証明請求＝その旨の表示必要。 ネット利用して失効申出なら甲区乙区の別も提供。 移転請求権の移転請求権仮登記＝識別不要。法定代理人に識別通知＝支配人に通知。 抵当権移転で事前通知あっても前の住所への通知なし。根抵当権の元本確定登記＝権利者単独申請なら識別提供不要"],"不登法::登記識別情報":["注意点（2021年TAC予想問題集）：証明＝ネットならネットで送信・ダウンロード。司法書士が相続情報なく証明請求＝その旨の表示必要。 ネット利用して失効申出なら甲区乙区の別も提供。 移転請求権の移転請求権仮登記＝識別不要。法定代理人に識別通知＝支配人に通知。 抵当権移転で事前通知あっても前の住所への通知なし。根抵当権の元本確定登記＝権利者単独申請なら識別提供不要"],"登記事項の証明等":["注意点：登記事項要約書＝送付の方法不可。登記原因証明情報の閲覧＝利害関係書類提示必要。 土地所在図以外の附属書類閲覧＝法人の代表者の資格証する書類提示。 登記事項要約書＝１の用紙に2以上の事項記載可能。図面＝土地所在図・地積測量図・地役権図面・建物、各階平面図が該当。正当な理由あれば戸籍や印鑑証明閲覧可能。"],"不登法::登記事項の証明等":["注意点：登記事項要約書＝送付の方法不可。登記原因証明情報の閲覧＝利害関係書類提示必要。 土地所在図以外の附属書類閲覧＝法人の代表者の資格証する書類提示。 不可郵便だが本人限定郵便でない。本人確認情報の提供があり登記官が確実と認める場合省略可能（公証人の本人確認認証では省略不可）"],"不登法::先取特権に関する登記":["注意点（伊藤塾2021公開模試2）：建物新築＝不動産工事の先取特権保存＝建物設計図面提供。不動産保存＝予算登記不可（通常申請時に確定してるから）地上権売買の先取特権保存可能 不動産質権の存続期間・損賠担保しない別段の定め＝申請情報になる。引き直し可能。 宅地造成の不動産工事の先取特権保存＝工事図面不要。建物・附属建物新築は図面必要。 建物新築不動産工事の先取特権保存登記＝先取特権のみ譲渡不可能 滞納処分による差押え＝建物完成していれば受理される。"],"先取特権に関する登記":["注意点（伊藤塾2021公開模試2）：建物新築＝不動産工事の先取特権保存＝建物設計図面提供。不動産保存＝予算登記不可（通常申請時に確定してるから）地上権売買の先取特権保存可能 不動産質権の存続期間・損賠担保しない別段の定め＝申請情報になる。引き直し可能。 宅地造成の不動産工事の先取特権保存＝工事図面不要。建物・附属建物新築は図面必要。 建物新築不動産工事の先取特権保存登記＝先取特権のみ譲渡不可能 滞納処分による差押え＝建物完成していれば受理される。","ポイント：工事注文者名義の所有権保存後に第三者への所移必要 / 建物新築にかかる不動産工事の先取特権保存＝図面含む建物設計書必要。宅地造成なら不要 / 不動産保存の先取特権保存は債権額と債務者必要。保存の予算額登記不可能。工事は予算額必要 / 建物のみの先取特権不可能（惣菜さんだから） / 地上権売買の先取特権保存可能"],"数次相続の登記":["注意点：A→BC→DE中間省略で登記可能。A→配偶者Bと兄弟CDEが第一相続後、B死亡でFG相続＝CDEFGの遺産分割協議で取得者CにすればAからCへの相続登記可能。A死亡BC相続でB死亡＝DE相続＝CDの相続はできないからまずは取得者BC相続後にBの持分をDに移転する。"],"不登法::数次相続の登記":["注意点：A→BC→DE中間省略で登記可能。A→配偶者Bと兄弟CDEが第一相続後、B死亡でFG相続＝CDEFGの遺産分割協議で取得者CにすればAからCへの相続登記可能。A死亡BC相続でB死亡＝DE相続＝CDの相続はできないからまずは取得者BC相続後にBの持分をDに移転する。"],"親子間の利益相反行為":["注意点（LEC2023実力診断模試）：未成年者所有権の登記名義人＝親名義に真正な登記名義の回復＝利益相反行為に該当しない。 子と親の共有不動産＝一括売却＝利益相反該当しない。"],"不登法::親子間の利益相反行為":["注意点（LEC2023実力診断模試）：未成年者所有権の登記名義人＝親名義に真正な登記名義の回復＝利益相反行為に該当しない。 子と親の共有不動産＝一括売却＝利益相反該当しない。"],"申請情報たる持分":["注意点：根質権＝持分提供不要。抵当権の利息変更＝持分提供不要。"],"不登法::申請情報たる持分":["注意点：根質権＝持分提供不要。抵当権の利息変更＝持分提供不要。"],"不登法::申請の内容が真実であると思料する旨の申出":["注意点：事前通知に対する申出＝申請書または委任状に押印したものと同一の印で提出。未成年者が申請した場合は事前通知も未成年者が対応。"],"申請の内容が真実であると思料する旨の申出":["注意点：事前通知に対する申出＝申請書または委任状に押印したものと同一の印で提出。未成年者が申請した場合は事前通知も未成年者が対応。"],"審査請求":["注意点（2020年TAC予想問題集）：抵当権移転の却下→設定者は審査請求不可。監督法務局・地方法務局の長→審理員に送付。不備補正なければ裁決で審査請求却下可能。審査請求人の地位承継不可。意思表示取り消したが登記申請された場合＝もはや審査請求不可。 筆界特定申請の却下＝審査請求対象","ポイント：処分に不服があるもの・不作為にかかる処分を申請したもの / 筆界特定申請の却下＝請求対象 / あて名は法務局または地方法務局の長だが、請求は登記官経由 / 口頭意見陳述なし"],"不登法::審査請求":["注意点（2020年TAC予想問題集）：抵当権移転の却下→設定者は審査請求不可。監督法務局・地方法務局の長→審理員に送付。不備補正なければ裁決で審査請求却下可能。審査請求人の地位承継不可。意思表示取り消したが登記申請された場合＝もはや審査請求不可。 筆界特定申請の却下＝審査請求対象"],"不登法::信託の登記":["注意点（2020年TAC予想問題集）：信託管理人の解任→登記官が職権で信託の変更登記を嘱託。受託者辞任で「受託者変更」→非課税。 受益者の変更は受託者が単独で申請。 信託財産の管理方法変更→受託者が単独で変更登記。委託者の地位移転→受託者及び受益者の同意必要。 信託の併合＝債権者保護手続が適法に行われたことを証する書面必要。受託者固有財産＝委付 受託者名義の所有権保存可能。被保佐人も受託者になれる＝個人が被保佐人になったら任務終了。 信託登記の後に所有権移…","注意点：地上権も信託可能。信託の登記申請時、信託目録に記載すべき事項は添付情報として提供。受益権の譲渡＝確定日付ある証書ないと対抗できない。 信託の併合＝信託の併合による権利の変更＋従前の信託登記抹消＋新たな信託登記の同時申請必要。 共同受託者の一社が会社分割＝合有名義人変更登記の原因「会社分割」。X信託とY信託でX信託の受託者が地上権設定し地上権をY信託に帰属させること不可。委託者の全員が受託者となるもの＝自己信託・委託者の中に受託者とならないものがいる…"],"信託の登記":["注意点（2020年TAC予想問題集）：信託管理人の解任→登記官が職権で信託の変更登記を嘱託。受託者辞任で「受託者変更」→非課税。 受益者の変更は受託者が単独で申請。 信託財産の管理方法変更→受託者が単独で変更登記。委託者の地位移転→受託者及び受益者の同意必要。 信託の併合＝債権者保護手続が適法に行われたことを証する書面必要。受託者固有財産＝委付 受託者名義の所有権保存可能。被保佐人も受託者になれる＝個人が被保佐人になったら任務終了。 信託登記の後に所有権移…","注意点：地上権も信託可能。信託の登記申請時、信託目録に記載すべき事項は添付情報として提供。受益権の譲渡＝確定日付ある証書ないと対抗できない。 信託の併合＝信託の併合による権利の変更＋従前の信託登記抹消＋新たな信託登記の同時申請必要。 共同受託者の一社が会社分割＝合有名義人変更登記の原因「会社分割」。X信託とY信託でX信託の受託者が地上権設定し地上権をY信託に帰属させること不可。委託者の全員が受託者となるもの＝自己信託・委託者の中に受託者とならないものがいる…","ポイント：信託原因の地上権の設定可能 / 複数の委託者のうち一部を受託者＝OK / 解任の裁判＝裁判所書記官の嘱託","ポイント：信託の分割＝受益者は識別不要だが、受託者は識別必要 / 信託原因の停止条件付所有権移転の仮登記も信託の仮登記と一緒に申請必要 / 信託管理人解任＝裁判所書記官の嘱託","ポイント：受託者権利能力なき社団不可能。抵当権の債務者なら可能 / 自己信託も識別＋印鑑証明必要（信託財産となった旨の権利の変更登記及び信託の登記） / 受託者の固有財産「委付」受託者の固有財産となった旨の権利の変更の登記及び信託の登記の抹消"],"不登法::職権又は嘱託による登記":["注意点（伊藤塾2019プレ模試）：強制競売による売却原因の所有権移転登記を嘱託＝差押え後の地上権抹消＝裁判所書記官の嘱託。 処分制限の登記嘱託＝土地所在図地積測量図・建物図面各階平面図提供必要。強制競売による所有権移転嘱託＝差押に遅れる地上権＝裁判所書記官の嘱託による抹消。 根抵当権の分割譲渡＝登記官職権で極度額減額による根抵当権変更登記。共同抵当でひとつに消滅請求＝当事者が抹消申請。抵当権の順位変更請求権保全のため保全仮登記の嘱託可能（順位変更の仮登記は…"],"職権又は嘱託による登記":["注意点（伊藤塾2019プレ模試）：強制競売による売却原因の所有権移転登記を嘱託＝差押え後の地上権抹消＝裁判所書記官の嘱託。 処分制限の登記嘱託＝土地所在図地積測量図・建物図面各階平面図提供必要。強制競売による所有権移転嘱託＝差押に遅れる地上権＝裁判所書記官の嘱託による抹消。 根抵当権の分割譲渡＝登記官職権で極度額減額による根抵当権変更登記。共同抵当でひとつに消滅請求＝当事者が抹消申請。抵当権の順位変更請求権保全のため保全仮登記の嘱託可能（順位変更の仮登記は…"],"不登法::譲渡担保の登記":["注意点：被担保債権とともに譲渡担保権も売渡＝譲渡担保の売買原因で所移。譲渡担保に買戻特約不可。譲渡担保契約解除による所有権移転でも抹消でもどちらでも可能"],"譲渡担保の登記":["注意点：被担保債権とともに譲渡担保権も売渡＝譲渡担保の売買原因で所移。譲渡担保に買戻特約不可。譲渡担保契約解除による所有権移転でも抹消でもどちらでも可能","ポイント：譲渡担保で被担保債権の発生原因と内容登記不可 / 譲渡担保の売買（贈与）を原因可能 / 譲渡担保と同時に買戻特約は不可 / 譲渡担保の１号OK、２号は不可 / 譲渡担保契約解除原因の所有権移転登記でも抹消でもOK"],"所有権保存の登記":["注意点（伊藤塾2020フ "注意点（令和5年LEC直前予想模試）：一部移転を全部に更正→全部取得したものに識別通知。遺産分割審判後、単有とする遺産分割で直ちに相続不可。"],"所有権の登記全般":["注意点（令和5年LEC直前予想模試）：一部移転を全部に更正→全部取得したものに識別通知。遺産分割審判後、単有とする遺産分割で直ちに相続不可。"],"所有権の登記の抹消":["注意点（伊藤塾2019プレ模試）：錯誤で所有権移転抹消＝登記権利者である前所有権登記名義人の住所変更あっても変更できないので変更証する情報提供して抹消（前提としての変更はできない）"],"不登法::所有権の登記の抹消":["注意点（伊藤塾2019プレ模試）：錯誤で所有権移転抹消＝登記権利者である前所有権登記名義人の住所変更あっても変更できないので変更証する情報提供して抹消（前提としての変更はできない）"],"不登法::処分制限の登記":["注意点（伊藤塾2020公開模試）：破産管財人の任意売却＝破産手続開始の登記→管財人申立で書記官の嘱託により抹消 仮処分による一部失効→更正登記。 遅れる登記抹消しない場合→仮処分債権者の申立てで書記官が抹消嘱託 処分制限で持分記録なし。任意売却所有権移転→破産管財人の申立てで書記官の嘱託抹消 仮処分債権者の申立てで仮処分命令裁判所が更正決定＝書記官の嘱託で保全仮登記更正の登記＝仮処分債権者が更正登記するわけじゃ無い。保全仮登記の更正＝書記官の嘱託。 遅れる…"],"処分制限の登記":["注意点（伊藤塾2020公開模試）：破産管財人の任意売却＝破産手続開始の登記→管財人申立で書記官の嘱託により抹消 仮処分による一部失効→更正登記。 遅れる登記抹消しない場合→仮処分債権者の申立てで書記官が抹消嘱託 処分制限で持分記録なし。任意売却所有権移転→破産管財人の申立てで書記官の嘱託抹消 仮処分債権者の申立てで仮処分命令裁判所が更正決定＝書記官の嘱託で保全仮登記更正の登記＝仮処分債権者が更正登記するわけじゃ無い。保全仮登記の更正＝書記官の嘱託。 遅れる…","ポイント：一筆の土地の一部に処分禁止の仮処分の登記不可。ただし仮処分の決定書正本添付して、代位して分筆の登記可能 / 遅れる根抵当権の債権の範囲変更は抹消不可 / 通知は１週間 / 破産管財人の印鑑証明書なんでもいい"],"処分禁止の仮処分の登記":["注意点：仮処分に遅れる登記の抹消を申請=あらかじめ権利者に対し通知必要。仮処分債権者が仮処分債務者を義務者とする所有権の登記を申請する場合=単独抹消可能。建物収去土地明渡命令では所有権移転登記できない。"],"不登法::処分禁止の仮処分の登記":["注意点：仮処分に遅れる登記の抹消を申請=あらかじめ権利者に対し通知必要。仮処分債権者が仮処分債務者を義務者とする所有権の登記を申請する場合=単独抹消可能。建物収去土地明渡命令では所有権移転登記できない。"],"不登法::順位の変更の登記":["注意点（2020年TAC予想問題集）：更正＝前後で影響受けないものは申請人にならない。順位譲渡後に順位変更しても、登記官の職権では譲渡抹消されない。"],"順位の変更の登記":["注意点（2020年TAC予想問題集）：更正＝前後で影響受けないものは申請人にならない。順位譲渡後に順位変更しても、登記官の職権では譲渡抹消されない。"],"不登法::主登記・付記登記":["注意点（令和5年LEC直前予想模試）：所有権移転の仮登記を相続で移転＝主登記の仮登記。所有権以外の処分制限＝付記。抵当権の順位譲渡保全＝処分禁止の仮処分の執行としての抵当権の処分禁止の仮登記＝付記登記。 破産手続開始決定＝所有権は主・それ以外は付記。抵当権設定の破産法による否認の登記＝常に主登記 賃借権の先順位抵当権に優先する同意の登記・敷地権の登記・信託財産固有・自己信託・所有権に関する処分制限＝常に主登記。根抵当権の全部譲渡＝所有権以外の権利の移転＝付…","注意点：所有権目的の買戻権移転＝買戻権に付記。地上権消滅の定め＝付記登記。利息の特別の登記＝６６条。 賃借権の先順位抵当権に優先する同意＝主登記"],"主登記・付記登記":["注意点（令和5年LEC直前予想模試）：所有権移転の仮登記を相続で移転＝主登記の仮登記。所有権以外の処分制限＝付記。抵当権の順位譲渡保全＝処分禁止の仮処分の執行としての抵当権の処分禁止の仮登記＝付記登記。 破産手続開始決定＝所有権は主・それ以外は付記。抵当権設定の破産法による否認の登記＝常に主登記 賃借権の先順位抵当権に優先する同意の登記・敷地権の登記・信託財産固有・自己信託・所有権に関する処分制限＝常に主登記。根抵当権の全部譲渡＝所有権以外の権利の移転＝付…","注意点：所有権目的 関する登記":["注意点（伊藤塾2020公開模試）：譲渡制限廃止で公開移行＝取締役等選解任付株式の定め廃止の旨の発行可能種類株式総数及び発行する各種類の株式の内容の変更登記必要。取締役・監査役員数欠いて選任できない時も廃止とみなされるので変更登記必要。"],"商登法::役員その他に関する登記":["注意点（伊藤塾2020公開模試）：譲渡制限廃止で公開移行＝取締役等選解任付株式の定め廃止の旨の発行可能種類株式総数及び発行する各種類の株式の内容の変更登記必要。取締役・監査役員数欠いて選任できない時も廃止とみなされるので変更登記必要。"],"本店移転に関する登記":["注意点（伊藤塾2019公開模試）：旧所在地で本店移転と支配人を置いた営業所移転の登記申請。特例有限の解散と株式会社設立で商号変更可能＝本店移転は別途申請必要。新所在地での登記＝別添登記事項証明書のとおりという記載で省略OK。","注意点（伊藤塾2020公開模試2）：移転した旨と年月日のみでOK。役会設置会社＝定款変更伴わない移転＝移転後に役会の決議あったら役会決議の日が原因。本店移転総会決議の不存在確定＝裁判所書記官が職権で本店移転抹消登記嘱託"],"商登法::本店移転に関する登記":["注意点（伊藤塾2019公開模試）：旧所在地で本店移転と支配人を置いた営業所移転の登記申請。特例有限の解散と株式会社設立で商号変更可能＝本店移転は別途申請必要。新所在地での登記＝別添登記事項証明書のとおりという記載で省略OK。","注意点（伊藤塾2020公開模試2）：移転した旨と年月日のみでOK。役会設置会社＝定款変更伴わない移転＝移転後に役会の決議あったら役会決議の日が原因。本店移転総会決議の不存在確定＝裁判所書記官が職権で本店移転抹消登記嘱託"],"法人の登記における住所等":["注意点（伊藤塾2020ファイナル模試）：ビル→ビル2階にすでに同じ名称の別会社あったら移転不可。住居表示実施なら医療法人も変更登記必要。 重任なら代表の住民票移しも必要なく、前提としての住所変更登記不要。"],"商登法::法人の登記における住所等":["注意点（伊藤塾2020ファイナル模試）：ビル→ビル2階にすでに同じ名称の別会社あったら移転不可。住居表示実施なら医療法人も変更登記必要。 重任なら代表の住民票移しも必要なく、前提としての住所変更登記不要。"],"商登法::法人の登記":["注意点（伊藤塾2021プレ模試）：司法書士法人＝社員の欠亡で解散＝相続人の同意得て新たに社員加入で継続可能＝相続人同意書面と社員入社承諾書面必要。 宗教法人設立＝認証規則&代表者資格書面添付。医療法人理事長＝寄附行為の定め不要。 学校法人＝理事長以外の理事・監事・評議員の登記不要。特定非営利活動法人＝資産の総額登記不要","注意点：組合等（社会福祉法人含む）の資産の総額の変更=毎事業年度末日現在から3ヶ月以内にすればOK。医師理事長の医師証明重任でも省略不可。資産総額=特定非営利活動法人で記載不要。宗教法人の規則の変更=所轄庁の認証書の交付なければ効力生じない。学校法人=代表権の範囲制限の定め登記必要。"],"法人の登記":["注意点（伊藤塾2021プレ模試）：司法書士法人＝社員の欠亡で解散＝相続人の同意得て新たに社員加入で継続可能＝相続人同意書面と社員入社承諾書面必要。 宗教法人設立＝認証規則&代表者資格書面添付。医療法人理事長＝寄附行為の定め不要。 学校法人＝理事長以外の理事・監事・評議員の登記不要。特定非営利活動法人＝資産の総額登記不要","注意点：組合等（社会福祉法人含む）の資産の総額の変更=毎事業年度末日現在から3ヶ月以内にすればOK。医師理事長の医師証明重任でも省略不可。資産総額=特定非営利活動法人で記載不要。宗教法人の規則の変更=所轄庁の認証書の交付なければ効力生じない。学校法人=代表権の範囲制限の定め登記必要。","ポイント：司法書士法人の継続＝死亡した社員の同意書面＋新たな社員の入社承諾書添付 / 宗教法人の設立＝所轄庁の証明認証規則謄本及び代表の資格証する書面 / 学校法人は理事長以外登記不要 / 特定非営利法人に資産の総額登記不要"],"商登法::募集株式の発行の登記":["注意点（伊藤塾2022公開模試2）：非公開第三者＝総会決議で取締役または役会に委任可能（定款じゃない・株主割当なら定款） 譲渡制限変更決議後、募集株式効力発生＝譲渡制限効力発生→募集株式発行は登記可能、譲渡制限NG","注意点（伊藤塾2023公開模試）：代表と引受社団の代表同じ＝引受社団で利益相反承認必要。書類添付は不要。 取締役の報酬として発行＝払込金額期日不要・割当日必要。資本金の増加計算＝役務を割当後提供＝事業年度末日・割 任の制限に関する契約可能＝登記も必要。株式会社への名称変更による解散登記に一切の書面添付不要。","注意点：総会で代表定めたら、就任承諾書不要。議事録には従前の印ない限り議長と出席取締役の印鑑証明書必要。 「取締役が1名となったため代表取締役Aの氏名抹消」「会社を代表しない取締役の不存在により代表取締役Aの氏名抹消」。監査役の氏名と住所登記事項。特別決議の総株主＝議決権制限株主も含む。"],"商登法::特例有限会社の登記":["注意点（令和4年LEC直前予想模試）：株式会社に変更＝資本金の1000分の1.5（直前超える部分は1000分の7）、未満は3万円。株式への変更と同時に代表取締役選定にかかる取締役会議事録NG。＝移行と同時に定款に役会設置・最初の代表・効力発生時を設立にすれば可能。","注意点：非業務執行取締役または監査役の会社に対する責任の制限に関する契約可能＝登記も必要。株式会社への名称変更による解散登記に一切の書面添付不要。","注意点：総会で代表定めたら、就任承諾書不要。議事録には従前の印ない限り議長と出席取締役の印鑑証明書必要。 「取締役が1名となったため代表取締役Aの氏名抹消」「会社を代表しない取締役の不存在により代表取締役Aの氏名抹消」。監査役の氏名と住所登記事項。特別決議の総株主＝議決権制限株主も含む。"],"特別取締役の登記":["注意点（伊藤塾2023公開模試）：監査等委員会設置＝特別取締役存する＝役会で重要な業務執行取締役委任定款変更＝特別取締役の議決の定め廃止。本人確認証明適用なし。子会社業務執行取締役就任で社外性喪失。"],"商登法::特別取締役の登記":["注意点（伊藤塾2023公開模試）：監査等委員会設置＝特別取締役存する＝役会で重要な業務執行取締役委任定款変更＝特別取締役の議決の定め廃止。本人確認証明適用なし。子会社業務執行取締役就任で社外性喪失。"],"商登法::登録免許税":["注意点（伊藤塾2022プレ模試）：一般財団法人設立＝6万円。初めてする外国会社の登記＝日本に営業所ない６万・ある9万。未成年者の営業開始1.8万円。合資会社＝新設分割関わらず6万円。株式交付＝最低3万円","注意点：本支店移転＝ツで３万円。会社継続＝ソで３万円。合同会社の社員加入と資本金増加＝変更分と増加分両方必要","注意点：支配人の選任と代理権の消滅＝３万✖️２＝６万円。設立と同時に支店設置なら支店分の免許税不要"],"登記期間":["注意点（伊藤塾2023公開模試）：官庁の許可書が株式会社に到達した日に効力発生。外国会社＝本国で登記事項発生＝日本における代表者に到達してから3週間以内に登記","ポイント：官庁の許可書が株式会社に到達した日から２週間 / 支配人の選任＝登記期間なし"],"商登法::登記期間":["注意点（伊藤塾2023公開模試）：官庁の許可書が株式会社に到達した日に効力発生。外国会社＝本国で登記事項発生＝日本における代表者に到達してから3週間以内に登記"],"商登法::登記の更正・抹消":["注意点（伊藤塾2021公開模試2）：吸収分割の無効の訴え認容＝裁判所書記官の嘱託で抹消","注意点：登記官の過誤による錯誤・遺漏＝遅滞なく監督法務局・地方法務局長の許可を得て登記官が更正。 本店登記完了後に移転無効＝旧所在地に新旧分の抹消申請する"],"登記の更正・抹消":["注意点（伊藤塾2021公開模試2）：吸収分割の無効の訴え認容＝裁判所書記官の嘱託で抹消","注意点：登記官の過誤による錯誤・遺漏＝遅滞なく監督法務局・地方法務局長の許可を得て登記官が更正。 本店登記完了後に移転無効＝旧所在地に新旧分の抹消申請する"],"商登法::定款の添付":["注意点（伊藤塾2020ファイナル模試）：取得請求権付株式の取得と引換にする新株予約権の発行＝初めてなら定款添付必要。 株主名簿管理人設置・非公開の株主割当を役会で＝定款必要。"],"定款の添付":["注意点（伊藤塾2020ファイナル模試）：取得請求権付株式の取得と引換にする新株予約権の発行＝初めてなら定款添付必要。 株主名簿管理人設置・非公開の株主割当を役会で＝定款必要。"],"商登法::組織変更の登記":["注意点（伊藤塾2019プレ模試）：名資会社が組織変更＝債権者異議を二重公告による省略不可。合同会社の効力発生日変更＝社員の過半数","注意点（伊藤塾2022プレ模試）：株→合同＝変更直前における資産負債額並びに合同が株主に交付する財産価額記載した合同代表作成の書類の添付が必要になる。","注意点（伊藤塾2022公開模試2）：効力発生日の20日前までに登録株式質権者に対して通知または公告。持分→株式変更＝役員選定は変更後のルールで行う。株式→合資＝ 予想問題集）：取締役・監査等委員（社外取締役）○。仮取締役・監査等委員。 重要な業務執行の決定の取締役への委任についての定款の定め＝特別取締役にようる議決の定め当然に廃止。"],"商登法::監査等委員会設置会社の登記":["注意点（2020年TAC予想問題集）：取締役・監査等委員（社外取締役）○。仮取締役・監査等委員。 重要な業務執行の決定の取締役への委任についての定款の定め＝特別取締役にようる議決の定め当然に廃止。"],"商登法::監査等委員会設置会社・指名委員会等設置会社":["注意点（令和5年LEC直前予想模試）：監査等委員会置く旨＝監査役設置会社の定めの廃止&監査役の退任による変更申請必要。 社外取締役の旨抹消＝委任状以外いらない。重要な業務執行の委任後、委任に基づく決定＝取締役の決定証する書面及び委任した取締役会の議事録添付必要。変更前の代表執行役が取締役兼ねてないなら、印鑑証明必要。"],"監査等委員会設置会社・指名委員会等設置会社":["注意点（令和5年LEC直前予想模試）：監査等委員会置く旨＝監査役設置会社の定めの廃止&監査役の退任による変更申請必要。 社外取締役の旨抹消＝委任状以外いらない。重要な業務執行の委任後、委任に基づく決定＝取締役の決定証する書面及び委任した取締役会の議事録添付必要。変更前の代表執行役が取締役兼ねてないなら、印鑑証明必要。"],"株主リスト":["注意点（伊藤塾2018公開模試２）：特例有限が監査役置く旨廃止＝監査役退任するが株主リスト不要。 新株予約権の行使による変更登記＝募集事項定めた株主総会議事録必要→株主リストは不要。解散時の決算報告承認した議事録＝株主リスト必要。","注意点（伊藤塾2019公開模試）：募集株式の申込み期日短縮＝総会議事録にリスト必要。","注意点：不再任で株主リスト不要。通常の総会＝議決権割合の記載必要。全員の同意でのみなし決議＝株主リストは通常のでOK。新設合併のリストは消滅分も新会社代表が作成する。","ポイント：選解任権付種類株式での選解任に、株主リスト不要 / 発行済み株式をほかの種類の種類株式に変更＝株主リスト必要 / 清算決了も株主リスト必要"],"商登法::株主リスト":["注意点（伊藤塾2018公開模試２）：特例有限が監査役置く旨廃止＝監査役退任するが株主リスト不要。 新株予約権の行使による変更登記＝募集事項定めた株主総会議事録必要→株主リストは不要。解散時の決算報告承認した議事録＝株主リスト必要。","注意点（伊藤塾2019公開模試）：募集株式の申込み期日短縮＝総会議事録にリスト必要。","注意点：不再任で株主リスト不要。通常の総会＝議決権割合の記載必要。全員の同意でのみなし決議＝株主リストは通常のでOK。新設合併のリストは消滅分も新会社代表が作成する。"],"株式交付の登記":["注意点（伊藤塾2023公開模試）：対価5分の1なら原則計画承認不要＝親が非公開なら総会決議で承認必要 取得が譲渡制限なら子の役会承認必要（書面添付は不要）","注意点：株式交付親会社の株式に準ずるもの以外を対価とした交付＝債権者保護必要。非公開で1/5かつ対価が安い場合＝総会決議不要＝一定の株主は反対したら省略不可。簡易に該当する場合の書面も必要。変更後の効力発生日公告と申込者に通知＝変更に関する役会書面いるが公告書面は不要。"],"商登法::株式交付の登記":["注意点（伊藤塾2023公開模試）：対価5分の1なら原則計画承認不要＝親が非公開なら総会決議で承認必要 取得が譲渡制限なら子の役会承認必要（書面添付は不要）","注意点：株式交付親会社の株式に準ずるもの以外を対価とした交付＝債権者保護必要。非公開で1/5かつ対価が安い場合＝総会決議不要＝一定の株主は反対したら省略不可。簡易に該当する場合の書面も必要。変更後の効力発生日公告と申込者に通知＝変更に関する役会書面いるが公告書面は不要。"],"株式会社の役員等の登記":["注意点（伊藤塾2023公開模試2）：税理士法人合併＝会計参与の退任による変更登記&就任による変更の登記"],"商登法::株式会社の役員等の登記":["注意点（伊藤塾2023公開模試2）：税理士法人合併＝会計参与の退任による変更登記&就任による変更の登記"],"商登法::株式会社の役員等に関する登記":["注意点（伊藤塾2020公開模試2）：特別取締役の要件満たさなくなった場合も、すぐに後任就任した場合は議決の定め廃止されない。 非公開＝公開でも監査等委員会設置会社及び指名委員会等設置会社の取締役の任期満了しない。"],"株式会社の役員等に関する登記":["注意点（伊藤塾2020公開模試2）：特別取締役の要件満たさなくなった場合も、すぐに後任就任した場合は議決の定め廃止されない。 非公開＝公開でも監査等委員会設置会社及び指名委員会等設置会社の取締役の任期満了しない。"],"株式会社の設立の登記":["注意点（2021年TAC予想問題集）：創立総会選任調査者でも、設立登記に調査報告書添付不要。","注意点（令和4年LEC直前予想模試）：設立前に死亡＝死亡書面と残存役員のみで登記可能。","注意点（伊藤塾2019プレ模試）：発起設立＝認証後の定款の商号を全員の同意で変更＝変更書面に全員記名押印し再認証で足りる。設立時執行役＝設立時取締役が選任。定款で決めてないなら発起人の過半数で特別取締役選任。","注意点（伊藤塾2021公開模試2）：設立時取締役の就任承諾＝発起人の記名押印ある定款添付","注意点（2018年TAC予想問題集）：発起人が受ける報酬を定款で定めた時、検査役の調査省略不可能＋設立時調査報告書＋附属書類。 ①創立総会終結日②種類総会決議の日③引受けの取消可能決議の日から２週間を経過した日④引受け取消可能種類創立総会決議の日から２週間経過した日⑤設立時種類株主に損害及ぼす可能性ある場合の種類創立総会決議の日＝これらの日のうちもっとも遅い日から２週間以内に設立登記。","注意点（2019年TAC予想問題集）：株式会社の負担する設立費用（定款手数料除く）＝検査役の調査で報告書附属書類添付。 本店ない定款後から認証受けても無効。定款作成代理人証する書面不要。 譲渡制限か全部取得条項付種類株式とする創立総会決議＝設立時種類株式の引受取消可能だから、決議の日から２週間経過まで設立登記申請できない。","注意点：公証人作成の電子定款の謄本文書情報の添付可能。＝電子定款印刷してもダメ。創立総会で選任されたものによる調査報告書面の添付は不要。"],"商登法::株式会社の設立の登記":["注意点（2021年TAC予想問題集）：創立総会選任調査者でも、設立登記に調査報告書添付不要。","注意点（令和4年LEC直前予想模試）：設立前に死亡＝死亡書面と残存役員のみで登記可能。","注意点（伊藤塾2019プレ模試）：発起設立＝認証後の定款の商号を全員の同意で変更＝変更書面に全員記名押印し再認証で足りる。設立時執行役＝設立時取締役が選任。定款で決めてないなら発起人の過半数で特別取締役選任。","注意点（伊藤塾2021公開模試2）：設立時取締役の就任承諾＝発起人の記名押印ある定款添付","注意点（2018年TAC予想問題集）：発起人が受ける報酬を定款で定めた時、検査役の調査省略不可能＋設立時調査報告書＋附属書類。 ①創立総会終結日②種類総会決議の日③引受けの取消可能決議の日から２週間を経過した日④引受け取消可能種類創立総会決議の日から２週間経過した日⑤設立時種類株主に損害及ぼす可能性ある場合の種類創立総会決議の日＝これらの日のうちもっとも遅い日から２週間以内に設立登記。","注意点（2019年TAC予想問題集）：株式会社の負担する設立費用（定款手数料除く）＝検査役の調査で報告書附属書類添付。 本店ない定款後から認証受けても無効。定款作成代理人証する書面不要。 譲渡制限か全部取得条項付種類株式とする創立総会決議＝設立時種類株式の引受取消可能だから、決議の日から２週間経過まで設立登記申請できない。","注意点：公証人作成の電子定款の謄本文書情報の添付可能。＝電子定款印刷してもダメ。創立総会で選任されたものによる調査報告書面の添付は不要。"],"株式会社の設立":["注意点（2022年TAC予想問題集）：現物出資で変更→変更にかかる裁判の謄本が必要。成立後の資本金・準備金＝発起人全員の同意","注意点（伊藤塾2019公開模試2）：本店外国はNG。設立無効は将来効＝有効期間中の剰余金配当無効にならない","注意点（LEC2023実力診断模試）：変態設立事項の変更＝1週間以内なら発起人が定款変更可能＝募集設立は裁判所決定あっても創立総会で変更","注意点（伊藤塾2023公開模試2）：発起人は日本に住所なくてOK。被保佐人＝代理権の審判で保佐人代理する時除き被保佐人が就任承諾必要。","注意点（LEC直前予想模試2022）：取得する種類の株式＝売主追加請求可能。他の種類の株主は不可。追加請求できない定め設定・変更は当該株主全員の同意必要","注意点（2020年TAC予想問題集）：定款で定められた設立時取締役＝出資の履行完了時に選任とみなされる。 解任＝創立総会で設立時株主の過半数で出席の3分の2。設立無効の訴え認容→将来効","注意点：発行する全部の株式の内容として譲渡制限株式の定めの定款変更＝設立時株主の半数かつ議決権の2/3必要。 発起で監査役選任権付種類株式発行＝引き受けた発起人の過半数で選任。種類株式発行会社で剰余金配当異なるかつ初発行までに定める定款ある場合＝発起人全員の同意得て具体的内容定めなければならない。 募集設立も設立時募集株式の数を発起人全員の同意で決定。","注意点：設立時会計監査人は変態設立事項の調査可能。検査役の調査いらなくても設立時取締役と監査役の調査は必要＝弁護士等の証明が妥当かについても＝調査報告及びその付属書類。"],"商登法::株式会社の設立":["注意点（2022年TAC予想問題集）：現物出資で変更→変更にかかる裁判の謄本が必要。成立後の資本金・準備金＝発起人全員の同意","注意点：設立時会計監査人は変態設立事項の調査可能。検査役の調査いらなくても設立時取締役と監査役の調査は必要＝弁護士等の証明が妥当かについても＝調査報告及びその付属書類。"],"商登法::株式移転の登記":["注意点（伊藤塾2020ファイナル模試）：株式移転・新設分割なら設立時の就任承諾書に印鑑証明必要。子会社管轄区域外なら代表の印鑑証明必要"],"株式移転の登記":["注意点（伊藤塾2020ファイナル模試）：株式移転・新設分割なら設立時の就任承諾書に印鑑証明必要。子会社管轄区域外なら代表の印鑑証明必要"],"商登法::株式の登記":["注意点（令和5年LEC直前予想模試）：取締役等選解任権付種類株式発行会社が譲渡制限撤廃＝取締役等選解任権付種類株式の定め廃止による変更登記必要。株主名簿管理人を事実上置いた日（事務委託契約締結日）から2週間以内に変更登記必要 損害及ぼすおそれあっても種類総会要しない変更＝種類株主全員の同意","注意点（伊藤塾2022公開模試）：取得請求権＝対価株式なら分配可能額問題にならない。 株券発行会社が譲渡制限＝1ヶ月前までに公告かつ通知。株券発行廃止＝2週間前までに無効になる公告及び通知。","注意点（伊藤塾2023プレ模試）：非公開の第三者割当て＝通知・公告不要（総会決議ある）だから期間短縮問題にならない。"],"株式の登記":["注意点（令和5年LEC直前予想模試）：取締役等選解任権付種類株式発行会社が譲渡制限撤廃＝取締役等選解任権付種類株式の定め廃止による変更登記必要。株主名簿管理人を事実上置いた日（事務委託契約締結日）から2週間以内に変更登記必要 損害及ぼすおそれあっても種類総会要しない変更＝種類株主全員の同意","注意点（伊藤塾2022公開模試）：取得請求権＝対価株式なら分配可能額問題にならない。 株券発行会社が譲渡制限＝1ヶ月前までに公告かつ通知。株券発行廃止＝2週間前までに無効になる公告及び通知。","注意点（伊藤塾2023プレ模試）：非公開の第三者割当て＝通知・公告不要（総会決議ある）だから期間短縮問題にならない。"],"商登法::株式に関する登記":["注意点（伊藤塾2018公開模試）：株券発行会社＝譲渡制限なら1ヶ月前に提供広告必要。種類発行後に種類総会要しない変更＝種類全員の同意必要 株式の併合＝20日前までに通知または公告。金銭債権の弁済期到来確認できなくても、期限の利益放棄明らかじゃなければ受理される。","注意点：剰余金の配当＝内容の異なる2種類の株式＝配当財産の種類以外は要綱で足りる＝要綱も登記事項。損害及ぼす恐れあっても決議要しない旨は登記事項"],"株式に関する登記":["注意点（伊藤塾2018公開模試）：株券発行会社＝譲渡制限なら1ヶ月前に提供広告必要。種類発行後に種類総会要しない変更＝種類全員の同意必要 株式の併合＝20日前までに通知または公告。金銭債権の弁済期到来確認できなくても、期限の利益放棄明らかじゃなければ受理される。","注意点：剰余金の配当＝内容の異なる2種類の株式＝配当財産の種類以外は要綱で足りる＝要綱も登記事項。損害及ぼす恐れあっても決議要しない旨は登記事項"],"商登法::株式、新株予約権及び資本金の額に関する登記":["注意点（伊藤塾2020公開模試）：取得条項付株式の取得と引換に株式発行＝資本金増加しない。"],"株式、新株予約権及び資本金の額に関する登記":["注意点（伊藤塾2020公開模試）：取得条項付株式の取得と引換に株式発行＝資本金増加しない。"],"外国会社の登記":["注意点（LEC2023実力診断模試）：全員の退任＝清算以外なら債権者保護必要＝全員退任証する書面添付した時除き債権者保護証する書面添付必要。 持分会社の社員になる時も前提としての外国会社の登記不要。支配人設置＝全ての営業所で登記必要","注意点（伊藤塾2023公開模試）：継続して取引＝日本に住所有する代表ひとり必要。代表法人でも可能。日本における代表者が登記できない時は新たに代表決めなきゃいけない。","注意点：日本における代表者は法人でもOK。代表者に住所が法律事務所でもOK。支配人は全ての営業所で登記。日本の代表者の全ての住所地で登記必要＝経由は不要。営業廃止で代表者所在不明の場合、新たな代表者選任して代表者の変更と営業所廃止の登記をするべき"],"商登法::外国会社の登記":["注意点（LEC2023実力診断模試）：全員の退任＝清算以外なら債権者保護必要＝全員退任証する書面添付した時除き債権者保護証する書面添付必要。 持分会社の社員になる時も前提としての外国会社の登記不要。支配人設置＝全ての営業所で登記必要","注意点（伊藤塾2023公開模試）：継続して取引＝日本に住所有する代表ひとり必要。代表法人でも可能。日本における代表者が登記できない時は新たに代表決めなきゃいけない。","注意点：日本における代表者は法人でもOK。代表者に住所が法律事務所でもOK。支配人は全ての営業所で登記。日本の代表者の全ての住所地で登記必要＝経由は不要。営業廃止で代表者所在不明の場合、新たな代表者選任して代表者の変更と営業所廃止の登記をするべき"],"商登法::解散に関する登記":["注意点（伊藤塾2019公開模試）：数ヶ月先の解散決議NG。3日程度であればOK。みなし解散からの継続＝新たに選定する代表（従前の届出印関係なく印鑑証明提出必要）"],"解散に関する登記":["注意点（伊藤塾2019公開模試）：数ヶ月先の解散決議NG。3日程度であればOK。みなし解散からの継続＝新たに選定する代表（従前の届出印関係なく印鑑証明提出必要）"],"解散した会社の登記":["注意点（2023年TAC予想問題集）：同時廃止なら会社継続不可。破産債権者の同意による廃止決定なら継続され、廃止時に管財人登記抹消される。"],"商登法::解散した会社の登記":["注意点（2023年TAC予想問題集）：同時廃止なら会社継続不可。破産債権者の同意による廃止決定なら継続され、廃止時に管財人登記抹消される。"],"解散・清算に関する登記":["注意点（令和5年LEC直前予想模試）：定款で決めた清算人＝就任承諾書面必要。解散前に監査役設置会社だったら解散後も監査役設置会社。"],"商登法::解散・清算に関する登記":["注意点（令和5年LEC直前予想模試）：定款で決めた清算人＝就任承諾書面必要。解散前に監査役設置会社だったら解散後も監査役設置会社。"],"会社分割の登記":["注意点（伊藤塾2021公開模試2）：吸収分割承継の資本金＝対価株式の時のみ吸収分割契約の定めに伴い増加。承継の株式全部を剰余金として配当交付する場合のみ、承継会社の資本金増加可能。 組織変更でも新設分割・株式移転なら設立時代表執行役の就任承諾に対する印鑑証明必要。","ポイント：吸収分割時、対価が承継の株式のみ剰余金の配当をする場合でも、資本金の減少になる訳ではない / 新設分割で不法行為債権者の異議省略不可能 / 簡易吸収分割承認不要 / 新設分割・株式移転による指名委員会等設置会社の設立は、設立時代表執行役の就任承諾書に印鑑証明必要 / 吸収分割合同会社＝一部承継なら社員の過半数の一致で足りる。"],"商登法::会社分割の登記":["注意点（伊藤塾2021公開模試2）：吸収分割承継の資本金＝対価株式の時のみ吸収分割契約の定めに伴い増加。承継の株式全部を剰余金として配当交付する場合のみ、承継会社の資本金増加可能。 組織変更でも新設分割・株式移転なら設立時代表執行役の就任承諾に対する印鑑証明必要。"],"商登法::会社分割に関する登記":["注意点（伊藤塾2018公開模試２）：吸収分割合同会社＝権利義務全部承継なら総社員の同意・一部なら過半数。新設分割＝1000分の7。新設合併1.5"],"会社分割に関する登記":["注意点（伊藤塾2018公開模試２）：吸収分割合同会社＝権利義務全部承継なら総社員の同意・一部なら過半数。新設分割＝1000分の7。新設合併1.5"],"商登法::会社以外の商人の商号の登記":["注意点（2020年TAC予想問題集）：同一の商号使用しようとするもの＝抹消の登記申請可能。商号の相続による変更＝被相続人の記録閉鎖するとともに新しい登記記録起こす。商号譲渡による変更の登記は譲受人がする（譲渡証する書面必要） 免責の登記同時じゃなくていい。"],"会社以外の商人の商号の登記":["注意点（2020年TAC予想問題集）：同一の商号使用しようとするもの＝抹消の登記申請可能。商号の相続による変更＝被相続人の記録閉鎖するとともに新しい登記記録起こす。商号譲渡による変更の登記は譲受人がする（譲渡証する書面必要） 免責の登記同時じゃなくていい。"],"会計参与及び会計監査人に関する登記":["注意点（伊藤塾2019公開模試）：会計参与の後見開始＝委任の規定に従い退任による変更登記必要。会計監査人の任期満了時の定時株主総会が開かれなかった時＝退任の変更登記必要（仮会計監査人の選任もとめるのが適切）職務違反は監査役全員の同意で解任可能"],"商登法::会計参与及び会計監査人に関する登記":["注意点（伊藤塾2019公開模試）：会計参与の後見開始＝委任の規定に従い退任による変更登記必要。会計監査人の任期満了時の定時株主総会が開かれなかった時＝退任の変更登記必要（仮会計監査人の選任もとめるのが適切）職務違反は監査役全員の同意で解任可能"],"商登法::会計参与に関する登記":["注意点（伊藤塾2020プレ模試）：子会社の監査役＝会計参与になれない。法定相続情報一覧図も死亡証する書面にできる。 裁判所書記官の職権で仮会計参与の登記嘱託される。"],"会計参与に関する登記":["注意点（伊藤塾2020プレ模試）：子会社の監査役＝会計参与になれない。法定相続情報一覧図も死亡証する書面にできる。 裁判所書記官の職権で仮会計参与の登記嘱託される。"],"商登法::会計監査人の登記":["注意点（令和4年LEC直前予想模試）：業務停止処分＝欠格事由なので、業務一時停止日を日付で退任登記必要。"],"会計監査人の登記":["注意点（令和4年LEC直前予想模試）：業務停止処分＝欠格事由なので、業務一時停止日を日付で退任登記必要。","ポイント：監査法人の名称変更＝総社員の同意で定款変更"],"仮会計監査人の登記":["注意点（伊藤塾2022公開模試2）：現に会計監査人が欠けていないと選任不可。監査役が独自に選任可能。抹消は登記官が職権で。"],"商登法::仮会計監査人の登記":["注意点（伊藤塾2022公開模試2）：現に会計監査人が欠けていないと選任不可。監査役が独自に選任可能。抹消は登記官が職権で。"],"印鑑の提出等":["注意点（伊藤塾2022公開模試）：印鑑未提出の商人選任の支配人＝印鑑提出時は3ヶ月以内の印鑑証明必要。氏名婚姻変更＝印鑑記録は登記官が変更。破産開始決定当時の代表は印鑑証明書の交付請求可能"],"商登法::印鑑の提出等":["注意点（伊藤塾2022公開模試）：印鑑未提出の商人選任の支配人＝印鑑提出時は3ヶ月以内の印鑑証明必要。氏名婚姻変更＝印鑑記録は登記官が変更。破産開始決定当時の代表は印鑑証明書の交付請求可能"],"一般社団法人及び一般財団法人の登記":["注意点（伊藤塾2018公開模試）：一般財団の評議員＝定款で選解任。社団は社員名登記しない。"],"商登法::一般社団法人及び一般財団法人の登記":["注意点（伊藤塾2018公開模試）：一般財団の評議員＝定款で選解任。社団は社員名登記しない。"],"商登法::一般社団法人の登記":["注意点（2022年TAC予想問題集）：休眠一般社団法人＝最後の登記から5年。監事＝住所登記不要。","注意点（2023年TAC予想問題集）：設立時理事＝法令定款違反調査。電磁的方法で5年提供すれば貸借対照表の公告不要。","注意点（2018年TAC予想問題集）：名称区に会社法人等番号記録される。評議員おけない。資産の総額は貸借対照表を公告。非業務執行理事が負う責任の限度に関する契約の締結についての定款の定めも登記事項。支配人の選任不可。"],"一般社団法人の登記":["注意点（2022年TAC予想問題集）：休眠一般社団法人＝最後の登記から5年。監事＝住所登記不要。","注意点（2023年TAC予想問題集）：設立時理事＝法令定款違反調査。電磁的方法で5年提供すれば貸借対照表の公告不要。","注意点（2018年TAC予想問題集）：名称区に会社法人等番号記録される。評議員おけない。資産の総額は貸借対照表を公告。非業務執行理事が負う責任の限度に関する契約の締結についての定款の定めも登記事項。支配人の選任不可。","ポイント：理事・監事・評議員も就任時に本人確認証明書が必要"],"商登法::一般社団法人・一般財団法人の登記":["注意点（令和4年LEC直前予想模試）：社団＝社員欠けると解散→証する書面不要。設立時代表理事が登記。 決算承認の清算人会の議事録不要＝評議委員会の書類が必要。社員総会設置・社員氏名住所は登記事項じゃない。 財団の評議員は氏名登記","注意点（令和5年LEC直前予想模試）：一般社団法人＝理事＝社員総会決議で選任。社員総会議事録&就任承諾→財団法人の評議員は定款で定める方法で選任＝定めた方法で選任証する書面&就任承諾&定款必要。理事会じゃなく定款に基づく社員総会で代表理事決めたら定款添付必要。 一般財団法人＝目的・評議員の選解任の方法に係る定款変更不可＝設立時定款で評議員会で変更できる旨あれば変更可能。特別の事情運営継続 :窃盗罪":["注意点（2022年TAC予想問題集）：情報コピー用紙にしたら全体として財物になる。","注意点（LEC直前予想模試2022）：設立時委員の選定は設立時取締役の過半数で決定","注意点：店員が店のもの盗む＝占有は店主なので窃盗成立。内縁に親族相盗例適用なし"],"刑法::窃盗の罪":["注意点（伊藤塾2020公開模試2）：排除意思と利用処分意思必要＝自首目的で利用意思なく窃盗しても窃盗罪にならない。 6階から地下1階に10分忘れた＝占有なしなので遺失物等横領になる。賃貸借終了後も占有＝他人の占有侵奪してないから不動産侵奪罪にならない。"],"窃盗の罪":["注意点（伊藤塾2020公開模試2）：排除意思と利用処分意思必要＝自首目的で利用意思なく窃盗しても窃盗罪にならない。 6階から地下1階に10分忘れた＝占有なしなので遺失物等横領になる。賃貸借終了後も占有＝他人の占有侵奪してないから不動産侵奪罪にならない。"],"刑法::責任":["注意点（伊藤塾2023公開模試）：責任能力＝実行行為の時にあれば足りる（結果的加重犯の時に責任能力不要）"],"責任":["注意点（伊藤塾2023公開模試）：責任能力＝実行行為の時にあれば足りる（結果的加重犯の時に責任能力不要）","注意点（令和５年予備試験）：場屋営業者は、注意していたことを証明できたとしても、不可抗力が原因でない場合は、損害賠償責任を負う"],"刑法::正当防衛":["注意点（2023年TAC予想問題集）：喧嘩の最中ナイフに対して拳＝正当防衛"],"正当防衛":["注意点（2023年TAC予想問題集）：喧嘩の最中ナイフに対して拳＝正当防衛"],"人の生命・身体に対する罪":["注意点（伊藤塾2021公開模試）：赤ちゃん栄養失調にしたら生命危険なくても保護責任者遺棄罪成立。"],"刑法::人の生命・身体に対する罪":["注意点（伊藤塾2021公開模試）：赤ちゃん栄養失調にしたら生命危険なくても保護責任者遺棄罪成立。"],"刑法::信用及び業務に対する罪":["注意点（伊藤塾2022公開模試）：信用毀損罪＝虚偽の風説流布・偽計を用いて人の信用を毀損。業務妨害の業務は適法でなくても該当。 信用毀損罪＝法人や商品品質に対する社会的信頼含む。警察官による捜索差押え＝公務執行妨害のみ。"],"信用及び業務に対する罪":["注意点（伊藤塾2022公開模試）：信用毀損罪＝虚偽の風説流布・偽計を用いて人の信用を毀損。業務妨害の業務は適法でなくても該当。 信用毀損罪＝法人や商品品質に対する社会的信頼含む。警察官による捜索差押え＝公務執行妨害のみ。"],"刑法::傷害罪":["注意点（2022年TAC予想問題集）：暴行＝人の身体に向けた不法な有形力の行使。具体的危険。同時暴行＝傷害致死なら共同正犯。 暴行の意思で障害→傷害罪。生理的機能に障害。"],"傷害罪":["注意点（2022年TAC予想問題集）：暴行＝人の身体に向けた不法な有形力の行使。具体的危険。同時暴行＝傷害致死なら共同正犯。 暴行の意思で障害→傷害罪。生理的機能に障害。"],"刑法::傷害の罪":["注意点（伊藤塾2020公開模試2）：ストレス＝生理的機能傷害。暴行＝有形力行使。現場助勢罪＝もっとやれで片方だけ助勢→傷害罪の従犯（幇助犯）。両方囃し立てなら成立。"],"傷害の罪":["注意点（伊藤塾2020公開模試2）：ストレス＝生理的機能傷害。暴行＝有形力行使。現場助勢罪＝もっとやれで片方だけ助勢→傷害罪の従犯（幇助犯）。両方囃し立てなら成立。"],"刑法::自由及び私生活の平穏に対する罪":["注意点（伊藤塾2022公開模試2）：不同意わいせつ等致死傷＝逃走のための暴行でも適用・殺意持って殺した場合は観念的競合。 監禁＝脱出できないよう自由拘束。偽計で錯誤利用する場合も含む。 営業活動妨害告知＝生命・身体・自由・名誉・財産じゃないから脅迫にあたらない。家出人＝他人扱い"],"自由及び私生活の平穏に対する罪":["注意点（伊藤塾2022公開模試2）：不同意わいせつ等致死傷＝逃走のための暴行でも適用・殺意持って殺した場合は観念的競合。 監禁＝脱出できないよう自由拘束。偽計で錯誤利用する場合も含む。 営業活動妨害告知＝生命・身体・自由・名誉・財産じゃないから脅迫にあたらない。家出人＝他人扱い"],"刑法::事実の錯誤":["注意点（伊藤塾2021公開模試2）：B殺害の意思でBC死亡＝数故意犯説＝観念的競合。住居侵入窃盗教唆で暴行のみ＝住居侵入と強盗致傷成立→牽連犯。住居侵入と窃盗未遂の教唆犯成立。Bに殺意で動物殺害＝殺人未遂のみ成立。"],"事実の錯誤":["注意点（伊藤塾2021公開模試2）：B殺害の意思でBC死亡＝数故意犯説＝観念的競合。住居侵入窃盗教唆で暴行のみ＝住居侵入と強盗致傷成立→牽連犯。住居侵入と窃盗未遂の教唆犯成立。Bに殺意で動物殺害＝殺人未遂のみ成立。"],"刑法::司法作用に対する罪":["注意点（伊藤塾2020公開模試）：他人が犯人に証拠隠滅教唆しても教唆犯成立しない＝犯人が他人で成立。"],"司法作用に対する罪":["注意点（伊藤塾2020公開模試）：他人が犯人に証拠隠滅教唆しても教唆犯成立しない＝犯人が他人で成立。"],"殺人または傷害の罪":["注意点（伊藤塾2018公開模試）：髪切断＝暴行"],"刑法::殺人または傷害の罪":["注意点（伊藤塾2018公開模試）：髪切断＝暴行"],"刑法::罪数":["注意点（伊藤塾2023プレ模試）：観念的競合＝1個の行為が2個以上の罪名に触れる場合。窃盗と銃刀法剣類所持取締法違反＝併合罪。 牽連犯＝犯罪の手段結果である行為が他の罪名に触れる時。他方の手段・結果となること＝私文書偽造と偽造私文書行使罪は牽連犯。住居侵入と殺人＝牽連犯（かすがい現象） 包括一罪＝数個の行為が構成要件的に包括して評価され一罪となる場合。業務上過失致死と殺人罪は併合罪。 窃取したキャッシュカード使って払い戻し＝新たな法益侵害→窃盗罪の併合罪。","注意点：時間的場所的に近接＝一連の行為＝一罪。１個の行為で殺人２人＝観念的競合。私文書偽造と詐欺＝牽連犯。恐喝と監禁は併合罪。","注意点：幇助の個数は正犯の数で判定＝観念的競合。科刑上一罪でも懲役刑に罰金刑併科可能。"],"罪数":["注意点（伊藤塾2023プレ模試）：観念的競合＝1個の行為が2個以上の罪名に触れる場合。窃盗と銃刀法剣類所持取締法違反＝併合罪。 牽連犯＝犯罪の手段結果である行為が他の罪名に触れる時。他方の手段・結果となること＝私文書偽造と偽造私文書行使罪は牽連犯。住居侵入と殺人＝牽連犯（かすがい現象） 包括一罪＝数個の行為が構成要件的に包括して評価され一罪となる場合。業務上過失致死と殺人罪は併合罪。 窃取したキャッシュカード使って払い戻し＝新たな法益侵害→窃盗罪の併合罪。","注意点：時間的場所的に近接＝一連の行為＝一罪。１個の行為で殺人２人＝観念的競合。私文書偽造と詐欺＝牽連犯。恐喝と監禁は併合罪。","注意点：幇助の個数は正犯の数で判定＝観念的競合。科刑上一罪でも懲役刑に罰金刑併科可能。"],"詐欺罪":["注意点（伊藤塾2019公開模試）：登記官に不動産処分する権限無い→登記書類偽造＝公正証書原本不実記載罪。 他人乗せるのに搭乗券請求＝詐欺。健康保険証なりすまし請求＝詐欺。パスポート＝免状等不実記載罪のみ。"],"刑法::詐欺罪":["注意点（伊藤塾2019公開模試）：登記官に不動産処分する権限無い→登記書類偽造＝公正証書原本不実記載罪。 他人乗せるのに搭乗券請求＝詐欺。健康保険証なりすまし請求＝詐欺。パスポート＝免状等不実記載罪のみ。"],"刑法::詐欺の罪":["注意点（伊藤塾2020プレ模試）：横領の他詐欺利得罪は成立しない。"],"詐欺の罪":["注意点（伊藤塾2020プレ模試）：横領の他詐欺利得罪は成立しない。"],"国家的法益に対する罪":["注意点（伊藤塾2020ファイナル模試）：公務員からの恐喝＝恐喝と収賄の観念的競合。被恐喝者も贈賄罪成立。休憩宣言時点では職務現に執行だから殴ったら公務執行妨害"],"刑法::国家的法益に対する罪":["注意点（伊藤塾2020ファイナル模試）：公務員からの恐喝＝恐喝と収賄の観念的競合。被恐喝者も贈賄罪成立。休憩宣言時点では職務現に執行だから殴ったら公務執行妨害"],"刑法::公務執行妨害罪":["注意点（伊藤塾2021公開模試2）：外国大使館の職員＝公務員に当たらない。補助者に対しても適用。税務調査で検査章持ってなくても妨害したら公務執行妨害成立。事後強盗罪と公務執行妨害＝観念的競合。"],"公務執行妨害罪":["注意点（伊藤塾2021公開模試2）：外国大使館の職員＝公務員に当たらない。補助者に対しても適用。税務調査で検査章持ってなくても妨害したら公務執行妨害成立。事後強盗罪と公務執行妨害＝観念的競合。"],"刑法における故意または過失":["注意点（伊藤塾2019公開模試）：殺人の故意で発砲→犬に命中＝殺人未遂のみ成立"],"刑法::刑法における故意または過失":["注意点（伊藤塾2019公開模試）：殺人の故意で発砲→犬に命中＝殺人未遂のみ成立"],"緊急避難":["注意点（伊藤塾2019公開模試2）：やむを得ずにした行為＝唯一の方法。業務上特別の義務があるもの＝義務の趣旨に反しないなら緊急避難成立"],"刑法::緊急避難":["注意点（伊藤塾2019公開模試2）：やむを得ずにした行為＝唯一の方法。業務上特別の義務があるもの＝義務の趣旨に反しないなら緊急避難成立"],"刑法::強盗の罪":["注意点（伊藤塾2023プレ模試）：暴行脅迫後に被害者が犯行不能＝財物奪取の意思生じて奪った＝窃盗罪成立。強盗予備に中止犯なし。 財物取り返されること・逮捕防ぐ目的で暴行・脅迫＝事後強盗罪。あわせて公務執行妨害も成立する。 事後強盗の既遂未遂は財物奪取の有無で決まる。強盗致傷の成立検討。強盗殺人＝財物ではなく死傷の結果で決まる。"],"強盗の罪":["注意点（伊藤塾2023プレ模試）：暴行脅迫後に被害者が犯行不能＝財物奪取の意思生じて奪った＝窃盗罪成立。強盗予備に中止犯なし。 財物取り返されること・逮捕防ぐ目的で暴行・脅迫＝事後強盗罪。あわせて公務執行妨害も成立する。 事後強盗の既遂未遂は財物奪取の有無で決まる。強盗致傷の成立検討。強盗殺人＝財物ではなく死傷の結果で決まる。"],"共犯":["注意点（2021年TAC予想問題集）：盗品等有償処分あっせん罪＝盗品の運搬、保管、購入について、後段は盗品を買ってくれる人を探す行為を処罰","注意点（伊藤塾2022公開模試2）：是非善悪判断可能な幼女利用して窃盗＝間接正犯。得意先が陳列すると知りながらわいせつフィルム貸与＝猥褻物陳列罪の幇助犯","注意点（LEC直前予想模試2022）：受託者が内容物のみ抜き取った場合、窃盗罪。共同保管者が自己の占有に移す行為＝窃盗。","注意点（2019年TAC予想問題集）：教唆されたものが教唆された犯罪事実を実行したら処罰関係なく成立。 教唆行為あきらめて新たな意思で犯罪＝因果関係なし。"],"刑法::共犯":["注意点（2021年TAC予想問題集）：盗品等有償処分あっせん罪＝盗品の運搬、保管、購入について、後段は盗品を買ってくれる人を探す行為を処罰","注意点（伊藤塾2022公開模試2）：是非善悪判断可能な幼女利用して窃盗＝間接正犯。得意先が陳列すると知りながらわいせつフィルム貸与＝猥褻物陳列罪の幇助犯","注意点（LEC直前予想模試2022）：受託者が内容物のみ抜き取った場合、窃盗罪。共同保管者が自己の占有に移す行為＝窃盗。","注意点（2019年TAC予想問題集）：教唆されたものが教唆された犯罪事実を実行したら処罰関係なく成立。 教唆行為あきらめて新たな意思で犯罪＝因果関係なし。"],"偽造の罪":["注意点（2023年TAC予想問題集）：コピーのコピーでも公文書偽造成立。虚偽の登記申請＝電磁的公正証書原本不実記録罪。 虚偽診断書等作成罪＝公務所に提出するものだけ。医師が公務員なら虚偽公文書作成等罪。偽造手形を見せ手形＝偽造有価証券行使罪。友人に器用さ自慢で偽造幣紙作成＝セーフ","注意点：行使の目的で偽造通貨を収得＝偽造通貨習得罪。通貨自体に行使の目的不要。無償でも成立。私文書偽造＝名義人と作成者の人格同一性偽ること。偽造卒業書書提示＝偽造公文書行使罪。取引先に手形を真正なものとして見せるだけで偽造有価証券行使罪成立。（通貨行使は流通に置くこと必要）"],"刑法::偽造の罪":["注意点（2023年TAC予想問題集）：コピーのコピーでも公文書偽造成立。虚偽の登記申請＝電磁的公正証書原本不実記録罪。 虚偽診断書等作成罪＝公務所に提出するものだけ。医師が公務員なら虚偽公文書作成等罪。偽造手形を見せ手形＝偽造有価証券行使罪。友人に器用さ自慢で偽造幣紙作成＝セーフ","注意点：行使の目的で偽造通貨を収得＝偽造通貨習得罪。通貨自体に行使の目的不要。無償でも成立。私文書偽造＝名義人と作成者の人格同一性偽ること。偽造卒業書書提示＝偽造公文書行使罪。取引先に手形を真正なものとして見せるだけで偽造有価証券行使罪成立。（通貨行使は流通に置くこと必要）"],"刑法::横領罪等":["注意点（伊藤塾2019公開模試2）：横領罪の保護法益は所有権＝質物という担保物件侵害＝背任罪。抵当権設定・所有権移転＝それぞれ横領罪"],"横領罪等":["注意点（伊藤塾2019公開模試2）：横領罪の保護法益は所有権＝質物という担保物件侵害＝背任罪。抵当権設定・所有権移転＝それぞれ横領罪"],"横領罪":["注意点（令和5年LEC直前予想模試）：登記上自己の他人所有＝本人から移転登記求められて自己所有権主張は横領罪。不実の抵当権仮登記＝横領罪 所有権の侵害必要＝質権者から委託質物保管中、所有権者に変換しても所有権侵害してない。 抵当権設定後売却＝横領罪"],"刑法::横領罪":["注意点（令和5年LEC直前予想模試）：登記上自己の他人所有＝本人から移転登記求められて自己所有権主張は横領罪。不実の抵当権仮登記＝横領罪 所有権の侵害必要＝質権者から委託質物保管中、所有権者に変換しても所有 で調査者選任可能。発起で種類なし＝設立時監査役解任は発起人の議決権の3分の2。設立の無効は2年以内に訴えをもってのみ（公開非公開関係ない）。"],"株式会社の設立手続":["注意点（2021年TAC予想問題集）：設立時取締役の一部でも発起人がいれば、創立総会決議で調査者選任可能。発起で種類なし＝設立時監査役解任は発起人の議決権の3分の2。設立の無効は2年以内に訴えをもってのみ（公開非公開関係ない）。"],"会社法::株式会社の設立":["注意点（伊藤塾2019公開模試2）：本店外国はNG。設立無効は将来効＝有効期間中の剰余金配当無効にならない","注意点（LEC2023実力診断模試）：変態設立事項の変更＝1週間以内なら発起人が定款変更可能＝募集設立は裁判所決定あっても創立総会で変更","注意点（伊藤塾2023公開模試2）：発起人は日本に住所なくてOK。被保佐人＝代理権の審判で保佐人代理する時除き被保佐人が就任承諾必要。","注意点（LEC直前予想模試2022）：取得する種類の株式＝売主追加請求可能。他の種類の株主は不可。追加請求できない定め設定・変更は当該株主全員の同意必要","注意点（2020年TAC予想問題集）：定款で定められた設立時取締役＝出資の履行完了時に選任とみなされる。 解任＝創立総会で設立時株主の過半数で出席の3分の2。設立無効の訴え認容→将来効","注意点：発行する全部の株式の内容として譲渡制限株式の定めの定款変更＝設立時株主の半数かつ議決権の2/3必要。 発起で監査役選任権付種類株式発行＝引き受けた発起人の過半数で選任。種類株式発行会社で剰余金配当異なるかつ初発行までに定める定款ある場合＝発起人全員の同意得て具体的内容定めなければならない。 募集設立も設立時募集株式の数を発起人全員の同意で決定。"],"株式会社の資本金の額等":["注意点（令和5年LEC直前予想模試）：剰余金の額減少＝総会普通決議。資本金の額の効力発生日＝発生日前はいつでも変更可能かつ公告不要。"],"会社法::株式会社の資本金の額等":["注意点（令和5年LEC直前予想模試）：剰余金の額減少＝総会普通決議。資本金の額の効力発生日＝発生日前はいつでも変更可能かつ公告不要。"],"会社法::株式移転":["注意点（伊藤塾2019プレ模試）：取締役会の決議で計画承認できない。対価金銭は不可。","注意点（伊藤塾2022プレ模試）：設立が指名委員会等設置会社＝移転計画で設立時取締役・会計監査人は決定必要。委員・執行役・代表執行役は設立後の設立時取締役が定めるから決めなくていい。","ポイント：全部を設立株式会社に移転。 / 移転計画で設立時委員、設立時執行役の氏名定める必要ない / 取締役・会計監査人の氏名は計画で定める / 子会社の承認決議は特殊決議 / 新株予約権付社債権者は子会社に異議OK"],"株式移転":["注意点（伊藤塾2019プレ模試）：取締役会の決議で計画承認できない。対価金銭は不可。","注意点（伊藤塾2022プレ模試）：設立が指名委員会等設置会社＝移転計画で設立時取締役・会計監査人は決定必要。委員・執行役・代表執行役は設立後の設立時取締役が定めるから決めなくていい。","ポイント：全部を設立株式会社に移転。 / 移転計画で設立時委員、設立時執行役の氏名定める必要ない / 取締役・会計監査人の氏名は計画で定める / 子会社の承認決議は特殊決議 / 新株予約権付社債権者は子会社に異議OK"],"会社法::株式の併合・分割・無償割当":["注意点（2023年TAC予想問題集）：分割を定款の定めで代表取締役の決定にすることは不可能。無償割当ては可能。 株式の併合＝単元なしor1端数でる会社のみやめろ請求可能。分割・無償割当ては不可能。"],"株式の併合・分割・無償割当":["注意点（2023年TAC予想問題集）：分割を定款の定めで代表取締役の決定にすることは不可能。無償割当ては可能。 株式の併合＝単元なしor1端数でる会社のみやめろ請求可能。分割・無償割当ては不可能。"],"会社法::株式の併合・株式の分割":["注意点（伊藤塾2019プレ模試）：損害及ぼす種類株主の総会不要の定款ある時だけ反対買取あり。併合のみ事後開示あり。分割はなし。"],"株式の併合・株式の分割":["注意点（伊藤塾2019プレ模試）：損害及ぼす種類株主の総会不要の定款ある時だけ反対買取あり。併合のみ事後開示あり。分割はなし。"],"株式の併合":["注意点（2021年TAC予想問題集）：株主であったものも資料閲覧可能。反対株主は全部の買取請求必要（一部は煩雑）","注意点（2022年TAC予想問題集）：1株未満の端数が生じる場合は、効力発生日の2週間前でなく、2 証人または立会人になれない。後見人が後見人・後見人の配偶者もしくは直系卑属の利益になる遺言無効＝兄弟姉妹ならセーフ。日付が他の証拠で明らかであっても記載なければ無効。未成年後見監督人は複数OKなので撤回にあたらない。被後見人の直系血族・配偶者・兄弟姉妹以外の後見人に遺言＝後見の計算終了…","注意点：死亡危急者遺言＝証人３人以上の立会い＝普通方式でできるようになって６ヶ月生存する時は効力生じない。 伝染病隔離者遺言＝警察官一人と証人一人で遺言→警察関わるので家裁の確認は不要だが検認は必要。自筆証書遺言は通称やペンネームなど遺言者特定できるなら有効。扶養前提として養子にして不動産贈与遺言＝協議離縁し扶養受けないものとした場合＝遺言撤回とみなされる。自筆証書遺言の日付違っていたからといって直ちに無効になるものじゃない。遺言の内容の変更を伴わない明ら…","条文目安：民法960条周辺。条文番号と要件・効果をセットで確認。","ポイント：被保佐人は，保佐人の同意を得ずに遺言可能"],"遺言":["注意点（令和5年LEC直前予想模試）：遺言書の保管の申請＝自ら出頭必要。未成年者・推定相続人・受遺者これらの配偶者直系血族・公証人の配偶者・四親等内の親族・書記使用人は遺言の証人または立会人になれない。後見人が後見人・後見人の配偶者もしくは直系卑属の利益になる遺言無効＝兄弟姉妹ならセーフ。日付が他の証拠で明らかであっても記載なければ無効。未成年後見監督人は複数OKなので撤回にあたらない。被後見人の直系血族・配偶者・兄弟姉妹以外の後見人に遺言＝後見の計算終了…","注意点：死亡危急者遺言＝証人３人以上の立会い＝普通方式でできるようになって６ヶ月生存する時は効力生じない。 伝染病隔離者遺言＝警察官一人と証人一人で遺言→警察関わるので家裁の確認は不要だが検認は必要。自筆証書遺言は通称やペンネームなど遺言者特定できるなら有効。扶養前提として養子にして不動産贈与遺言＝協議離縁し扶養受けないものとした場合＝遺言撤回とみなされる。自筆証書遺言の日付違っていたからといって直ちに無効になるものじゃない。遺言の内容の変更を伴わない明ら…","条文目安：民法960条周辺。条文番号と要件・効果をセットで確認。","ポイント：被保佐人は，保佐人の同意を得ずに遺言可能"],"民法::意思表示":["注意点（2022年TAC予想問題集）：到達妨げた時＝通常到達すべき時に到達したと擬制。公示＝官報掲載から2週間経過した時に到達。過失あれば到達しない。強制執行免れるために仮装譲渡しても、当然に不法原因給付で返還請求できなくなる訳じゃない。電子メール＝到達時。一人が詐欺で代物弁済した場合の他の連帯債務者＝第三者に当たらない。個々の行為の結果を認識判断する能力＝有無は意思表示をした時点で判断。被保佐人が負担付贈与＝保佐人の同意必要。 子が意思能力有していても母…","注意点：相手方知ることができないなら公示の方法可能。意思表示は表意者が通知後に死亡・意思能力喪失・行為能力制限受けても効力に影響ない。相手方が意思無能力者・未成年・被後見人なら対抗できない。","条文目安：民法93条周辺。条文番号と要件・効果をセットで確認。","ポイント：差押免れるために仮装譲渡しても、返還できなくなるわけではない"],"意思表示":["注意点（2022年TAC予想問題集）：到達妨げた時＝通常到達すべき時に到達したと擬制。公示＝官報掲載から2週間経過した時に到達。過失あれば到達しない。強制執行免れるために仮装譲渡しても、当然に不法原因給付で返還請求できなくなる訳じゃない。電子メール＝到達時。一人が詐欺で代物弁済した場合の他の連帯債務者＝第三者に当たらない。個々の行為の結果を認識判断する能力＝有無は意思表示をした時点で判断。被保佐人が負担付贈与＝保佐人の同意必要。 子が意思能力有していても母…","注意点：相手方知ることができないなら公示の方法可能。意思表示は表意者が通知後に死亡・意思能力喪失・行為能力制限受けても効力に影響ない。相手方が意思無能力者・未成年・被後見人なら対抗できない。","条文目安：民法93条周辺。条文番号と要件・効果をセットで確認。","ポイント：差押免れるために仮装譲渡しても、返還できなくなるわけではない"],"委任契約":["注意点（2023年TAC予想問題集）：引渡要する場合は報酬は同時履行。"],"民法::委任契約":["注意点（2023年TAC予想問題集）：引渡要する場合は報酬は同時履行。"],"委任・寄託・事務管理":["注意点（令和4年LEC直前予想模試）：承諾をやむを得ない事由で第三者保管可能。 寄託物の一部滅失損傷・受寄者費用償還＝返還から1年以内に請求必要。", 備短答模試）：当事者尋問は証拠調べなので、自白に拘束されない。"],"民訴法::本人尋問":["注意点（令和４年予備短答模試）：当事者尋問は証拠調べなので、自白に拘束されない。"],"法人でない社団":["注意点（令和４年予備短答模試）：総有権確認訴訟＝特別の授権必要。"],"民訴法::法人でない社団":["注意点（令和４年予備短答模試）：総有権確認訴訟＝特別の授権必要。"],"判決によらない訴訟の完結":["注意点（令和４年予備短答模試）：裁判外で被告と訴え取下げの合意＝訴えの利益喪失で却下判決。株主代表訴訟でも訴訟上の和解可能"],"民訴法::判決によらない訴訟の完結":["注意点（令和４年予備短答模試）：裁判外で被告と訴え取下げの合意＝訴えの利益喪失で却下判決。株主代表訴訟でも訴訟上の和解可能"],"同時審判共同訴訟":["注意点（令和４年予備短答模試）：格別に審理＝同時審判の申出できない。控訴審の口頭弁論終結まで申出可能。 共同被告の一人の認諾・自白＝その者と原告の間で生じる（共同訴訟人独立の原則）第一審で同時審判共同訴訟＝控訴審格別に提起されても弁論及び裁判は併合してしなければならない"],"民訴法::同時審判共同訴訟":["注意点（令和４年予備短答模試）：格別に審理＝同時審判の申出できない。控訴審の口頭弁論終結まで申出可能。 共同被告の一人の認諾・自白＝その者と原告の間で生じる（共同訴訟人独立の原則）第一審で同時審判共同訴訟＝控訴審格別に提起されても弁論及び裁判は併合してしなければならない"],"当事者による口頭弁論手続の準備":["注意点（伊藤塾2022プレ模試）：意見を求める照会はできない。"],"民訴法::当事者による口頭弁論手続の準備":["注意点（伊藤塾2022プレ模試）：意見を求める照会はできない。"],"民訴法::訴訟費用":["注意点（伊藤塾2022プレ模試）：原告が日本国内にいない＝被告の申立てで訴訟費用の担保請求可能。 証拠保全に関する費用＝訴訟費用の一部。"],"訴訟費用":["注意点（伊藤塾2022プレ模試）：原告が日本国内にいない＝被告の申立てで訴訟費用の担保請求可能。 証拠保全に関する費用＝訴訟費用の一部。"],"民訴法::訴訟行為と条件":["注意点（令和５年予備試験）：主位的請求解除条件に予備的請求なら、まず主位的判断必要。反訴請求債権を自働債権，本訴請求債権を受働債権とする相殺の抗弁を認める。抵当権抹消登記を停止条件として訴訟取下はNG"],"訴訟行為と条件":["注意点（令和５年予備試験）：主位的請求解除条件に予備的請求なら、まず主位的判断必要。反訴請求債権を自働債権，本訴請求債権を受働債権とする相殺の抗弁を認める。抵当権抹消登記を停止条件として訴訟取下はNG"],"民訴法::訴訟委任による訴訟代理人":["注意点（2018年TAC予想問題集）：特別の委任なくても契約の解除可能（攻撃防御方法という考え）"],"訴訟委任による訴訟代理人":["注意点（2018年TAC予想問題集）：特別の委任なくても契約の解除可能（攻撃防御方法という考え）"],"民訴法::訴状":["注意点（令和５年予備試験）：訴状の補正＝不服申立て不可。手数料補正で却下前に手数料納付したら訴状却下不可になる。"],"訴状":["注意点（令和５年予備試験）：訴状の補正＝不服申立て不可。手数料補正で却下前に手数料納付したら訴状却下不可になる。"],"争点及び証拠の整理手続":["注意点（令和４年予備短答模試）：受命裁判官の手続主宰＝弁論準備手続・書面による準備手続（高裁の） 書面による準備手続の提出期間は必要的。","注意点：弁論準備手続でも当事者が申出た者については支障なければ傍聴許さなければならない。受命裁判官も調査嘱託・鑑定・文書提出書証の申出嘱託・文書の送付嘱託についての裁判可能。当事者双方の申立てあれば弁論準備手続取り消さなければならない。"],"民訴法::争点及び証拠の整理手続":["注意点（令和４年予備短答模試）：受命裁判官の手続主宰＝弁論準備手続・書面による準備手続（高裁の） 書面による準備手続の提出期間は必要的。","注意点：弁論準備手続でも当事者が申出た者については支障なければ傍聴許さなければならない。受命裁判官も調査嘱託・鑑定・文書提出書証の申出嘱託・文書の送付嘱託についての裁判可能。当事者双方の申立てあれば弁論準備手続取り消さなければならない。"],"相殺の抗弁":["注意点（令和４年予備短答模試）：被告による訴訟上の抗弁に対し原告が訴訟上の再抗弁をすることは不適法。 本訴で訴訟物となっている債権の全部または一部が時効により消滅したと判断されることを条件として反訴で時効消滅部分を自働債権として相殺の抗弁を主張することは許される。 口頭弁論終結前に相殺適状＝終結後に相殺の意思表示で請求異議の訴え提起OK","注意点：金銭債権の数量的一部請求で敗訴した原告が残部請求の訴えていき許されない＝後に残部として請求できる部分ないこと示すに他ならないから。訴訟上の相殺の抗弁に対し訴訟上の相殺を再抗弁で主張することは許されない。継続中の別訴において訴訟物となっている債権を自働債権として他の訴訟で相殺抗弁するの許されない。明示的一部請求で残部を他の訴訟で相殺の抗弁に使うのはあり"],"民訴法::相殺の抗弁":["注意点（令和４年予備短答模試）：被告による訴訟上の抗弁に対し原告が訴訟上の再抗弁をすることは不適法。 本訴で訴訟物となっている債権の全部または一部が時効により消滅したと判断されることを条件として反訴で時効消滅部分を自働債権として相殺の抗弁を主張することは許される。 口頭弁論終結前に相殺適状＝終結後に相殺の意思表示で請求異議の訴え提起OK","注意点：金銭債権の数量的一部請求で敗訴した原告が残部請求の訴えていき許されない＝後に残部として請求できる部分ないこと示すに他ならないから。訴訟上の相殺の抗弁に対し訴訟上の相殺を再抗弁で主張することは許されない。継続中の別訴において訴訟物となっている債権を自働債権として他の訴訟で相殺抗弁するの許されない。明示的一部請求で残部を他の訴訟で相殺の抗弁に使うのはあり"],"専門的知識を有する者の関与":["注意点（令和４年予備短答模試）：専門委員手続関与＝当事者の同意必要。知財調査官＝裁判長の命令で当事者の同意なく直接問OK。専門委員の説明聴取＝証拠調べではない。専門委員・知財調査官・鑑定人＝忌避の対象"],"民訴法::専門的知識を有する者の関与":["注意点（令和４年予備短答模試）：専門委員手続関与＝当事者の同意必要。知財調査官＝裁判長の命令で当事者の同意なく直接問OK。専門委員の説明聴取＝証拠調べではない。専門委員・知財調査官・鑑定人＝忌避の対象"],"選定当事者":["注意点（令和５年予備試験）：選定当事者＝和解禁止は無効"],"民訴法::選定当事者":["注意点（令和５年予備試験）：選定当事者＝和解禁止は無効"],"民訴法::証人尋問及び当事者尋問":["注意点（2018年TAC予想問題集）：当事者の宣誓は任意＝た宣誓した当事者が虚偽＝決定で過料。離婚請求訴訟でも請求の放棄可能。"],"証人尋問及び当事者尋問":["注意点（2018年TAC予想問題集）：当事者の宣誓は任意＝た宣誓した当事者が虚偽＝決定で過料。離婚請求訴訟でも請求の放棄可能。"],"証拠調べ":["注意点（令和５年予備試験）：文書送付嘱託＝任意なので従わなくても第三者罰則なし。","注意点：16歳未満＝証人尋問で宣誓させられない。鑑定人も宣誓必要。鑑定人質問あり。"],"民訴法::証拠調べ":["注意点（令和５年予備試験）：文書送付嘱託＝任意なので従わなくても第三者罰則なし。","注意点：16歳未満＝証人尋問で宣誓させられない。鑑定人も宣誓必要。鑑定人質問あり。"],"民訴法::上告または上告受理":["注意点（令和５年予備試験）：原裁判所自ら上告受理却下は不可。事実判断して差戻＝裁判所拘束。控訴しない合意無効"],"上告または上告受理":["注意点（令和５年予備試験）：原裁判所自ら上告受理却下は不可。事実判断して差戻＝裁判所拘束。控訴しない合意無効"],"民訴法::裁判所等の裁量":["注意点（令和４年予備短答模試）：一部敗訴の訴訟費用＝裁判所の裁量で定める。決定完結事件＝口頭弁論しない場合審尋も裁量で可能。付郵便送達＝書記官の裁量。"],"裁判所等の裁量":["注意点（令和４年予備短答模試）：一部敗訴の訴訟費用＝裁判所の裁量で定める。決定完結事件＝口頭弁論しない場合審尋も裁量で可能。付郵便送達＝書記官の裁量。"],"債権者代位訴訟":["注意点（令和４年予備短答模試）：訴訟告知欠いたら裁判所は訴え却下。債権者代位訴訟で被担当者である債務者死んでも訴訟中断しない。債権ない場合裁判所は訴え却下。"],"民訴法::債権者代位訴訟":["注意点（令和４年予備短答模試）：訴訟告知欠いたら裁判所は訴え却下。債権者代位訴訟で被担当者である債務者死んでも訴訟中断しない。債権ない場合裁判所は訴え却下。"],"控訴":["注意点（令和４年予備短答模試）：株主代表訴訟＝類似必要的共同訴訟＝控訴しなかった株主にも効果及ぶが、控訴人にはならない。 相殺の抗弁を理由とする請求棄却から他の理由による請求棄却になる場合、控訴裁判所は第一審判決取り消し、改めて請求棄却判決するべき"],"民訴法::控訴":["注意点（令和４年予備短答模試）：株主代表訴訟 承諾とみなされる。 保管義務は物品の価額が保管費用より低いなら負わない","注意点（2018年TAC予想問題集）：商人が商人以外に金銭消費貸借契約＝特約ないと利息請求不可。商行為の委任による代理＝本人死亡で消滅しない。（任意規定）。債務者にとっての商行為かどうかで連帯になるか決まる。","注意点：商法上の留置権＝牽連性不要。申込みで受けた物品ある場合に申込拒絶＝保管等は申込者の費用。申込受けたものが商人であれば適用。","注意点：投機購買には加工品の販売を含む。投機売買は不動産を除き一度きりでも商行為となる。登記賃貸は営業的商行為＝反復のみ。有価証券は含まれていない。受信行為と与信行為双方ないと銀行取引にはあたらない。旅館業者が無償で客送迎することは付属的商行為にあたる","注意点：表見支配人がおこなった裁判外の行為＝相手方悪意除き会社に帰属。仲立人＝他人間の商行為の媒介することを行とするもの＝AがBのために宿泊契約の締結を媒介＝他人間商行為の媒介＝Aは仲立人に該当。","ポイント：原材料購入で自己製造販売＝商行為 / 投機売却に不動産ふくまれない＝商行為じゃない / 投機賃貸に有価証券は含まれない / 旅館が客送迎＝付属的商行為","ポイント：申込みに対する諾否怠ったら、承諾とみなされる / 仲立人＝商行為の媒介するもの 委託を受けて宿泊契約の媒介＝仲立人。ホテルから委託関係ない"],"商法::社債":["注意点（令和５年予備試験）：無記名社債は社債券の発行が必要。申込者が社債権者となるのは、会社が割り当てた段階、総額引受の場合は、総額引受契 約が成立した段階。取締役に委任することができない事項は、募集社債の総額の上限や募集社債の利率の上限、募集社債の払込金額の総額の最低金額な（会社法施行規則９９条）。"],"個人商人の責任":["注意点（令和４年予備短答模試）：売買契約の合意解除に際し買主に手付金返還約した場合、商号利用許諾商人も手付返還債務にちて連帯して責任負う。"],"商法::個人商人の責任":["注意点（令和４年予備短答模試）：売買契約の合意解除に際し買主に手付金返還約した場合、商号利用許諾商人も手付返還債務にちて連帯して責任負う。"],"商法::業務執行取締役":["注意点（令和５年予備試験）：業務執行取締役も使用人に再委任可能。監視義務あり"],"業務執行取締役":["注意点（令和５年予備試験）：業務執行取締役も使用人に再委任可能。監視義務あり"],"株主提案権":["注意点（令和５年予備試験）：監査委員会設置と監査役・監査役会廃止は一つの議案とみなされる。議案提案は8週間前まで"],"商法::株主提案権":["注意点（令和５年予備試験）：監査委員会設置と監査役・監査役会廃止は一つの議案とみなされる。議案提案は8週間前まで"],"商登法::役員変更の登記":["注意点（2018年TAC予想問題集）：指名委員会等設置会社以外の役会設置会社は特別取締役による議決の定めOK。 監査等委員会設置以外なら取締役６名以上かつそのうち１名社外取締役の必要あり＝社外取締役である旨登記。"],"役員変更の登記":["注意点（2018年TAC予想問題集）：指名委員会等設置会社以外の役会設置会社は特別取締役による議決の定めOK。 監査等委員会設置以外なら取締役６名以上かつそのうち１名社外取締役の必要あり＝社外取締役である旨登記。"],"未成年者の登記":["注意点（2019年TAC予想問題集）：未成年者の登記は未成年者自身が申請。消滅は未成年者も法定代理人も可能。 成年消滅は登記官の職権可能。"],"商登法::未成年者の登記":["注意点（2019年TAC予想問題集）：未成年者の登記は未成年者自身が申請。消滅は未成年者も法定代理人も可能。 成年消滅は登記官の職権可能。"],"商登法::同時申請":["注意点（2019年TAC予想問題集）：合名で代表しない社員退社＝退社と代表社員抹消は同時申請。"],"同時申請":["注意点（2019年TAC予想問題集）：合名で代表しない社員退社＝退社と代表社員抹消は同時申請。"],"申請または嘱託":["注意点（2018年TAC予想問題集）：登記の嘱託もオンラインで可能。登記期間過ぎていることを理由に却下にはならない。 登記官またはその配偶者もしくは４親等内の親族（であったもの）が申請人＝当該登記官は登記できない。"],"商登法::申請または嘱託":["注意点（2018年TAC予想問題集）：登記の嘱託もオンラインで可能。登記期間過ぎていることを理由に却下にはならない。 登記官またはその配偶者もしくは４親等内の親族（であったもの）が申請人＝当該登記官は登記できない。"],"嘱託・職権による登記":["注 身の自由":["注意点（令和５年予備試験）：黙秘権を規定した日本国憲法第38条第1項の法意は何人も自己が刑事上の責任を問われるおそれのある事項について供述を強要されないことを保障したものと解すべきで、道路交通取締法施行令第67条第2項により事故報告を命ずることは、憲法第38条第1項にいう自己に不利益な供述の強要にあたらない。"],"人身の自由":["注意点（令和５年予備試験）：黙秘権を規定した日本国憲法第38条第1項の法意は何人も自己が刑事上の責任を問われるおそれのある事項について供述を強要されないことを保障したものと解すべきで、道路交通取締法施行令第67条第2項により事故報告を命ずることは、憲法第38条第1項にいう自己に不利益な供述の強要にあたらない。"],"憲法::職業選択の自由 問４":["注意点（令和５年予備試験）：許可制は、職業の自由に対する強力な制限であるから、その合憲性を肯定しうるためには、原則として、重要な公共の利益のために必要かつ合理的な措置であることを要し、また、それが社会政策ないしは経済政策上の積極的な目的のための措置ではなく、自由な職業活動が社会公共に対してもたらす弊害を防止するための消極的、警察的措置である場合には、許可制に比べて職業の自由に対するよりゆるやかな制限である職業活動の内容及び態様に対する規制によつては右の目的…"],"職業選択の自由 問４":["注意点（令和５年予備試験）：許可制は、職業の自由に対する強力な制限であるから、その合憲性を肯定しうるためには、原則として、重要な公共の利益のために必要かつ合理的な措置であることを要し、また、それが社会政策ないしは経済政策上の積極的な目的のための措置ではなく、自由な職業活動が社会公共に対してもたらす弊害を防止するための消極的、警察的措置である場合には、許可制に比べて職業の自由に対するよりゆるやかな制限である職業活動の内容及び態様に対する規制によつては右の目的…"],"憲法::条約":["注意点（令和５年予備試験）：予算、条約又は内閣総理大臣の指名については、両院協議会を開いても意見が一致しないときは、衆議院の議決が国会の議決。参議院が衆議院の議決した予算又は条約を受け取った後３０日以内に議決しないとき、及び衆議院が内閣総理大臣の指名の議決をした後１０日以内に参議院が指名の議決をしないときは、衆議院の議決が国会の議決となる。 法律案については、衆議院で可決し、参議院でこれと異なった議決をした場合に、衆議院が出席議員の３分の２以上の多数で再び…"],"条約":["注意点（令和５年予備試験）：予算、条約又は内閣総理大臣の指名については、両院協議会を開いても意見が一致しないときは、衆議院の議決が国会の議決。参議院が衆議院の議決した予算又は条約を受け取った後３０日以内に議決しないとき、及び衆議院が内閣総理大臣の指名の議決をした後１０日以内に参議院が指名の議決をしないときは、衆議院の議決が国会の議決となる。 法律案については、衆議院で可決し、参議院でこれと異なった議決をした場合に、衆議院が出席議員の３分の２以上の多数で再び…"],"憲法::集会の自由":["注意点（令和５年予備試験）：皇居外苑使用不許可事件＝国民が皇居外苑に集合し利用することは、その利用の許否（許可するか否か）は厚生大臣の自由裁量ではなく、公園としての使命を達成させるよう考慮した上で決しなければならない。"],"集会の自由":["注意点（令和５年予備試験）：皇居外苑使用不許可事件＝国民が皇居外苑に集合し利用することは、その利用の許否（許可するか否か）は厚生大臣の自由裁量ではなく、公園としての使命を達成させるよう考慮した上で決しなければならない。"],"思想及び良心の自由":["注意点（2020年TAC予想問題集）：君が代伴奏＝通常想定されるもの→19条に違反しない。"],"憲法::思想及び良心の自由":["注意点（2020年TAC予想問題集）：君が代伴奏＝通常想定されるもの→19条に違反しない。"],"憲法::幸福追求権":["注意点（LEC直前予想模試2022）：裁判官の一時的な故障は重大であっても罷免自由にあたらない。家裁の遺産分割＝公開の法廷で行う必要がない。 行政事件の裁判含め通常裁判に属するものとする。 弁護士の資格要件は法律で決める。裁判所規則不可。"],"幸福追求権":["注意点（LEC直前予想模試2022）：裁判官の一時的な故障は重大であっても罷免自由にあたらない。家裁の遺産分割＝公開の法廷で行う必要がない。 行政事件の裁判含め通常裁判に属するものとする。 弁護士の資格要件は法律で決める。裁判所規則不可。"],"刑法::未遂及び既遂":["注意点（2020年TAC予想問題集）： を供託書に記載しなければならない。"],"担保供託":["注意点：供託物取戻請求権に処分制限＝差替え不可。担保取消決定に承継人記載されていても取戻時に書面添付省略不可。 被供託者を特定できる時は氏名等を供託書に記載しなければならない。"],"行政法::争訟の種類":["注意点（令和５年予備試験）：起業者を被告として土地所有権の確認を求める訴え。教職員の義務不存在確認 国外居住日本人の選挙権確認。長の公開決定に国が取消訴訟"],"争訟の種類":["注意点（令和５年予備試験）：起業者を被告として土地所有権の確認を求める訴え。教職員の義務不存在確認 国外居住日本人の選挙権確認。長の公開決定に国が取消訴訟"],"行政法::情報の公開":["注意点（令和５年予備試験）：人の生命等に関わり公にすることが必要な情報＝法人の利益害しても不開示にできない 開示請求の方法確認"],"情報の公開":["注意点（令和５年予備試験）：人の生命等に関わり公にすることが必要な情報＝法人の利益害しても不開示にできない 開示請求の方法確認"],"抗告訴訟":["注意点（令和５年予備試験）：差止の訴えの第三者効確認。取消判決の行政庁＝事実認定及び法律行為に従う義務はない。"],"行政法::抗告訴訟":["注意点（令和５年予備試験）：差止の訴えの第三者効確認。取消判決の行政庁＝事実認定及び法律行為に従う義務はない。"],"行政法::原告適格":["注意点（令和５年予備試験）：風俗営業の近隣住民に原告適格なし"],"原告適格":["注意点（令和５年予備試験）：風俗営業の近隣住民に原告適格なし"],"行政法::行政不服審査法":["注意点（令和５年予備試験）：審査請求に事実行為が含まれるか確認・固有の資格＝国が一般私人に優先に取り扱われているか"],"行政不服審査法":["注意点（令和５年予備試験）：審査請求に事実行為が含まれるか確認・固有の資格＝国が一般私人に優先に取り扱われているか"],"行政法::行政契約":["注意点（令和５年予備試験）：指定管理者＝行政処分として「指定」。委託契約とは違う。"],"行政契約":["注意点（令和５年予備試験）：指定管理者＝行政処分として「指定」。委託契約とは違う。"],"義務の履行確保":["注意点（令和５年予備試験）：建築工事の中止命令不履行に対する民事訴訟提起の可否。代執行の要件の確認"],"行政法::義務の履行確保":["注意点（令和５年予備試験）：建築工事の中止命令不履行に対する民事訴訟提起の可否。代執行の要件の確認"],"行政法::仮の救済":["注意点（令和５年予備試験）：仮の義務付けの要件確認・裁判所は市の意見を聞かなければならない。"],"仮の救済":["注意点（令和５年予備試験）：仮の義務付けの要件確認・裁判所は市の意見を聞かなければならない。"],"会社法::発起設立と募集設立":["注意点（2018年TAC予想問題集）：設立時代表取締役は発起でも募集でも設立時取締役が選解任。検査役の調査得た場合は発起募集いずれも現物出資の不足責任負わない。","注意点（2019年TAC予想問題集）：役会設置会社の設立時取締役＝代表取締役の選解任担当。募集なら発起人以外の取締役に創立総会決議で調査依頼可能"],"発起設立と募集設立":["注意点（2018年TAC予想問題集）：設立時代表取締役は発起でも募集でも設立時取締役が選解任。検査役の調査得た場合は発起募集いずれも現物出資の不足責任負わない。","注意点（2019年TAC予想問題集）：役会設置会社の設立時取締役＝代表取締役の選解任担当。募集なら発起人以外の取締役に創立総会決議で調査依頼可能"],"募集株式の発行等":["注意点（2019年TAC予想問題集）：第三者割当＝総会で取締役に決定委任可能（有利か関係ない）。株式の上限と払込金額の下限制定必要＆理由説明"],"会社法::募集株式の発行等":["注意点（2019年TAC予想問題集）：第三者割当＝総会で取締役に決定委任可能（有利か関係ない）。株式の上限と払込金額の下限制定必要＆理由説明"],"取締役と監査役の責任と免除":["注意点（令和４年予備短答模試）：取締役会で意義述べなかった監査役＝任務懈怠推定なし。取締役の任務懈怠責任＝総株主の同意で免除。取締役の任務懈怠責任一部免除を総会に提出＝各監査役の同意必要。"],"会社法::取締役と監査役の責任と免除":["注意点（令和４年予備短答模試）：取締役会で意義述べなかった監査役＝任務懈怠推定なし。取締役の任務懈怠責任＝総株主の同意で免除。取締役の任務懈怠責任一部免除を総会に提出＝各監査役の同意必要。"],"会社法::取締役会":["注意点（令和４年予備短答模試）：定足数は全過程に出席が必要"],"取締役会":["注意点（令和４年予備短答模試）：定足数は全過程に出席が必要"],"新設型組織再編行為":["注意点（2019年TAC予想問題集）：新設合併消滅会社の新株予約権者に代わり＝新株予約権か金銭。新設分割＆株式移転＝設立or親の新株予約権に限られる。株式移転完全子会社も必ず総会承認必要。 株式移転完全子会社＝常に反対株主の買取請求認められている。"],"会社法::新設型組織再編行為":["注意点（2019年TAC予想問題集）：新設合併消滅会社の新株予約権者に代わり＝新株予約権か金銭。新設分割＆株式移転＝設立or親の新株予約権に限られる。株式移転完全子会社も必ず総会承認必要。 株式移転完全子会社＝常に反対株主の買取請求認められている。"],"会社法::商行為":["注意点（2018年TAC予想問題集）：商人が商人以外に金銭消費貸借契約＝特約ないと利息請求不可。商行為の委任による代理＝本人死亡で消滅しない。（任意規定）。債務者にとっての商行為かどうかで連帯になるか決まる。","注意点：商法上の留置権＝牽連性不要。申込みで受けた物品ある場合に申込拒絶＝保管等は申込者の費用。申込受けたものが商人であれば適用。","注意点：投機購買には加工品の販売を含む。投機売買は不動産を除き一度きりでも商行為となる。登記賃貸は営業的商行為＝反復のみ。有価証券は含まれていない。受信行為と与信行為双方ないと銀行取引にはあたらない。旅館業者が無償で客送迎することは付属的商行為にあたる","注意点：表見支配人がおこなった裁判外の行為＝相手方悪意除き会社に帰属。仲立人＝他人間の商行為の媒介することを行とするもの＝AがBのために宿泊契約の締結を媒介＝他人間商行為の媒介＝Aは仲立人に該当。","ポイント：原材料購入で自己製造販売＝商行為 / 投機売却に不動産ふくまれない＝商行為じゃない / 投機賃貸に有価証券は含まれない / 旅館が客送迎＝付属的商行為","ポイント：申込みに対する諾否怠ったら、承諾とみなされる / 仲立人＝商行為の媒介するもの 委託を受けて宿泊契約の媒介＝仲立人。ホテルから委託関係ない"],"会社法::吸収型組織再編行為":["注意点（2018年TAC予想問題集）：吸収合併・分割無効になったら存続が連帯して債務負担。（株式交換なら子会社債務負わない） 吸収分割で総株主の同意必要なケースなし。交換契約で親会社以外のものが有する子会社の株一部を取得させることはできない。消滅株式会社の新株予約権者に株式交付することはできない。"],"吸収型組織再編行為":["注意点（2018年TAC予想問題集）：吸収合併・分割無効になったら存続が連帯して債務負担。（株式交換なら子会社債務負わない） 吸収分割で総株主の同意必要なケースなし。交換契約で親会社以外のものが有する子会社の株一部を取得させることはできない。消滅株式会社の新株予約権者に株式交付することはできない。"],"会社法::監査等委員会設置会社と指名委員会等設置会社の比較":["注意点（2019年TAC予想問題集）：監査等委員以外の取締役＝１年・監査等委員２年。委員会の委員は役会決議で決める。 定款で定めあっても、監査等委員が選定する監査等委員・指名委員会等が選定するものは役会召集可能。 指名委員会等の取締役＝原則業務執行できない。"],"監査等委員会設置会社と指名委員会等設置会社の比較":["注意点（2019年TAC予想問題集）：監査等委員以外の取締役＝１年・監査等委員２年。委員会の委員は役会決議で決める。 定款で定めあっても、監査等委員が選定する監査等委員・指名委員会等が選定するものは役会召集可能。 指名委員会等の取締役＝原則業務執行できない。"],"監査等委員会":["注意点（令和４年予備短答模試）：常勤の監査等委員は不要。監査役会は取締役の人事・報酬に口出し不可（監査等委員は可能）"],"会社法::監査等委員会":["注意点（令和４年予備短答模試）：常勤の監査等委員は不要。監査役会は取締役の人事・報酬に口出し不可（監査等委員は可能）"],"会社法::株主平等原則":["注意点（令和４年予備短答模試）：新株予約権無償割当も株主平等原則及ぶ。特定株主に損失補填の意味でなされた贈与契約＝平等原則違反。残余財産分配も非公開なら異なる取り扱いOK"],"株主平等原則":["注意点（令和４年予備短答模試）：新株予約権無償割当も株主平等原則及ぶ。特定株主に損失補填の意味でなされた贈与契約＝平等原則違反。残余財産分配も非公開なら異なる取り扱いOK"],"会社法::株主総会の招集":["注意点（2019年TAC予想問題集）：召集の決定事項は、役会ありなら役会で決める。先立ち調査１００分の１","注意点：特例有限会社＝総株主の10分の1以上有すれば取締役に対し総会招集請求可能。"],"株主総会の招集":["注意点（2019年TAC予想問題集）：召集の決定事項は、役会ありなら役会で決める。先立ち調査１００分の１","注意点：特例有限会社＝総株主の10分の1以上有すれば取締役に対し総会招集請求可能。"],"会社法::株主総会の決議":["注意点（伊藤塾2022プレ模試）：株主5人・議決権1.2万＝普通6001以上、特別8000、特殊3人以上8000以上、特殊④3人以上9000以上 解職対象取締役＝役会決議参加不可、総会監査役参加可能。 属人的権利の定め（剰余金・残余財産）＝特殊④","ポイント：役会非設置で代表・普通 / 監査解任特別 / 解職対象取締役は決議参加不可 / 種なし公開が譲制＝特殊決議 / 剰余金の配当残余持参の分配・議決権の株主ごとに異なる取扱い＝最上級特殊"],"株主総会の決議":["注意点（伊藤塾2022プレ模試）：株主5人・議決権1.2万＝普通6001以上、特別8000、特殊3人以上8000以上、特殊④3人以上9000以上 解職対象取締役＝役会決議参加不可、総会監査役参加可能。 属人的権利の定め（剰余金・残余財産）＝特殊④","ポイント：役会非設置で代表・普通 / 監査解任特別 / 解職対象取締役は決議参加不可 / 種なし公開が譲制＝特殊決議 / 剰余金の配当残余持参の分配・議決権の株主ごとに異なる取扱い＝最上級特殊"],"会社法::株式の併合・分割・無償割当て":["注意点（2018年TAC予想問題集）：株券提出は併合のみ。基準日定めるのは分割のみ（分割にかかる基準日）。"],"株式の併合・分割・無償割当て":["注意点（2018年TAC予想問題集）：株券提出は併合のみ。基準日定めるのは分割のみ（分割にかかる基準日）。"],"不動産質権":["注意点：不動産質権者が固定資産税払う。債権の利息を請求できない。10年更新＝期間満了で優先弁済権もなくなる"],"民法::不動産質権":["注意点：不動産質権者が固定資産税払う。債権の利息を請求できない。10年更新＝期間満了で優先弁済権もなくなる"],"民法::物上代位":["注意点：買戻権付の不動産に抵当権＝買戻権行使で取得した買戻代金債権の差押可能。 仮差押解放金の取戻請求権は物上代位の対象。抵当不動産倒壊して木材＝物上代位不可。一般債権者の差押え後も先取特権者が物上代位権行使可能","条文目安：民法304条周辺。条文番号と要件・効果をセットで確認。","ポイント：請負代金債権にも物上代位行使可能 / 一般債権者の申立てによる差押命令の第三債務者への送達＝抵当権設定登記の先後＝抵当権は配当要求前に設定が必要 / 抵当物件崩壊して木材になった場合、木材に抵当権の効果は及ばない / 一般債権者による目的債権の差押後に、動産売買の先取特権者が物上代位権行使可能"],"物上代位":["注意点：買戻権付の不動産に抵当権＝買戻権行使で取得した買戻代金債権の差押可能。 仮差押解放金の取戻請求権は物上代位の対象。抵当不動産倒壊して木材＝物上代位不可。一般債権者の差押え後も先取特権者が物上代位権行使可能","条文目安：民法304条周辺。条文番号と要件・効果をセットで確認。","ポイント：請負代金債権にも物上代位行使可能 / 一般債権者の申立てによる差押命令の第三債務者への送達＝抵当権設定登記の先後＝抵当権は配当要求前に設定が必要 / 抵当物件崩壊して木材になった場合、木材に抵当権の効果は及ばない / 一般債権者による目的債権の差押後に、動産売買の先取特権者が物上代位権行使可能"],"外国人の人権保障":["注意点：政治的活動の自由＝保障される"],"憲法::外国人の人権保障":["注意点：政治的活動の自由＝保障される"],"民法::物上保証人":["注意点：主たる債務者に抵当権の処分の通知（転抵当）または承諾しなければ債務者・保証人・設定者・承継人に対抗不可。 債権者は更改前の限度において質権・抵当権を更改後の債務に移せるが、第三者が設定者なら承諾必要。 委託を受けた物上保証人＝弁済期きても事前求償権行使不可。"],"物上保証人":["注意点：主たる債務者に抵当権の処分の通知（転抵当）または承諾しなければ債務者・保証人・設定者・承継人に対抗不可。 債権者は更改前の限度において質権・抵当権を更改後の債務に移せるが、第三者が設定者なら承諾必要。 委託を受けた物上保証人＝弁済期きても事前求償権行使不可。"],"民法::物権的請求権":["注意点（LEC直前予想模試2022）：地上権者が買戻し特約付きで所有権譲受→買戻しで売買解約→混同で消滅した地上権復活。 賃借権対抗要件具備後の混同なら消滅しない。 賃借人が賃貸人から不動産譲受けた後に二重譲渡された＝賃借権消滅しない","条文目安：民法198条周辺。条文番号と要件・効果をセットで確認。","ポイント：所有権に基づく所有物の返還請求権は消滅時効にかからない / 適切維持管理無いなら直接自己に引渡し請求可能"],"物権的請求権":["注意点（LEC直前予想模試2022）：地上権者が買戻し特約付きで所有権譲受→買戻しで売買解約→混同で消滅した地上権復活。 賃借権対抗要件具備後の混同なら消滅しない。 賃借人が賃貸人から不動産譲受けた後に二重譲渡された＝賃借権消滅しない","条文目安：民法198条周辺。条文番号と要件・効果をセットで確認。","ポイント：所有権に基づく所有物の返還請求権は消滅時効にかからない / 適切維持管理無いなら直接自己に引渡し請求可能"],"普通養子縁組及び特別養子縁組":["注意点（2019年TAC予想問題集）：後見人が被後見人を養子・未成年＝両方家裁の許可必要。特別養子後に認知不可。被後見人を養子とする場合、直系卑属でも家裁の許可必要。配偶者の嫡出子を養子にする場合も配偶者の同意は必要。 15歳未満の子の代諾＝監護者と親権停止されてる父母の同意も必要。"],"民法::普通養子縁組及び特別養子縁組":["注意点（2019年TAC予想問題集）：後見人が被後見人を養子・未成年＝両方家裁の許可必要。特別養子後に認知不可。被後見人を養子とする場合、直系卑属でも家裁の許可必要。配偶者の嫡出子を養子にする場合も配偶者の同意は必要。 15歳未満の子の代諾＝監護者と親権停止されてる父母の同意も必要。"],"会社法::創立総会":["注意点：累積投票可能。議決権制限株主も会社廃止には議決権行使可能","ポイント：会日の５日前なら累積投票可能 / 議決権制限株式の引受人も、設立廃止には議決権行使できる"],"創立総会":["注意点：累積投票可能。議決権制限株主も会社廃止には議決権行使可能","ポイント：会日の５日前なら累積投票可能 / 議決権制限株式の引受人も、設立廃止には議決権行使できる"],"会社法::株式等売渡請求":["注意点：新株予約権のみの売渡請求は不可。","ポイント：自己株式については売渡請求不要 / 新株予約権売渡請求可能、のみは不可 / 役会の承認必要 / 損害恐れの種類株主総会の特別決議必要 / 無効原因ある場合は、訴えをもってのみ。取得日から６カ月OR１年"],"株式等売渡請求":["注意点：新株予約権のみの売渡請求は不可。","ポイント：自己株式については売渡請求不要 / 新株予約権売渡請求可能、のみは不可 / 役会の承認必要 / 損害恐れの種類株主総会の特別決議必要 / 無効原因ある場合は、訴えをもってのみ。取得日から６カ月OR１年"],"会社法::組織再編手続":["注意点：役会も合併契約の決定は執行役に委任不可。合併無効＝設立会社を被告。"],"組織再編手続":["注意点：役会も合併契約の決定は執行役に委任不可。合併無効＝設立会社を被告。"],"確認の訴えの利益":["注意点：建物賃貸借契約における敷金返還請求権も確認の訴えの対象。過去の事実の報告偽造確認＝利益なし"],"民訴法::確認の訴えの利益":["注意点：建物賃貸借契約における敷金返還請求権も確認の訴えの対象。過去の事実の報告偽造確認＝利益なし"],"民保法::不動産の処分禁止の仮処分":["注意点：保全執行裁判所＝仮処分命令発した裁判所。所有権以外の保存設定変更＝仮処分登記必要。移転消滅は不要。 債務者以外のものに占有移転禁止の仮処分命令＝執行文の付与に対する意義申し立て可能。 処分禁止の登記後に建物譲り受けたものに建物の収去土地明渡請求できるが、占有移転した場合は建物退去土地明渡請求訴訟を提起する必要あり"],"不動産の処分禁止の仮処分":["注意点：保全執行裁判所＝仮処分命令発した裁判所。所有権以外の保存設定変更＝仮処分登記必要。移転消滅は不要。 債務者以外のものに占有移転禁止の仮処分命令＝執行文の付与に対する意義申し立て可能。 処分禁止の登記後に建物譲り受けたものに建物の収去土地明渡請求できるが、占有移転した場合は建物退去土地明渡請求訴訟を提起する必要あり"],"書士法::書士会と連合会":["注意点：連合会は直接法務大臣に認可申請書、建議諮問答申可能。書士会のみ注意勧告・紛議調停可能。"],"書士会と連合会":["注意点：連合会は直接法務大臣に認可申請書、建議諮問答申可能。書士会のみ注意勧告・紛議調停可能。"],"近時の先例等":["注意点（伊藤塾2022公開模試2）：遺言書保管官作成の遺言書情報証明書を提供必要＝死亡情報としては扱えない。 受託者Aが信託財産とA固有財産拠出して土地取得＝Aが所有者及び受託者として記載＝識別は１通。"],"不登法::近時の先例等":["注意点（伊藤塾2022公開模試2）：遺言書保管官作成の遺言書情報証明書を提供必要＝死亡情報としては扱えない。 受託者Aが信託財産とA固有財産拠出して土地取得＝Aが所有者及び受託者として記載＝識別は１通。"],"共有の不動産に関する登記":["注意点（2023年TAC予想問題集）：AB各2分の1所有地＝同一の契約でCに4分の1ずつ移転＝「A持分4分の1、B持分4分の1移転」"],"不登法::共有の不動産に関する登記":["注意点（2023年TAC予想問題集）：AB各2分の1所有地＝同一の契約でCに4分の1ずつ移転＝「A持分4分の1、B持分4分の1移転」"],"不登法::共有の登記":["注意点（伊藤塾2018公開模試２）：根抵当権の準共有者一人の債権の範囲変更でも準共有者全員登記権利者として関与必要。"],"共有の登記":["注意点（伊藤塾2018公開模試２）：根抵当権の準共有者一人の債権の範囲変更でも準共有者全員登記権利者として関与必要。"],"共同抵当の登記":["注意点：立木と土地の共同抵当可能。抵当権なら一部弁済後の債権額で追加設定可能。根は不可。"],"不登法::共同抵当の登記":["注意点：立木と土地の共同抵当可能。抵当権なら一部弁済後の債権額で追加設定可能。根は不可。"],"共同抵当・根抵当権の登記":["注意点：債務者の住所変更＝抵当なら省略追加設定可能。根は不可。"],"不登法::共同抵当・根抵当権の登記":["注意点：債務者の住所変更＝抵当なら省略追加設定可能。根は不可。"],"不登法::共同根抵当権の登記":["注意点（2021年TAC予想問題集）：片方だけ債権の範囲変更登記済みでも双方極度額の変更登記可能→登記しないまま元本確定したら登記した方も範囲変更効力なし。","注意点（2023年TAC予想問題集）：優先の定めの内容異なる場合、格別に登記。","注意点（2018年TAC予想問題集）：所有者の異なる複数の不動産の共同根抵当権で根抵当権者からの確定請求＝すべての設定者に確定請求しなければ効果発生しない。（設定者側からの請求との対比）"],"共同根抵当権の登記":["注意点（2021年TAC予想問題集）：片方だけ債権の範囲変更登記済みでも双方極度額の変更登記可能→登記しないまま元本確定したら登記した方も範囲変更効力なし。","注意点（2023年TAC予想問題集）：優先の定めの内容異なる場合、格別に登記。","注意点（2018年TAC予想問題集）：所有者の異なる複数の不動産の共同根抵当権で根抵当権者からの確定請求＝すべての設定者に確定請求しなければ効果発生しない。（設定者側からの請求との対比）"],"不登法::期日や期間の登記事項":["注意点：登記記録上存続期間満了している敷地権地上権の建物の所移=消滅してないなら受理される。"],"期日や期間の登記事項":["注意点：登記記録上存続期間満了している敷地権地上権の建物の所移=消滅してないなら受理される。"],"不登法::会社法人等番号":["注意点：資格証する登記事項証明書＝作成後1ヶ月以内。支配人がする場合も１ヶ月。電子証明書も法人番号に変えられる。"],"会社法人等番号":["注意点：資格証する登記事項証明書＝作成後1ヶ月以内。支配人がする場合も１ヶ月。電子証明書も法人番号に変えられる。"],"会社の利益相反に関する登記":["注意点（伊藤塾2018公開模試）：会社所有不動産に取締役を債務者とする根抵当＝全部譲渡の設定者の承諾は利益相反に該当＝承認役会議事録必要 会社と取締役の取引＝利益相反承認は日付には影響しない 会社所有不動産・債務者代表の根抵当権全部譲渡＝設定者の会社承諾情報＋役会の利益相反承認必要。"],"不登法::会社の利益相反に関する登記":["注意点（伊藤塾2018公開模試）：会社所有不動産に取締役を債務者とする根抵当＝全部譲渡の設定者の承諾は利益相反に該当＝承認役会議事録必要 会社と取締役の取引＝利益相反承認は日付には影響しない 会社所有不動産・債務者代表の根抵当権全部譲渡＝設定者の会社承諾情報＋役会の利益相反承認必要。"],"商登法::登記事項証明書の添付":["注意点：会計参与の書類等備置場所の変更・株主名簿管理人の氏名、営業所変更＝登記簿添付不要","注意点：株主名簿管理人が法人でも登記添付不要。合同会社の業務執行しない社員の加入＝登記事項じゃないから資本金の増加記入で足りる＝加入の事実添付必要だが登記の添付は不要。吸収分割＝承継経由。"],"登記事項証明書の添付":["注意点：会計参与の書類等備置場所の変 別不要。変更更正でも承諾ないと付記不可。"],"仮登記に基づく本登記":["注意点（伊藤塾2022公開模試2）：A所有→B農地法許可条件仮登記→停止条件付所有権贈与移転付記登記→許可あったらA→C直接OK 仮登記後の差押え＝仮登記前抵当権原因でも本登記の利害関係人にあたる。","ポイント：所有権の本登記＝仮登記後の差押債権者が仮登記前の抵当権原因なら本登記時利害関係人にあたる / 抵当権の仮登記の本登記＝義務者は現在でも過去の名義人でもいい / 所有権移転請求権の一部移転＝仮登記権利者の全員が同時に申請必要 / 農地法所定の許可が停止条件の条件付き所有権移転の仮登記＝前提相続不要 / 仮登記名義人の住所に変更＝前提名変必要"],"不登法::仮登記に基づく本登記":["注意点（伊藤塾2022公開模試2）：A所有→B農地法許可条件仮登記→停止条件付所有権贈与移転付記登記→許可あったらA→C直接OK 仮登記後の差押え＝仮登記前抵当権原因でも本登記の利害関係人にあたる。"],"不登法::仮登記":["注意点（2020年TAC予想問題集）：仮登記の本登記の登記義務者＝仮登記時の義務者のまま。現在の所有権名義人は利害関係有する第三者。 移転請求権の移転請求権の仮登記で、大元の移転請求権の本登記＝後のは登記官の職権抹消されちゃうから、利害関係人になる。移転請求権の移転で住所証明情報不要（まだ所有権確定してないから） 所有権に関する仮登記義務者なら、識別いる。所有権に関する仮登記名義人を義務者＝印鑑証明 破産手続開始の前の仮登記の承諾＝破産管財人の許可ないと単…","注意点：「年月日交換予約」とする所有権移転請求権の仮登記可能。真正な登記名義回復の所有権移転請求権仮登記・停止条件付所有権の移転仮登記は不可。信託仮登記と同時じゃない信託原因の停止条件付所有権移転仮登記不可。 根抵当権設定仮と同時に信託仮はOK＝セキュリティトラスト。公正証書作成を条件とする事業用定期借地権の設定仮登記は不可。農地法3条または5条の許可条件の停止条件付所有権移転の仮登記は可能。 利害関係有する第三者＝仮登記後に仮登記義務者を起点として地位を…"],"仮登記":["注意点（2020年TAC予想問題集）：仮登記の本登記の登記義務者＝仮登記時の義務者のまま。現在の所有権名義人は利害関係有する第三者。 移転請求権の移転請求権の仮登記で、大元の移転請求権の本登記＝後のは登記官の職権抹消されちゃうから、利害関係人になる。移転請求権の移転で住所証明情報不要（まだ所有権確定してないから） 所有権に関する仮登記義務者なら、識別いる。所有権に関する仮登記名義人を義務者＝印鑑証明 破産手続開始の前の仮登記の承諾＝破産管財人の許可ないと単…","注意点：「年月日交換予約」とする所有権移転請求権の仮登記可能。真正な登記名義回復の所有権移転請求権仮登記・停止条件付所有権の移転仮登記は不可。信託仮登記と同時じゃない信託原因の停止条件付所有権移転仮登記不可。 根抵当権設定仮と同時に信託仮はOK＝セキュリティトラスト。公正証書作成を条件とする事業用定期借地権の設定仮登記は不可。農地法3条または5条の許可条件の停止条件付所有権移転の仮登記は可能。 利害関係有する第三者＝仮登記後に仮登記義務者を起点として地位を…","ポイント：所有権移転の仮登記＝義務者の識別は必要だが、住所情報は不要 / 仮登記単独申請＝登記原因証明情報・仮登記命ずる処分の決定書正本 / 仮登記も付記登記の時は第三者の承諾情報必要","ポイント：仮登記された所有権移転請求権の移転請求権保全の仮登記＝所有権移転請求権の保全の仮登記に付記した仮登記よって実行 / 代物弁済予約の所有権移転請求権保全の仮登記＝担保仮登記。後順位担保権者が清算金差押したことを証する情報＋仮登記権利者が清算金を供託したことを証する情報で承諾に代わる"],"商登法::監査等委員会設置会社":["注意点：監査等で役会委任で取締役が決定した事項登記＝決定書面＋役会委任にかかる議事録必要。任期満了と同時に監査等委員である取締役就任＝本人確認証明書の添付不要。 監査等委員の同意あれば監査等委員選任議案を総会に提出可能＝同意書面不要。","注意点：通常取締役が監査等委員である取締役に就任＝再任扱いで本人確認証明情報も不要。 重要な業務執行の決定の取締役への委任についての定款の定めしたら特別取締役の議決の定め設定不可、特別取締役による議決の定めの設定・廃止は役会で決議だが議事録添付不要。 監査等委員である取締役が取締役辞任する旨記載あり、監査等委員を辞任する旨の記載ない辞任証する書面も有効。"],"出資に関する添付書面":["注意点：現物出資の市場価格のある有価証券＝定款認
