 {id:"ryuchi-shichi",cat:"民法・担保物権",title:"留置権 vs 質権",tags:["留置権","質権","担保物権"],common:["どちらも他人の物を目的として債権回収を強化する担保物権。","目的物の占有が重要になる。占有喪失は権利行使に大きく影響する。","物権なので、原則として第三者に対しても主張し得る。"],diff:["留置権は法律上当然に成立する法定担保物権。質権は原則として設定契約による約定担保物権。","留置権は優先弁済権を当然には持たない。質権は優先弁済権を持つ。","留置権は被担保債権と目的物との牽連性が必要。質権は牽連性がなくても設定できる。","留置権は不可分性により全部の弁済まで目的物全部を留置できる。"],trap:["留置権＝競売できるが、優先弁済権があるわけではない点に注意。","質権は占有改定による引渡しでは設定できない。","留置権は不法行為によって始まった占有では成立しない。"]},
 {id:"ryuchi-douji",cat:"民法・抗弁",title:"留置権 vs 同時履行の抗弁権",tags:["留置権","同時履行","抗弁権"],common:["どちらも相手方の請求に対して履行を拒める場面で使う。","権利行使により、相手方からの一方的な履行請求を止める機能を持つ。"],diff:["留置権は物権。同時履行の抗弁権は双務契約上の抗弁権。","留置権は目的物の占有が必要。同時履行の抗弁権は占有を要しない。","留置権は第三者にも主張し得る。同時履行の抗弁権は原則として契約当事者間の問題。","留置権は目的物と債権の牽連性が必要。同時履行は対価的牽連関係が問題。"],trap:["登記請求と代金支払など、どちらが先履行かを問う問題に注意。","留置権を主張できる場面でも、同時履行の抗弁権とは要件が違う。"]},
 {id:"chijou-chinshaku",cat:"民法・用益",title:"地上権 vs 賃借権",tags:["地上権","賃借権","借地権"],common:["どちらも他人の土地を利用する権利として出題される。","建物所有目的なら借地借家法の適用が問題になる。","登記や引渡しなど、第三者対抗要件が重要。"],diff:["地上権は物権。賃借権は債権。","地上権は原則として譲渡・転貸が自由。賃借権は賃貸人の承諾が問題になる。","地上権は登記請求権がある。賃借権は原則として当然には登記請求できない。","地上権は土地を直接支配する権利として構成される。賃借権は契約に基づく使用収益権。"],trap:["地上権の譲渡禁止特約は原則として債権的効力にとどまる。","借地借家法上の対抗要件は民法上の原則と混同しやすい。"]},
 {id:"teitou-ne-teitou",cat:"民法・担保物権",title:"抵当権 vs 根抵当権",tags:["抵当権","根抵当権","元本確定"],common:["どちらも不動産を目的とする非占有担保。","登記が対抗要件として重要。","実行により目的不動産から優先弁済を受ける。"],diff:["抵当権は特定の債権を担保する。根抵当権は一定範囲の不特定債権を極度額の範囲で担保する。","抵当権は被担保債権に附従する。根抵当権は元本確定前には附従性が緩和される。","根抵当権では債権の範囲・債務者・極度額・元本確定が重要論点。","元本確定前後で、移転・変更・処分の可否や要件が変わる。"],trap:["根抵当権は『元本確定前か後か』を最初に確認する。","債務者変更・債権の範囲変更は、元本確定前後で扱いが変わる。","極度額変更は利害関係人の承諾が問題になりやすい。"]},
 {id:"kari-sashiosae-kari-shobun",cat:"民事保全・執行",title:"仮差押え vs 仮処分",tags:["仮差押え","仮処分","保全"],common:["どちらも本案判決前に権利実現を保全する制度。","保全の必要性が問題になる。","担保提供が問題になりやすい。"],diff:["仮差押えは金銭債権の将来の強制執行を保全する。","仮処分は特定物・権利関係など金銭債権以外の保全に使う。","処分禁止の仮処分は登記手続・対抗関係と結びつきやすい。","占有移転禁止の仮処分は明渡請求などで問題になる。"],trap:["金銭債権ならまず仮差押えを考える。","不動産登記と絡む場合は処分禁止仮処分の効力・登記の順位に注意。"]},
 {id:"shobun-hozon",cat:"不動産登記法",title:"所有権保存登記 vs 所有権移転登記",tags:["保存登記","移転登記","所有権"],common:["どちらも所有権に関する登記。","登記名義人・申請適格・添付情報が問われやすい。"],diff:["保存登記は初めて所有権登記名義を作る登記。移転登記は既存の所有権登記名義を移す登記。","保存登記は原則として単独申請。移転登記は原則として共同申請。","保存登記では表題部所有者・相続人など申請適格が重要。","移転登記では登記原因証明情報・登記識別情報・印鑑証明書などが問題になりやすい。"],trap:["保存登記なのに義務者を立てて考えない。","相続による保存か、相続による移転かを混同しない。"]},
 {id:"hon-ten-shiten",cat:"商業登記法",title:"本店移転 vs 支店設置・移転・廃止",tags:["本店移転","支店","商業登記"],common:["会社の営業拠点に関する登記。","管轄・決議機関・登録免許税・添付書面が問題になる。"],diff:["本店移転は定款記載との関係で株主総会決議が必要になる場合がある。","支店設置・移転・廃止は本店所在地での登記が中心になる。","管轄外本店移転では旧所在地・新所在地の申請関係が重要。","支店は登記事項だが、会社法上の機関設計とは別論点。"],trap:["定款変更が必要な本店移転か、取締役会等の決定で足りるかを分ける。","管轄外本店移転では印鑑提出・同時申請の感覚を確認。"]},
 {id:"yakuhen-shunin",cat:"商業登記法",title:"取締役変更 vs 代表取締役変更",tags:["役員変更","取締役","代表取締役"],common:["役員に関する変更登記。","就任承諾書・本人確認証明書・印鑑証明書・議事録が問われやすい。"],diff:["取締役は会社の機関構成員。代表取締役は会社を代表する権限を持つ者。","代表取締役の選定方法は取締役会設置会社か否かで異なる。","印鑑提出者・代表権の有無により添付書面の重みが変わる。","取締役の任期満了退任と代表取締役資格喪失の連動に注意。"],trap:["取締役を退任すると代表取締役の資格も失う場合がある。","平取締役の就任と代表取締役の就任で添付書面を混同しない。"]},
 {id:"boshu-kabushiki-shinkabu",cat:"会社法・商業登記",title:"募集株式の発行 vs 新株予約権",tags:["募集株式","新株予約権","資本金"],common:["資金調達・株式発行に関係する会社法上の手続。","決議機関・払込・登記事項・添付書面が問われる。"],diff:["募集株式は株式そのものを発行する。新株予約権は将来株式を取得できる権利を発行する。","募集株式では発行済株式総数・資本金等の変更が中心。","新株予約権では行使条件・行使期間・目的株式数などが登記事項になる。","公開会社・非公開会社、有利発行かどうかで決議要件が変わる。"],trap:["新株予約権の発行時と行使時を分ける。","募集事項の決定機関を、公開会社・非公開会社で混同しない。"]},
 {id:"souzoku-igon",cat:"相続",title:"遺産分割 vs 遺言による承継",tags:["遺産分割","遺言","相続登記"],common:["相続による権利承継の場面で問題になる。","相続登記・登記原因・添付情報に影響する。","相続人・受遺者・遺言執行者の関与が問われる。"],diff:["遺産分割は相続人間の協議等により具体的取得者を決める。","遺言による承継は被相続人の意思表示に基づく。","特定財産承継遺言か遺贈かで登記手続・申請人構造が変わる。","遺産分割は相続開始時に遡及するが、第三者保護に注意。"],trap:["『相続させる』趣旨か『遺贈』かで共同申請・単独申請を混同しない。","遺言執行者がいる場合の申請構造を確認。"]}
];

const INITIAL_DATA=[{"id":1800000000001,"subject":"民法","topic":"連帯債務","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n他の連帯債務者が相殺をもって免責を得た連帯債務者に対抗した場合、債権者に相殺によって消滅すべきだった債務の履行を請求することができる（過失あるのに、求償できなかった部分の償還請求できるってこと。）\n免除受けた連帯債務者にも求償可能。連帯の免除＝負担部分に限って請求しそれ以上請求しないこと。絶対と相対あり。\n連帯債権＝各債権者は全部請求も可能。","date":"Excel取込"},{"id":1800000000002,"subject":"民法","topic":"留置権","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n建物買取代金債権で留置権可能。留置権の抗弁も、訴訟係属中は完成猶予の効果有する。保存に必要な使用によって得た利益＝不当利得として返還必要。","date":"Excel取込"},{"id":1800000000003,"subject":"民法","topic":"離婚","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n届出委託した後翻意した場合、届出委託解除の事実なくても協議離婚の届出無効。\n具体的離婚原因提出していたら、反対事実ない限り、抽象的離婚原因あると主張していると解せない。\n監護者は定めなくてもいい。未成熟子いても離婚可能。離婚後に双方を親権者と定めることはできない。子の監護については子の利益を最も優先して決定。","date":"Excel取込"},{"id":1800000000004,"subject":"民法","topic":"利息債権","level":1,"memo":"３年毎に変動法定利率制。将来において負担すべき費用についての損害賠償額を定める場合＝費用負担すべき時までの利息相当額を控除する時はその損害賠償額の請求権が生じた時点における法定利率によりこれをする。","date":"Excel取込"},{"id":1800000000005,"subject":"民法","topic":"利益相反行為","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n共同所持人である子を代理して他に手形譲渡＝セーフ。","date":"Excel取込"},{"id":1800000000006,"subject":"民法","topic":"養子縁組","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n夫婦と離縁＝共に。離婚してたら個別OK。養父母ともに死亡＝未成年後見開始。特別養子縁組請求時点で15歳未満＝成立時点で15歳達した時はそのものの同意必要。取消は将来効。保佐人が被保佐人養子にする時＝家裁の許可不要。縁組に同意していない配偶者＝6ヶ月以内なら取消請求可能","date":"Excel取込"},{"id":1800000000007,"subject":"民法","topic":"用益物権","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n永小作権消滅時、土地所有者は地上物を買い取る請求可能＝正当な理由ないと拒めない。\n地上権の譲渡禁止特約＝債権的効力なので第三者には対抗できない。入会団体の構成員＝各自使用収益権確認・妨害排除請求可能。地上権・賃借権で太陽光パネルOK。","date":"Excel取込"},{"id":1800000000008,"subject":"民法","topic":"用益権","level":1,"memo":"地上権者は収去権はあるが買取請求権はある。地上権設定者は買取請求権あり＝借地借家法適用あるなら地上権者・賃借権者から買取請求可能。","date":"Excel取込"},{"id":1800000000009,"subject":"民法","topic":"無効又は取消し","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n保証人＝主たる債務者が詐欺で騙された場合の取消権なし＝債権者に対し履行拒否は可能。","date":"Excel取込"},{"id":1800000000010,"subject":"民法","topic":"無権代理","level":1,"memo":"【ソース】伊藤塾2022プレ模試\n\n第三者＝代理権消滅を過失で知らなかった場合＝主張・立証責任負う。","date":"Excel取込"},{"id":1800000000011,"subject":"民法","topic":"民法上の留置権","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n留置権不発生の特約も有効。留置権による競売＝換価金を留置可能","date":"Excel取込"},{"id":1800000000012,"subject":"民法","topic":"民法上の組合","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n組合債権＝持分について単独行使不可。組合常務→異議述べた時除き単独可能。組合員に対する債権者は組合財産行使できない。組合債権者は可能。加入前の債務責任負わない。組合員の債務に混同生じない＝組合に全額請求可能。脱退した組合員は組合に求償可能。脱退時の払い戻しは組合財産の状況による。破産後見脱退事由","date":"Excel取込"},{"id":1800000000013,"subject":"民法","topic":"未成年者","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n一切の営業許可や1個の営業の一部に限定することできない。時効の更新＝管理能力必要。未成年管理能力なし。","date":"Excel取込"},{"id":1800000000014,"subject":"民法","topic":"未成年後見と成年後見","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n後見人の任務終了時＝2ヶ月以内に管理計算必要。家裁で伸長可能。未成年後見なら居住の用に供する建物第三者賃貸で家裁の許可不要。","date":"Excel取込"},{"id":1800000000015,"subject":"民法","topic":"法律行為","level":1,"memo":"法律行為＝取り消し解除相殺転貸の承諾遺言。売買請負賃貸借。法人設立。準法律行為＝債権譲渡の通知承諾権利の承認・債務承認履行催促弁済受領の拒絶。","date":"Excel取込"},{"id":1800000000016,"subject":"民法","topic":"法定地上権","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n抵当権設定等時（仮差押え含む）に同一→実行までに土地・建物が第三者に譲渡→競売でも法定地上権成立。借地人が借地上建物に1番抵当権設定後に借地所有権取得し2番抵当権設定＝１番実行されたら法定地上権成立","date":"Excel取込"},{"id":1800000000017,"subject":"民法","topic":"補助及び保佐","level":1,"memo":"【ソース】伊藤塾2021公開模試\n\n補助人＝常に職権。補助監督人は請求または職権。保佐監督人いれば利益相反あっても臨時保佐人不要。意思表示の相手方が補助人なら対抗可能。","date":"Excel取込"},{"id":1800000000018,"subject":"民法","topic":"保証契約","level":1,"memo":"法人保証は極度額不要。賃貸借における保証人＝個人値保証契約＝主たる債務者死亡で元本確定し、死亡後の相続債務負わない。","date":"Excel取込"},{"id":1800000000019,"subject":"民法","topic":"保証","level":1,"memo":"【ソース】伊藤塾2020プレ模試\n\n取消原因を保証人が知っていた時、主たる債務取り消された時保証人独立債務推定あり。\n保証人法人じゃないなら2ヶ月以内に期限の利益失った通知必要＝しなかったら遅延損害金請求不可。\n委託を受けた物上保証人＝事前求償権行使不可。個人貸金等根保証契約で元本確定期日なし＝契約締結から3年経過する日。委託を受けない保証＝求償権の基準時＝保証人の債務消滅時。意思に反した保証＝求償時。\n債権者の履行状況提供義務は委託を受けた保証のみ。連帯債務者または不可分債務者の一人のためにした保証人＝他の債務者には負担部分のみ求償可能。","date":"Excel取込"},{"id":1800000000020,"subject":"民法","topic":"保佐及び補助","level":1,"memo":"【ソース】伊藤塾2023プレ模試\n\n特定の法律行為の代理権付与を本人以外が請求＝補佐人の同意必要。補助人の任務終了時の計算＝補助監督人いるなら立ち会いが必要","date":"Excel取込"},{"id":1800000000021,"subject":"民法","topic":"弁済","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n特定物の引渡＝債権発生時にそのものが存在した場所で弁済だが、損賠に代わった後は債権者の現在の住所で弁済になる。取立債務＝取立無いと確定期限来ても遅滞にならない。債権者の受領遅滞＝債務者の注意義務軽減（故意重過失）\n代物弁済契約しても給付前であれば本来の給付可能。正当な利益ない第三者が弁済の代位対抗するには債権譲渡に準じた対抗要件具備必要。債務者のために物上保証人弁済＝代位の付記登記なくても担保目的財産の譲受人に対抗可能。","date":"Excel取込"},{"id":1800000000022,"subject":"民法","topic":"物権変動","level":1,"memo":"【ソース】伊藤塾2022プレ模試\n\n明認方法＝立木のみが取引の対象とされた場合の対抗要件。本来土地の構成部分","date":"Excel取込"},{"id":1800000000023,"subject":"民法","topic":"物件的請求権と占有訴権の比較","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n対抗要件（登記）備えていない賃借権は妨害排除請求不可。占有回収は1年。占有の侵奪＝代理人含め意思に基づかず奪われること。賃貸借契約終了後の占有に対して占有回収は不可（元々意思に基づいているから）\n物件返還請求＝占有失うと質物に基づいて返還請求不可。","date":"Excel取込"},{"id":1800000000024,"subject":"民法","topic":"物件的請求権","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\n抵当権に基づく妨害排除請求＝損傷されている限り、債権額に十分でも認められる。","date":"Excel取込"},{"id":1800000000025,"subject":"民法","topic":"普通養子縁組","level":1,"memo":"配偶者のあるものが未成年者を養子＝嫡出または意思表示できない場合除き配偶者とともに必要","date":"Excel取込"},{"id":1800000000026,"subject":"民法","topic":"不法行為","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\n確定した遺族年金は損害賠償から控除される。","date":"Excel取込"},{"id":1800000000027,"subject":"民法","topic":"不動産物権変動","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n他人のために登記申請義務を負うもの＝登記がないことを主張できない（第三者にあたらないって意味）登記申請の依頼を受けた司法書士や，未成年者の代理人として登記を行う立場にある親権者が該当。\n登記備えていないと一般債権者に過ぎない仮差押債権者にも対抗できない","date":"Excel取込"},{"id":1800000000028,"subject":"民法","topic":"不動産の先取特権","level":1,"memo":"【ソース】伊藤塾2021プレ模試\n\n工事の材料提供者＝先取特権者にならない。建物の建築費用＝不動産工事の先取特権","date":"Excel取込"},{"id":1800000000029,"subject":"民法","topic":"不当利得","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n不法原因が受益者についてのみ存した時は給付返還請求可能。\n借地上の建物譲受人が借地権譲渡認めない地主に対して家屋買取請求＝地代相当額は不当利得だが賃料相当額は該当しない。共有不動産権限なく占有する他の共有者には持分割合に応じて不当利得請求・損害賠償額請求可能。銀行が過失あって他の共同相続人に払い戻しした場合、不当利得の返還請求可能。","date":"Excel取込"},{"id":1800000000030,"subject":"民法","topic":"不在者の財産の管理","level":1,"memo":"【ソース】伊藤塾2020プレ模試\n\n弁済期到来した債務の弁済＝保存行為＝家裁の許可不要","date":"Excel取込"},{"id":1800000000031,"subject":"民法","topic":"表見代理","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\n白紙委任状＝転々流通予定してない限り代理権与えた表示したものに当たらない。\n登記申請行為権限委任＝110条該当。印鑑証明書交付の代理＝公法上の行為＝当該行為を基本代理権として110条の表見代理は成立しない。","date":"Excel取込"},{"id":1800000000032,"subject":"民法","topic":"非典型担保","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n代理受領＝第三者対抗要件なし→優先的地位主張不可。\n動産所有権留保＝弁済期経過後も土地所有権妨害の事実知らなければ知るまで不法行為責任なし。\n所有権留保付物件の譲渡担保契約＝第三者に対抗主張不可（完済まで所有権移転してないから）\n土地建物同一人＝土地に担保仮登記本登記＝建物所有目的の土地賃借権成立とみなす。代理受領＝同時履行の抗弁・相殺可能。譲渡担保権者が自己の債権者のために更に譲渡担保設定しても、設定者の一般債権者がした差押えに対して第三者異議の訴えで排除求める権利は有したまま","date":"Excel取込"},{"id":1800000000033,"subject":"民法","topic":"賠償額の予定","level":1,"memo":"違約金は賠償額の予定と推定する。","date":"Excel取込"},{"id":1800000000034,"subject":"民法","topic":"売買","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n予約完結権も譲渡可能。建物と敷地賃借権売買＝賃貸人が負担すべき敷地の修繕義務＝隠れた瑕疵じゃないので解除不可。数量指示売買＝特約なければ追加請求不可。代金減額請求＝相当の期間定めて履行の追完請求してから。競売＝数量や権利不適合＝債務不履行。種品なら行使不可。債務者の将来の資力担保＝弁済期における資力担保。種類物売買＝特定かつ引渡後＝当事者双方の責めに帰せない事由＝追完請求不可。買い受けた不動産に抵当権＝代金支払拒めるが、売主も抵当権消滅請求するよう請求できる。買戻特約権者に、賃借権の対抗要件（引渡）あれば、残存期間中1年に限り対抗可能。","date":"Excel取込"},{"id":1800000000035,"subject":"民法","topic":"配偶者短期居住権","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n有償で居住していた時、配偶者短期居住権成立しない。短期も普通も相続放棄しても成立＝欠格・廃除では否成立。\n配偶者が通常の必要費負担。遺贈のみOK=特定財産承継遺言は不可。一部に居住していても全部に配偶者居住権及ぶ。設定登記義務あり。配偶者短期居住権は対抗力なし。短期居住権は収益不可。配偶者が持分有する場合、配偶者居住権が消滅したことを理由として返還請求不可。タンキモ フツウモ","date":"Excel取込"},{"id":1800000000036,"subject":"民法","topic":"認知","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n死亡した子＝直系卑属ある場合のみ認知可能。認知後親子関係不存在確定で認知の効力なし。\n認知判決正当な当事者で確定＝第三者が反対事実で無効訴え不可能。認知者死亡した後も検察相手に認知無効の訴え可能。認知無効の訴え＝父も取消できないが訴えは可能。子を代理して認知の訴え可能。子がまだ出生していない時は不可。","date":"Excel取込"},{"id":1800000000037,"subject":"民法","topic":"内縁配偶者と第三者との関係","level":1,"memo":"相続人の賃借権を援用して居住権主張できるが、賃借人ではないから賃貸人ではないから賃料支払義務を負わない。内縁夫婦共有名義なら、一方死亡後に単独使用しても不当利得に当たらない。内縁配偶者も固有の慰謝料請求可能＝将来の扶養利益も。内縁夫婦にも連帯責任準用。","date":"Excel取込"},{"id":1800000000038,"subject":"民法","topic":"特別養子縁組","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n未成年後見人が特別養子縁組＝家裁の許可不要。15歳になるまでにやむを得ない事情あれば15歳以上でも可能。成立は原則父母の同意必要。","date":"Excel取込"},{"id":1800000000039,"subject":"民法","topic":"特別の寄与","level":1,"memo":"【ソース】伊藤塾2021公開模試\n\n相続開始及び相続人知った時から6ヶ月経過または相続から1年経過＝家裁に協議に代わる処分請求不可になる。特別寄与者が相続開始および相続人を知った時から6ヶ月を経過した時または相続開始から1年経過した時請求不可。特別寄与料の負担は算定額に相続分を乗じた額。","date":"Excel取込"},{"id":1800000000040,"subject":"民法","topic":"同時履行の抗弁権","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n抵当権抹消と債務弁済は弁済が先履行。","date":"Excel取込"},{"id":1800000000041,"subject":"民法","topic":"動産先取特権","level":1,"memo":"先取特権は被担保債権移転すれば随伴する。第一順位の先取特権者は債権取得の時において第二順位または第三順位の債権者があることを知っていた時はこれらのものに対して優先弁済権を講師できない。代位目的の債権に差押前に債務者破産しても、これを差し押さえて物上代位権行使可能。","date":"Excel取込"},{"id":1800000000042,"subject":"民法","topic":"動産質権","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n存続期間の定めなし。違約金・利息・実効費用・保存不履行隠れた瑕疵担保。占有改定不可。差押禁止動産にも設定可能。動産質権実行せずまず一般財産への強制執行も可能。簡易な弁済充当に要する費用＝担保される。","date":"Excel取込"},{"id":1800000000043,"subject":"民法","topic":"動産の物件変動と対抗問題","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n動産強制競売された場合に占有改定でも即時取得成立（178条による考え）","date":"Excel取込"},{"id":1800000000044,"subject":"民法","topic":"土地利用権","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n観望地役権＝一定の行為をしない義務（分筆不要で範囲指定可能）地上権者も現状に復することができる＝土地所有者が木を買い取る請求したら、正当な理由ないと拒めない。","date":"Excel取込"},{"id":1800000000045,"subject":"民法","topic":"登記をしなければ対抗できない第三者","level":1,"memo":"死因贈与で受贈者が限定承認＝相続債権者に不動産対抗できない。","date":"Excel取込"},{"id":1800000000046,"subject":"民法","topic":"添付","level":1,"memo":"融和で損失受けたものは償還請求可能。添付により消滅した所有権目的とする質権も消滅するが、動産所有者が取得した償還請求権に物上代位可能。請負工事＝加工","date":"Excel取込"},{"id":1800000000047,"subject":"民法","topic":"抵当権消滅請求","level":1,"memo":"登記をしたすべての債権者が代価承諾し第三者が払渡または供託＝抵当権消滅＝抵当権の抹消登記原因「年月日抵当権消滅請求」","date":"Excel取込"},{"id":1800000000048,"subject":"民法","topic":"抵当権の物上代位","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n抵当権者＝物上代位の目的債権譲渡されても自ら差押えて物上代位権行使可能\n物上代位と相殺の優劣＝抵当権設定登記と自動債権取得の先後。","date":"Excel取込"},{"id":1800000000049,"subject":"民法","topic":"抵当権の処分・順位変更","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n主たる債務者に抵当権の処分を通知し、又は主たる債務者がこれを承諾しなければ、これをもって主たる債務者、保証人、抵当権設定者及びこれらの者の承継人に対抗することができない。\n＝転抵当権者には通謀虚偽表示対抗不可。\n原抵当権の債権額が転抵当権の債権額超える場合のみ自ら抵当権実行可能。転抵当権の対抗要件は登記。","date":"Excel取込"},{"id":1800000000050,"subject":"民法","topic":"抵当権の処分","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n順位変更＝登記が効力要件＝対抗も通知不要","date":"Excel取込"},{"id":1800000000051,"subject":"民法","topic":"抵当権の効力","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n賃料債権に物上代位するには差押え必要。買戻買主取得した買戻代金債権に物情代位可能。","date":"Excel取込"},{"id":1800000000052,"subject":"民法","topic":"抵当権の効力","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n抵当権設定後の賃借権＝抵当権物上代位で賃料債権に及んでも相殺できない。\n抵当不動産が第三者不法に占有しても賃料相当の損害被る訳ではない。第三取得者は競売の買受人OK","date":"Excel取込"},{"id":1800000000053,"subject":"民法","topic":"抵当権と第三者","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n混同の例外で抵当権消滅免れた第三者＝抵当権消滅請求も可能\n地上権設定登記義務＝地代支払義務と同時履行の関係になし","date":"Excel取込"},{"id":1800000000054,"subject":"民法","topic":"抵当権","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n物上代位の目的債権の譲渡＝払渡・引渡しにあたらないので差押えて物上代位可能。\n不動産工事・保存＝抵当権に優先、売買は登記先後。全体に対する抵当権＝持分取得者は抵当権消滅請求不可。\n損壊があれば債権満足でも妨害排除可能\n第391条【抵当不動産の第三取得者による費用の償還請求】\n抵当不動産の第三取得者は、抵当不動産について必要費又は有益費を支出したときは、第196条の区別に従い、抵当不動産の代価から、他の債権者より先にその償還を受けることができる。\n未登記不動産買受人が登記前に売主が所有権保存し、第三者が抵当権設定＝第三者は177条の第三者なので抵当権対抗可能。","date":"Excel取込"},{"id":1800000000055,"subject":"民法","topic":"抵当建物使用者の引渡し猶予","level":1,"memo":"抵当権者に対抗することのできない賃貸借＝建物の使用収益→競売前からOR強制管理担保不動産収益執行管理人が競売手続開始後＝買受けの時から６ヶ月経過までは猶予。現に使用収益必要。","date":"Excel取込"},{"id":1800000000056,"subject":"民法","topic":"定型約款","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n不特定多数との取引の全部または一部が画一的。定型約款準備者が定型約款を契約内容とする表示していた時は個別条項にも合意したとみなされる。一方的に利益害するものは合意しなかったとみなされる。\n合意前含め相手方の請求あれば遅滞なく相当な方法で内容示さなければならない＝書面・電磁記録提供済みなら不要。変更は合意あったとみなし合意なく可能。","date":"Excel取込"},{"id":1800000000057,"subject":"民法","topic":"賃貸借","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n賃貸人と転借人が同一になっても混同生じない（契約が別だから）借地権は30年、それ以下の特約無効。有益費返還＝新賃貸人が承継。本旨に反する使用の損害賠償請求権＝賃貸人が返還を受けてから1年は時効完成しない。","date":"Excel取込"},{"id":1800000000058,"subject":"民法","topic":"賃借権の譲渡及び転貸","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n適法でも転借人の過失で滅失損傷＝過失有無関わらず転貸人が賃貸人に損賠責任負う","date":"Excel取込"},{"id":1800000000059,"subject":"民法","topic":"地役権","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n土地の分割その譲渡＝地役権は各部に存する。同一の土地に数個の用水地役権（承役地の水汲む権利）OK。汲水地役権の時効取得不可。有償の特約＝登記事項じゃないので対抗不可。複数の用水地役権＝可能だが前の地役権者の水の使用妨げてはならない","date":"Excel取込"},{"id":1800000000060,"subject":"民法","topic":"地上権と永小作権","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n永小作権の譲渡禁止特約は登記で対抗要件。地上権は登記不可。","date":"Excel取込"},{"id":1800000000061,"subject":"民法","topic":"地上権","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n耕作性あるもの不可＝永小作権。必要費償還請求不可。解約＝有償の時は1年前or1年分地代支払い。地上権者が賃貸＝地上権合意解除しても賃貸人に対抗できず所有者が賃貸人の地位承継","date":"Excel取込"},{"id":1800000000062,"subject":"民法","topic":"担保物件一般","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n動産質権の責任転質＝質権消滅請求不可。委託を受けた物上保証人＝事前求償権NG。","date":"Excel取込"},{"id":1800000000063,"subject":"民法","topic":"担保物件","level":1,"memo":"不動産質権者＝原則利息請求できないが別段の合意により請求可能＝民法375条準用され、最後の2年分に限定される。質権＝被担保債権が譲渡されると目的物の引渡しなくても譲受人に質権移転ー第三者に対抗できないだけ。","date":"Excel取込"},{"id":1800000000064,"subject":"民法","topic":"第三者のためにする契約","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n要約者の詐欺で諾約者が取消＝利益受ける第三者は保護されない。債権者が受益の意思表示の代位行使・請求可能","date":"Excel取込"},{"id":1800000000065,"subject":"民法","topic":"代理受領と債権質の比較","level":1,"memo":"債権譲渡が特約で禁止＝質権無効。代理受領なら譲渡・質入禁止特約債権でも可能。代理受領は直接自己の名で取り立てることまで認められない。代理受領は第三者対抗要件なし。代理受領は委任契約。質権は非担保債務相続される。","date":"Excel取込"},{"id":1800000000066,"subject":"民法","topic":"代理受領","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n代理受領権者が消滅時効の完成猶予の催告不可。代理受領＝優先弁済的効力なし＝非典型担保","date":"Excel取込"},{"id":1800000000067,"subject":"民法","topic":"代理","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n制限行為能力者が他の制限行為能力者の法定代理人としてした行為は取り消すことができる。委任者死亡しても代理権消滅しない定め有効。本人装い本人のために権限内行為＝本人に有効。委任・受任者どっち破産しても終了。無利息での貸付＝保存にも管理にもあたらないので無権代理。無権代理人の責任＝善意無過失必要。ただし無権代理人が無権代理を知っていた場合は過失セーフ。行為能力制限も除外。代理人による詐欺＝相手方は常に取消し可能","date":"Excel取込"},{"id":1800000000068,"subject":"民法","topic":"多数当事者間の債権債務","level":1,"memo":"【ソース】伊藤塾2021プレ模試\n\n連帯債権者の一人と更改・免除あったら他の債権者は履行請求不可。分割債権＝すべて相対効。不可分債権者の一人との更改＝他の不可分債権者に対して効力生じない。\n連帯債権＝可分である必要あり。連帯債権者の一人の時効＝他の債権者に効力生じない。","date":"Excel取込"},{"id":1800000000069,"subject":"民法","topic":"即時取得","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\n無権代理は取引無効なので即時取得不成立。盗難2年後に即時取得したものに所有権移転。半信半疑＝悪意","date":"Excel取込"},{"id":1800000000071,"subject":"民法","topic":"相隣関係","level":1,"memo":"隣地から水が自然に流れてくるのを妨げない＝承水義務。共同の費用で境界標OK＝設置保存費用は相隣者が等しい割合で負担可能。\n測量費用＝土地の広狭に応じて分担。２棟の建物の所有者別、間に空き地がある時共同の費用で囲障設置可能。協調整わない時板垣又は竹垣であって高さ２メートルのものでなければならない。建物築造で50メートル違反＝隣地所有者は建築中止変更請求可能。建築着手から1年経過または完成したら損害賠償請求のみ。境界線付近の掘削の制限＝井戸用水だめを掘るには境界線から2メートル以上、池尿だめは1メートル以上の距離が必要。導水管なら境界線から深さの２分の１以上の距離必要＝1メートル超えなくてもいい。\n共有者の一人＝障壁の高さを増せる。自己の費用で必要な工作・改築必要。212条の通行地役権＝通路開設一括支払い必要。その他1年ごとOK。","date":"Excel取込"},{"id":1800000000072,"subject":"民法","topic":"相続人","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n殺害を告発せず告訴しなかった者＝原則相続不可（是非弁別ないor犯人が自己配偶者・直系血族ならセーフ）\n排除した推定相続人に遺贈可能。相続債権者は仮登記ないと相続財産法人に登記請求不可。","date":"Excel取込"},{"id":1800000000073,"subject":"民法","topic":"相続の承認及び放棄","level":1,"memo":"【ソース】伊藤塾2021公開模試\n\n詐欺・脅迫は追認から6ヶ月または承認放棄から10年で時効。全員が限定承認＝相続人の中から家裁が相続財産管理人を選任。","date":"Excel取込"},{"id":1800000000074,"subject":"民法","topic":"相続の効力","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n共有の持分権には回復請求なし（包括持分だけ）被相続人は遺言によってのみ相続分の指定可能。祭祀財産＝祭祀主宰すべきもの（相続人じゃなくてもいい）が承継。個人根保証契約・身元保証人＝地位相続しない","date":"Excel取込"},{"id":1800000000075,"subject":"民法","topic":"相殺","level":1,"memo":"【ソース】伊藤塾2020プレ模試\n\n禁止の特約＝第三者が善意無重過失なら対抗不可。賃貸借解除当時、反対債権行使可能事実知らなかったとしても解除に影響なし","date":"Excel取込"},{"id":1800000000076,"subject":"民法","topic":"占有権の効力","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n特定承継人＝侵奪の事実→侵奪あったかもしれない程度では足りない。所有の意思ない占有者＝善意でも占有者の責めに帰すべき事由で滅失・損傷＝全額賠償。善意の占有者は果実取得する＝敗訴は訴えの時から悪意＝それまでに消費していた果実返還義務負わない。占有保持の訴え＝相手方に故意過失必要。債権者も債務者の占有推定援用可能（差押えとかに流用）。家畜以外の動物占有＝飼い主の占有離れてから1ヶ月以内に回復請求受けなかったら権利行使可能ヘンカｎ","date":"Excel取込"},{"id":1800000000077,"subject":"民法","topic":"占有の訴え","level":1,"memo":"【ソース】伊藤塾2021プレ模試\n\n占有保持の損害賠償＝故意過失必要。占有保全＝損害賠償の担保は故意過失不要。占有回収の訴えの損害賠償請求＝相手方に故意・過失必要。\n占有保持・保全＝消滅後1年以内。工事着工1年経過または完成したら不可。占有保全の訴え＝損害の予防または損害賠償の担保のどっちか。占有代理人に対する第三者の権利行使は占有者本人に対する権利の行使となる。","date":"Excel取込"},{"id":1800000000078,"subject":"民法","topic":"先取特権","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n旅館宿泊の先取特権＝宿泊料・飲食料・手荷物。一般債権者が物上代位目的債権の差押えしたに過ぎない時は、先取特権者は物上代位権を行使可能（払渡・引渡前だから）占有改定も引渡にあたる。工場労務最後の三ヶ月の賃金＝工業労務の先取特権あり。先取特権も抵当権準用して満期となった2年分のみ権利行使可能。債務者が破産開始しても払渡・引渡にあたらないので物上代位権行使可能。動産担保権者＝動産売買の先取特権で競売されたら動産競売不許の訴え可能。\n不動産賃貸の先取特権=違約金支払債務も含む。適法な賃借権譲渡転貸あれば、譲受人や転貸人の動産にも先取特権及ぶ。旅館宿泊の先取特権=手荷物過失なく宿泊客のと信じたら先取特権成立。動産質権→第一順位、保存は第二順位。","date":"Excel取込"},{"id":1800000000079,"subject":"民法","topic":"請負","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n仕事完成前に報酬請求権譲渡・差押え可能。注文者相殺意思表示した日の翌日から注文者の報酬残債務は履行遅滞になる。\n注文者が破産＝仕事完成前なら解除可能→破産管財人が解除した場合のみ損害賠償可能。","date":"Excel取込"},{"id":1800000000080,"subject":"民法","topic":"人が死亡した時の法律関係","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n個人根保証契約で主たる債務者・保証人死亡＝元本確定。","date":"Excel取込"},{"id":1800000000081,"subject":"民法","topic":"親子関係","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n母が胎児を代理して父に認知の訴えできない。子は21歳まで可能。（母は認知から7年以内に認知無効の訴え提起）\n認知無効の訴え＝子・母・認知者の3人のみ。子の利益に関わらず否認権行使可能。害する時除き母も否認可能。\n父又は母は、子の出生後において、その嫡出であることを承認したときは、それぞれその否認権を失う＝嫡出否認の訴え不可。子の父が定められる場合において、父又は子は、子が嫡出であることを否認することができる。\n婚姻の成立から200日以内に生まれた子＝婚姻前の懐胎子と推定。婚姻成立から200日後または離婚から300日以内も婚姻中の懐胎扱い。＝父子関係争いは嫡出否認の訴え（知った時から3年以内）","date":"Excel取込"},{"id":1800000000082,"subject":"民法","topic":"親権","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n第三者債務を親権者が子と共に連帯債務者＝利益相反。養親全員死んでも実親の親権復活しない。第三者が無償で子に財産与え、親権者に管理させない意思表示＝有効","date":"Excel取込"},{"id":1800000000083,"subject":"民法","topic":"譲渡担保権","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n先順位の抵当権代位弁済しても、求償権は特段の定めないと譲渡担保で担保される債権範囲に含まれない。\n買戻特約付売買でも占有移転伴わないなら性質は譲渡担保。抵当権に関する制約受けない。損害賠償請求権をもって留置権行使不可（牽連関係ないから）換価権行使＝目的不動産価格から先順位抵当権の被担保債権額控除し残額と譲渡担保の被担保債権額を比較して算定される。清算金請求権と目的物引渡請求権＝同時履行。履行遅滞にならない。弁済期後に差し押さえられたら、全額弁済しても所有権回復できない。","date":"Excel取込"},{"id":1800000000084,"subject":"民法","topic":"消滅時効","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n競売開始正本が債務者に送達された時＝被担保債権の時効更新。無断転貸の解除権＝転貸使用収益開始時から進行。定期金債権＝各債権から10年。婚姻解消から6ヶ月間は一方に対して有する権利の時効完成しない。","date":"Excel取込"},{"id":1800000000085,"subject":"民法","topic":"消費貸借","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n消費貸借の予約＝当事者の一方破産で効力なくなる。占有改定でも成立。諾成的消費貸借＝将来目的物を受ける権利譲渡可能。書面でする消費貸借＝目的物受け取るまでの解除権は借主のみ。準消費貸借契約＝旧債務存在しないと成立しない。旧債務の不存在は効力を争うものが事実の立証責任を負う。金銭その他のものを給付する義務を負う場合、当事者が消費貸借の目的すること約したら消費貸借成立。","date":"Excel取込"},{"id":1800000000086,"subject":"民法","topic":"書面によらない贈与","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n受贈者が瑕疵または不存在知ってたら告げなくても責任負わない。","date":"Excel取込"},{"id":1800000000087,"subject":"民法","topic":"所有者不明土地管理命令等","level":1,"memo":"所有者不明建物管理命令の効力=動産や敷地権にもおよぶ。管理不全土地管理人=保存行為・改良行為=裁判所の許可。土地の処分は所有者の許可も必要。管理不全土地なら被告は所有者。費用報酬は所有者負担。","date":"Excel取込"},{"id":1800000000088,"subject":"民法","topic":"所有者不明土地管理人","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n善管注意義務・裁判所の許可で売却。報酬前払いあり。裁判所許可で辞任","date":"Excel取込"},{"id":1800000000089,"subject":"民法","topic":"所有権一般","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n宅地の所有者＝合理的なら他人の給排水設備利用できる。相隣者の一人は共有障壁の高さ増せる＝増した部分は工事した者の単独所有になる。井戸境界線2メートル、尿だめ1メートル。不動産に対する加工＝加工物所有権は不動産所有者。分離するのに過分の費用＝主たる動産の所有者に帰属。\n境界線から1メートル未満の距離で他人の宅地見通せる窓またはベランダ設置者＝目隠し必要","date":"Excel取込"},{"id":1800000000090,"subject":"民法","topic":"重大な過失","level":1,"memo":"急迫の危害免れるための事務管理＝悪意重過失ないと賠償責任負わない。","date":"Excel取込"},{"id":1800000000091,"subject":"民法","topic":"取得時効","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n時効期間中の果実は時効取得者に帰属＝果実返還不要。被相続人の占有で時効完成＝自己の相続分の限度でのみ援用可能。自己物以外の時効取得もあり。農地を農地以外にするために買い受けたもの＝農地法の許可得られていなくても時効OK。","date":"Excel取込"},{"id":1800000000092,"subject":"民法","topic":"質権","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\n動産根質権＝極度額不要。動産質権＝占有失ったら対抗できないが質権は無くならない。代担保による消滅請求なし。","date":"Excel取込"},{"id":1800000000093,"subject":"民法","topic":"失踪宣告・不在者財産管理人","level":1,"memo":"【ソース】LEC2023実力診断模試\n\n違う日の死亡証明＝請求により失踪宣告の取消必要。期限到来した債務弁済＝保存行為なので許可不要。\n生存明らかな時に家裁で改任NG。不在者本人が置いた管理人＝命令なければ財産目録作成不要。\n裁判所が管理人置いた後、本人が違う管理人置いても、請求無ければ従前の管理人取り消されない。検察も改任請求可能。","date":"Excel取込"},{"id":1800000000094,"subject":"民法","topic":"自己契約・双方代理","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n賃貸人が賃借人の代理人を選任し若い契約結ぶ委任状無効","date":"Excel取込"},{"id":1800000000095,"subject":"民法","topic":"時効","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n未成年者は単独で時効承認できない。強制競売で債権届出ても更新の効果なし。建物賃借人は賃貸人の敷地所有権の時効取得援用できない。物上保証人が物上保証・被担保債権の存在承認しても、物上保証人と債権者の間に被担保債権の更新事由とならない。被保佐人は承諾なく時効承認可能。物上保証人いる場合、競売開始決定による差押えの効力発生後、正本が債務者に送達された時に完成猶予の効力生じる。定期金債権は各債権知った時10年","date":"Excel取込"},{"id":1800000000096,"subject":"民法","topic":"事務管理","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n本人の名で契約しても、当然に本人に帰属するわけではない。","date":"Excel取込"},{"id":1800000000097,"subject":"民法","topic":"氏","level":1,"memo":"子が父母と氏を異にする場合＝父母婚姻中に限り家裁の許可得ないで父母と同じ氏を名乗れる。15歳未満なら法定代理人が代わりに届出。","date":"Excel取込"},{"id":1800000000098,"subject":"民法","topic":"死因贈与と遺贈の異同","level":1,"memo":"負担付遺贈は負担の履行状況にかかわらず契約の全部又は一部撤回することがやむを得ない特段の事情ないと撤回できない。死因贈与は自由に放棄できない。フタンツキイゾウ フタンノ リコウジョウキョウニ ケイヤクノ ゼンブ マタハ イチブ テッカイ トクダンノ ジジョウ テッカイ シインゾウヨハ ジユウニ ホウキデキナイ","date":"Excel取込"},{"id":1800000000099,"subject":"民法","topic":"使用貸借","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n借主は第三者に対し使用借権を主張できない。","date":"Excel取込"},{"id":1800000000100,"subject":"民法","topic":"債務不履行","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n履行不能に基づく損賠＝期限の定めの無い債務＝履行請求時から遅滞。損賠予定額定めたら裁判所増減できない。\n債権者一部支払い受けた時は債務者は代位しない。金銭以外のもの返還する場合＝受領の時以降の利息および果実の返還必要。契約成立時点で不能＝代金支払債務消滅のためには契約の解除必要。安全配慮義務違反＝遺族固有の慰謝料請求不可。期限の定めのない債務。債務不履行にかかる弁護士報酬の損賠請求不可＝安全配慮義務違反・不法行為なら可能。\n特別事情で予見すべきであれば請求可能、契約解除してなくても填補賠償請求可能。火災保険金＝賃貸人に対する損賠から損益相殺控除されない","date":"Excel取込"},{"id":1800000000101,"subject":"民法","topic":"債務引受","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n免責的債務引受＝債権者が債務者に通知した時に効果発生。解除権・取消権の行使不可＝履行拒否は可能。免責的債務引受の引受人＝売買の目的達成できない時も契約解除不可。債務者の意思に基づかない債務引受NG。免責的債務引受されたら、元の債務担保のための第三者の質権も消滅する。","date":"Excel取込"},{"id":1800000000102,"subject":"民法","topic":"債権譲渡","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n将来債権譲渡＝債務者対抗要件具備前に譲渡制限特約→譲受人は特約悪意となって、債務者に対抗できない。\n譲渡制限債権に強制執行＝善悪に関係なく対抗不可。債権譲渡後、対抗要件備える前でも譲渡人は債務者に請求できない。譲渡禁止特約の善意無過失＝譲渡時点で判断（対抗要件時点関係無し）債務者が異議留めない承諾＝譲渡人に対抗事由あること譲受人過失で知らなかった場合→債務者対抗可能\n譲渡制限特約付きの預貯金債権の譲渡は、悪意又は重過失のある譲受人に対する関係では無効である（1項）。\n債務者は、譲渡制限特約があることを理由に、譲渡制限特約付きの預貯金債権に対して強制執行をした差押債権者に対抗できない（2項）法人＝第三者へは債権譲渡登記、債務者へは登記通知または承諾必要。\n譲渡制限悪意重過失あっても譲渡人が破産した時は譲受人は債務者に供託させられる。債務者が異議をとどめないで承諾をしても、非担保債権は復活せず、抵当権も復活しない。","date":"Excel取込"},{"id":1800000000103,"subject":"民法","topic":"債権者代位権および詐害行為取消権","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n金銭・動産なら直接引渡し請求OK。借地上の建物賃借人＝賃借権保全のため建物譲受人の建物買取請求権代位行使不可","date":"Excel取込"},{"id":1800000000104,"subject":"民法","topic":"債権質権","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n質権設定されても時効の更新のために設定者が債権行使可能。","date":"Excel取込"},{"id":1800000000105,"subject":"民法","topic":"詐欺・脅迫","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n買主詐欺で売主追認できる以後に引渡受ける＝履行請求に含まれないので取消可能。騙す・一定の意思表示させるとう二段の故意必要。","date":"Excel取込"},{"id":1800000000106,"subject":"民法","topic":"詐害行為取消権","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n取り消されたら反対給付返還か困難なら価額償還請求可能。害することを知って行為をすることを債権者が知った時から２年または行為の時から10年。時効の更新事由としての承認も詐害行為取消の対象。物上保証抵当権有する債権者＝抵当権での満足関係なく詐害行為取消請求可能","date":"Excel取込"},{"id":1800000000107,"subject":"民法","topic":"混同","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n所有権以外の物件が同一人に帰属＝他の権利の目的なら混同の例外。\n地上権者が買戻特約付で土地譲受け→買戻で売買解除されたら地上権復活する。\n賃借権に対抗要件具備されている状態で同一人に帰属しても、賃借権消滅しない。","date":"Excel取込"},{"id":1800000000108,"subject":"民法","topic":"根抵当権","level":1,"memo":"登記なくても確定期日当事者間では有効。目的不動産の第三取得者が破産開始決定受けた場合も元本確定。物上代位権行使で差押え＝元本確定。信用金庫取引による債権＝根抵当債務者に対する保証債権含む。保証委託取引により生ずる債権＝保証協会の保証債権含まない。","date":"Excel取込"},{"id":1800000000109,"subject":"民法","topic":"婚姻と内縁の比較","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n夫婦間契約いつでも取消可能→実質破綻してたら不可。内縁でも共有不動産は特段の事情ない限り従前同様無償使用可能。不法行為の慰謝料請求＝内縁配偶者も含まれる。","date":"Excel取込"},{"id":1800000000110,"subject":"民法","topic":"婚姻","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n養子・配偶者・養子直系卑属・その配偶者＝養親・直系尊属＝婚姻不可。","date":"Excel取込"},{"id":1800000000111,"subject":"民法","topic":"後見人","level":1,"memo":"後見開始審判と選任は一緒に必要。未成年後見は職権なし。特別養子縁組で後見人＝被後見人・未成年後見のための家裁の許可は不要","date":"Excel取込"},{"id":1800000000112,"subject":"民法","topic":"元本確定前の根抵当権","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n元本確定前に転抵当あっても債務者は自由に弁済可能。分割譲渡の登記は対抗要件で効力要件じゃない。","date":"Excel取込"},{"id":1800000000113,"subject":"民法","topic":"権利能力なき社団と民法上の組合","level":1,"memo":"【ソース】伊藤塾2023プレ模試\n\n権利能力なき社団も組合も親睦図ること目的OK。権利能力なき社団は個人で債務負わない＝組合は個人で負う。\n構成員の脱退＝権利能力なき社団は持分払戻不可。民法上の組合は可能","date":"Excel取込"},{"id":1800000000114,"subject":"民法","topic":"権利質","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n地上権者は質権者に引渡し必要。存続期間10年。債権に質権設定でも譲渡可能。\n質権者が債務者である債権も質入れ可能。債権質に対して第三債務者は相殺できない。設定者の取立て禁止。催告はしてもOK","date":"Excel取込"},{"id":1800000000115,"subject":"民法","topic":"契約の第三者に対する効力","level":1,"memo":"再受寄者＝受寄者と同一の権利義務＝再受寄者も寄託者に保管費用の償還請求可能。転借人も賃借人の債務の範囲を限度として賃貸人に債務直接履行義務負う。注文者と元請けで出来形部分の所有権注文者に属する特約ある場合、下請けが材料提供しても特段の事情ない限り所有権は注文者に帰属する。","date":"Excel取込"},{"id":1800000000116,"subject":"民法","topic":"契約の成立","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n承諾の期間定めないでした申込み＝対話継続中はいつでも撤回可能。\n意思表示・慣習で承諾必要ないなら承諾と認めるべき事実あった時に成立","date":"Excel取込"},{"id":1800000000117,"subject":"民法","topic":"契約の効力","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n継続的供給契約で相手方が前期の債務履行しない時、後期の債務履行拒絶できる。双務契約から生じた２つの債務のうち一方が更改されたら同時履行の抗弁権消滅。","date":"Excel取込"},{"id":1800000000118,"subject":"民法","topic":"契約の解除","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n原始的不能＝そもそも無効で解除問題とならない。逓次供給＝債務分割して給付→後履行のみ解除可能。使用利益も返還必要。手付償還＝拒否されても影響なく解約可能。一部が履行不能＝催告なく解除可能（一部解除も）。原状回復＝使用利益も返還。解除権行使前に損害の賠償＝解除権消滅。\n契約解除の意思表示＝相手方の同意ないと撤回できない。債務の全部が履行不能となった時＝債務者の帰責性なくても債権者は催告なく解除可能。金銭以外のもの返還する時は受領以後の果実も返還必要","date":"Excel取込"},{"id":1800000000119,"subject":"民事保全法","topic":"民事保全","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n処分禁止の仮処分命令＝請求認容判決で債務名義取得→処分禁止の登記後の承継人に承継執行文を受けて建物収去土地明渡の強制執行可能 。\n占有移転禁止の仮処分命令執行後、善意の占有承継者に対し強制執行可能。\n債権者以外の利害関係人＝記録閲覧請求に時期的制限あり。保全執行は申立てで行う（職権なし）","date":"Excel取込"},{"id":1800000000120,"subject":"民事保全法","topic":"民事保全","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n利害関係人も事件記録閲覧請求可能→時期についての制限あり。\n仮の地位を定める仮処分→審尋必要。ただし目的達成できない場合は不要。保全異議申立ての決定＝送達必要。\n占有移転禁止の仮処分命令執行後は、善悪問わず占有承継者に明渡しの強制執行可能。","date":"Excel取込"},{"id":1800000000121,"subject":"民事保全法","topic":"民事保全","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n手続裁判は口頭弁論不要。書証提出されても認否なく資料にできる。保全異議＝申立期限なし。\n保全抗告＝理由有無判断せず抗告裁判所へ送付。（保全抗告＝保全異議・保全取消しについての不服申立て）","date":"Excel取込"},{"id":1800000000122,"subject":"民事保全法","topic":"民事保全","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n占有移転禁止の仮処分命令＝不動産で債務者特定困難→特定しないでOK\n保全異議の申立てについての決定＝審級同一なので認可・変更・取消し必要。","date":"Excel取込"},{"id":1800000000123,"subject":"民事保全法","topic":"民事保全","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n執行官が行う保全執行の執行処分＝執行官所属の地裁が保全執行裁判所\n民保法＝すべて専属管轄。急迫の事情あれば裁判長が保全命令の決定可能（裁判所もオール決定主義）。\n保全すべき権利・必要性・趣旨すべて疎明必要","date":"Excel取込"},{"id":1800000000124,"subject":"民事保全法","topic":"民事保全","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n原裁判所＝保全抗告受けたら抗告裁判所へ送付（再度の考案禁止）保全執行＝当事者以外へは執行文の付与。","date":"Excel取込"},{"id":1800000000125,"subject":"民事保全法","topic":"民事保全","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n保全命令の申立＝簡裁でも書面で必要。発令裁判所に保全異議。","date":"Excel取込"},{"id":1800000000126,"subject":"民事保全法","topic":"民事保全","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n金銭債権不執行の合意＝仮差押命令不可。必要性あれば同一被保全債権に更に仮差押可能。\n債務者の申立あれば、保全異議で仮処分取り消す場合に債権者へ仮処分命令で得たものの返還請求可能。\n動産で著しい価格減少・不相応な費用かかる場合、売却して供託しなければならない","date":"Excel取込"},{"id":1800000000127,"subject":"民事保全法","topic":"民事保全","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\n占有移転禁止の仮処分命令＝特別の事情あれば債務者特定しないで可能。簡裁への保全命令申立も書面必要","date":"Excel取込"},{"id":1800000000128,"subject":"民事保全法","topic":"民事保全","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n係争物に関する仮処分命令＝権利実行できなくなるおそれ・著しい困難おそれで可能。\n仮差押解放金供託しても仮差押命令の効力がなくなるわけではない＝効力が供託金取戻請求権に移行するだけ。\n保全異議＝利益あればいつでも可能。保全抗告＝原裁判所再度の考案不可。不動産占有移転禁止＝占有者特定しないとできない。","date":"Excel取込"},{"id":1800000000129,"subject":"民事保全法","topic":"民事保全","level":1,"memo":"【ソース】伊藤塾2022公開模試\n\n保全命令申立却下の即時抗告却下に対して再抗告不可。仮処分命令で償うことができない損害＝債務者の申立てあれば担保で命令取消し可能。","date":"Excel取込"},{"id":1800000000130,"subject":"民事保全法","topic":"民事保全","level":1,"memo":"【ソース】伊藤塾2023プレ模試\n\n審理終結日＝立ち会える審尋の期日なら直ちに審理終結宣言可能。","date":"Excel取込"},{"id":1800000000131,"subject":"民事保全法","topic":"民事保全","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n民事保全も移送の決定準用あり。保全命令＝担保は裁判所の許可を得て支払委託契約もその他特別の契約も可能。\n当事者に送達必要なので相当な方法での告知不可。","date":"Excel取込"},{"id":1800000000132,"subject":"民事保全法","topic":"保全命令","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n仮差押命令・仮処分命令＝被保全債権が条件期限付でも可能。\n取下げは口頭弁論・審尋期日以外は書面で","date":"Excel取込"},{"id":1800000000133,"subject":"民事保全法","topic":"保全命令","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n決定には理由付す必要＝口頭弁論得ないなら理由要旨を示せば足りる","date":"Excel取込"},{"id":1800000000134,"subject":"民事保全法","topic":"保全執行","level":1,"memo":"【ソース】伊藤塾2021公開模試\n\n原則執行文不要。当事者以外の承継人にする場合必要。金銭債権に対する仮差押＝第三債務者に弁済禁止する命令を発する。仮処分前に権利取得しても仮処分登記後に登記したら対抗不可。","date":"Excel取込"},{"id":1800000000135,"subject":"民事保全法","topic":"保全異議・保全取消","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n執行停止＝担保条件で保全執行・既にした処分の取消可能＝保全命令の取消明らかな事情と償うことできない損害の疎明必要。保全命令取消す決定＝2週間以内の期間経過しなければ決定効力ない旨宣言可能。\n仮処分命令で償うことできない損害＝債務者の申立てで担保条件で仮処分命令の取消可能。\n債務者の申立てで本案の訴え提起&係属書面提出命令あり。仲裁判断も本案に該当。\n保全命令＝保全異議申立て可能。保全命令発令前に戻り、再度必要性審理する。","date":"Excel取込"},{"id":1800000000136,"subject":"民事保全法","topic":"保全異議","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n保全異議＝保全命令を発した裁判所が必要性再審理。いつでも可能。当事者双方期日なければ決定不可。取下げに債権者の同意不要。","date":"Excel取込"},{"id":1800000000137,"subject":"民事保全法","topic":"仮差押えの執行","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n裏書禁止の有価証券＝債権に対する仮差押えの執行→第三債務者に債務者への弁済を禁止する方法＝給付訴訟を保存行為として行うことはできる。不動産に対する仮差押えの効力は登記時。","date":"Excel取込"},{"id":1800000000138,"subject":"民事保全法","topic":"不動産担保権の実行フドウサンタンポケンジッコウ","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n債務名義なくても実行可能（確定判決・公正証書・登記・一般先取特権証明書）不動産担保権の実行の開始決定に対する執行抗告及び執行異議の申立＝担保権の不存在消滅理由にしてOK。（民執35と182の対比）サイムメイギジッコウカノウカクテイハンケツコウセイショウショトウキイッパトッケンショウメイショフドウサンタンポケンジッコウカイシケッテイタイシッコウコウコクオヨシッコウイギモウシタテタンポケンフソンザイショウメツリユウミンシツタイヒ","date":"Excel取込"},{"id":1800000000139,"subject":"民事保全法","topic":"仮差押命令カリサシオサメイレイ","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n仮差押解放金供託証明＝執行取消。命令自体の取消は保全異議や保全取消し。\n執行は申立てにより裁判所または執行官が行う。カリサシオサカイホウキンキョウタクショウメイシッコウトリケシメイレイジタイトリケシホゼンイギホゼントリケシッコウモウシタサイバンショシッコウカンオコナ","date":"Excel取込"},{"id":1800000000140,"subject":"民事訴訟法","topic":"民事訴訟における証拠収集手続","level":1,"memo":"【ソース】伊藤塾2021公開模試\n\n証人尋問＝職権不可。鑑定＝職権可能。訴訟継続中職権で証拠保全の決定可能＝不服申立て不可。","date":"Excel取込"},{"id":1800000000141,"subject":"民事訴訟法","topic":"補助参加及び訴訟告知","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n判決確定後も補助参加申出とともに再審の訴え提起して訴訟再会可能。\n訴訟外で相殺の意思表示＝参加人も主張可能。被参加人が補助参加人のできない訴訟行為を故意過失でしなかった時＝補助参加人に裁判の効力生じない。補助参加しなくても参加的効力受ける。","date":"Excel取込"},{"id":1800000000142,"subject":"民事訴訟法","topic":"弁論準備手続","level":1,"memo":"【ソース】伊藤塾2021プレ模試\n\n分離可能。当事者双方の申立てで取消必要。証拠の申出の裁判可能","date":"Excel取込"},{"id":1800000000143,"subject":"民事訴訟法","topic":"弁論準備手続","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n弁論準備手続の証拠調べ＝文書・準文書（図面・写真・録音テープ・ビデオテープ）","date":"Excel取込"},{"id":1800000000144,"subject":"民事訴訟法","topic":"弁論主義・釈明権","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n当事者尋問＝証拠資料＝口頭弁論で主張したものとはみなされない。当事者ではなく代理人がしたと認定＝弁論主義に反しない。","date":"Excel取込"},{"id":1800000000145,"subject":"民事訴訟法","topic":"弁論主義","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\nABの履行請求訴訟＝Aの代理人CとB間の契約と認定＝弁論主義に反しない。債権者に過失があった事実＝債務者において主張立証責任負う。書証の成立真正＝補助事実。","date":"Excel取込"},{"id":1800000000146,"subject":"民事訴訟法","topic":"文書提出命令","level":1,"memo":"【ソース】伊藤塾2021プレ模試\n\n決定に対して即時抗告可能","date":"Excel取込"},{"id":1800000000147,"subject":"民事訴訟法","topic":"複数請求訴訟","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n訴えの変更の新請求による時効の完成猶予＝変更書面の裁判所への提出時。\n中間確認の訴え＝請求の先決関係にある権利法律関係の存否＝訴訟要件の存否は対象外。\n引渡と代償請求＝請求の単純併合＝全ての請求について審理・判決必要","date":"Excel取込"},{"id":1800000000148,"subject":"民事訴訟法","topic":"必要的共同訴訟","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n類似なら一部のものだけ取下可能。一人が上訴したら全員に遮断効発生。\n参加承継＝独立当事者訴訟。片面的な参加も可能。相手型一人に訴訟行為で全員に効果発生。","date":"Excel取込"},{"id":1800000000149,"subject":"民事訴訟法","topic":"反訴","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n本訴の目的請求または防御の方法と関連ある場合のみ提起可能。再反訴OK。併合要件欠く場合終局判決をもって却下される","date":"Excel取込"},{"id":1800000000150,"subject":"民事訴訟法","topic":"反訴","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\n再反訴可能。併合要件欠く時は終局判決で却下すべき","date":"Excel取込"},{"id":1800000000151,"subject":"民事訴訟法","topic":"判決手続","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n判決の誤記訂正＝更正決定→即時抗告が可能。適法な控訴あったらできない。","date":"Excel取込"},{"id":1800000000152,"subject":"民事訴訟法","topic":"判決","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n判決書＝口頭弁論の終結日記載必要。実在しない当事者に対する判決＝無効判決だが自ら取消不可能。\n更正決定に対して即時抗告可能。","date":"Excel取込"},{"id":1800000000153,"subject":"民事訴訟法","topic":"判決","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n請求の一部に脱漏あっても追加判決申立てで補充できるから上訴不可。","date":"Excel取込"},{"id":1800000000154,"subject":"民事訴訟法","topic":"二重起訴の禁止","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n貸金債権残部を自動債権として相殺の抗弁主張は可能。手形金支払請求権と代金支払債務不存在確認は訴訟物違うからセーフ","date":"Excel取込"},{"id":1800000000155,"subject":"民事訴訟法","topic":"二重起訴の禁止","level":1,"memo":"【ソース】伊藤塾2022公開模試\n\n貸金返還請求訴訟→反訴→貸金訴訟で相殺抗弁主張は不可。","date":"Excel取込"},{"id":1800000000156,"subject":"民事訴訟法","topic":"当時者能力","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n当事者能力欠缺を看過して本案判決確定＝再審不可。被保佐人が訴訟上の和解＝保佐人の特別の授権必要。","date":"Excel取込"},{"id":1800000000157,"subject":"民事訴訟法","topic":"当事者適格","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n境界確定＝被告が時効で原告土地取得＝原告適格なし。口頭弁論終結後の承継人も再審の訴え可能。\n給付の訴えの被告適格は個別判断。相続分全部譲渡したもの＝遺産確認の訴えの当事者適格なし。","date":"Excel取込"},{"id":1800000000158,"subject":"民事訴訟法","topic":"当事者適格","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n給付義務者になり得なくても却下されない。権利能力ない社団＝代表個人名義に求める原告適格あり。\n業務執行組合員＝自己の名で訴訟OK。代位債権者＝保全債権消滅したら却下","date":"Excel取込"},{"id":1800000000159,"subject":"民事訴訟法","topic":"当事者尋問","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n当事者尋問＝自白成立しない。宣誓させることができる。法定代理人に尋問しても、さらに未成年に尋問可能。","date":"Excel取込"},{"id":1800000000160,"subject":"民事訴訟法","topic":"当事者及び裁判所の訴訟行為","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n終結した口頭弁論の再開＝職権でOK。弁論の更新放棄不可（放棄は責問権の喪失）\n訴訟遅滞おこしたら勝訴でも遅滞で生じた訴訟費用支払わせられる。","date":"Excel取込"},{"id":1800000000161,"subject":"民事訴訟法","topic":"当事者及び裁判所の訴訟行為","level":1,"memo":"【ソース】伊藤塾2023プレ模試\n\n口頭弁論の指揮に関する裁判所の命令・処置に異議＝裁判所は決定で異議について裁判する＝受訴裁判所が単独体の時は適用されない。弁論の更新＝責問権喪失の対象外。","date":"Excel取込"},{"id":1800000000162,"subject":"民事訴訟法","topic":"当事者への意見聴取の要否","level":1,"memo":"【ソース】伊藤塾2023プレ模試\n\n証拠保全の決定＝不要。弁論準備手続・書面による準備手続・専門委員の関与・控訴審での請求追加の期間＝必要。","date":"Excel取込"},{"id":1800000000163,"subject":"民事訴訟法","topic":"当事者の訴訟行為","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n責に帰さない事由で不変期間遵守できなかった場合、事由消滅後1週間以内に追完可能→期間延長不可能","date":"Excel取込"},{"id":1800000000164,"subject":"民事訴訟法","topic":"当事者の申立権","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n支払う能力ない者＝訴訟上の救助の決定可能。口頭弁論の併合・終了した口頭弁論の再開＝当事者の申立権ない。\n裁判長に釈明権、当事者は期日外含め求問権あり","date":"Excel取込"},{"id":1800000000165,"subject":"民事訴訟法","topic":"提訴予告通知制度","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n請求の要旨・紛争の要点で足りる。予告通知をした日から4ヶ月以内に書面で照会可能→営業秘密は不可＝通知受けたものも照会可能。裁判所は文書の送付嘱託・調査の嘱託・専門的な知見に基づく意見陳述の嘱託・執行官による現況調査可能＝文書の提出命令は不可（訴え提起前の証拠収集処分）","date":"Excel取込"},{"id":1800000000166,"subject":"民事訴訟法","topic":"直接主義","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n大規模訴訟（当事者や証人が著しく多数）でも受命裁判官に証人・当事者尋問させられる。","date":"Excel取込"},{"id":1800000000167,"subject":"民事訴訟法","topic":"調査の嘱託","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n被嘱託者は団体＝権利能力なき社団もOK。報告書＝当事者の援用不要。手形訴訟で調査嘱託不可","date":"Excel取込"},{"id":1800000000168,"subject":"民事訴訟法","topic":"即時抗告","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n訴え変更許さない旨決定・文書の所持者でない本案被告・少額訴訟→通常訴訟決定＝即時抗告不可。\n督促意義の却下・命令による訴状却下＝即時抗告可能","date":"Excel取込"},{"id":1800000000169,"subject":"民事訴訟法","topic":"送達","level":1,"memo":"【ソース】伊藤塾2023プレ模試\n\n被保佐人に対して送達する。書留郵便＝発送の時に送達あったとみなされる。送達報告書作成必要だが、作成・提出しなくても効力に影響なし。","date":"Excel取込"},{"id":1800000000170,"subject":"民事訴訟法","topic":"訴訟要件","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n抗弁事項（仲裁の合意・不起訴の合意・原告の訴訟費用の担保提供）は主張必要。給付が事実上不可能判明しても訴えの利益は消滅しない。","date":"Excel取込"},{"id":1800000000171,"subject":"民事訴訟法","topic":"訴訟行為","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n不起訴の合意OK。口頭弁論の指揮に関する裁判所の命令・処置に対し異議を述べた時、裁判所は決定でその異議について裁判する。釈明権に対し異議可能。","date":"Excel取込"},{"id":1800000000172,"subject":"民事訴訟法","topic":"訴え提起前の和解","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n請求の趣旨&争いの実情提示で相手方の簡裁に和解の申立て可能。裁判所は提起前の和解で和解条項定められない。\n当事者双方の申立てじゃなくていい。和解申立時に訴え提起とみなされる。","date":"Excel取込"},{"id":1800000000173,"subject":"民事訴訟法","topic":"訴え提起前における証拠収集","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n訴え提起前の証拠保全可能＝特別代理人選任OK。証拠保全却下＝抗告可能。予告通知書＝請求の要旨・紛争の要点。\n4ヶ月以内に限り回答照会請求可能。裁判所に証拠収集処分申立て可能。","date":"Excel取込"},{"id":1800000000174,"subject":"民事訴訟法","topic":"訴えの利益","level":1,"memo":"【ソース】伊藤塾2021公開模試\n\n給付判決事実上実現不可能でも訴えの利益あり。","date":"Excel取込"},{"id":1800000000175,"subject":"民事訴訟法","topic":"訴えの提起","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n訴状却下命令＝即時抗告可能。訴訟係属前＝裁判長が命令で却下、係属後は判決で却下。","date":"Excel取込"},{"id":1800000000176,"subject":"民事訴訟法","topic":"上訴","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n控訴審で初めて提出された攻撃防御方法を時期に遅れていると却下可能。即時抗告1週間。抗告裁判所は口頭弁論しない場合、抗告人その他利害関係人の審尋可能。","date":"Excel取込"},{"id":1800000000177,"subject":"民事訴訟法","topic":"上告及び再審","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n上告上は原裁判所提出。判決で口頭弁論得ず棄却可能。再審は不服申立てにかかる判決した裁判所の管轄。\n再審開始の決定＝相手型の審尋必要。判決確定後再審事由を知った日から30日以内かつ判決確定から5年の除斥期間内に提起必要→代理権の欠缺・確定判決抵触理由なら期間なし","date":"Excel取込"},{"id":1800000000178,"subject":"民事訴訟法","topic":"証人尋問","level":1,"memo":"【ソース】伊藤塾2023プレ模試\n\n証拠調べの申出却下に対して不服申立てなし。証人＝訴訟能力不要。","date":"Excel取込"},{"id":1800000000179,"subject":"民事訴訟法","topic":"証拠","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n嘱託で得られた回答＝当事者の援用不要で証拠OK。再嘱託も可能","date":"Excel取込"},{"id":1800000000180,"subject":"民事訴訟法","topic":"証拠","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n参考人の審尋＝当事者が申し出た者に限られる＝当事者双方が立会いできる日に必要。","date":"Excel取込"},{"id":1800000000181,"subject":"民事訴訟法","topic":"少額訴訟","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n回数違反＝職権で通常訴訟移行決定。","date":"Excel取込"},{"id":1800000000182,"subject":"民事訴訟法","topic":"少額訴訟","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n証人尋問で宣誓しなくてもいい。証人・本人の順番裁判所が決める。移行申述権は最初の口頭弁論まで\n特別の事情あれば、当事者の同意なく期日続行可能。","date":"Excel取込"},{"id":1800000000183,"subject":"民事訴訟法","topic":"少額訴訟","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n回数違反＝通常訴訟にする決定。少額訴訟＝仮執行宣言必要","date":"Excel取込"},{"id":1800000000184,"subject":"民事訴訟法","topic":"少額訴訟","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n弁論前の通常訴訟への移行申述＝訴え却下求める本案前の弁論含む\n終局判決に対する異議の取下げ＝相手型の同意必要","date":"Excel取込"},{"id":1800000000185,"subject":"民事訴訟法","topic":"少額訴訟","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n異議審に対しても控訴不可。","date":"Excel取込"},{"id":1800000000186,"subject":"民事訴訟法","topic":"少額訴訟","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\n共同被告に対して少額訴訟可能","date":"Excel取込"},{"id":1800000000187,"subject":"民事訴訟法","topic":"書面による訴訟行為","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n不控訴の同意＝書面必要。訴訟告知は理由程度記載書面を裁判所に提出して行う。補助参加の申出口頭で可能。\n反訴提起も簡裁なら口頭で可能。抗告は原裁判所に抗告状を提出","date":"Excel取込"},{"id":1800000000188,"subject":"民事訴訟法","topic":"書面ですることを要する訴訟行為","level":1,"memo":"【ソース】伊藤塾2022公開模試\n\n訴訟告知＝理由程度を裁判所に書面で提出→裁判所は告知書を送達。中間確認は書面。\n手形訴訟の異議・訴訟受継＝書面","date":"Excel取込"},{"id":1800000000189,"subject":"民事訴訟法","topic":"書証","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n社内文書もおそれない時は文書提出命令の対象。","date":"Excel取込"},{"id":1800000000190,"subject":"民事訴訟法","topic":"書証","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\n文書提出命令＝提出義務なくても可能。社内文書＝看過し難い不利益ないなら提出対象。\n文書提出命令発令前滅失でも故意として真実にできる。\n第三者所持文書＝原告が文書提出命令申立て＝被告は即時抗告不可。","date":"Excel取込"},{"id":1800000000191,"subject":"民事訴訟法","topic":"処分権主義","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n境界確定訴訟＝形式的形成訴訟＝裁判所が境界線定める。明示的一部請求＝総額確定→相殺→認容\n土地全部の請求に対し、一部分筆しての登記認容可能。立退料引換明渡＝立退料アップOK","date":"Excel取込"},{"id":1800000000192,"subject":"民事訴訟法","topic":"重複起訴","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n反訴請求債権を自働債権とし、本訴請求権を受働債権として相殺の抗弁OK","date":"Excel取込"},{"id":1800000000193,"subject":"民事訴訟法","topic":"手形訴訟","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n審理裁判できない理由→口頭弁論せず却下判決OK＝控訴不可。一般的訴訟要件欠缺なら控訴OK。\n文書の成立真否・手形提示事実＝申立てで当事者尋問可能。職権調査事項は書証以外でもOK。異議申立て後の審理においては反訴提起可能。","date":"Excel取込"},{"id":1800000000194,"subject":"民事訴訟法","topic":"手形訴訟","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n被告の住所地・支払地で訴額によって管轄変わる。振出地はNG。原告は被告の同意なしに通常訴訟への移行口頭で申述可能。手形金銭支払・法定利率による損賠請求＝手形訴訟可能。利得償還請求は不可。終局判決に対する異議の取り下げは相手方の同意必要","date":"Excel取込"},{"id":1800000000195,"subject":"民事訴訟法","topic":"裁判上の和解","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n裁判上の和解＝（訴訟上の和解と訴え提起前の和解）。和解の申立て＝簡裁。和解整わず双方の申立て＝直ちに弁論命ずる。請求全部認諾しても訴訟費用折半なら訴訟上の和解成立。確定前なら和解OK。第三者の参加OK。\n意思表示に要素の錯誤あったら無効。","date":"Excel取込"},{"id":1800000000196,"subject":"民事訴訟法","topic":"裁判所等による当事者への意見聴取","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n準備的口頭弁論・当事者尋問＝意見聴取不要。","date":"Excel取込"},{"id":1800000000197,"subject":"民事訴訟法","topic":"裁判によらない訴訟の完結","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n和解条項＝当事者双方の申立て必要。書面でしなければならない。","date":"Excel取込"},{"id":1800000000198,"subject":"民事訴訟法","topic":"裁判によらない訴訟の完結","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n当事者以外の第三者も和解に参加可能＝訴え提起前の和解がされたものと考える。\n判決出てても確定までは認諾可能","date":"Excel取込"},{"id":1800000000199,"subject":"民事訴訟法","topic":"裁判によらない訴訟の完結","level":1,"memo":"【ソース】伊藤塾2022公開模試\n\n株主総会決議取消訴訟＝原告請求放棄可能・被告認諾不可。","date":"Excel取込"},{"id":1800000000200,"subject":"民事訴訟法","topic":"控訴及び上告","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n訴え不適法の却下判決＝被告も控訴可能。相殺の抗弁で請求棄却＝被告側の相殺以外の理由求めて控訴可能。\n上告裁判所は口頭弁論得ないで判決で上告棄却可能。","date":"Excel取込"},{"id":1800000000201,"subject":"民事訴訟法","topic":"口頭弁論の準備","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n意見を求める照会は不可。弁論準備手続も傍聴あり。当事者双方とテレビ電話OK。申立てなく専門委員関与可能。","date":"Excel取込"},{"id":1800000000202,"subject":"民事訴訟法","topic":"口頭弁論における直接主義","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n弁論更新しないで判決＝絶対的上告理由","date":"Excel取込"},{"id":1800000000203,"subject":"民事訴訟法","topic":"口頭弁論","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\n専門委員の説明＝証拠資料とならない。鑑定人の意見＝証拠資料。期日ごとに調書必要。訴訟で引用した文書の提出命令＝従わなくても制裁なし。同時審判の申出がある共同訴訟＝分離不可","date":"Excel取込"},{"id":1800000000204,"subject":"民事訴訟法","topic":"検証","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n文書の外形・存在は検証。当事者の申出必要。職権不可。鑑定は職権で可能。決定で検証目的物の提示送付命じれる。大気汚染や騒音などの無体物も検証可能","date":"Excel取込"},{"id":1800000000205,"subject":"民事訴訟法","topic":"計画審理","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n裁判所と当事者が協議して審理計画＝証人尋問期間・口頭弁論判決予定定める必要ある。","date":"Excel取込"},{"id":1800000000206,"subject":"民事訴訟法","topic":"共同訴訟","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n共同訴訟人間の証拠共通の原則。申出で分離せずに裁判。なければ弁論・裁判の分離は裁判所の裁量。","date":"Excel取込"},{"id":1800000000207,"subject":"民事訴訟法","topic":"共同訴訟","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n通常共同訴訟＝各共同訴訟人単独で訴訟上の和解可能。必要的共同訴訟で上訴期間経過した訴訟人→全員の上訴期間経過前でも上訴できない","date":"Excel取込"},{"id":1800000000208,"subject":"民事訴訟法","topic":"共同訴訟","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n被保佐人・被補助人＝同意えずに上訴について訴訟行為可能","date":"Excel取込"},{"id":1800000000209,"subject":"民事訴訟法","topic":"共同訴訟","level":1,"memo":"【ソース】伊藤塾2022公開模試\n\n土地所有者が建物共同相続人に建物収去土地明渡請求＝同時に判決得ること要しない。","date":"Excel取込"},{"id":1800000000210,"subject":"民事訴訟法","topic":"鑑定","level":1,"memo":"【ソース】伊藤塾2022公開模試\n\n鑑定人の勾引不可。口頭弁論・弁論準備手続・書面による準備手続＝当事者及び鑑定人と協議可能。\n職権鑑定不可だが、鑑定嘱託・検証時の鑑定職権は可能。","date":"Excel取込"},{"id":1800000000211,"subject":"民事訴訟法","topic":"簡裁訴訟手続","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n紛争の要点で足りる。反訴提起可能。（手形・小切手・少額訴訟はNG）。口頭提起も可能","date":"Excel取込"},{"id":1800000000212,"subject":"民事訴訟法","topic":"簡易裁判所の訴訟手続","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n相手方が準備必要なら書面で準備or通知必要＝通知の方法は自由。簡裁反訴OK。請求棄却は必ず判決書原本。\n和解に代わる決定＝被告が争わない場合原告の意見を聴いて決定。","date":"Excel取込"},{"id":1800000000213,"subject":"民事訴訟法","topic":"簡易裁判所の訴訟手続","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n口頭弁論の調書＝証人の陳述・検証の結果＝裁判官の許可得て省略可能。期日不出頭で裁判所は和解整わないとみなすことができる。","date":"Excel取込"},{"id":1800000000214,"subject":"民事訴訟法","topic":"管轄","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n引渡請求・代償請求＝共通の利益。","date":"Excel取込"},{"id":1800000000215,"subject":"民事訴訟法","topic":"管轄","level":1,"memo":"【ソース】伊藤塾2020プレ模試\n\n専属管轄違反＝判決確定で治癒＝再審事由じゃない","date":"Excel取込"},{"id":1800000000216,"subject":"民事訴訟法","topic":"管轄","level":1,"memo":"【ソース】伊藤塾2021公開模試\n\n管轄裁判所決める決定＝不服申立て不可。","date":"Excel取込"},{"id":1800000000217,"subject":"民事訴訟法","topic":"確定判決の効力","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n口頭弁論終結前の賃借人・二重譲渡譲受人＝確定判決の既判力及ばない。\n法人格の濫用として法人格否定される場合にも、請求の目的を承継した訳ではないなら既判力拡張されない。","date":"Excel取込"},{"id":1800000000218,"subject":"民事訴訟法","topic":"確定判決","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n事実審確定前に相殺適状にあったなら、認容判決確定後に相殺の主張してもOK。","date":"Excel取込"},{"id":1800000000219,"subject":"民事訴訟法","topic":"一部請求等","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n明示のない一部請求の訴訟物は債権全額＝全額について時効完成猶予生じる。\n明示一部請求でも相殺が債権全額を考慮して判断（外側説）","date":"Excel取込"},{"id":1800000000220,"subject":"民事訴訟法","topic":"移送","level":1,"memo":"【ソース】伊藤塾2021プレ模試\n\n移送の決定・申立て却下＝即時抗告可能。","date":"Excel取込"},{"id":1800000000221,"subject":"民事訴訟法","topic":"証人尋問（地裁における）ショウニンジンモンチサイ","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n何人でも証人尋問OK＝16歳未満なら宣誓させられない。当事者に異議がない時は証人尋問に代え書面提出させ得られる。ナンピトショウニンジンモンサイミマンセンセイトウジシャイギトキショウニンジンモンカショメンテイシュツエ","date":"Excel取込"},{"id":1800000000222,"subject":"民事執行法","topic":"民事執行","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n不動産の強制競売＝所在地の裁判所が執行裁判所。執行後に債務者死亡しても続行可能（債権者側だったら承継執行文必要）間接強制＝相手方の審尋必要。確定判決についての請求異議の訴え＝口頭弁論終結後に生じたものに限られる。","date":"Excel取込"},{"id":1800000000223,"subject":"民事執行法","topic":"民事執行","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n反対給付＝証明しなくても執行文の付与受けられる。建物に対し強制競売開始決定＝地上権・賃借権で債務者が地代賃料払わない場合＝申立てにより差押債権者が債務者に代わって弁済すること許可可能。\n代替執行の授権決定＝債務者の審尋が必要","date":"Excel取込"},{"id":1800000000224,"subject":"民事執行法","topic":"不動産担保権の実行","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n担保不動産上の留置権は買受人引受となり消滅しない。抵当権に基づく不動産競売→不存在・消滅を売却許可決定に対する執行抗告の理由とすることができない＝開始決定時に執行異議あるから。\n違法執行に対して法律の定めあり＝執行抗告（上級裁判所）。なし＝執行異議（原裁判所）。\n不当執行に対して請求異議の訴え・第三者意義の訴え","date":"Excel取込"},{"id":1800000000225,"subject":"民事執行法","topic":"不動産執行","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n建物に仮差押えの時点で同一人＝第三者に譲渡され強制競売された時点で違っても法定地上権成立。\n不動産担保権の実行としての競売＝債務者は被担保債権の消滅理由に請求異議の訴え不可→開始決定に対する執行抗告または執行異議の申立ては可能","date":"Excel取込"},{"id":1800000000226,"subject":"民事執行法","topic":"不動産執行","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n不動産にかかる差押え・仮差押えの執行は売却で効力失う。先の開始決定停止＝申立てにより、配当要求終期までにされた後の開始決定で手続続行可能。執行裁判所は売却代金の交付計算書を作成して剰余金債務者に交付","date":"Excel取込"},{"id":1800000000227,"subject":"民事執行法","topic":"不動産執行","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n執行裁判所＝差押債権者の債権に優先する債権ない場合＝買受可能価格が執行費用のうち共益費用見込額を超えない時はその旨通知必要。買受申出後天災で不動産損傷＝売却不許可申出・取消の申立て可能。二重強制管理あり","date":"Excel取込"},{"id":1800000000228,"subject":"民事執行法","topic":"非金銭執行","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n子の引渡しの強制執行＝直接強制可能。不動産引渡し・明渡し＝目的外動産取り除くか売却必要＝保管費用は執行費用。居住動産（キャンピングカー）は取り上げない。差押禁止動産も引渡執行の対象。\n代替執行の決定は債務者の審尋が必要。","date":"Excel取込"},{"id":1800000000229,"subject":"民事執行法","topic":"非金銭執行","level":1,"memo":"【ソース】伊藤塾2022公開模試\n\n執行官は債務者が不動産占有してれば明渡催告可能。動産（有価証券）の引渡の強制執行＝債権者の選択で直接強制・間接強制の方法可能。国内の子の引渡＝前提として間接強制一定の期間経過等必要。\n執行裁判所が第三債務者の引渡請求権を差押え＝目的物動産不動産問わない。","date":"Excel取込"},{"id":1800000000230,"subject":"民事執行法","topic":"動産執行","level":1,"memo":"【ソース】伊藤塾2020プレ模試\n\n動産執行＝二重差押え不可（現実の占有伴うから）。申立てあれば差押禁止動産の差押許可可能（職権NG)\n第三者占有物の提出拒まれたら差押不可。先取特権・質権者配当要求可能、一般債権者不可。\n差押物第三者の占有になった時、差押債権者申立で執行官への引渡命令可能→第三者は第三者異議の訴えする","date":"Excel取込"},{"id":1800000000231,"subject":"民事執行法","topic":"担保権の実行としての競売等","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n担保不動産競売・担保不動産収益執行は両方申立て可能。留置権は買受人の引受になるので消滅しない。\n開始決定に対する執行抗告・執行異議＝不存在消滅主張OK。担保不動産競売開始決定前も申立てで価格現場行為の禁止可能。債務名義不要。","date":"Excel取込"},{"id":1800000000232,"subject":"民事執行法","topic":"担保権の実行としての競売","level":1,"memo":"【ソース】伊藤塾2022プレ模試\n\n不動産所有者＝第三者異議の訴え可能。請求異議は不可。質権の実行としての動産競売＝一般先取特権者も配当要求可能。債権その他の財産権＝担保権の存在証する文書提出された時に限り実行開始。フドウサンショユウシャダイサンシャイギウッタカノウセイキュウイギフカシチケンジッコウドウサンケイバイイッパンサキドリトッケンシャハイトウヨウキュウカノウサイケンタザイサンケンタンポケンソンザイショウブンショテイシュツトキカギジッコウカイシ","date":"Excel取込"},{"id":1800000000233,"subject":"民事執行法","topic":"請求異議の訴え及び第三者異議の訴え","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n仮執行宣言付された判決を債務名義とする強制執行＝債務者は判決確定前に請求異議の訴え不可。\n強制執行受けた債務者＝権利の放棄・不執行の合意主張＝請求異議の訴え\n債権者は第三者異議の訴えで敗訴しても同一の債務名義で他の財産に強制執行可能。\n第三者異議の訴え＝口頭弁論必要。強制執行の不許求めるものだから、執行終了後は訴えの利益ない。","date":"Excel取込"},{"id":1800000000234,"subject":"民事執行法","topic":"執行異議","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n財産開示手続決定＝執行抗告できるから執行異議できない。民事執行取り消す執行官の処分に対する執行異議の申立て却下裁判に執行抗告可能。期日以外は書面で必要。執行抗告は1週間の不変期間・執行異議は期間制限なし。\n執行異議の裁判は口頭弁論不要","date":"Excel取込"},{"id":1800000000235,"subject":"民事執行法","topic":"債権執行","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n差押に係る証書＝差押債権者に証書引渡必要。差押債権の額が債権及び執行費用超える場合も全額差押え可能（さらに差押えは不可）","date":"Excel取込"},{"id":1800000000236,"subject":"民事執行法","topic":"債権執行","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n執行裁判所＝債務者の普通裁判籍の地裁or無い時債権の所在地の地裁。差押命令＝審尋無しで送達。\n第三債務者に対する陳述の催告あり＝ちゃんとしないと損賠あり。\n転付命令確定後、第三債務者の資力不足で弁済不可＝差押債権者は債務者に残額請求不可。\n先取特権者＝第三債務者供託までに書面で証明して配当要求すれば配当受けられる","date":"Excel取込"},{"id":1800000000237,"subject":"民事執行法","topic":"金銭債権に対する強制執行","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n抵当権に基づき物上代位権行使＝他の債権者の差押えで配当要求不可。\n継続的給付に係る差押え＝差押え後の給料・賃料債権に及ぶ。差押え送達１週間後取り立て可能。","date":"Excel取込"},{"id":1800000000238,"subject":"民事執行法","topic":"金銭債権に対する強制執行","level":1,"memo":"【ソース】伊藤塾2021プレ模試\n\n差押執行受けてる債権にも可能。少額訴訟債権執行＝簡易裁判所の裁判書書記官に対して申立て","date":"Excel取込"},{"id":1800000000239,"subject":"民事執行法","topic":"強制執行に対する不服申立て","level":1,"memo":"【ソース】伊藤塾2021公開模試\n\n強制競売申立却下＝執行抗告可能。開始決定＝執行異議。執行抗告に理由がある＝原裁判所は更正。\n執行抗告＝1週間以内。執行異議＝期間なし。請求異議＝強制執行終了前に提起必要。\n第三者異議の原告＝訴えに併合して債務者に対する目的物に対する訴え可能。","date":"Excel取込"},{"id":1800000000240,"subject":"民事執行法","topic":"強制競売","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n執行抗告＝開始決定に対するのは強制管理のみ。強制競売は売却決定時に執行抗告できるから。","date":"Excel取込"},{"id":1800000000241,"subject":"民事執行法","topic":"強制競売","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n強制競売開始決定→ただちに差押嘱託→登記を執行裁判所へ送付。通常使用は可能。\n買受人の抵当権者等から申出あったら、所有権移転登記は司法書士に嘱託情報提供して登記所に提供させる方法でする。","date":"Excel取込"},{"id":1800000000242,"subject":"民事執行法","topic":"強制競売","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n執行裁判所は評価人選任必要。担保不動産競売＝事前に保全可能→不動産強制競売は差押さえするまで保全不可能。執行裁判所が代金納付しない者に支払い命ずること不可","date":"Excel取込"},{"id":1800000000243,"subject":"民事執行法","topic":"不動産の強制競売フドウサンキョウセイケイバイ","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n留置権は強制競売で消滅しない。開始決定で書記官直ちに嘱託必要→登記を執行裁判所に送付。\n不動産の滅失等移転妨げる事情あり＝執行裁判所は競売取消必要。\n強制競売取下げ＝登記官は開始決定抹消嘱託。リュウチケンキョウセイケイバイショウメツカイシケッテイショキカンタダショクタクヒツヨウトウキシッコウサイバンショソウフフドウサンメッシツトウイテンサマタジジョウシッコウサイバンショケイバイトリケシヒツヨウキョウセイケイバイトリサトウキカンカイシケッテイマッショウショクタク","date":"Excel取込"},{"id":1800000000244,"subject":"民事執行法","topic":"仮差押命令カリサシオサメイレイ","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n被保全権利が期限・条件付きでも可能。動産の仮差押え命令なら目的物特定せずにOK。\n仮処分なら償うことができない損害で命令取消あり（仮執行はNG）ヒホゼンケンリキゲンジョウケンツカノウドウサンカリサシオサメイレイモクテキブツトクテイカリショブンツグナソンガイメイレイトリケシカリシッコウ","date":"Excel取込"},{"id":1800000000245,"subject":"不動産登記法","topic":"要役権の登記","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n地役権の工作物の設置義務＝要役地には記録されない。地代増額しない＝登記事項。排水目的で建物に地役権不可。\n採石権＝存続期間常に登記。採石権＝目的は登記事項じゃない。賃借権の存続期間＝任意的事項。\n永小作権＝永小作権者・存続期間・譲渡賃貸禁止＝任意事項。地役権目的「庭園眺望」OK。\n採石権者・存続期間＝絶対登記事項。建物所有目的賃借権＝「建物所有」「借地借家法第22条の特約」＝50年以上・更新・買取なし","date":"Excel取込"},{"id":1800000000246,"subject":"不動産登記法","topic":"用益権の登記","level":1,"memo":"地役権＝存続期間の定め登記不可。採石権の場合は存続期間かならず登記必要。地役権が要役地とともに移転しない特約で抹消する時＝義務者が地役権設定当時の溶液地の所有権名義人であること証する情報の提供必要。","date":"Excel取込"},{"id":1800000000247,"subject":"不動産登記法","topic":"抹消回復登記","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n混同で消滅しない抵当権誤って消滅登記＝登記官職権で回復不可＝当事者の申請で回復＝回復も1000円\n誤って混同の抵当権抹消・根抵当抹消＝抹消前の後順位抵当権者→回復登記の利害関係人にあたらない。ネテイマッショウ","date":"Excel取込"},{"id":1800000000248,"subject":"不動産登記法","topic":"本人確認情報","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n外国在住で識別提供なし＝署名証明書を提供しても事前通知される。破産管財人代理も本人確認の対象にできる。\n代理人作成の本人確認情報で複代理人は登記申請できない。\n識別提出不可理由＝事実と異なったら書士作成本人確認で登記官相当と認めても省略不可。","date":"Excel取込"},{"id":1800000000249,"subject":"不動産登記法","topic":"法定相続情報一覧図","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n再交付の申出＝当初の申出行った登記所&当初の申出人のみ可能→本人確認書面添付必要。","date":"Excel取込"},{"id":1800000000250,"subject":"不動産登記法","topic":"変更の登記または更正の登記","level":1,"memo":"判決正本に登記上の住所と現住所併記されてても前提として名変省略不可。共有者の住所更正登記は一括対応可能。","date":"Excel取込"},{"id":1800000000251,"subject":"不動産登記法","topic":"敷地権付き区分建物の登記","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n敷地権が地上権→分離処分禁止は地上権。所有権は自由に移転可能。一般の先取特権保存＝敷地権発生前後問わず不可能。処分禁止の仮登記は前後問わずOK。賃借権・特別の先取特権・仮処分・敷地権が賃借権である場合の抵当権＝建物のみ可能","date":"Excel取込"},{"id":1800000000252,"subject":"不動産登記法","topic":"付記登記","level":1,"memo":"根抵当件の優先の定め=常に付記登記。地上権の持分の更正=必ず利害関係人の承諾必要=付記登記","date":"Excel取込"},{"id":1800000000253,"subject":"不動産登記法","topic":"判決による登記","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n判決主文に原因明示あれば、中間省略登記も可能。\n契約不存在無効判決確定後に承継あっても、口頭弁論終結後の承継人に執行文の付与受けて抹消可能＝一般賞継承する情報または代位原因証明でOK。口頭弁論終結後の所有権二重譲受人＝対抗問題なので承継執行文不可。\n仲裁判断による登記＝執行決定必要\n単独申請のための判決＝給付判決必要。仮執行宣言付判決（確定前に強制執行を許す判決）で申請不可。抹消登記単独で申請する場合も利害関係人の承諾書面自体は必要。","date":"Excel取込"},{"id":1800000000254,"subject":"不動産登記法","topic":"買戻特約の登記","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n敷地権付区分建物＝専有部分と敷地権で一括して定めた金額を提供。抹消時は差押権者等の承諾必要。\n代物弁済契約不可。増額更正・減額変更可能。増額変更は不可。「契約費用　なし」で記載必要。\n買戻権についてる質権は職権抹消。買戻権抹消時の買戻権者の住所変更不要\n未登記不動産売買＝買主が表題登記義務を負う＝所有権保存登記と同時に買戻登記可能。契約の日から10年経過で単独抹消可能。代金増額の更正登記＝買戻権者が義務者＝印鑑証明必要。\n買戻特約抹消＝住所変更不要。15年と申請したら却下される。特約で定めた金額＝「合意金額」で提供可能。代物弁済で買戻NG。","date":"Excel取込"},{"id":1800000000255,"subject":"不動産登記法","topic":"配偶者居住権の登記","level":1,"memo":"存続期間の延長・更新は不可、短縮は可能。相続不可＝遺贈。前提所有権移転必要なら遺言執行者が義務者になれる。「死亡による消滅」。延長や更新は不可。短縮は可能。登記原因証明情報として、必ずしも住民票等を提供する必要はない","date":"Excel取込"},{"id":1800000000256,"subject":"不動産登記法","topic":"農地法所定の許可","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n会社分割・移転錯誤抹消・電線路の施設＝許可不要。遺産分割贈与・車両通行地役権＝許可必要。","date":"Excel取込"},{"id":1800000000257,"subject":"不動産登記法","topic":"農地についての所有権の登記","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n判決理由中に農地法許可認定or許可要しない旨＝許可情報提供不要","date":"Excel取込"},{"id":1800000000258,"subject":"不動産登記法","topic":"特定承継による所有権移転の登記","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n死亡条件所有権失効の付記登記＝相続人と共同して所有権移転必要。","date":"Excel取込"},{"id":1800000000259,"subject":"不動産登記法","topic":"登録免許税","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n全部譲渡による元本確定前の根抵当権移転＝極度額に1000分の2\n遺産分割による贈与（代償分割）＝普通に1000分の20。賃借権転貸＝1000分の10\n仮登記された所有権移転請求権の移転＝不動産1個につき1000円。\n仮登記所有権移転請求権の移転＝1000円。仮登記所有権の所有権移転の仮登記（主登記の仮登記）＝1000分の10\n同一不動産の1番2番に同一債権者＝抹消は1000円で可能。契約解除で仮登記と本登記抹消＝1000円でOK。\n区制施行＝登録免許税法第5条5号\n根抵当権の一部譲渡＝極度額➗一部譲渡後の共有者数（譲受人複数ならさらに✖️譲受人の数）✖️1000分の2\n所有権移転請求権の移転＝付記の本登記→1000円。\n抵当権の設定による信託の登記＝債権額の1000分の2。信託分1000分の4（所有権と違って免除なし）\n共有の土地分筆＝移転する持分価格のうち従前の持分超える部分＝1000分の20、残りは1000分の4。\n確定前の一部譲渡＝譲渡後の準共有者の数で極度額割る✖️（譲受人の数）✖️1000分の2。\n抵当権の譲渡＝付記登記で1000円。委託者兼受益者＝受託者から受益者に所有権移転＝登録免許税かからない。\n極度額増額＝登記事項証明書提供しなくても可能＝13条2項で1500円も可能。\n異なる管轄の共同根抵当の極度額増額＝登記提出しなくても可能（したら1500円）20個抹消＝2万円・更正は普通にかかる。委託者兼受益者→受託者から受益者へ所有権移転（非課税）・信託抹消1000円\n担保不動産競売に係る差押えの登記及び担保不動産収益執行の開始決定に係る差押えの登記が同時に嘱託された場合＝それぞれ債権金額の1000分の4。非課税墓地に根抵当設定後、別宅地を共同根抵当設定＝原則通り極度額の1000分の4必要。確定根抵当権の一部代位弁済で一部移転されている残債権の全部の代位弁済による根抵当権の移転＝極度額に満たない場合は代位弁済額、超える場合極度額基準とする。書記官嘱託の破産手続開始の登記の抹消＝登録免許税非課税。","date":"Excel取込"},{"id":1800000000260,"subject":"不動産登記法","topic":"登記名義人等の氏名等の変更の登記","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n所有権移転の仮登記の抹消＝氏名住所更正省略して抹消可能。\n抵当権実行による差押え＝抵当権者は設定者に代位して設定者の住所変更可能。債務者の住所変更は不可（共同申請必要）抵当証券ある場合の債務者単独での住所変更＝抵当証券提供不要\n所有権移転の義務者死亡でも前提として名変必要。\n抵当証券発行されている場合の債務者の名変＝抵当証券の提供不要。識別情報の失効申出で前提名変不要。\n数回に渡る持分の取得＝移転時はすべての持分について住所変更必要。仮登記名義人が単独抹消＝所有権登記名義人の住所変更必要。改名してても相続登記時名変不要。地番変更あれば名変必要。\n仮差押え債権者の住所＝名義人の住所変更可能。所有権全部から一部移転へ更正＝前提としての名変不可なので住所変更情報提出。\n担保仮登記に基づく所有権移転の本登記後、仮登記義務者が受戻しを原因とする所有権移転＝前提として仮登記義務者の住所変更不要。","date":"Excel取込"},{"id":1800000000261,"subject":"不動産登記法","topic":"登記申請人","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n不適法抹消での抵当権回復＝登記義務者は現在の登記名義人\nA→Bへの所移仮登記。A→Cへの所移後、仮登記共同抹消＝権利者はAでもCでもいい","date":"Excel取込"},{"id":1800000000262,"subject":"不動産登記法","topic":"登記申請する際の添付情報","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n職務代行者が不動産贈与＝裁判所の許可証提供必要。不在者の財産管理人が遺産分割協議＝家裁の許可必要\n親子共有名義不動産で第三者の債務担保＝利益相反に当たらない。","date":"Excel取込"},{"id":1800000000263,"subject":"不動産登記法","topic":"登記上の利害関係を有する第三者の承諾を証する情報","level":1,"memo":"【ソース】伊藤塾2022プレ模試\n\n転抵当権の抵当権の順位譲渡＝承諾不要（転抵当権者の財産確保後に順位譲渡当事者間の問題だから影響ない）地上権の地代減額→後順位抵当権・所有権者（請求権含む）。\n根抵当権設定→AからBへ所移→極度額増額→所移抹消→根抵当権者利害関係人。（極度額変更も職権抹消されるから）","date":"Excel取込"},{"id":1800000000264,"subject":"不動産登記法","topic":"登記所の図面","level":1,"memo":"地図＝各土地の区画を明確にし、地番を表示。建物所在図＝位置及び家屋番号を表示。\n土地所在図等＝電磁記録で保存OK。","date":"Excel取込"},{"id":1800000000265,"subject":"不動産登記法","topic":"登記識別情報の失効・有効証明請求","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n失効申出時添付の印鑑証明還付不可。有効証明なら可能。","date":"Excel取込"},{"id":1800000000266,"subject":"不動産登記法","topic":"登記識別情報","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n証明＝ネットならネットで送信・ダウンロード。司法書士が相続情報なく証明請求＝その旨の表示必要。\nネット利用して失効申出なら甲区乙区の別も提供。\n移転請求権の移転請求権仮登記＝識別不要。法定代理人に識別通知＝支配人に通知。\n抵当権移転で事前通知あっても前の住所への通知なし。根抵当権の元本確定登記＝権利者単独申請なら識別提供不要","date":"Excel取込"},{"id":1800000000267,"subject":"不動産登記法","topic":"登記事項の証明等","level":1,"memo":"登記事項要約書＝送付の方法不可。登記原因証明情報の閲覧＝利害関係書類提示必要。\n土地所在図以外の附属書類閲覧＝法人の代表者の資格証する書類提示。\n登記事項要約書＝１の用紙に2以上の事項記載可能。図面＝土地所在図・地積測量図・地役権図面・建物、各階平面図が該当。正当な理由あれば戸籍や印鑑証明閲覧可能。","date":"Excel取込"},{"id":1800000000268,"subject":"不動産登記法","topic":"登記事項","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n質権は存続期間ある時のみその登記必要。敷地権付区分建物の買戻費用は一体として提供必要。抵当証券発行定めあり＝元本・利息の弁済期の定め必要。根抵当＝付加して一体となっているものに効力及ばない定め＝登記事項","date":"Excel取込"},{"id":1800000000270,"subject":"不動産登記法","topic":"登記原因証明情報","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n遺産分割による指定債務者の合意＝登記原因証明情報に債権者同意の旨必要。官庁または公署が権利者・義務者＝いずれも登記原因証明必要。仮処分による執行＝登記原因証明情報不要。\n買戻期間満了による抹消にも必要。混同＝不要。敷地権なし表題部から＝所有権取得証明情報が必要（原因は不要）\n敷地権付なら必要。根抵当権の債務者の変更＝必ずしも相続証する情報戸籍じゃなくてもいい。処分禁止に遅れる登記の抹消＝原因不明・通知情報は必要。会社分割＝確定前なら法人番号のみ、確定後は分割契約書も必要。\n破産管財人の任意売却も原因情報と家裁の許可必要\n根抵当権設定者の元本確定請求＝元本確定証する情報提供して共同で申請必要（設定者請求で根抵当権者の単独申請不可）法人の登記原因証明情報＝登記支配人か未登記支配人も対応可能。未登記支配人なら業務権限証明情報の添付も必要。\n売買契約書作成後に住所移転＝変更証明情報の添付も必要。","date":"Excel取込"},{"id":1800000000271,"subject":"不動産登記法","topic":"登記原因及びその日付","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n特別縁故者＝被相続人の死亡から9ヶ月（公告半年・縁故者申出3ヶ月以内）。現物出資＝発起人組合に給付した日\n権利能力なき社団代表死亡＝「委任の終了」新代表就任日。「年月日債務者更改による新債務担保」\n権利能力なき社団の代表者死亡による交代＝新代表者就任日。信託受託者死亡なら死亡日。\n仮登記担保の本登記＝清算金通知到達から2ヶ月経過した日\n受託者死亡＝死亡の日で権利の移転登記","date":"Excel取込"},{"id":1800000000272,"subject":"不動産登記法","topic":"登記原因について第三者の許可、同意または承諾を証する情報","level":1,"memo":"農地への抵当権設定だけ農地法の許可不要。Bの所有権移転請求権の保全仮登記されたAの農地→Cが請求権の譲渡受けたら、AC間の農地法の許可必要。工場財団に属する権利に賃借権の設定＝工場財団に抵当権設定している抵当権者の同意必要。","date":"Excel取込"},{"id":1800000000273,"subject":"不動産登記法","topic":"登記義務者の印鑑証明書","level":1,"memo":"裁判所書記官作成の印鑑証明書に期限ない。義務者の記名押印に公証人認証あれば印鑑証明不要。署名証明書に期限ない。法人番号あれば委任状に印鑑証明不要。","date":"Excel取込"},{"id":1800000000274,"subject":"不動産登記法","topic":"登記記録等の保存期間","level":1,"memo":"土地＝閉鎖から50年、建物＝30年。共同担保目録＝すべての事項抹消から10年。信託目録＝信託登記抹消から20年。権利に関する登記の申請情報と添付書類＝受付日から30年。識別の失効の申出情報＝受付から10年。","date":"Excel取込"},{"id":1800000000275,"subject":"不動産登記法","topic":"登記官の職権による登記","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n単有の所有権に地上権、所有権共有に更正→地上権職権抹消（共有持分に設定できないから）\n不動産の収用による所有権移転＝職権で裁決手続開始の登記を抹消。国又は地方公共が起業者なら所移も官公署による嘱託。処分禁止の登記に後れる第三者名義の賃借権設定の登記抹消＝自分で申請。1番抵当権から2番抵当権へ順位譲渡後、2番抹消＝順位譲渡は登記官の職権で抹消。順位譲受人の承諾書添付して1番抵当権抹消あれば、順位譲渡登記官の職権で抹消される。順位変更にかかる抵当権すべて抹消された場合も、登記官抹消する規定ない。","date":"Excel取込"},{"id":1800000000276,"subject":"不動産登記法","topic":"登記の抹消","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n「買主死亡時は所有権移転が失効する」→抹消できず移転での処理。相続原因の所有権移転抹消→共同申請。\n抵当権→所移→担保不動産競売開始決定差押＝差押は現在の所有権登記名義人を目的→所有権移転抹消時に登記上の利害関係有する第三者になる。不登法70条3項の対象＝抵当権・質権・先取特権\n仮登記の通常抹消＝共同申請か仮登記名義人または利害関係人からの単独申請。\n抵当権者法人＝弁済期から30年かつ解散30年＝所有権者単独で抹消可能。譲渡担保権者供託で70条4抹消不可。\n所在知れてる時は不可。公示催告→除権決定。買戻は契約日から10年経過で権利者が単独抹消可能。","date":"Excel取込"},{"id":1800000000277,"subject":"不動産登記法","topic":"登記の単独申請","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n抵当証券ある債務者の住所変更＝債務者は単独可能・登記名義人は不可。\n抵当権の実行による差押→設定者の住所は抵当権者代位して単独OK・債務者の住所は共同申請。\n死亡による所有権移転失効＝相続人と共同申請","date":"Excel取込"},{"id":1800000000278,"subject":"不動産登記法","topic":"登記の申請方式","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n合併による抵当権の移転＝承継会社が単独。工場財団の消滅＝工場の所有者が単独。","date":"Excel取込"},{"id":1800000000279,"subject":"不動産登記法","topic":"登記の申請人","level":1,"memo":"【ソース】伊藤塾2020プレ模試\n\n指定根抵当権者決めても、全部譲渡の申請人は義務者として根抵当権名義人全員。\n根抵当権の準共有者間の優先の定めの変更＝変更に係る共有者のみの合同申請。","date":"Excel取込"},{"id":1800000000280,"subject":"不動産登記法","topic":"登記の申請手続","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n代位債権者が勝訴して抵当権設定登記抹消＝被代位債権者は単独で抹消申請不可。","date":"Excel取込"},{"id":1800000000281,"subject":"不動産登記法","topic":"登記の嘱託","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n不動産の公売処分→登記権利者の請求→権利移転・消滅した権利の抹消・滞納処分による差押え抹消を嘱託。\n承諾を証する情報の印鑑証明＝19条2項だから3ヶ月以内じゃなくていい。","date":"Excel取込"},{"id":1800000000282,"subject":"不動産登記法","topic":"登記の実行における形式","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n優先の定め＝付記登記。一部移転も付記。\n根抵当権の相続による移転＝付記。指定根抵当権者も合意も付記。\n買戻も付記。→地上権移転と同時に買戻＝付記された地上権移転に買戻を付記。","date":"Excel取込"},{"id":1800000000283,"subject":"不動産登記法","topic":"登記の可否","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n保全仮登記地上権に仮差押え嘱託不可能。買戻＝合意金額に変更登記可能。\nAB権利者の移転請求権仮登記→Bのみ＝所有権一部移転請求権とする変更仮登記可能＝「1番仮登記変更」「年月日権利者中A持分につき解除」→「所有権一部移転請求権仮登記」「権利者　持分2分の1 B」。\n胎児出生前に遺産分割で胎児登記は不可能（法定相続は可能）","date":"Excel取込"},{"id":1800000000284,"subject":"不動産登記法","topic":"電子申請等","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n電子証明書＝住所情報・法人番号になる。却下決定書は書面。","date":"Excel取込"},{"id":1800000000285,"subject":"不動産登記法","topic":"添付書面の原本還付","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n承諾証する情報＝原本還付不可。役会議事録＝登記原因についての承諾なので還付可能\n共有物分割禁止の印鑑証明・承諾情報（仮登記含む）に対する印鑑証明・委任状に対する印鑑証明・破産管財人の任意売却にかかる破産管財人の印鑑証明＝還付不可。外国人の署名証明書＝原本還付不可。承諾情報の印鑑証明も還付不可。","date":"Excel取込"},{"id":1800000000286,"subject":"不動産登記法","topic":"抵当権設定登記の申請手続","level":1,"memo":"保証料＋求償債権担保＝年月日保証委託契約年月日設定。求償債権のみ＝年月日保証委託契約による求償債権年月日設定。保証委託契約ない場合＝年月日保証契約による求償債権年月日設定。債権の一部を被担保債権＝年賀日金銭消費貸借契約金◯円のうち金◯円年月日設定。複数の債権のうち一部を担保＝年月日債権譲渡（年月日金銭消費貸借・譲渡人A）にかかる債権年月日設定。譲渡された債権が1個の場合＝年月日債権譲渡（譲渡人A）にかかる債権年月日設定。","date":"Excel取込"},{"id":1800000000287,"subject":"不動産登記法","topic":"抵当権設定登記","level":1,"memo":"単有不動産で所有権一部移転＝価額に関わらず抵当権及ばない部分として所有権移転は不可。\n「所有権一部（順位３番で登記した持分）抵当権設定」可能\n附属建物のみに抵当権実体上可能だが前提として分割登記必要。設定契約が所有権取得停止条件なら取得日を設定日として抵当権設定登記可能。抵当権設定後に遺産分割して相続＝遡及効で当該相続人を設定者で抵当権登記可能\n抵当権設定後利率引下げ＝前提で変更なく追加設定可能。清算中も設定可能\n清算中でも物上保証での抵当権設定可能。信託財産で第三者の債務担保のための抵当権設定不可。\n賃借権が工場財団組成していても所有権目的で抵当権設定可能。買戻特約付き不動産の抵当権＝抵当証券発行不可。\n申請情報として一部弁済あった旨提供不要\n「年月日債務承認契約年月日設定」準消費貸借等の抵当権設定可能。分割貸付でも総額被担保債権として記載可能。\n重利の特約で抵当権設定NG。数人の債権者の数個の債権のための抵当権設定できない。","date":"Excel取込"},{"id":1800000000288,"subject":"不動産登記法","topic":"抵当権の抹消の登記","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n抵当権登記名義人清算結了→被担保債権残存→清算結了抹消し清算会社が放棄等対応。","date":"Excel取込"},{"id":1800000000289,"subject":"不動産登記法","topic":"抵当権の変更登記","level":1,"memo":"及ぼす変更＝付記でするなら後順位抵当権者の承諾必要。共有者の一部弁済＝債権額減額の変更登記で対応。原因変更で利息範囲拡大するなら後順位差押登記名義人は利害関係人","date":"Excel取込"},{"id":1800000000290,"subject":"不動産登記法","topic":"抵当権の登記全般","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n共同抵当権の抹消＝共同担保目録で不動産の表示省略不可。解除条件のある抵当権で抵当証券発行不可＝買戻ある場合も不可。採石権も抵当権の目的OK。","date":"Excel取込"},{"id":1800000000291,"subject":"不動産登記法","topic":"抵当権の登記","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n債権譲渡（連帯債務者Aに係る債権）で抵当権一部移転登記可能。\n転抵当ある場合に一部弁済で債権額減額＝転抵当権者が利害関係人にあたる（変更後の債権額転抵当権額上回ってても）真正な登記名義の回復で抵当権移転不可。\n一部移転されている抵当権の一部弁済＝移転抹消じゃなく「○の債権弁済」での移転登記\n抵当権の債務者の住所は変更せず追加設定可能（根抵当権は変更必要）\n抵当権の一部順位譲渡可能「登記の目的　１番抵当権の一部（金200万円のうち100万円分）の2番抵当権への順位譲渡」「原因　○年〜抵当権一部順位譲渡」\n移転の付記がされていない抵当権について、B→Cなど別の抵当権者に真正な登記名義の回復として移転登記することは不可能。（従前登記名義人じゃないから）\n元本全額弁済で利息のみ残っている=元本弁済原因とする抵当権の変更登記可能。将来の貸付金担保のための抵当権の予約契約変更して貸付金増額=債権額変更の東京可能。","date":"Excel取込"},{"id":1800000000292,"subject":"不動産登記法","topic":"抵当権の処分に関する登記","level":1,"memo":"【ソース】伊藤塾2023プレ模試\n\n順位放棄＝被担保債権・発生日は記録されない。順位放棄・譲渡・質入・転抵当＝全部承諾不要、全部付記登記＝不動産1個につき1000円。\n転抵当権者＝根抵当権の分割譲渡時の利害関係人になる。2番根抵当権に対して順位の譲渡をしている1番抵当権者は3番抵当権を第一、2番根抵当権を第二順位とする順位変更の登記を申請する場合の利害関係人にあたる。1番抵当から2番値根抵当に順位譲渡されていて、1番と2番の順位変更する場合＝譲渡の登記職権抹消はされない。","date":"Excel取込"},{"id":1800000000293,"subject":"不動産登記法","topic":"抵当権の順位変更登記","level":1,"memo":"ABに分割譲渡された根抵当権で順位変更＝BだけじゃなくCの同意も必要。順位変更常に主登記\n真正な登記名義の回復による移転＝従前の名義人に回復する場合のみ可能\n一個の抵当権の一部の順位変更不可（譲渡・放棄は可能）順位変更＝差押え債権者は利害関係人に当たらない\n原則他人所有不動産の抵当権設定NG。利息の特別の登記＝設定者兼債務者「までの利息延滞」物上保証「までの利息の担保契約」\n債務弁済契約NG『年月日債務承認契約年月日設定』OK。抵当権の別個の金銭消費貸借で貸増し＝債権増額変更登記不可。混同で抵当権消滅＝抹消前に所有権移転されたら現在の所有権登記名義人が権利者になるので単独抹消不可。\n登記前に利息変更＝変更後の利息で抵当権設定可能（原因日付は当初の日）\n利息に関する定めのある抵当権に遅れる差押えある場合＝原因日付から2年超えない日に更正登記＝差押え債権者は利害関係人＝付記登記なら承諾情報必要。\n準共有の抵当権＝債権額に按分して支払われる＝順位譲渡可能。順位放棄は不可。\n抵当証券の交付＝債権の全部を弁済するに足りることを証する情報必要。証券発行抵当権の順位が下がる変更＝弁済足りる情報提供必要\n債権者の交替による更改＝債務者含めた3面契約＝更改後の債務に抵当権移す場合、設定者が契約当事者以外なら承諾必要＝債権者の交替による更改なら設定者の印鑑証明必要。\n保証人の代位弁済による抵当権移転＝登記無くして対抗可。順位変更は承諾の日が原因。\n順位変更の更正は影響受けるもののみで申請。未登記抵当権と順位譲渡契約＝設定登記後、契約日で順位譲渡登記可能。抵当証券が発行されている後順位のために先順位が順位譲渡＝抵当証券の提供必要だが担保の十分性証する書面不要。債権者更改による新債務担保→抵当権移転登記。給付内容変更・債務者の交替による更改→抵当権変更登記\n更改して設定者の承諾得られなかった場合＝「抵当権消滅」更改契約成立日に抹消申請。","date":"Excel取込"},{"id":1800000000294,"subject":"不動産登記法","topic":"賃借権の先順位抵当権に優先する同意の登記","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n賃借権が仮登記でも優先の登記可能。主登記","date":"Excel取込"},{"id":1800000000295,"subject":"不動産登記法","topic":"賃借権に関する登記","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n月額は固定資産税に何分の何乗じた額＝OK。転貸ある賃借権抹消＝転貸は登記官の職権抹消。\n賃料＝甲土地を使用収益するOK。契約から５年は○円、６年目からは○円OK\n賃料増額＝付記でする場合、賃借権移転仮登記権者等の承諾必要。後順位抵当権者関係なし。\n賃貸人の承諾後でも、移転日は譲渡契約の日。\n事業用定期借地権（10年30年。23条2項）登記しないまま所有権移転で譲受人承認＝従前所有権者と借地権者の設定契約日の登記可能。転借ある登記で賃借権抹消→登記官の職権で転貸抹消\n1番賃借権の賃貸人たる地位の留保のための設定＝合意日＝主登記\n転貸借契約＝原因日付は承諾に関わらず契約の日。賃貸人たる地位留保の登記＝元の賃借権なくても常に主登記。","date":"Excel取込"},{"id":1800000000296,"subject":"不動産登記法","topic":"地役権の登記","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n管轄違うなら申請・抹消ともに登記事項必要。修繕義務特約を承役地に追加設定しても、要役地にその旨登記されない。地役権の目的範囲の定め変更＝要役地の表示すでにされているから提供不要\n変更の登記で要役地の情報不要。地役権設定前の抵当権・差押え・所有権移転仮登記＝地役権抹消の利害関係人じゃない。\n承役地全体より広い免責を範囲として提供不可。要役地とともに移転しない場合の抹消義務者＝要役地の全所有権登記名義人＝年月日要役地の所有権移転。電線の支持物を除く電電線路施設設定の目的＝農地法の許可不要。承役地の地上権者が設定者となって地役権設定＝地上権の登記に付記して実行される。\n地役権範囲縮小＝地役権者の所有権取得時の識別必要。承役地に申請＝要役地は設定・抹消ともに登記官の職権","date":"Excel取込"},{"id":1800000000297,"subject":"不動産登記法","topic":"地上権の登記","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\nすでに地上権登記あっても仮登記重ねて可能。承諾得て設定した区分地上権＝競売で先順位の地上権取得した第三者にも対抗可能。農地に地上権設定＝許可情報必要。霊園所有目的の地上権OK。被災地短期借地権＝公正証書で必要。\n地上権移転が満了後でも原因日付が満了前なら却下されない。\n競売による法定地上権＝当事者の共同申請。準共有者ごとに異なる地代の登記NG。\n区分地上権の使用制限＝土地の処分や使用全面的に禁止するものはNG。AB間で地上権契約→登記前にCが所有者→BC間で新たに地上権契約必要。\n特定階層所有目的の区分地上権は不可。\n農地の地下に工作物＝許可必要。電気事業者の農地等を目的とする電線路のため地役権を設定した場合（電線の支持物を除く）＝不要。特定階層所有のための区分地上権はNG","date":"Excel取込"},{"id":1800000000298,"subject":"不動産登記法","topic":"第三者の承諾を証する情報","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n抵当証券の裏書譲渡人と所持人は利害関係有する。抵当権に優先する登記された賃借権で存続期間延長や賃料減額→抵当権者が利害関係有する。\n買戻に質権＝買戻権行使されたら質権も職権で抹消される。\n順位変更で順位繰り下がる抵当権に順位放棄している先順位抵当権者＝順位変更の合意の利害関係人。\n根抵当権に遅れる所有権仮登記名義人＝極度額増額の利害関係人\n所有権本登記＝仮登記に遅れる差押え（仮登記前の抵当権に基づくもの）あったら利害関係人にあたる。\n順位変更後、元抵当権抹消する場合も他の承諾不要＝順位変更してから元抹消しても影響ないから。\n単有不動産→共有に修正＝地上権職権抹消。利害関係第三者が抵当証券の所持人なら証券提供必要","date":"Excel取込"},{"id":1800000000299,"subject":"不動産登記法","topic":"代理人等","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n後見人＝後見登記ファイル添付。選任後三ヶ月以内なら審判書正本確定証明書でもOK。被相続人の作成後三ヶ月以内の印鑑証明必要。権利者義務者が同一の委任状利用OK。\n在外日本人のための委任公正証書＝期間制限なし。復代理人が申請するときは復代理人作成の本人確認情報必要。\n復代理人が登記申請する場合、代理人が副代理人権限証する書面に記名押印しても印鑑証明の提供不要。","date":"Excel取込"},{"id":1800000000300,"subject":"不動産登記法","topic":"代理権限証明書類","level":1,"memo":"外国在留邦人＝署名証明書と訳文でOK。","date":"Excel取込"},{"id":1800000000301,"subject":"不動産登記法","topic":"代位による登記","level":1,"memo":"抵当権者が抵当権の実行としての競売の申立を受理した旨の証明書を提供の上、相続人に代位して相続登記可能=代位原因証する情報添付必要。被相続人A相続人Bとする処分禁止の仮処分の嘱託OK=前提として相続登記不要。","date":"Excel取込"},{"id":1800000000302,"subject":"不動産登記法","topic":"胎児名義の登記","level":1,"memo":"出生前の胎児の特別受益証明書作成して母が自己単独名義の登記可能＝利益相反にも当たらない。\n婚姻外の胎児相続＝単に「◯子胎児」と書く。胎児単独で相続登記後死産＝死産原因で抹消登記","date":"Excel取込"},{"id":1800000000303,"subject":"不動産登記法","topic":"相続等が生じた場合の登記","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n特別受益者＝登記義務は負う。特定財産承継遺言＝遺言執行者が実行可能。","date":"Excel取込"},{"id":1800000000304,"subject":"不動産登記法","topic":"相続登記の申請","level":1,"memo":"破産管財人が当事者で調停・審判成立＝裁判所の許可証明情報不要。遺産分割協議参加なら必要。\n遺産分割調停調書と相続分譲渡証明書添付しても受理されない。","date":"Excel取込"},{"id":1800000000305,"subject":"不動産登記法","topic":"相続以外の原因による所有権移転登記","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\n親子共有不動産＝親権者が代わりに未成年の子の持分放棄＝利益相反じゃないので特別代理人不要。","date":"Excel取込"},{"id":1800000000306,"subject":"不動産登記法","topic":"相続の開始","level":1,"memo":"遺産分割方法の指定＝相続。包括遺贈で一部の相続人＝遺贈。","date":"Excel取込"},{"id":1800000000307,"subject":"不動産登記法","topic":"相続に関する登記","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n欠格事由あったら代襲相続人も更正登記で相続登記可能（他の変更ない相続人申請人にならない）。\n相続登記後に相続前の失踪宣告→錯誤更正\n遺産分割の審判・調停＝申立・職権で財産管理者選任可能。財産売却する場合も、前提として相続登記必要。\n印鑑証明提出しない相続人＝遺産分割協議書真否確認の訴えの確定勝訴判決で代える。\nA→B→Cの相続で直接A→Cに所移＝中間相続人B・D判明したら、抹消してから相続でC・Dに移転。\n相続人に特定不動産遺贈＝遺贈。分筆後の不動産で相続可能（撤回とみなされない）\n相続分の譲渡されて直接譲受人に相続移転できるのはどう順位の共同相続人間に譲渡された場合のみ。","date":"Excel取込"},{"id":1800000000308,"subject":"不動産登記法","topic":"前提登記","level":1,"memo":"賃貸人合併後の転貸の登記抹消=前提として原賃借権の移転登記必要。遺贈の登記で住所が死亡時と相違=住所変更登記必要。","date":"Excel取込"},{"id":1800000000309,"subject":"不動産登記法","topic":"前住所通知","level":1,"memo":"行政区画の名称変更＝前住所通知不要。転送不可郵便だが本人限定郵便でない。本人確認情報の提供があり登記官が確実と認める場合省略可能（公証人の本人確認認証では省略不可）","date":"Excel取込"},{"id":1800000000310,"subject":"不動産登記法","topic":"先取特権に関する登記","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n建物新築＝不動産工事の先取特権保存＝建物設計図面提供。不動産保存＝予算登記不可（通常申請時に確定してるから）地上権売買の先取特権保存可能\n不動産質権の存続期間・損賠担保しない別段の定め＝申請情報になる。引き直し可能。\n宅地造成の不動産工事の先取特権保存＝工事図面不要。建物・附属建物新築は図面必要。\n建物新築不動産工事の先取特権保存登記＝先取特権のみ譲渡不可能\n滞納処分による差押え＝建物完成していれば受理される。","date":"Excel取込"},{"id":1800000000311,"subject":"不動産登記法","topic":"数次相続の登記","level":1,"memo":"A→BC→DE中間省略で登記可能。A→配偶者Bと兄弟CDEが第一相続後、B死亡でFG相続＝CDEFGの遺産分割協議で取得者CにすればAからCへの相続登記可能。A死亡BC相続でB死亡＝DE相続＝CDの相続はできないからまずは取得者BC相続後にBの持分をDに移転する。","date":"Excel取込"},{"id":1800000000312,"subject":"不動産登記法","topic":"親子間の利益相反行為","level":1,"memo":"【ソース】LEC2023実力診断模試\n\n未成年者所有権の登記名義人＝親名義に真正な登記名義の回復＝利益相反行為に該当しない。\n子と親の共有不動産＝一括売却＝利益相反該当しない。","date":"Excel取込"},{"id":1800000000313,"subject":"不動産登記法","topic":"申請情報たる持分","level":1,"memo":"根質権＝持分提供不要。抵当権の利息変更＝持分提供不要。","date":"Excel取込"},{"id":1800000000314,"subject":"不動産登記法","topic":"申請の内容が真実であると思料する旨の申出","level":1,"memo":"事前通知に対する申出＝申請書または委任状に押印したものと同一の印で提出。未成年者が申請した場合は事前通知も未成年者が対応。","date":"Excel取込"},{"id":1800000000315,"subject":"不動産登記法","topic":"審査請求","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n抵当権移転の却下→設定者は審査請求不可。監督法務局・地方法務局の長→審理員に送付。不備補正なければ裁決で審査請求却下可能。審査請求人の地位承継不可。意思表示取り消したが登記申請された場合＝もはや審査請求不可。\n筆界特定申請の却下＝審査請求対象","date":"Excel取込"},{"id":1800000000316,"subject":"不動産登記法","topic":"信託の登記","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n信託管理人の解任→登記官が職権で信託の変更登記を嘱託。受託者辞任で「受託者変更」→非課税。\n受益者の変更は受託者が単独で申請。\n信託財産の管理方法変更→受託者が単独で変更登記。委託者の地位移転→受託者及び受益者の同意必要。\n信託の併合＝債権者保護手続が適法に行われたことを証する書面必要。受託者固有財産＝委付\n受託者名義の所有権保存可能。被保佐人も受託者になれる＝個人が被保佐人になったら任務終了。\n信託登記の後に所有権移転請求権保全の仮登記＝委付で所有権移転しても影響なし＝承諾不要。\n不動産売却で所有権移転と信託抹消＝信託抹消登記尾の登記原因は「信託財産の処分」\n受託者固有の財産→受益者は義務者だが識別不要（識別持ってないケースもあるから）\n自己信託＝公正証書・単独で可能。原因日付＝公正証書作成日。合有登記名義人変更「年月日受託者A任務終了」\n受託者固有財産の変更＝委付原因。信託の併合＝全部一緒に登記必要。\n自己信託＝信託財産となった旨の変更の登記→原因日付は公正証書作成日。\n受益者代理人いる時は代理人氏名住所登記必要＝受益者の登記不要。信託の分割＝受益者の識別不要・受託者の識別必要。信託は仮登記も同時に必要。","date":"Excel取込"},{"id":1800000000317,"subject":"不動産登記法","topic":"職権又は嘱託による登記","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n強制競売による売却原因の所有権移転登記を嘱託＝差押え後の地上権抹消＝裁判所書記官の嘱託。\n処分制限の登記嘱託＝土地所在図地積測量図・建物図面各階平面図提供必要。強制競売による所有権移転嘱託＝差押に遅れる地上権＝裁判所書記官の嘱託による抹消。\n根抵当権の分割譲渡＝登記官職権で極度額減額による根抵当権変更登記。共同抵当でひとつに消滅請求＝当事者が抹消申請。抵当権の順位変更請求権保全のため保全仮登記の嘱託可能（順位変更の仮登記は不可）\n共同担保を登記官が遺漏＝同一管轄かつ利害関係にいないなら職権で更正可能\n順位変更＝当事者の承諾提供した官庁公署が嘱託可能。過誤＝職権抹消回復可能。\n強制競売での所有権移転嘱託＝差押登記後の地上権＝裁判所書記官の嘱託により抹消される。\n処分禁止に遅れる登記＝同時に抹消されなかったら＝処分禁止の仮処分の登記→仮処分債権者の申立てで保全執行裁判所の書記官の嘱託で抹消","date":"Excel取込"},{"id":1800000000318,"subject":"不動産登記法","topic":"譲渡担保の登記","level":1,"memo":"被担保債権とともに譲渡担保権も売渡＝譲渡担保の売買原因で所移。譲渡担保に買戻特約不可。譲渡担保契約解除による所有権移転でも抹消でもどちらでも可能","date":"Excel取込"},{"id":1800000000319,"subject":"不動産登記法","topic":"所有権保存の登記","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\n確定判決で保存＝建物図面・各階平面図必要。表題部2人＝保存行為で共有者全員分保存可能。包括遺贈は直接自己名義保存不可。（相続ならOK）\n表題部所有者の一人相続人なくして死亡＝相続財産法人含む保存した後移転登記。未成年後見人いても単独登記OK\n権利能力なき社団の代表者からの買主＝代表者の相続人被告とする確認判決で直接自己名義の保存登記OK。\n表題部所有者ABからXが買受＝A死亡してCD相続＝判決はBCD全員被告である必要あり。敷地権付区分建物の取得＝表題部所有者から区分建物所有権取得した旨の情報提供不要＝登記原因証明情報のほうで証明するから。","date":"Excel取込"},{"id":1800000000320,"subject":"不動産登記法","topic":"所有権登記名義人の死亡","level":1,"memo":"不動産BCに遺贈する遺言書とCの遺贈放棄証書でB単有の遺贈登記不可。","date":"Excel取込"},{"id":1800000000321,"subject":"不動産登記法","topic":"所有権更正の登記","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\nAからBへの一部移転→全部移転（A持分につき新たにBが登記名義人）＝識別通知される。\n一部移転を全部移転としてその後更正＝免許税は返ってこない\n更正登記前提として住所変更の登記不可。売買→贈与へ更正＝従前が義務者、現在が権利者","date":"Excel取込"},{"id":1800000000322,"subject":"不動産登記法","topic":"所有権移転の登記","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n存続期間満了している地上権が敷地権の区分建物移転＝申請情報から敷地権消滅明らかな場合除き受理される。\n相続財産法人の付記あっても抹消せず相続人に移転登記可能。","date":"Excel取込"},{"id":1800000000323,"subject":"不動産登記法","topic":"所有権の登記全般","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n一部移転を全部に更正→全部取得したものに識別通知。遺産分割審判後、単有とする遺産分割で直ちに相続不可。","date":"Excel取込"},{"id":1800000000324,"subject":"不動産登記法","topic":"所有権の登記の抹消","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n錯誤で所有権移転抹消＝登記権利者である前所有権登記名義人の住所変更あっても変更できないので変更証する情報提供して抹消（前提としての変更はできない）","date":"Excel取込"},{"id":1800000000325,"subject":"不動産登記法","topic":"処分制限の登記","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n破産管財人の任意売却＝破産手続開始の登記→管財人申立で書記官の嘱託により抹消\n仮処分による一部失効→更正登記。\n遅れる登記抹消しない場合→仮処分債権者の申立てで書記官が抹消嘱託\n処分制限で持分記録なし。任意売却所有権移転→破産管財人の申立てで書記官の嘱託抹消\n仮処分債権者の申立てで仮処分命令裁判所が更正決定＝書記官の嘱託で保全仮登記更正の登記＝仮処分債権者が更正登記するわけじゃ無い。保全仮登記の更正＝書記官の嘱託。\n遅れる登記の抹消で通知から1週間経過せずに抹消申請＝配達証明書の添付必要。","date":"Excel取込"},{"id":1800000000326,"subject":"不動産登記法","topic":"処分禁止の仮処分の登記","level":1,"memo":"仮処分に遅れる登記の抹消を申請=あらかじめ権利者に対し通知必要。仮処分債権者が仮処分債務者を義務者とする所有権の登記を申請する場合=単独抹消可能。建物収去土地明渡命令では所有権移転登記できない。","date":"Excel取込"},{"id":1800000000327,"subject":"不動産登記法","topic":"順位の変更の登記","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n更正＝前後で影響受けないものは申請人にならない。順位譲渡後に順位変更しても、登記官の職権では譲渡抹消されない。","date":"Excel取込"},{"id":1800000000328,"subject":"不動産登記法","topic":"主登記・付記登記","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n所有権移転の仮登記を相続で移転＝主登記の仮登記。所有権以外の処分制限＝付記。抵当権の順位譲渡保全＝処分禁止の仮処分の執行としての抵当権の処分禁止の仮登記＝付記登記。\n破産手続開始決定＝所有権は主・それ以外は付記。抵当権設定の破産法による否認の登記＝常に主登記\n賃借権の先順位抵当権に優先する同意の登記・敷地権の登記・信託財産固有・自己信託・所有権に関する処分制限＝常に主登記。根抵当権の全部譲渡＝所有権以外の権利の移転＝付記登記（一部譲渡は主登記）\n392条2項後段の代位による抵当権・極度額変更＝常に付記。工場財団＝所有権なら主登記・それ以外付記\n抹消された登記の回復＝一部なら付記登記。全部なら主登記。\n根抵当権の分割譲渡＝主登記（原根抵当権の極度額の減額＝登記官職権で付記登記）\n先順位抵当権に優先する登記後、賃借権者に有利な登記＝承諾の有無で主・付記変わる。\n根抵当権準共有者間の優先の定め＝付記登記。賃借権の先順位抵当権者に優先する同意＝主登記","date":"Excel取込"},{"id":1800000000329,"subject":"不動産登記法","topic":"借地権に関する登記","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n臨時設置建物の目的「臨時建物所有」＝公正証書不要。存続期間50年以上「建物所有」「借地借家法第22条の特約」\n建物所有目的の土地賃借権＝設定の目的必要「目的　建物所有」\n借地借家法23条2項＝10年以上30年未満＝目的「借地借家法23条2項の建物所有」\n30年以上50年未満＝「目的　借地借家法23条1項の建物所有」「特約　借地借家法23条1項の特約」\n1項借地権の存続期間変更＝変更日じゃなく設定日から満了までが30〜50の間である必要あり。\n存続期間50年・更新延長・建物買取しない請求＝一般定期借地権＝書面・電磁的記録で足りる。","date":"Excel取込"},{"id":1800000000330,"subject":"不動産登記法","topic":"識別情報の失効の申出","level":1,"memo":"公務員が職務上作成した情報がない場合はコレに代わる情報でOK","date":"Excel取込"},{"id":1800000000331,"subject":"不動産登記法","topic":"時効取得による所有権の登記","level":1,"memo":"【ソース】LEC2023実力診断模試\n\n表題部なし＝保存登記の前提として表示に関する登記必要。「年月日不詳時効取得」＝不可\n相続人が直接時効援用して所有権移転可能","date":"Excel取込"},{"id":1800000000332,"subject":"不動産登記法","topic":"持分放棄","level":1,"memo":"共有物移転=原因:持分放棄。","date":"Excel取込"},{"id":1800000000333,"subject":"不動産登記法","topic":"事前通知又は前の住所への通知","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n公証人認証で事前通知省略しても前の住所への通知は省略不可。前の住所地への通知で異議の申出出たら本人確認調査に入る。法人代表者の住所地は登記記載の住所になる","date":"Excel取込"},{"id":1800000000334,"subject":"不動産登記法","topic":"事業用定期借地権の登記","level":1,"memo":"雑種地や山林でも事業用定期借地権可能。住み込み管理人室がある程度なら対象。転借地権として事業用定期借地権可能。賃料一括記載の公正証書に内訳原因情報添付すれば可能。","date":"Excel取込"},{"id":1800000000335,"subject":"商業登記法","topic":"役員等の登記","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n会計参与書類等備置場所の変更で事実証明書面不要。辞任と同時に就任＝重任不可。（退任ならOK）\n会計監査人就任時の登記事項証明書＝三ヶ月以内\n仮会計監査人は裁判所書記官職権で遅滞なく嘱託。辞任なら、伸長した事実証明書面不要。","date":"Excel取込"},{"id":1800000000336,"subject":"商業登記法","topic":"役員その他に関する登記","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n譲渡制限廃止で公開移行＝取締役等選解任付株式の定め廃止の旨の発行可能種類株式総数及び発行する各種類の株式の内容の変更登記必要。取締役・監査役員数欠いて選任できない時も廃止とみなされるので変更登記必要。","date":"Excel取込"},{"id":1800000000337,"subject":"商業登記法","topic":"本店移転に関する登記","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n旧所在地で本店移転と支配人を置いた営業所移転の登記申請。特例有限の解散と株式会社設立で商号変更可能＝本店移転は別途申請必要。新所在地での登記＝別添登記事項証明書のとおりという記載で省略OK。","date":"Excel取込"},{"id":1800000000338,"subject":"商業登記法","topic":"本店移転に関する登記","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n移転した旨と年月日のみでOK。役会設置会社＝定款変更伴わない移転＝移転後に役会の決議あったら役会決議の日が原因。本店移転総会決議の不存在確定＝裁判所書記官が職権で本店移転抹消登記嘱託","date":"Excel取込"},{"id":1800000000339,"subject":"商業登記法","topic":"法人の登記における住所等","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\nビル→ビル2階にすでに同じ名称の別会社あったら移転不可。住居表示実施なら医療法人も変更登記必要。\n重任なら代表の住民票移しも必要なく、前提としての住所変更登記不要。","date":"Excel取込"},{"id":1800000000340,"subject":"商業登記法","topic":"法人の登記","level":1,"memo":"【ソース】伊藤塾2021プレ模試\n\n司法書士法人＝社員の欠亡で解散＝相続人の同意得て新たに社員加入で継続可能＝相続人同意書面と社員入社承諾書面必要。\n宗教法人設立＝認証規則&代表者資格書面添付。医療法人理事長＝寄附行為の定め不要。\n学校法人＝理事長以外の理事・監事・評議員の登記不要。特定非営利活動法人＝資産の総額登記不要","date":"Excel取込"},{"id":1800000000341,"subject":"商業登記法","topic":"募集株式の発行の登記","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n非公開第三者＝総会決議で取締役または役会に委任可能（定款じゃない・株主割当なら定款）\n譲渡制限変更決議後、募集株式効力発生＝譲渡制限効力発生→募集株式発行は登記可能、譲渡制限NG","date":"Excel取込"},{"id":1800000000342,"subject":"商業登記法","topic":"募集株式の発行の登記","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n代表と引受社団の代表同じ＝引受社団で利益相反承認必要。書類添付は不要。\n取締役の報酬として発行＝払込金額期日不要・割当日必要。資本金の増加計算＝役務を割当後提供＝事業年度末日・割当前＝割当日に増加","date":"Excel取込"},{"id":1800000000343,"subject":"商業登記法","topic":"募集株式の発行に関する登記","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n非公開の役会設置の株主割当＝定款あれば役会で募集事項決定＝定款添付必要。\n錯誤書面提供で債権者保護なく募集株式発行に伴う資本金の額減少可能。","date":"Excel取込"},{"id":1800000000344,"subject":"商業登記法","topic":"募集株式の発行による変更の登記","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n割当ての決定書面証する書面＝募集株式が譲渡制限株式である時に限られる。\n有価証券の市場価格＝募集事項の決定日における最終の市場価格記載の新聞でOK。","date":"Excel取込"},{"id":1800000000345,"subject":"商業登記法","topic":"募集株式の発行による変更の登記","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n取締役・会計参与・監査役・執行役・支配人・使用人は現物出資財産の価額証明できない。","date":"Excel取込"},{"id":1800000000346,"subject":"商業登記法","topic":"補欠の監査役の登記","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n補欠が就任時点で承諾＝欠員が生じた日に就任。監査役が欠格事由「資格喪失」。社外監査役の補欠も置ける。\n補欠決議有効＝次の定時株主総会まで。定款で伸長した場合、就任登記で定款添付必要。","date":"Excel取込"},{"id":1800000000347,"subject":"商業登記法","topic":"特例有限会社の登記","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n株式会社に変更＝資本金の1000分の1.5（直前超える部分は1000分の7）、未満は3万円。株式への変更と同時に代表取締役選定にかかる取締役会議事録NG。＝移行と同時に定款に役会設置・最初の代表・効力発生時を設立にすれば可能。","date":"Excel取込"},{"id":1800000000348,"subject":"商業登記法","topic":"特別取締役の登記","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n監査等委員会設置＝特別取締役存する＝役会で重要な業務執行取締役委任定款変更＝特別取締役の議決の定め廃止。本人確認証明適用なし。子会社業務執行取締役就任で社外性喪失。","date":"Excel取込"},{"id":1800000000349,"subject":"商業登記法","topic":"登録免許税","level":1,"memo":"【ソース】伊藤塾2022プレ模試\n\n一般財団法人設立＝6万円。初めてする外国会社の登記＝日本に営業所ない６万・ある9万。未成年者の営業開始1.8万円。合資会社＝新設分割関わらず6万円。株式交付＝最低3万円","date":"Excel取込"},{"id":1800000000350,"su
