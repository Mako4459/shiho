<!DOCTYPE html><html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>司法書士 苦手ノート</title><style>
:root{
  --bg:#07111f;
  --header:#0d2240;
  --card:#10233f;
  --card2:#152d4d;
  --text:#f3ead7;
  --sub:#aebcd3;
  --accent:#d4af37;
  --border:#24476f;
}

body.white-theme{
  --bg:#f2f2f2;
  --header:#ffffff;
  --card:#ffffff;
  --card2:#ececec;
  --text:#222222;
  --sub:#666666;
  --accent:#c29214;
  --border:#d6d6d6;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  transition:.25s;
}

header{
  position:sticky;
  top:0;
  z-index:999;
  background:var(--header);
  border-bottom:1px solid var(--border);
  padding:16px;
}

.topbar{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo{
  flex:1;
}

.logo small{
  display:block;
  letter-spacing:4px;
  color:var(--sub);
  font-size:10px;
}

.logo h1{
  margin:2px 0 0;
  font-size:22px;
}

.hbtn{
  border:none;
  border-radius:16px;
  background:var(--accent);
  color:#111;
  width:60px;
  height:60px;
  font-size:24px;
  font-weight:bold;
}

.tabs{
  display:flex;
  gap:10px;
  overflow:auto;
  padding:14px;
}

.tab{
  border:1px solid var(--border);
  background:transparent;
  color:var(--text);
  border-radius:999px;
  padding:12px 18px;
  white-space:nowrap;
  font-size:16px;
}

.tab.active{
  border-color:var(--accent);
  color:var(--accent);
}

.search-wrap{
  display:flex;
  gap:10px;
  padding:0 14px 14px;
}

.search{
  flex:1;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:18px;
  padding:16px;
  color:var(--text);
  font-size:18px;
}

.search-btn{
  width:80px;
  border:none;
  border-radius:18px;
  background:var(--accent);
  color:#111;
  font-size:18px;
  font-weight:bold;
}

.clear-btn{
  width:80px;
  border:none;
  border-radius:18px;
  background:#3f5273;
  color:#fff;
  font-size:18px;
  font-weight:bold;
}

.list{
  padding:14px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:20px;
  margin-bottom:18px;
}

.badges{
  display:flex;
  gap:8px;
  margin-bottom:14px;
}

.badge{
  border:1px solid var(--border);
  border-radius:999px;
  padding:6px 10px;
  font-size:14px;
}

.badge.red{
  color:#ff8080;
}

.badge.orange{
  color:#ffb84d;
}

.badge.green{
  color:#66ff99;
}

.topic{
  font-size:42px;
  font-weight:700;
  margin-bottom:18px;
}

.memo{
  color:var(--sub);
  line-height:1.8;
  font-size:17px;
  margin-bottom:18px;
}

.meta{
  color:var(--accent);
  font-size:16px;
  line-height:1.8;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:var(--header);
  border-top:1px solid var(--border);
}

.bottom-nav button{
  flex:1;
  border:none;
  background:none;
  color:var(--text);
  padding:16px 0;
  font-size:18px;
}

.bottom-nav button.active{
  color:var(--accent);
  font-weight:700;
}

.spacer{
  height:100px;
}
</style></head><body><header>  <div class="topbar"><div class="logo">
  <small>JUDICIAL SCRIVENER</small>
  <h1>苦手分野 管理ノート</h1>
</div>

<button
  class="hbtn"
  onclick="toggleTheme()"
>
  ☀️
</button>

  </div></header><div class="tabs"><button class="tab active">一覧</button>
<button class="tab">ひな形</button>
<button class="tab">横断比較</button>
<button class="tab">今日</button>

</div><div class="tabs">  <button class="tab active">
    全て 1255
  </button>  <button class="tab">
    未理解 1254
  </button>  <button class="tab">
    不安 1
  </button>  <button class="tab">
    普通 0
  </button>  <button class="tab">
    自信あり 0
  </button></div><div class="search-wrap"><input
class="search"
placeholder="検索語を入力"
/>

  <button class="search-btn">
    検索
  </button>  <button class="clear-btn">
    クリア
  </button></div><div class="list">  <div class="card"><div class="badges">
  <div class="badge">民法</div>
  <div class="badge orange">不安</div>
</div>

<div class="topic">
  連帯債務
</div>

<div class="memo">
  【ソース】2021年TAC予想問題集<br><br>

  他の連帯債務者が相殺をもって
  免責を得た連帯債務者に対抗した場合、

</div>

<div class="meta">
  最後に見た日: 2026/05/18 00:19<br>
  復習: 2 ／ 間違え: 0
</div>

  </div>  <div class="card"><div class="badges">
  <div class="badge">民法</div>
  <div class="badge red">未理解</div>
</div>

<div class="topic">

</div>

<div class="memo">

  建物買取代金債権で

<div class="meta">

  </div></div><div class="spacer"></div><div class="bottom-nav">  <button class="active">
    一覧
  </button>  <button>
    ひな形
  </button>  <button>
    比較
  </button>  <button>
    今日
  </button></div><script>
function toggleTheme(){

  document.body.classList.toggle(
    "white-theme"
  );

  const isWhite =
    document.body.classList.contains(
      "white-theme"
    );

  localStorage.setItem(
    "theme",
    isWhite ? "white" : "dark"
  );
}

window.addEventListener("load",()=>{

  const savedTheme =
    localStorage.getItem("theme");

  if(savedTheme==="white"){

    document.body.classList.add(
      "white-theme"
    );
  }
});
</script></body>
</html>
