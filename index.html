額の計上書面必要、資本金の額の計上書面不要 効力発生日の変更＝役会決議。準備金の資本組入れ＝債権者保護書面の添付は不要"],"解散の登記":["注意点：存続期間の満了で解散なら＝解散の年月日満了日の翌日。清算結了の年月日＝総会における決算報告書の承認の日。 定款or総会で就任した清算人＝就任承諾書面必要。"],"商登法::解散の登記":["注意点：存続期間の満了で解散なら＝解散の年月日満了日の翌日。清算結了の年月日＝総会における決算報告書の承認の日。 定款or総会で就任した清算人＝就任承諾書面必要。"],"商登法::一般社団法人・一般財団法人":["注意点：剰余金・残余財産の分配不可。財団の理事＝評議員会で選任&就任承諾必要、定款不要。評議員は定款で定める。 一般財団法人＝財産の拠出の履行があったこと証する書面添付。定款には拠出財産とその価額の記載が必要＝登記事項ではない。"],"一般社団法人・一般財団法人":["注意点：剰余金・残余財産の分配不可。財団の理事＝評議員会で選任&就任承諾必要、定款不要。評議員は定款で定める。 一般財団法人＝財産の拠出の履行があったこと証する書面添付。定款には拠出財産とその価額の記載が必要＝登記事項ではない。"],"商登法::持分会社の社員の加入・退社":["注意点：合資会社の社員がやむを得ない事由での退社＝退社届の添付必要。定款に業務執行社員の任期に関する定めがある場合、任期満了後直ちに再指定＝業務執行社員の変更登記不要。 持分の譲受による業務執行社員の加入＝持分の譲渡契約書及び定款の変更にかかる総社員の同意書面必要。（業務執行しない社員なら、譲渡契約書＋変更前定款＋業務執行社員全員の同意書） 持分差押での退社＝持分差押命令書＋６ヶ月前までに予告した退社予告書必要。"],"持分会社の社員の加入・退社":["注意点：合資会社の社員がやむを得ない事由での退社＝退社届の添付必要。定款に業務執行社員の任期に関する定めがある場合、任期満了後直ちに再指定＝業務執行社員の変更登記不要。 持分の譲受による業務執行社員の加入＝持分の譲渡契約書及び定款の変更にかかる総社員の同意書面必要。（業務執行しない社員なら、譲渡契約書＋変更前定款＋業務執行社員全員の同意書） 持分差押での退社＝持分差押命令書＋６ヶ月前までに予告した退社予告書必要。"],"民訴法::当事者照会":["注意点：訴訟の継続中裁判外で裁判所の関与なく当事者同士で行われる。"],"当事者照会":["注意点：訴訟の継続中裁判外で裁判所の関与なく当事者同士で行われる。"],"印鑑証明書":["注意点（伊藤塾2022公開模試2）：仮登記名義人の承諾書の印鑑証明・利害関係有する第三者承諾＝3ヶ月じゃなくていい。 仮登記義務者の承諾情報＝印鑑証明原本還付不可。共有物分割禁止の定めに添付する全員分、利害関係人の印鑑、破産管財人の印鑑、死亡した委任者から代理人が受領していた印鑑証明＝還付不可。 所有権の登記名義人が登記義務者となる権利に関する登記（担保権（根抵当・根質権以外）の債務者変更更正を除く）を申請する時に必要。自己信託所有権＝印鑑証明必要。嘱託の…","注意点：本国官憲の印鑑添付できない場合も上申書と公証人等の証明で対応可能。外国在住日本人も公証人等の認証で印鑑証明に代えること可能。書記官作成の印鑑証明書＝３ヶ月の期限ない。官庁作成書面の印鑑証明書添付不要。印鑑証明書の住所違っても住所証明情報出せば受理される。","ポイント：抵当権の債務者の変更印鑑証明不要 / 書記官作成の印鑑証明に期限ない / 申請書・委任状に公証人の認証あるなら印鑑証明不要 / 署名証明に有効期限無い","ポイント：共有物分割禁止＝全員の３カ月以内の印鑑証明書添付必要 / 所有権保存登記の抹消＝所有権移転がない場合に限り単独抹消可能。３カ月以内の印鑑証明必要 / 仮登記義務者の印鑑証明＝３カ月以内じゃなくてOK"],"不登法::印鑑証明書":["注意点（伊藤塾2022公開模試2）：仮登記名義人の承諾書の印鑑証明・利害関係有する第三者承諾＝3ヶ月じゃなくていい。 仮登記義務者の承諾情報＝印鑑証明原本還付不可。共有物分割禁止の定めに添付する全員分、利害関係人の印鑑、破産管財人の印鑑、死亡した委任者から代理人が受領していた印鑑証明＝還付不可。 所有権の登記名義人が登記義務者となる権利に関する登記（担保権（根抵当・根質権以外）の債務者変更更正を除く）を申請する時に必要。自己信託所有権＝印鑑証明必要。嘱託の…","注意点：本国官憲の印鑑添付できない場合も上申書と公証人等の証明で対応可能。外国在住日本人も公証人等の認証で印鑑証明に代えること可能。書記官作成の印鑑証明書＝３ヶ月の期限ない。官庁作成書面の印鑑証明書添付不要。印鑑証明書の住所違っても住所証明情報出せば受理される。"],"不登法::一の申請情報による登記の申請":["注意点：単有と共有の各不動産一申請で名称変更・更正可能＝「変更後の事項 所有者及び共有者Aの住所」 抵当権移転の債務者は当事者にならないから譲渡人と譲受人同じなら複数債権の譲渡一申請で可能。 共同担保で抵当権の順位番号と変更後の順位全く同一なら順位変更の登記は一申請可能。 仮登記に基づく共同根抵当権設定の本登記なら一申請可能 仮登記担保の一申請は不可＝A甲土地B乙土地に金銭債権担保のための代物弁済予約が同日Cのためでも所有権移転請求権仮登記の一申請は不可。…"],"一の申請情報による登記の申請":["注意点：単有と共有の各不動産一申請で名称変更・更正可能＝「変更後の事項 所有者及び共有者Aの住所」 抵当権移転の債務者は当事者にならないから譲渡人と譲受人同じなら複数債権の譲渡一申請で可能。 共同担保で抵当権の順位番号と変更後の順位全く同一なら順位変更の登記は一申請可能。 仮登記に基づく共同根抵当権設定の本登記なら一申請可能 仮登記担保の一申請は不可＝A甲土地B乙土地に金銭債権担保のための代物弁済予約が同日Cのためでも所有権移転請求権仮登記の一申請は不可。…"],"遺言がある場合の登記":["注意点（伊藤塾2019公開模試）：包括受遺者＝登記義務も承継→生前売買の登記可能。"],"不登法::遺言がある場合の登記":["注意点（伊藤塾2019公開模試）：包括受遺者＝登記義務も承継→生前売買の登記可能。"],"要役権の登記全般":["注意点：共有者の一人の持分のみに地上権設定不可。賃料異なっても賃借権一申請可能。１年未満の建物賃貸＝期間の定めのない賃貸借とみなされる。定期建物賃貸借なら１年未満可能。日照確保地役権可能。 地役権移転しない特約で抹消＝設定当時の所有権者の識別必要。保証金や権利金も敷金として登記可能。 永小作権者複数の共有でも設定登記可能。"],"不登法::要役権の登記全般":["注意点：共有者の一人の持分のみに地上権設定不可。賃料異なっても賃借権一申請可能。１年未満の建物賃貸＝期間の定めのない賃貸借とみなされる。定期建物賃貸借なら１年未満可能。日照確保地役権可能。 地役権移転しない特約で抹消＝設定当時の所有権者の識別必要。保証金や権利金も敷金として登記可能。 永小作権者複数の共有でも設定登記可能。"],"未成年者の申請":["注意点：未成年者名義の不動産＝真正な登記名義の回復で親権者＝利益相反に該当しない。相続分のない旨の証明作成して登記申請＝特別代理人の選任不要。親の不動産・債務者親→不動産子に贈与しても利益相反にあたらない。"],"不登法::未成年者の申請":["注意点：未成年者名義の不動産＝真正な登記名義の回復で親権者＝利益相反に該当しない。相続分のない旨の証明作成して登記申請＝特別代理人の選任不要。親の不動産・債務者親→不動産子に贈与しても利益相反にあたらない。"],"商登法::資本金の額の変更":["注意点：剰余金の資本組入れ変更登記後、剰余金存在しなかったことを理由としての更正登記不可=裁判所からの嘱託により抹消すべき。資本金少なく登記された場合、謝った登記抹消した上で変更登記。抹消前の資本金の額控除して登録免許税計算可能。清算株式会社に準備金資本金の規定は適用されない。"],"資本金の額の変更":["注意点：剰余金の資本組入れ変更登記後、剰余金存在しなかったことを理由としての更正登記不可=裁判所からの嘱託により抹消すべき。資本金少なく登記された場合、謝った登記抹消した上で変更登記。抹消前の資本金の額控除して登録免許税計算可能。清算株式会社に準備金資本金の規定は適用されない。"],"民訴法::管轄全般":["注意点：管轄区域の不明確＝直近上級裁判所に申立して決定で管轄裁判所を定める。特許権＝併合請求・合意管轄・応訴管轄認められている"],"管轄全般":["注意点：管轄区域の不明確＝直近上級裁判所に申立して決定で管轄裁判所を定める。特許権＝併合請求・合意管轄・応訴管轄認められている"],"憲法::政教分離":["注意点：起工式＝宗教的活動にあたらない。地蔵の無償使用もセーフ。市が連合町内会に対し市有地を無償で神社施設の敷地としての利用に供している行為が憲法８９条，２０条１項後段に違反する。氏子集団＝宗教上の組織"],"政教分離":["注意点：起工式＝宗教的活動にあたらない。地蔵の無償使用もセーフ。市が連合町内会に対し市有地を無償で神社施設の敷地としての利用に供している行為が憲法８９条，２０条１項後段に違反する。氏子集団＝宗教上の組織"],"憲法::勤労と労働":["注意点：公務員の争議行為に違法・適法の区別認めること禁止。生産管理の違法性阻却されない。"],"勤労と労働":["注意点：公務員の争議行為に違法・適法の区別認めること禁止。生産管理の違法性阻却されない。"],"盗品または遺失物の回復":["注意点：民法193条＝即時取得された目的物が盗品・遺失物の場合、被害者又は遺失者（賃借人含む）は、盗難又は遺失のときから2年間無償で、その物の占有者（その包括・特定承継人含む）に、物の返還を請求できる。占有者には代価の弁償があるまで占有物使用収益権限あるので使用利益の返還義務なし。"],"民法::盗品または遺失物の回復":["注意点：民法193条＝即時取得された目的物が盗品・遺失物の場合、被害者又は遺失者（賃借人含む）は、盗難又は遺失のときから2年間無償で、その物の占有者（その包括・特定承継人含む）に、物の返還を請求できる。占有者には代価の弁償があるまで占有物使用収益権限あるので使用利益の返還義務なし。"],"動産留置権と動産質権":["注意点：占有失っても質権は消滅しない＝対抗力失うだけ。回復請求可能。質権の被担保債権は弁済期になくてもいいし将来再建・条件付きでもいい。"],"民法::動産留置権と動産質権":["注意点：占有失っても質権は消滅しない＝対抗力失うだけ。回復請求可能。質権の被担保債権は弁済期になくてもいいし将来再建・条件付きでもいい。"],"抵当権の実行":["注意点（2018年TAC予想問題集）：被担保債権の債務名義あれば、抵当権実行せずに一般財産に強制執行できるが、一般債権者は異議可能"],"民法::抵当権の実行":["注意点（2018年TAC予想問題集）：被担保債権の債務名義あれば、抵当権実行せずに一般財産に強制執行できるが、一般債権者は異議可能"],"抵当権の効力の及ぶ範囲":["注意点：抵当権者は目的債権の譲渡されても差し押さえて物上代位権の行使可能＝債権譲渡は払渡・引渡に該当しないから。 債務不履行後の果実に対する優先弁済＝担保不動産収益執行か物上代位権の行使必要→してなかったら設定者が果実取得しても不当利得にならない。無権限者が他人の土地に植栽した樹木＝土地の付合物→効力及ぶ。 不動産の上に分離されても第三者が即時取得しない限り抵当権及ぶ＝追求力。ただし引渡し請求は不可。"],"民法::抵当権の効力の及ぶ範囲":["注意点：抵当権者は目的債権の譲渡されても差し押さえて物上代位権の行使可能＝債権譲渡は払渡・引渡に該当しないから。 債務不履行後の果実に対する優先弁済＝担保不動産収益執行か物上代位権の行使必要→してなかったら設定者が果実取得しても不当利得にならない。無権限者が他人の土地に植栽した樹木＝土地の付合物→効力及ぶ。 不動産の上に分離されても第三者が即時取得しない限り抵当権及ぶ＝追求力。ただし引渡し請求は不可。"],"民法::通謀虚偽表示":["注意点（LEC直前予想模試2022）：制限行為能力者が他の制限行為能力者の代理人としてした行為は取り消すことができる。死亡で代理権消滅しない合意可能。借地上の建物の売買契約＝敷地権も譲り渡したと認められる。土地賃貸人は、第三者にあたらない。 善意の判断は予約完結権の行使時"],"通謀虚偽表示":["注意点（LEC直前予想模試2022）：制限行為能力者が他の制限行為能力者の代理人としてした行為は取り消すことができる。死亡で代理権消滅しない合意可能。借地上の建物の売買契約＝敷地権も譲り渡したと認められる。土地賃貸人は、第三者にあたらない。 善意の判断は予約完結権の行使時"],"汚職の罪":["注意点：父兄から担任に贈答用小切手渡されても慣習的社交儀礼で賄賂にあたらないことがある。 警視庁Ａ警察署地域課に勤務する警察官が同庁Ｂ警察署刑事課で捜査中の事件に関して告発状を提出していた者から現金の供与を受けた行為につき収賄罪が成立する"],"刑法::汚職の罪":["注意点：父兄から担任に贈答用小切手渡されても慣習的社交儀礼で賄賂にあたらないことがある。 警視庁Ａ警察署地域課に勤務する警察官が同庁Ｂ警察署刑事課で捜査中の事件に関して告発状を提出していた者から現金の供与を受けた行為につき収賄罪が成立する"],"会社法::譲渡制限株式":["注意点：相続人への売渡請求＝公開会社でも可能。公開会社＝特定株主の株式有償取得＝自己も加えるよう請求可能（非公開は不可）。譲渡拒否なら買取必要→承認請求者議決権行使不可。"],"譲渡制限株式":["注意点：相続人への売渡請求＝公開会社でも可能。公開会社＝特定株主の株式有償取得＝自己も加えるよう請求可能（非公開は不可）。譲渡拒否なら買取必要→承認請求者議決権行使不可。"],"会社法::新株予約権買取請求":["注意点：譲渡制限・全部取得条項付種類設ける場合＝目的とする新株予約権者は買取請求可能。議決権制限の場合はなし。 組織再編で消滅する新株予約権の対価額に不満あれば、買取請求もOK。吸収合併に際し金銭交付の場合、条件に合致しない＝「吸収合併に際し新株予約権１個あたり金○円交付するじゃないから。 分割・交換・移転で持分会社存続なら新株予約権消滅できないから買取請求もなし。"],"新株予約権買取請求":["注意点：譲渡制限・全部取得条項付種類設ける場合＝目的とする新株予約権者は買取請求可能。議決権制限の場合はなし。 組織再編で消滅する新株予約権の対価額に不満あれば、買取請求もOK。吸収合併に際し金銭交付の場合、条件に合致しない＝「吸収合併に際し新株予約権１個あたり金○円交付するじゃないから。 分割・交換・移転で持分会社存続なら新株予約権消滅できないから買取請求もなし。"],"会社法::株主総会決議の取消の可否":["注意点：ある議案を否決する決議の取消＝訴えの利益なし。"],"株主総会決議の取消の可否":["注意点：ある議案を否決する決議の取消＝訴えの利益なし。"],"会社法::清算":["注意点：合同会社のみ債権者保護公告必要な持分会社＝各別催告省略規定なし。任意清算には１ヶ月の公告と省略規定あり。 人的分割はできない。"],"清算":["注意点：合同会社のみ債権者保護公告必要な持分会社＝各別催告省略規定なし。任意清算には１ヶ月の公告と省略規定あり。 人的分割はできない。"],"会社法::株式交換・株式移転":["注意点：新設型組織再編＝複数対１がOK。条件合致する新株予約権者にも株式移転完全子会社は移転することの通知または公告が必要"],"株式交換・株式移転":["注意点：新設型組織再編＝複数対１がOK。条件合致する新株予約権者にも株式移転完全子会社は移転することの通知または公告が必要"],"会社法::場屋営業者等の責任":["注意点：預かった物品の責任＝無過失かつ不可抗力の証明必要。悪意ない限り損害賠償責任は返還・持ち去った時から１年で時効。直ちに発見できない損傷・滅失で引渡しの日から２週間以内に荷受人が運送人に通知した時・運送人が知っていた時は責任消滅しない＝引渡後１年以内に裁判上の請求必要。"],"場屋営業者等の責任":["注意点：預かった物品の責任＝無過失かつ不可抗力の証明必要。悪意ない限り損害賠償責任は返還・持ち去った時から１年で時効。直ちに発見できない損傷・滅失で引渡しの日から２週間以内に荷受人が運送人に通知した時・運送人が知っていた時は責任消滅しない＝引渡後１年以内に裁判上の請求必要。"],"複数訴訟形態":["注意点：同時審判申出共同訴訟になっていたら控訴審格別に係属しても弁論と裁判の併合義務付けられる。選択的併合なら１つの請求認容で他の請求判断不要。"],"民訴法::複数訴訟形態":["注意点：同時審判申出共同訴訟になっていたら控訴審格別に係属しても弁論と裁判の併合義務付けられる。選択的併合なら１つの請求認容で他の請求判断不要。"],"独立当事者参加・参加承継":["注意点：独立当事者参加＝中断・中止全員に効果発生。当事者の一方のみを相手にできる。権利の目的譲り受けた承継人＝参加承継の申し出て当事者になれる。裁判を受けるべき請求の提出が必要。"],"民訴法::独立当事者参加・参加承継":["注意点：独立当事者参加＝中断・中止全員に効果発生。当事者の一方のみを相手にできる。権利の目的譲り受けた承継人＝参加承継の申し出て当事者になれる。裁判を受けるべき請求の提出が必要。"],"民訴法::再審":["注意点：新株発行の無効の訴えにかかる請求認容する確定判決の効力を受ける第三者＝独立当事者参加によって再審の訴えの当事者適格有する。代表取締役が自己または第三者の利益のために裁判＝再審事由にあたらない。再審の決定に対して即時抗告可能。"],"再審":["注意点：新株発行の無効の訴えにかかる請求認容する確定判決の効力を受ける第三者＝独立当事者参加によって再審の訴えの当事者適格有する。代表取締役が自己または第三者の利益のために裁判＝再審事由にあたらない。再審の決定に対して即時抗告可能。"],"民保法::保全手続全般":["注意点：保全取消の決定＝理由つけて当事者に送達。保全命令却下＝即時抗告可能、抗告却下に即時抗告不可。保全命令担保なくても可能。保全異議＝当事者双方での口頭弁論・審尋期日得なきゃ決定不可。保全執行は債権者に対して保全命令送達された日から２週間経過したら不可。","注意点：動産の仮差押命令＝目的物特定しないで発すること可能。申立てについての決定＝理由がいる。"],"保全手続全般":["注意点：保全取消の決定＝理由つけて当事者に送達。保全命令却下＝即時抗告可能、抗告却下に即時抗告不可。保全命令担保なくても可能。保全異議＝当事者双方での口頭弁論・審尋期日得なきゃ決定不可。保全執行は債権者に対して保全命令送達された日から２週間経過したら不可。","注意点：動産の仮差押命令＝目的物特定しないで発すること可能。申立てについての決定＝理由がいる。"],"民執法::民事執行全般":["注意点：財産開示の請求権者＝仮執行宣言付判決有する金銭債権の債権者も含む。差押命令は債務者・第三債務者を審尋しないで発する。間接強制の申立ての裁判＝執行抗告可能。"],"民事執行全般":["注意点：財産開示の請求権者＝仮執行宣言付判決有する金銭債権の債権者も含む。差押命令は債務者・第三債務者を審尋しないで発する。間接強制の申立ての裁判＝執行抗告可能。"],"書士法::司法書士法全般":["注意点：法人に対する懲戒＝戒告・２年以内の業務の全部、一部の停止及び解散＝禁止は規定されていない。","注意点：精神機能の障害で業務困難OR2年以上の休養要する場合＝本人・法定代理人・同居親族は書士会経由して連合会に医師の診断書添付して届出必要。社員の欠乏により解散に至った場合に限り相続人の同意を得て新たに社員加入させて法人継続可能。会費に関する会則の変更＝法務大臣の認可不要。公共嘱託登記司法書士協会＝仮差押の申請書の作成は不可。他の教会の司法書士に取り扱わせることも可能。"],"司法書士法全般":["注意点：法人に対する懲戒＝戒告・２年以内の業務の全部、一部の停止及び解散＝禁止は規定されていない。","注意点：精神機能の障害で業務困難OR2年以上の休養要する場合＝本人・法定代理人・同居親族は書士会経由して連合会に医師の診断書添付して届出必要。社員の欠乏により解散に至った場合に限り相続人の同意を得て新たに社員加入させて法人継続可能。会費に関する会則の変更＝法務大臣の認可不要。公共嘱託登記司法書士協会＝仮差押の申請書の作成は不可。他の教会の司法書士に取り扱わせることも可能。"],"不登法::保全仮登記":["注意点：仮処分の登記義務者がB相続人C、登記上B＝仮処分登記前提として相続登記不要。保全仮登記の更正＝利害関係人の承諾有無で主付決定。"],"保全仮登記":["注意点：仮処分の登記義務者がB相続人C、登記上B＝仮処分登記前提として相続登記不要。保全仮登記の更正＝利害関係人の承諾有無で主付決定。"],"不登法::法定相続登記後の登記手続の簡略化":["注意点：法定相続登記後に協議調停で更正＝「○年遺産分割」。特定財産承継遺言と相続人が受遺者である遺贈の更正＝義務者に通知必要。"],"法定相続登記後の登記手続の簡略化":["注意点：法定相続登記後に協議調停で更正＝「○年遺産分割」。特定財産承継遺言と相続人が受遺者である遺贈の更正＝義務者に通知必要。"],"不正登記防止申出":["注意点（2019年TAC予想問題集）：出頭必要。遠隔なら代理人選任。"],"不登法::不正登記防止申出":["注意点（2019年TAC予想問題集）：出頭必要。遠隔なら代理人選任。"],"不登法::農地法の許可":["注意点：会社分割は不要。共有者の持分放棄の時も不要。死因贈与なら必要。"],"農地法の許可":["注意点：会社分割は不要。共有者の持分放棄の時も不要。死因贈与なら必要。"],"不登法::根抵当権の相続に関する登記":["注意点（2019年TAC予想問題集）：債務者の変更・指定債務者の合意の登記＝根抵当権の設定登記に付記。 債務者と設定者が同一で共同相続人行方不明＝指定債務者の合意に不在者の財産管理人選任提供必要。"],"根抵当権の相続に関する登記":["注意点（2019年TAC予想問題集）：債務者の変更・指定債務者の合意の登記＝根抵当権の設定登記に付記。 債務者と設定者が同一で共同相続人行方不明＝指定債務者の合意に不在者の財産管理人選任提供必要。"],"根抵当権の元本確定の登記":["注意点：根抵当権者による元本確定請求＝単独申請時に識別提供不要。仮登記根抵当権の元本確定＝付記の本登記。６ヶ月経過後の債務者の相続による変更＝前提として元本確定不要。"],"不登法::根抵当権の元本確定の登記":["注意点：根抵当権者による元本確定請求＝単独申請時に識別提供不要。仮登記根抵当権の元本確定＝付記の本登記。６ヶ月経過後の債務者の相続による変更＝前提として元本確定不要。"],"根抵当権変更の登記":["注意点：AB準共有の一方の債権範囲変更でもAB両名が申請人になる必要ある。根抵当なら債務者の指名変更時に住所も申請内容として必要＝抵当なら氏名のみ。"],"不登法::根抵当権変更の登記":["注意点：AB準共有の一方の債権範囲変更でもAB両名が申請人になる必要ある。根抵当なら債務者の指名変更時に住所も申請内容として必要＝抵当なら氏名のみ。"],"登録免許税（不登法）":["注意点（2019年TAC予想問題集）：処分禁止嘱託＝抵当権債権額に1000分の4。保全仮登記分取られない。追加設定も13条2項適用で1500円。 同時に複数の信託＝１つの抵当権移転とみなし、信託分は債権額に1000分の2で足りる。 国が代位して登記するもの＝登録免許税がかからない。住居表示に誤り＝住所更正→登録免許税法５条４号で非課税 推定相続人に対する死因贈与＝20/1000。○年債権譲渡（連帯債務者Aに係る債権）＝原抵当権の債権額＊2/1000 売買で…"],"不登法::登録免許税（不登法）":["注意点（2019年TAC予想問題集）：処分禁止嘱託＝抵当権債権額に1000分の4。保全仮登記分取られない。追加設定も13条2項適用で1500円。 同時に複数の信託＝１つの抵当権移転とみなし、信託分は債権額に1000分の2で足りる。 国が代位して登記するもの＝登録免許税がかからない。住居表示に誤り＝住所更正→登録免許税法５条４号で非課税 推定相続人に対する死因贈与＝20/1000。○年債権譲渡（連帯債務者Aに係る債権）＝原抵当権の債権額＊2/1000 売買で…"],"不登法::登記名義人の氏名等の変更の登記":["注意点：債権者＝競売申立受理証明を代位原因として相続財産法人名義への変更登記可能＝管理人が実際いることまでは不要。 本登記の前提として、住所変更の登記申請は必要。前登記名義人からの名変登記は受理されない＝変更を証する情報で対応。"],"登記名義人の氏名等の変更の登記":["注意点：債権者＝競売申立受理証明を代位原因として相続財産法人名義への変更登記可能＝管理人が実際いることまでは不要。 本登記の前提として、住所変更の登記申請は必要。前登記名義人からの名変登記は受理されない＝変更を証する情報で対応。"],"却下事由":["注意点：役会設置会社の本店移転＝役会の決定。支部という文字商号に入れても問題ない。上場会社の取締役の報酬としての株式発行＝公開会社であることを確認すれば足りる。判決による登記でも、取締役の法定人数または定款所定の人数欠く場合辞任による変更登記不可。","ポイント：立木を除く特約の所有権移転＝NG / 財産分割＝NG"],"商登法::却下事由":["注意点：役会設置会社の本店移転＝役会の決定。支部という文字商号に入れても問題ない。上場会社の取締役の報酬としての株式発行＝公開会社であることを確認すれば足りる。判決による登記でも、取締役の法定人数または定款所定の人数欠く場合辞任による変更登記不可。"],"商登法::株式等に関する登記":["注意点：取得条項付株式の取得と引換えにする新株予約権発行する場合、一定の分配額存在称する書面の添付必要＝取得条項付新株予約権なら不要。取得条項付新株予約権の取得と引換えに株式発行＝資本金増加するので資本金の額の計上証する書面添付必要。取得条項付株式の取得と引換えに株式発行しても資本金は増加しない。"],"株式等に関する登記":["注意点：取得条項付株式の取得と引換えにする新株予約権発行する場合、一定の分配額存在称する書面の添付必要＝取得条項付新株予約権なら不要。取得条項付新株予約権の取得と引換えに株式発行＝資本金増加するので資本金の額の計上証する書面添付必要。取得条項付株式の取得と引換えに株式発行しても資本金は増加しない。"],"清算人の登記等":["注意点：登記に記載する旧氏は婚姻前に限られずタイミングも自由になった。監査役会を置く定めのある清算株式会社は清算人会を置く必要あり。監査役変更の登録免許税は通常と同一。"],"商登法::清算人の登記等":["注意点：登記に記載する旧氏は婚姻前に限られずタイミングも自由になった。監査役会を置く定めのある清算株式会社は清算人会を置く必要あり。監査役変更の登録免許税は通常と同一。"],"一般社団法人等の登記":["注意点：設立時理事・設立時監事＝財産の拠出完了してるか調査＝調査終了か設立者定めた日のいずれか遅い日から2週間以内に設立登記必要。一般財団法人＝評議員・評議員会・理事・理事会・監事必要。管轄区域外への移転＝旧所在地の経由申請、新所在地では成立の年月日と主たる事務所移転とその年月日は登記事項だが、申請書には書かなくていい。"],"商登法::一般社団法人等の登記":["注意点：設立時理事・設立時監事＝財産の拠出完了してるか調査＝調査終了か設立者定めた日のいずれか遅い日から2週間以内に設立登記必要。一般財団法人＝評議員・評議員会・理事・理事会・監事必要。管轄区域外への移転＝旧所在地の経由申請、新所在地では成立の年月日と主たる事務所移転とその年月日は登記事項だが、申請書には書かなくていい。"],"裁判官の身分保証":["注意点：最高裁の裁判官任期なしだが70歳まで。簡裁も70。高等・地裁・家裁は65。分限事件について裁判の公開はない。一時的な故障は心身故障で職務執れないにあたらない。裁判官の職務停止はない＝懲戒は戒告または1万以下の科料のみ"],"憲法::裁判官の身分保証":["注意点：最高裁の裁判官任期なしだが70歳まで。簡裁も70。高等・地裁・家裁は65。分限事件について裁判の公開はない。一時的な故障は心身故障で職務執れないにあたらない。裁判官の職務停止はない＝懲戒は戒告または1万以下の科料のみ"],"民法::賃貸借契約":["注意点（2020年TAC予想問題集）：賃貸借の存続期間は最長50年。賃貸人の地位＝譲受人に費用償還や敷金返還承継される。修繕通知してもしてくれない時or急迫の事情ある時賃借人自ら修繕可能。耕作又は牧畜目的で不可抗力で賃料より減収＝賃料減額請求可能。２年以上なら解除可能。","条文目安：民法601条周辺。条文番号と要件・効果をセットで確認。","ポイント：必要費は即償還請求可能 / 礼金＝敷金にあたる","ポイント：賃貸人の地位が移転＝費用償還債務は譲受人が承継する。すでに発生した賃料債権は債権譲渡ないと移転しない / 敷金は特約ない限り新賃借人には引き継がれない。賃貸人は敷金を旧賃借人の債務に充当し、残額あれば旧賃借人に返還必要"],"賃貸借契約":["注意点（2020年TAC予想問題集）：賃貸借の存続期間は最長50年。賃貸人の地位＝譲受人に費用償還や敷金返還承継される。修繕通知してもしてくれない時or急迫の事情ある時賃借人自ら修繕可能。耕作又は牧畜目的で不可抗力で賃料より減収＝賃料減額請求可能。２年以上なら解除可能。","条文目安：民法601条周辺。条文番号と要件・効果をセットで確認。","ポイント：必要費は即償還請求可能 / 礼金＝敷金にあたる","ポイント：賃貸人の地位が移転＝費用償還債務は譲受人が承継する。すでに発生した賃料債権は債権譲渡ないと移転しない / 敷金は特約ない限り新賃借人には引き継がれない。賃貸人は敷金を旧賃借人の債務に充当し、残額あれば旧賃借人に返還必要"],"賃借権":["注意点：賃借権の先順位抵当権者に優先する同意＝更新あり"],"民法::賃借権":["注意点：賃借権の先順位抵当権者に優先する同意＝更新あり"],"中間省略登記":["注意点：すでになされた中間省略登記は有効であり、中間者も正当な利益ある場合のみ無効主張可能＝代金不払いなど"],"民法::中間省略登記":["注意点：すでになされた中間省略登記は有効であり、中間者も正当な利益ある場合のみ無効主張可能＝代金不払いなど"],"民法::嫡出否認の訴え":["注意点：夫が子の出生を知った時から３年以内に提起必要。子の相続権を害される者その他夫の三親等の血族も訴え可能＝夫の死から１年以内に提起必要。離婚成立日から200日経過後または離婚・取消から300日以内に生まれた子＝婚姻中に懐胎したものと推定。"],"嫡出否認の訴え":["注意点：夫が子の出生を知った時から３年以内に提起必要。子の相続権を害される者その他夫の三親等の血族も訴え可能＝夫の死から１年以内に提起必要。離婚成立日から200日経過後または離婚・取消から300日以内に生まれた子＝婚姻中に懐胎したものと推定。"],"地上権・永小作権・土地賃借権":["注意点（2019年TAC予想問題集）：賃借人は２年以上不可抗力で賃料より少ない収入＝契約解除可能。 永小作・地上権＝不可抗力で３年以上収益なしor５年以上小作料より少ない収入で権利放棄可能"],"民法::地上権・永小作権・土地賃借権":["注意点（2019年TAC予想問題集）：賃借人は２年以上不可抗力で賃料より少ない収入＝契約解除可能。 永小作・地上権＝不可抗力で３年以上収益なしor５年以上小作料より少ない収入で権利放棄可能"],"多数当事者の債権債務":["注意点（令和４年予備短答模試）：可分債権を当事者の意思で不可分にはできない。不可分債務＝混同生じても相対的。"],"民法::多数当事者の債権債務":["注意点（令和４年予備短答模試）：可分債権を当事者の意思で不可分にはできない。不可分債務＝混同生じても相対的。"],"民法::代理一般":["注意点（LEC直前予想模試2022）：建物の所有権有しないなら、所有権保存登記していても収去義務負わない"],"代理一般":["注意点（LEC直前予想模試2022）：建物の所有権有しないなら、所有権保存登記していても収去義務負わない"],"民法::第三取得者と物上保証人":["注意点：物上保証人が複数いる場合、保証人負担部分除いた残額について各財産の価格に応じて債権者に代位する。 一部弁済なら債権者の同意ないと抵当権実行できない。抵当不動産の代価弁済＝①所有権・地上権の取得②抵当権者からの請求③代価の弁済必要＝自発的弁済不可。"],"第三取得者と物上保証人":["注意点：物上保証人が複数いる場合、保証人負担部分除いた残額について各財産の価格に応じて債権者に代位する。 一部弁済なら債権者の同意ないと抵当権実行できない。抵当不動産の代価弁済＝①所有権・地上権の取得②抵当権者からの請求③代価の弁済必要＝自発的弁済不可。"],"民法::贈与":["注意点（2019年TAC予想問題集）：売買契約書の記載あっても無償譲渡明白の場合撤回できない。書面によらない贈与の撤回件のみの時効消滅なし。"],"贈与":["注意点（2019年TAC予想問題集）：売買契約書の記載あっても無償譲渡明白の場合撤回できない。書面によらない贈与の撤回件のみの時効消滅なし。"],"相続分の計算":["注意点：婚姻期間20年以上で建物敷地贈与＝持戻し免除と推定。"],"民法::相続分の計算":["注意点：婚姻期間20年以上で建物敷地贈与＝持戻し免除と推定。"],"相続の承認・放棄":["注意点（令和５年予備試験）：承認・放棄までは固有の財産と同一の注意。相続債権者への弁済＝受遺者に弁済前も可能。相続債権者は、被相続人から抵当権の設定を受けていても、被相続人の死亡前に仮登記がされていた場合を除き、相続財産法人に対して抵当権設定登記手続を請求することができない。３年を超える賃貸借（短期賃貸借）＝単純承認。限定承認＝固有の財産と同一の注意。限定承認者は各相続債権者に弁済後でなければ受遺者に弁済できない。 限定承認者は相続債権者の差押に対抗できな…"],"民法::相続の承認・放棄":["注意点（令和５年予備試験）：承認・放棄までは固有の財産と同一の注意。相続債権者への弁済＝受遺者に弁済前も可能。相続債権者は、被相続人から抵当権の設定を受けていても、被相続人の死亡前に仮登記がされていた場合を除き、相続財産法人に対して抵当権設定登記手続を請求することができない。３年を超える賃貸借（短期賃貸借）＝単純承認。限定承認＝固有の財産と同一の注意。限定承認者は各相続債権者に弁済後でなければ受遺者に弁済できない。 限定承認者は相続債権者の差押に対抗できな…"],"偽造罪全般":["注意点：勝馬投票券の磁気ストラップ部分のデータ改竄＝私電磁的記録不正作出罪・同供用罪。仮想払込による増資の登記＝電磁的公正証書原本不実記録罪。偽造通貨交付罪＝偽貨であることを告げてまたは知っている相手に渡すこと。 公務所において現に使用され使用の目的で保管する文書＝公用文書＝公用文書毀棄罪の対象"],"刑法::偽造罪全般":["注意点：勝馬投票券の磁気ストラップ部分のデータ改竄＝私電磁的記録不正作出罪・同供用罪。仮想払込による増資の登記＝電磁的公正証書原本不実記録罪。偽造通貨交付罪＝偽貨であることを告げてまたは知っている相手に渡すこと。 公務所において現に使用され使用の目的で保管する文書＝公用文書＝公用文書毀棄罪の対象"],"恐喝罪":["注意点：脅迫により金銭支払いの約束＝恐喝利得罪。免責的債務引受は債権者の同意が必要なので、同意が無かったなら未遂にとどまる。警察官になりすまして畏怖で金銭交付＝詐欺じゃなく恐喝。"],"刑法::恐喝罪":["注意点：脅迫により金銭支払いの約束＝恐喝利得罪。免責的債務引受は債権者の同意が必要なので、同意が無かったなら未遂にとどまる。警察官になりすまして畏怖で金銭交付＝詐欺じゃなく恐喝。"],"会社法::自己株式と親会社株式":["注意点：事業の一部譲受けで親会社株式取得不可（全部ならOK）。株式交換の効力発生まで親会社株式の保有可能。"],"自己株式と親会社株式":["注意点：事業の一部譲受けで親会社株式取得不可（全部ならOK）。株式交換の効力発生まで親会社株式の保有可能。"],"単元未満株式":["注意点：制限できない権利＝全部取得条項付種類株式、取得条項付株式の取得対価の交付受ける権利、株式無償割当を受ける権利、単元未満株式の買取請求権、残余財産分配請求権、剰余金の配当で金銭の交付受ける権利、定款・株主名簿の閲覧請求権。"],"会社法::単元未満株式":["注意点：制限できない権利＝全部取得条項付種類株式、取得条項付株式の取得対価の交付受ける権利、株式無償割当を受ける権利、単元未満株式の買取請求権、残余財産分配請求権、剰余金の配当で金銭の交付受ける権利、定款・株主名簿の閲覧請求権。"],"会社法::決議要件":["注意点：自己株式の有償取得＝普通。譲り渡しを特定株主のみに通知する旨定める場合、定款ないなら309②。 取締役の会社に対する損賠一部免除＝309②。準備金の額の減少＝普通。欠損超えないなら債権者保護も不要。 資本金減少は309②、欠損超えないなら普通。募集の割当・決定＝譲渡制限なら309②か役会。支配株主の異動＝承認は普通。買取請求とともに譲渡承認拒否の買取決定＝309②。役会ない指定買取人指定も309②。譲渡承認のみなら普通"],"決議要件":["注意点：自己株式の有償取得＝普通。譲り渡しを特定株主のみに通知する旨定める場合、定款ないなら309②。 取締役の会社に対する損賠一部免除＝309②。準備金の額の減少＝普通。欠損超えないなら債権者保護も不要。 資本金減少は309②、欠損超えないなら普通。募集の割当・決定＝譲渡制限なら309②か役会。支配株主の異動＝承認は普通。買取請求とともに譲渡承認拒否の買取決定＝309②。役会ない指定買取人指定も309②。譲渡承認のみなら普通"],"利益相反取引":["注意点：自己のための利益相反取引＝承認の有無に関わらず任務懈怠推定＝監査等委員会の承認受けた時は推定なし。委員自身は懈怠逃れられない。取締役個人へ貸付金の返還請求し、承認ないこと理由に取締役が貸付無効主張すること許されない。競業取引に任務懈怠損害推定あるが、利益相反にはない。"],"会社法::利益相反取引":["注意点：自己のための利益相反取引＝承認の有無に関わらず任務懈怠推定＝監査等委員会の承認受けた時は推定なし。委員自身は懈怠逃れられない。取締役個人へ貸付金の返還請求し、承認ないこと理由に取締役が貸付無効主張すること許されない。競業取引に任務懈怠損害推定あるが、利益相反にはない。"],"資本金の額等":["注意点：準備金の額の減少による資本金増加＝減少は資本準備金でも利益準備金どちらでもOK。資本金減少の効力発生日は総会当日でもいいから、債権者保護を総会1ヶ月前に行う方法OK。新株発行無効認容＝発行済株式数減少するが資本金は減少しない。"],"会社法::資本金の額等":["注意点：準備金の額の減少による資本金増加＝減少は資本準備金でも利益準備金どちらでもOK。資本金減少の効力発生日は総会当日でもいいから、債権者保護を総会1ヶ月前に行う方法OK。新株発行無効認容＝発行済株式数減少するが資本金は減少しない。"],"持分会社の社員":["注意点：業務処理費用＝前払い。退社予告＝当該社員の弁済または相当の担保でその効力を失う。業務執行社員の競業取引の承認ない取引の任務懈怠推定あり。"],"会社法::持分会社の社員":["注意点：業務処理費用＝前払い。退社予告＝当該社員の弁済または相当の担保でその効力を失う。業務執行社員の競業取引の承認ない取引の任務懈怠推定あり。"],"訴えの却下":["注意点：反訴が併合要件を欠く＝終局判決で却下。特別受益財産の確認の訴え＝確認利益欠く。債務不存在確認訴訟に対して給付訴訟の反訴＝不存在は確認の利益欠く。"],"民訴法::訴えの却下":["注意点：反訴が併合要件を欠く＝終局判決で却下。特別受益財産の確認の訴え＝確認利益欠く。債務不存在確認訴訟に対して給付訴訟の反訴＝不存在は確認の利益欠く。"],"民訴法::訴訟手続の中断":["注意点：当事者の信託任務終了＝承継人訴訟可能になるまで中断。破産開始決定で破産財団に属する訴訟＝代理人いても常に中断。","注意点：判決の言渡し＝訴訟手続中断中でも可能。独立当事者参加した第三者死亡しても訴訟中断する。債権者代位訴訟で被担当者の債務者死んでも訴訟中断しない。","注意点：建物収去土地明渡訴訟＝固有必要的共同訴訟ではない。法人合併＝訴訟中断。法人唯一の代表者死亡も中断事由。係争物の譲渡＝参加承継・引受承継の問題。"],"訴訟手続の中断":["注意点：当事者の信託任務終了＝承継人訴訟可能になるまで中断。破産開始決定で破産財団に属する訴訟＝代理人いても常に中断。","注意点：判決の言渡し＝訴訟手続中断中でも可能。独立当事者参加した第三者死亡しても訴訟中断する。債権者代位訴訟で被担当者の債務者死んでも訴訟中断しない。","注意点：建物収去土地明渡訴訟＝固有必要的共同訴訟ではない。法人合併＝訴訟中断。法人唯一の代表者死亡も中断事由。係争物の譲渡＝参加承継・引受承継の問題。"],"民訴法::責問権":["注意点：専属管轄違背・公開主義違反＝責問権放棄・喪失不可。訴状の送達不適法＝責問権放棄の対象。"],"責問権":["注意点：専属管轄違背・公開主義違反＝責問権放棄・喪失不可。訴状の送達不適法＝責問権放棄の対象。"],"手形訴訟と少額訴訟":["注意点：手形訴訟に異議＝異議後の終局判決には控訴可能。少額訴訟は不可。補助参加どちらも可能。手形訴訟で分割払いできない。手形訴訟は職権での通常訴訟移行不可、少額訴訟は可能。反訴どっちも不可"],"民訴法::手形訴訟と少額訴訟":["注意点：手形訴訟に異議＝異議後の終局判決には控訴可能。少額訴訟は不可。補助参加どちらも可能。手形訴訟で分割払いできない。手形訴訟は職権での通常訴訟移行不可、少額訴訟は可能。反訴どっちも不可"],"供託法::供託の受諾":["注意点：増額請求で留保した一部還付は不可。還付請求権の仮差押債権者は受諾不可。債権者代位権で供託受諾可能。"],"供託の受諾":["注意点：増額請求で留保した一部還付は不可。還付請求権の仮差押債権者は受諾不可。債権者代位権で供託受諾可能。"],"登記原因の日付":["注意点：受託者死亡による任務終了＝新への移転は死亡の日。転貸・譲渡＝契約日。権利能力なき社団の更迭＝新代表者就任日。"],"不登法::登記原因の日付":["注意点：受託者死亡による任務終了＝新への移転は死亡の日。転貸・譲渡＝契約日。権利能力なき社団の更迭＝新代表者就任日。"],"不登法::登記上の利害関係を有する第三者":["注意点（2018年TAC予想問題集）：地上権の地代減額＝後順位抵当権者や所有権移転（請求権）の仮登記名義人＝利害関係有する第三者 根抵当権と租税債権の差押＝設定と納期限の先後。極度額増額する時も利害関係人に該当しない。 買戻額の減額更正＝抵当権者は第三者にあたらない。順位譲渡で１番抹消＝２番第三者該当。 転抵当は金額関係なく債権額減額の利害関係有する第三者。"],"登記上の利害関係を有する第三者":["注意点（2018年TAC予想問題集）：地上権の地代減額＝後順位抵当権者や所有権移転（請求権）の仮登記名義人＝利害関係有する第三者 根抵当権と租税債権の差押＝設定と納期限の先後。極度額増額する時も利害関係人に該当しない。 買戻額の減額更正＝抵当権者は第三者にあたらない。順位譲渡で１番抹消＝２番第三者該当。 転抵当は金額関係なく債権額減額の利害関係有する第三者。"],"不登法::登記識別情報の通知または提供":["注意点：支配人から申請＝代表じゃなく支配人に識別通知。電子申請による委任事項＝登記識別情報の暗号化に関する一切の権限。受領時は登記識別情報の復号に関する一切の権限。 土地の合筆＝所有権以外の権利登記があるとできない。共同抵当とか共同担保権ならできる。合筆後に担保権者が義務者になる登記＝合筆時の識別だけで足りる。（土地全部の付記＝登記官職権） 利害関係人による仮登記の単独抹消＝識別不要 有効証明請求は一の情報で複数可能。有効証明で司法書士なら相続書面不要＝失…"],"登記識別情報の通知または提供":["注意点：支配人から申請＝代表じゃなく支配人に識別通知。電子申請による委任事項＝登記識別情報の暗号化に関する一切の権限。受領時は登記識別情報の復号に関する一切の権限。 土地の合筆＝所有権以外の権利登記があるとできない。共同抵当とか共同担保権ならできる。合筆後に担保権者が義務者になる登記＝合筆時の識別だけで足りる。（土地全部の付記＝登記官職権） 利害関係人による仮登記の単独抹消＝識別不要 有効証明請求は一の情報で複数可能。有効証明で司法書士なら相続書面不要＝失…"],"不登法::登記官からする通知等":["注意点（2018年TAC予想問題集）：識別を郵送希望なら、本人限定受取郵便。極度額の変更＝識別通知なし。一方を書面で、一方をオンラインで完了証交付することはできない。 新たに共同担保目録＝共同担保目録の記号および目録番号が記録された完了証交付される。"],"登記官からする通知等":["注意点（2018年TAC予想問題集）：識別を郵送希望なら、本人限定受取郵便。極度額の変更＝識別通知なし。一方を書面で、一方をオンラインで完了証交付することはできない。 新たに共同担保目録＝共同担保目録の記号および目録番号が記録された完了証交付される。"],"電子申請による登記":["注意点（2018年TAC予想問題集）：特例法式で書面で登記原因書面提出＝OCR電磁記録提供も必要（電子署名は不要） 代理人による特例法式で電磁申請なら、事前通知も書面でＯＫ 却下時は申請人ごとに決定書交付。電子申請で登記済証のみ＝事前通知。"],"不登法::電子申請による登記":["注意点（2018年TAC予想問題集）：特例法式で書面で登記原因書面提出＝OCR電磁記録提供も必要（電子署名は不要） 代理人による特例法式で電磁申請なら、事前通知も書面でＯＫ 却下時は申請人ごとに決定書交付。電子申請で登記済証のみ＝事前通知。"],"抵当証券":["注意点：買戻特約ある不動産目的の抵当権で抵当証券交付不可。所有権移転仮登記後抵当証券発行の抵当権ある＝本登記時に抵当証券提供必要。転抵当権に抵当証券不可。共同担保に抵当証券発行されている場合＝順位繰り下がる順位変更または担保の一部について抵当権抹消＝担保の十分性証する情報提供必要。抵当証券にかかる債務につき債務者の交代＝債務者交代による抵当権の変更登記可能。"],"不登法::抵当証券":["注意点：買戻特約ある不動産目的の抵当権で抵当証券交付不可。所有権移転仮登記後抵当証券発行の抵当権ある＝本登記時に抵当証券提供必要。転抵当権に抵当証券不可。共同担保に抵当証券発行されている場合＝順位繰り下がる順位変更または担保の一部について抵当権抹消＝担保の十分性証する情報提供必要。抵当証券にかかる債務につき債務者の交代＝債務者交代による抵当権の変更登記可能。"],"登記の効力":["注意点：清算人の登記なくても民事訴訟で会社代表する権限を有するものに当たる。"],"商登法::登記の効力":["注意点：清算人の登記なくても民事訴訟で会社代表する権限を有するものに当たる。"],"役員等の変更":["注意点：会計監査人の職務上の義務違反・職務懈怠による解任＝どの機関設計でも全員の同意必要。監査法人で会計監査人の職務行うべきもの＝選定議事録は不要。反対に、持分会社の職務執行者は選任書面と就任承諾書必要。"],"商登法::役員等の変更":["注意点：会計監査人の職務上の義務違反・職務懈怠による解任＝どの機関設計でも全員の同意必要。監査法人で会計監査人の職務行うべきもの＝選定議事録は不要。反対に、持分会社の職務執行者は選任書面と就任承諾書必要。"],"特例有限会社の移行の登記":["注意点：移行と同時に役員変更＝設立登記に直接役員記載可能＝辞任するもの含む全ての添付書面必要。移行前と移行後で取締役まったく一緒なら予選決議可能。移行前に存在しない役会で代表決められない。移行設立と本店移転同時は不可。商号変更と資本金変更は可能"],"商登法::特例有限会社の移行の登記":["注意点：移行と同時に役員変更＝設立登記に直接役員記載可能＝辞任するもの含む全ての添付書面必要。移行前と移行後で取締役まったく一緒なら予選決議可能。移行前に存在しない役会で代表決められない。移行設立と本店移転同時は不可。商号変更と資本金変更は可能"],"知る権利":["注意点：憲法２１条で保障されている。"],"憲法::知る権利":["注意点：憲法２１条で保障されている。"],"民法::相続財産":["注意点：他人物売主相続した真の権利者＝履行義務拒否可能。相続開始時に存した金銭を相続財産として保管している他の相続人に対して自己の相続分に相当する金銭の支払請求不可。"],"相続財産":["注意点：他人物売主相続した真の権利者＝履行義務拒否可能。相続開始時に存した金銭を相続財産として保管している他の相続人に対して自己の相続分に相当する金銭の支払請求不可。"],"相続欠格・推定相続人の廃除":["注意点（2019年TAC予想問題集）：審判確定後10日以内にその届出必要（報告的届出）。相続欠格＝遺贈受けられない。"],"民法::相続欠格・推定相続人の廃除":["注意点（2019年TAC予想問題集）：審判確定後10日以内にその届出必要（報告的届出）。相続欠格＝遺贈受けられない。"],"民法::相続財産管理人":["注意点（伊藤塾2023公開模試）：相続財産管理人いる状態で相続財産管理人選任不可。限定承認者＝固有財産におけるのと同一の注意で管理。 管理人は性質変えない範囲で家裁の許可なく利用改良行為可能。"],"相続財産管理人":["注意点（伊藤塾2023公開模試）：相続財産管理人いる状態で相続財産管理人選任不可。限定承認者＝固有財産におけるのと同一の注意で管理。 管理人は性質変えない範囲で家裁の許可なく利用改良行為可能。"],"相続欠格":["注意点：故意に被相続人、先順位、同順位の相続人を殺人・殺人未遂＝欠格。殺害を知って告訴しなかったものは、犯人が配偶者または直系血族であること除いて相続人になれない。未成年後見人を指定した遺言書を破棄しても相続には関係ない。"],"民法::相続欠格":["注意点：故意に被相続人、先順位、同順位の相続人を殺人・殺人未遂＝欠格。殺害を知って告訴しなかったものは、犯人が配偶者または直系血族であること除いて相続人になれない。未成年後見人を指定した遺言書を破棄しても相続には関係ない。"],"相続":["注意点（令和４年予備短答模試）：債権の相続＝共同相続人全員からの通知または相続内容明らかにした通知及び債務者の承諾で対抗要件具備。 民法９０９条の２前段＝共同相続人が単独で行使できる預貯金債権の額について、相続開始時の預貯金の残高に対する、法定相続分（民法９００条及び９０１条）の３分の１の額。ただし、法務省令により各金融機関ごとの上限が１５０万円とされています。 前段により取得した預貯金については、一部分割をしたものとみなす。 その結果、後の遺産分割で決定…"],"民法::相続":["注意点（令和４年予備短答模試）：債権の相続＝共同相続人全員からの通知または相続内容明らかにした通知及び債務者の承諾で対抗要件具備。 民法９０９条の２前段＝共同相続人が単独で行使できる預貯金債権の額について、相続開始時の預貯金の残高に対する、法定相続分（民法９００条及び９０１条）の３分の１の額。ただし、法務省令により各金融機関ごとの上限が１５０万円とされています。 前段により取得した預貯金については、一部分割をしたものとみなす。 その結果、後の遺産分割で決定…"],"占有改定":["注意点（2019年TAC予想問題集）：質権は占有改定NG。譲渡担保はOK。先取特権も占有改定含まれる。"],"民法::占有改定":["注意点（2019年TAC予想問題集）：質権は占有改定NG。譲渡担保はOK。先取特権も占有改定含まれる。"],"占有訴権と物件的請求権":["注意点：占有保持＝妨害停止及び損害の賠償請求＝故意・過失必要。妨害の損する間または消滅後1年以内。工事着手から1年または工事完成した時は不可。"],"民法::占有訴権と物件的請求権":["注意点：占有保持＝妨害停止及び損害の賠償請求＝故意・過失必要。妨害の損する間または消滅後1年以内。工事着手から1年または工事完成した時は不可。"],"民法::占有の効力":["注意点：占有補助者に占有権認められない。188条の推定は権利変動には推定されない。本権に基づく反訴はOK。 農地法の許可得られてなくても自主占有"],"占有の効力":["注意点：占有補助者に占有権認められない。188条の推定は権利変動には推定されない。本権に基づく反訴はOK。 農地法の許可得られてなくても自主占有"],"民法::成年被後見人・被保佐人・被補助人":["注意点（2019年TAC予想問題集）：短期賃貸借や賃料の受領は保佐人の同意不要。成年後見監督人の同意得ずにした行為＝監督人は取り消せない。被後見人か後見人が取り消せる。補助のみ開始に本人の同意必要。"],"成年被後見人・被保佐人・被補助人":["注意点（2019年TAC予想問題集）：短期賃貸借や賃料の受領は保佐人の同意不要。成年後見監督人の同意得ずにした行為＝監督人は取り消せない。被後見人か後見人が取り消せる。補助のみ開始に本人の同意必要。"],"刑法::名誉毀損罪と侮辱罪の保護法益":["注意点：どちらも外部的地位。侮辱＝事実の摘示なし・名誉既存＝事実摘示あり。法人に対する侮辱も成立する"],"名誉毀損罪と侮辱罪の保護法益":["注意点：どちらも外部的地位。侮辱＝事実の摘示なし・名誉既存＝事実摘示あり。法人に対する侮辱も成立する"],"株券発行":["注意点：株券発行前にした株式の譲渡＝株券発行会社に対し効力生じない。募集株式の引受人＝株主となった日から１年経過後・権利行使後＝錯誤・詐欺・脅迫理由で引受取消不可。"],"会社法::株券発行":["注意点：株券発行前にした株式の譲渡＝株券発行会社に対し効力生じない。募集株式の引受人＝株主となった日から１年経過後・権利行使後＝錯誤・詐欺・脅迫理由で引受取消不可。"],"会社法::株式の共有":["注意点：未成年との共有で権利行使すべきもの親にしても利益相反じゃない。"],"株式の共有":["注意点：未成年との共有で権利行使すべきもの親にしても利益相反じゃない。"],"会社法::株式と新株予約権の異同":["注意点：自己新株予約権の処分の手続制限なし。募集新株予約権の発行＝払込期日なくてもいい。譲渡による新株予約権の取得に会社の承認いる旨＝登記事項じゃない。","ポイント：募集新株予約権＝払込期日不要 / 譲渡制限新株予約権＝登記事項ではない"],"株式と新株予約権の異同":["注意点：自己新株予約権の処分の手続制限なし。募集新株予約権の発行＝払込期日なくてもいい。譲渡による新株予約権の取得に会社の承認いる旨＝登記事項じゃない。","ポイント：募集新株予約権＝払込期日不要 / 譲渡制限新株予約権＝登記事項ではない"],"株式会社の役員等の任期":["注意点：監査等委員会・指名委員会＝全部の譲渡制限廃止しても任期満了しない。補欠会計監査人の任期＝退任した会計監査人の任期満了までとできない。"],"会社法::株式会社の役員等の任期":["注意点：監査等委員会・指名委員会＝全部の譲渡制限廃止しても任期満了しない。補欠会計監査人の任期＝退任した会計監査人の任期満了までとできない。"],"株式会社と合同会社の比較":["注意点：持分会社は自己持分取得できないので合併等によらないで取得したら取得した時に消滅する。持分会社と同種の事業をする会社の取締役・執行役・業務執行社員になるにも承認いる。合同会社の資本金の額減少＝債権者保護手続の終了した日","ポイント：業務執行社員＝定款なければ全員の承認なければ競業NG・同種の取締役・執行役・業務執行社員NG / 合同会社の資本金減額＝債権者保手続終了時に効果が生じる"],"会社法::株式会社と合同会社の比較":["注意点：持分会社は自己持分取得できないので合併等によらないで取得したら取得した時に消滅する。持分会社と同種の事業をする会社の取締役・執行役・業務執行社員になるにも承認いる。合同会社の資本金の額減少＝債権者保護手続の終了した日","ポイント：業務執行社員＝定款なければ全員の承認なければ競業NG・同種の取締役・執行役・業務執行社員NG / 合同会社の資本金減額＝債権者保手続終了時に効果が生じる"],"会社法::株主総会と社債権者集会の異同":["注意点：社債権者集会＝定款に記載の事項の決議不可。社債権者集会に出席しない社債権者＝当然に書面決議可能。社債権者も不統一行使可能","ポイント：総額１０分の１以上＝社債権者集会の招集請求可能 / 社債金額の合計額に応じて議決権あり / 社債権者集会当然に書面で議決権行使可能・不統一行使も可能"],"株主総会と社債権者集会の異同":["注意点：社債権者集会＝定款に記載の事項の決議不可。社債権者集会に出席しない社債権者＝当然に書面決議可能。社債権者も不統一行使可能","ポイント：総額１０分の１以上＝社債権者集会の招集請求可能 / 社債金額の合計額に応じて議決権あり / 社債権者集会当然に書面で議決権行使可能・不統一行使も可能"],"株式会社の組織再編行為":["注意点：株式会社が組織変更＝すべての新株予約権者が買取請求可能。吸収合併後に存続会社の新株予約権もらえないなら買取請求可能。吸収分割承継会社では常に債権者保護必要。吸収分割とともに剰余金配当や全部取得条項付種類株式の取得しない場合＝債務履行請求できる債権者は保護の対象外。株式交換完全親会社の債権者＝株式交換新株予約権が新株予約権付社債に付された新株予約権OR交付する金銭等が株式以外のとき＝異議述べられる。"],"会社法::株式会社の組織再編行為":["注意点：株式会社が組織変更＝すべての新株予約権者が買取請求可能。吸収合併後に存続会社の新株予約権もらえないなら買取請求可能。吸収分割承継会社では常に債権者保護必要。吸収分割とともに剰余金配当や全部取得条項付種類株式の取得しない場合＝債務履行請求できる債権者は保護の対象外。株式交換完全親会社の債権者＝株式交換新株予約権が新株予約権付社債に付された新株予約権OR交付する金銭等が株式以外のとき＝異議述べられる。"],"民訴法::弁論準備手続と書面による準備手続":["注意点：どっちも当事者の意見必要。書面による準備手続のみ提出期間の定め必要。当事者両方オンライン参加可能"],"弁論準備手続と書面による準備手続":["注意点：どっちも当事者の意見必要。書面による準備手続のみ提出期間の定め必要。当事者両方オンライン参加可能"],"占有移転禁止の仮処分命令":["注意点：占有移転禁止の仮処分命令＝不動産で債務者特定困難＝特定しないで可能。公示書その他で公示必要。執行は占有解く際に占有者特定できない場合不可。占有解かれたものが債務者になる。保全執行は債権者に対して保全命令送達から2週間位内に必要。2週間以内に執行されなかったら債務者への送達不要。"],"民保法::占有移転禁止の仮処分命令":["注意点：占有移転禁止の仮処分命令＝不動産で債務者特定困難＝特定しないで可能。公示書その他で公示必要。執行は占有解く際に占有者特定できない場合不可。占有解かれたものが債務者になる。保全執行は債権者に対して保全命令送達から2週間位内に必要。2週間以内に執行されなかったら債務者への送達不要。"],"抵当権の変更または更正の登記":["注意点（2019年TAC予想問題集）：元本のみ返済＝元本返済・債権額 金〇円（何年何月分から何年何月分までの利息）と提供"],"不登法::抵当権の変更または更正の登記":["注意点（2019年TAC予想問題集）：元本のみ返済＝元本返済・債権額 金〇円（何年何月分から何年何月分までの利息）と提供"],"抵当権抹消の登記":["注意点：債権者死亡で債権消滅特約＝抵当権抹消は共同申請必要。抵当権消滅の定めなら債務者側が単独登記可能。弁済で抵当権抹消前に会社分割＝新設分割会社が計画で登記義務承継定めてるなら、設定者と新設会社で抹消可能。"],"不登法::抵当権抹消の登記":["注意点：債権者死亡で債権消滅特約＝抵当権抹消は共同申請必要。抵当権消滅の定めなら債務者側が単独登記可能。弁済で抵当権抹消前に会社分割＝新設分割会社が計画で登記義務承継定めてるなら、設定者と新設会社で抹消可能。"],"不登法::地上権または区分地上権の登記":["注意点（2018年TAC予想問題集）：空間の上下＝図面提供不要。すでに地上権設定されている土地の区分地上権を範囲廃止して地上権に変更できない。"],"地上権または区分地上権の登記":["注意点（2018年TAC予想問題集）：空間の上下＝図面提供不要。すでに地上権設定されている土地の区分地上権を範囲廃止して地上権に変更できない。"],"不登法::単独申請":["注意点（2018年TAC予想問題集）：根抵当権者が元本確定請求したら、根抵当権者から単独申請可能。"],"単独申請":["注意点（2018年TAC予想問題集）：根抵当権者が元本確定請求したら、根抵当権者から単独申請可能。"],"商登法::資本金の額の計上に関する書面":["注意点：設立で金銭出資のみ＝計上書面不要。募集株式の発行＝必ず計上書面必要。準備金の額資本組入れ＝減少準備金計上書面なので資本金計上書面は不要。合同会社の資本金減少＝計上書面必要。"],"資本金の額の計上に関する書面":["注意点：設立で金銭出資のみ＝計上書面不要。募集株式の発行＝必ず計上書面必要。準備金の額資本組入れ＝減少準備金計上書面なので資本金計上書面は不要。合同会社の資本金減少＝計上書面必要。","ポイント：設立金銭のみ＝資本金の額計上書面不要 / 募集株式の発行＝必ず資本金の額の計上書面必要 / 準備金の資本組入れ＝減少に係る準備金の額が計上されていたことを証する書面 / 合同会社が資本金減少＝計上書面必要"],"商登法::株式会社の設立の登記の申請書の添付書面":["注意点：発起設立＝定款認証後に発起人会で商号変更して全員で署名押印して公証人の認証＝変更後の定款で設立可能。募集設立で払込場所変更＝直ちに通知。現物出資あって検査役の調査要しない＝取締役の調査報告書必要。"],"株式会社の設立の登記の申請書の添付書面":["注意点：発起設立＝定款認証後に発起人会で商号変更して全員で署名押印して公証人の認証＝変更後の定款で設立可能。募集設立で払込場所変更＝直ちに通知。現物出資あって検査役の調査要しない＝取締役の調査報告書必要。"],"取得請求権付株式の取得と引換えにする株式等の発行の登記":["注意点：取得請求権付株式1株と引換に新株予約権交付＝請求日に新株予約権者になる＝分配可能額証する書面必要ある→資本金計上書面不要。他の株式交付なら制限ない＝資本金額も増加しない。取得条項付株式＝交付される社債等の額が分配可能額超えていると効力生じない＝対価が株式なら財源規制ない。株券発行会社なら株券提供公告も必要。全部取得条項付種類株式を全部取得したとしても株式消却されないし資本金も減少しない。"],"商登法::取得請求権付株式の取得と引換えにする株式等の発行の登記":["注意点：取得請求権付株式1株と引換に新株予約権交付＝請求日に新株予約権者になる＝分配可能額証する書面必要ある→資本金計上書面不要。他の株式交付なら制限ない＝資本金額も増加しない。取得条項付株式＝交付される社債等の額が分配可能額超えていると効力生じない＝対価が株式なら財源規制ない。株券発行会社なら株券提供公告も必要。全部取得条項付種類株式を全部取得したとしても株式消却されないし資本金も減少しない。"],"株式の併合による変更の登記":["注意点：併合割合に制限なし。発行可能株式総数の定め必要。併合で種類株式に損害＝種類総会と株券提供公告必要。"],"商登法::株式の併合による変更の登記":["注意点：併合割合に制限なし。発行可能株式総数の定め必要。併合で種類株式に損害＝種類総会と株券提供公告必要。"],"商登法::代表取締役の登記":["注意点：定款定めあれば総会で代取選定可能。住居表示の実施＝変更登記必要かつ非課税・役会で総会での選任決議前提としてあらかじめ代表決めることできない。"],"代表取締役の登記":["注意点：定款定めあれば総会で代取選定可能。住居表示の実施＝変更登記必要かつ非課税・役会で総会での選任決議前提としてあらかじめ代表決めることできない。","ポイント：住居表示の実施→変更の登記必要（非課税） / 取締役選任前提で代表取締役選定NG"],"株式会社と合同会社の資本金の額の登記の異同":["注意点：吸収分割会社が対価である承継会社の株式を配当財産として剰余金の配当を行うと定めた場合＝資本金の額減少するかどうかはその会社次第。合同会社の資本金の額の減少＝業務執行社員の過半数の一致。出資が金銭以外なら資本金計上書面必要。","ポイント：吸収分割→必ず資本金の額減額するわけではない / 合同会社の資本金の額の減少＝業務執行社員の過半数 / 合同会社の社員の加入＝金銭以外の出資なら資本金の額の計上を証する書面が必要"],"商登法::株式会社と合同会社の資本金の額の登記の異同":["注意点：吸収分割会社が対価である承継会社の株式を配当財産として剰余金の配当を行うと定めた場合＝資本金の額減少するかどうかはその会社次第。合同会社の資本金の額の減少＝業務執行社員の過半数の一致。出資が金銭以外なら資本金計上書面必要。"],"商登法::持分会社の解散・清算の登記":["注意点：社員欠けた原因の任意清算不可。清算人に権利義務なし。代表しない清算人ある時のみ代表の氏名名称登記。代表清算人の住所は登記事項じゃない。持分なら法人を清算人にできる。債権申出公告＝債権者保護手続に関する書面添付不要。"],"持分会社の解散・清算の登記":["注意点：社員欠けた原因の任意清算不可。清算人に権利義務なし。代表しない清算人ある時のみ代表の氏名名称登記。代表清算人の住所は登記事項じゃない。持分なら法人を清算人にできる。債権申出公告＝債権者保護手続に関する書面添付不要。","ポイント：持分会社では清算人の権利義務承継なし / 持分会社では清算人は法人可能"],"司法権の独立":["注意点：裁判官の補職や転任は司法行政権に属し最高裁判所が権限有する。裁判の量刑についての調査は確定後であっても認められない。同一事件で下級審は上級審の判断に反せない。"],"憲法::司法権の独立":["注意点：裁判官の補職や転任は司法行政権に属し最高裁判所が権限有する。裁判の量刑についての調査は確定後であっても認められない。同一事件で下級審は上級審の判断に反せない。"],"民法::所有者不明土地等":["注意点：土地の管理不適当＋権利利益侵害のおそれ＝利害関係人の請求で管理不全土地管理命令できる。 命令取り消し後、所有者が所有者不明土地管理人被告として供託金返還請求権の確認請求可能。 所有者不明建物管理人は借地権を仮処分可能。所有者不明土地・建物管理人＝費用前払い・報酬受領可能"],"所有者不明土地等":["注意点：土地の管理不適当＋権利利益侵害のおそれ＝利害関係人の請求で管理不全土地管理命令できる。 命令取り消し後、所有者が所有者不明土地管理人被告として供託金返還請求権の確認請求可能。 所有者不明建物管理人は借地権を仮処分可能。所有者不明土地・建物管理人＝費用前払い・報酬受領可能"],"譲渡担保":["注意点：継続的取引から生じる債務の一切を根担保として設定することも可能。被担保債権不履行後、譲渡担保権者に受戻権を放棄して清算金支払請求可能。占有改定も譲渡担保の対抗要件。被担保債権の弁済期後に譲渡担保の目的物譲り受けた第三者も清算金支払請求権の消滅時効援用可能。保険金請求権にも集合動産譲渡担保の効力及ぶが、通常の営業継続しているなら特約なきゃ無理。清算金の清算やない旨の通知ない間に受戻権放棄しても直ちに清算金請求できるわけではない。設定契約により成立し、…"],"民法::譲渡担保":["注意点：継続的取引から生じる債務の一切を根担保として設定することも可能。被担保債権不履行後、譲渡担保権者に受戻権を放棄して清算金支払請求可能。占有改定も譲渡担保の対抗要件。被担保債権の弁済期後に譲渡担保の目的物譲り受けた第三者も清算金支払請求権の消滅時効援用可能。保険金請求権にも集合動産譲渡担保の効力及ぶが、通常の営業継続しているなら特約なきゃ無理。清算金の清算やない旨の通知ない間に受戻権放棄しても直ちに清算金請求できるわけではない。設定契約により成立し、…"],"条件および期限":["注意点（2018年TAC予想問題集）：始期付きまたは停止条件付でも時効更新のため占有者に承認を求められる。"],"民法::条件および期限":["注意点（2018年TAC予想問題集）：始期付きまたは停止条件付でも時効更新のため占有者に承認を求められる。"],"実子":["注意点：認知の訴え＝父母の死亡日から３年以内。婚姻中に懐胎＝夫の子と嫡出推定＝生物学上の父に監護されているという事情だけでは親子関係不存在確認不可（出張・受刑で性交渉なし客観的明白なら可能）"],"民法::実子":["注意点：認知の訴え＝父母の死亡日から３年以内。婚姻中に懐胎＝夫の子と嫡出推定＝生物学上の父に監護されているという事情だけでは親子関係不存在確認不可（出張・受刑で性交渉なし客観的明白なら可能）"],"民法::時効の更新及び完成猶予":["注意点（2020年TAC予想問題集）：承認に行為能力の制限関係ない。裁判が権利確定することなく終了＝終了から6ヵ月時効の完成猶予"],"時効の更新及び完成猶予":["注意点（2020年TAC予想問題集）：承認に行為能力の制限関係ない。裁判が権利確定することなく終了＝終了から6ヵ月時効の完成猶予"],"債権者代位権":["注意点（LEC直前予想模試2022）：債権譲渡登記への登記＝債務者以外の第三者へは確定日付による通知があったものとみなされる。代位債権者に対して主張できる抗弁をもっての対抗は不可。（あくまで債務者に対して） 転用の場合無資力要件なし。"],"民法::債権者代位権":["注意点（LEC直前予想模試2022）：債権譲渡登記への登記＝債務者以外の第三者へは確定日付による通知があったものとみなされる。代位債権者に対して主張できる抗弁をもっての対抗は不可。（あくまで債務者に対して） 転用の場合無資力要件なし。"],"共同正犯":["注意点：順次共謀も共謀共同正犯。12歳の是非弁識能力のある長男に指示命令＝意思抑圧に足りる程度のものではなく自らの意思により強盗を決意し完遂＝母親につき共同正犯。先行者の指示のもと恐喝正犯意思有していなかった場合＝恐喝罪の幇助犯"],"刑法::共同正犯":["注意点：順次共謀も共謀共同正犯。12歳の是非弁識能力のある長男に指示命令＝意思抑圧に足りる程度のものではなく自らの意思により強盗を決意し完遂＝母親につき共同正犯。先行者の指示のもと恐喝正犯意思有していなかった場合＝恐喝罪の幇助犯"],"会社法::財産引受":["注意点：財産引受契約当事者いずれも無効主張可能。追認しても常に無効。定款に記載必要。"],"財産引受":["注意点：財産引受契約当事者いずれも無効主張可能。追認しても常に無効。定款に記載必要。"],"会社法::株主総会全般":["注意点：会社側からも爽快に先立ち検査役の選任可能。代理人による議決権行使＝総会日から3ヶ月間代理権証する書面を本店に備え置き必要。総会前に質問状提出されても、総会で改めて質問なければ回答不要。調査役の仙人んは招集書面に記載なくても決議可能。"],"株主総会全般":["注意点：会社側からも爽快に先立ち検査役の選任可能。代理人による議決権行使＝総会日から3ヶ月間代理権証する書面を本店に備え置き必要。総会前に質問状提出されても、総会で改めて質問なければ回答不要。調査役の仙人んは招集書面に記載なくても決議可能。"],"会社法::特別清算":["注意点：債権者・清算人・監査役又は株主は債務超過の疑いがあると特別清算開始の申立てをしなければならない。 特別清算開始の命令があった場合＝裁判所の監督に属する。特別清算開始命令あっても従前の清算人は退任しない。事業の全部譲渡、重要な一部の譲渡（5分の1ルールあり）、子会社の株式または持分の全部・一部譲渡（5分の1超えないかつ議決権の過半数有しない時＝裁判所の許可必要"],"特別清算":["注意点：債権者・清算人・監査役又は株主は債務超過の疑いがあると特別清算開始の申立てをしなければならない。 特別清算開始の命令があった場合＝裁判所の監督に属する。特別清算開始命令あっても従前の清算人は退任しない。事業の全部譲渡、重要な一部の譲渡（5分の1ルールあり）、子会社の株式または持分の全部・一部譲渡（5分の1超えないかつ議決権の過半数有しない時＝裁判所の許可必要"],"会社法::社債権者集会":["注意点：特別代理人ー社債権者お管理者の利益相反したら申立てで選任必要。社債利息の弁済怠った時、社債権者集会の決議に基づき２ヶ月以内の弁済・期限の利益喪失する旨書面通知可能。発行会社の承諾あれば電磁的方法でもOK。原則＝出席社債権者の議決権の総額２分の１超える議決権の同意必要、一定の重要な事項＝議決権の総額５分の１以上かつ出席の総額３分の２以上の同意必要。無記名社債の社債権者＝集会の一週間前までに招集者に社債券の提示必要。","ポイント：社債管理補助者は、会社及び集会の同意で辞任可能。必要があるときは集会招集できる / 総額10分の1以上なら、管理者または補助者に集会招集請求可能 / 無記名社債＝1週間前に提示 / 免除＝集会 / 全員の同意でみなし＝裁判所の認可不要"],"社債権者集会":["注意点：特別代理人ー社債権者お管理者の利益相反したら申立てで選任必要。社債利息の弁済怠った時、社債権者集会の決議に基づき２ヶ月以内の弁済・期限の利益喪失する旨書面通知可能。発行会社の承諾あれば電磁的方法でもOK。原則＝出席社債権者の議決権の総額２分の１超える議決権の同意必要、一定の重要な事項＝議決権の総額５分の１以上かつ出席の総額３分の２ 分配を受ける権利、株主総会における議決権について異なる定め＝属人的株式＝登記不要。議決権制限の株主も頭数に参入。議決権代理行使の委任状は3ヶ月本店で保管＝株主は請求理由明らかにして委任状いつでも閲覧可能＝債権者は不可。過去2年以内に利益を得て第三者に通報したことある場合も請求拒める"],"民訴法::訴えの取下げ":["注意点：口頭弁論期日で口頭で取下げ＝相手出席してたらその日から2週間以内に異議を述べなかった時に同意したものとみなす。中間判決い過ぎない場合は取下げ後の再訴可能。"],"訴えの取下げ":["注意点：口頭弁論期日で口頭で取下げ＝相手出席してたらその日から2週間以内に異議を述べなかった時に同意したものとみなす。中間判決い過ぎない場合は取下げ後の再訴可能。"],"民保法::民事保全手続における不服申立て":["注意点：保全命令却下＝告知日から2週間以内なら債権者が即時抗告可能。保全異議または保全取消しの申立てについての裁判＝送達日から2週間以内に保全抗告可能＝抗告裁判所がした保全命令に対する保全異議の申立ての裁判に保全抗告NG。保全命令に対しての債務者の保全異議＝期間制限なし。保全異議＝当事者双方の立会必要。特別の事情による保全取消＝仮処分命令のみ。特別の事情は疎明必要。"],"民事保全手続における不服申立て":["注意点：保全命令却下＝告知日から2週間以内なら債権者が即時抗告可能。保全異議または保全取消しの申立てについての裁判＝送達日から2週間以内に保全抗告可能＝抗告裁判所がした保全命令に対する保全異議の申立ての裁判に保全抗告NG。保全命令に対しての債務者の保全異議＝期間制限なし。保全異議＝当事者双方の立会必要。特別の事情による保全取消＝仮処分命令のみ。特別の事情は疎明必要。"],"供託関係書類の保存期間":["注意点：副本ファイルの記録・支払委託書＝最終の払渡しをした年度の翌年度から10年。供託書・添付書類＝供託受理した年度の翌年度から10年。供託有価証券利札請求書・添付書類＝払渡した年度の翌年度から5年。電磁的記録媒体＝受理の日から１年。"],"供託法::供託関係書類の保存期間":["注意点：副本ファイルの記録・支払委託書＝最終の払渡しをした年度の翌年度から10年。供託書・添付書類＝供託受理した年度の翌年度から10年。供託有価証券利札請求書・添付書類＝払渡した年度の翌年度から5年。電磁的記録媒体＝受理の日から１年。"],"処分禁止の仮処分":["注意点：所有権以外の権利の移転・抹消＝処分禁止の登記のみ。所有権移転の抹消登記請求権保全＝処分禁止の登記のみ。 通知から１週間以内に送れる登記抹消＝内容証明＋配達証明書も提供 根抵当権の極度額増額＝仮処分債権者も利害関係人"],"不登法::処分禁止の仮処分":["注意点：所有権以外の権利の移転・抹消＝処分禁止の登記のみ。所有権移転の抹消登記請求権保全＝処分禁止の登記のみ。 通知から１週間以内に送れる登記抹消＝内容証明＋配達証明書も提供 根抵当権の極度額増額＝仮処分債権者も利害関係人"],"職権による登記":["注意点：職権による更正＝登記官の過誤・錯誤・遺漏のみ。順位変更にかかる抵当権抹消＝順位変更中の抵当権の表示抹消不要。 順位譲渡後、かかる（した・うけた）抵当権抹消＝職権で順位譲渡の登記抹消。順位譲渡後に順位変更＝職権抹消されないので順位変更による失効の登記申請必要。登記官は第三者の承諾を得ずに職権抹消できない。職権による更正の場合のみ法務局や長の許可必要。"],"不登法::職権による登記":["注意点：職権による更正＝登記官の過誤・錯誤・遺漏のみ。順位変更にかかる抵当権抹消＝順位変更中の抵当権の表示抹消不要。 順位譲渡後、かかる（した・うけた）抵当権抹消＝職権で順位譲渡の登記抹消。順位譲渡後に順位変更＝職権抹消されないので順位変更による失効の登記申請必要。登記官は第三者の承諾を得ずに職権抹消できない。職権による更正の場合のみ法務局や長の許可必要。"],"住所等の変更登記":["注意点：〇〇ビルの部分だけ削除変更した会社が変更前の不動産売却で所移＝前提名変不要。A/AおよびBの住所変更を同一の申請情報ですることはできない。要役地の名義人の氏名異なっても前提名変不要。判決所移で住所記載あっても前提名変省略不可。"],"不登法::住所等の変更登記":["注意点：〇〇ビルの部分だけ削除変更した会社が変更前の不動産売却で所移＝前提名変不要。A/AおよびBの住所変更を同一の申請情報ですることはできない。要役地の名義人の氏名異なっても前提名変不要。判決所移で住所記載あっても前提名変省略不可。"],"事前通知等":["注意点（2019年TAC予想問題集）：電子申請の事前通知の申出＝電子署名して電子証明書と送信。"],"不登法::事前通知等":["注意点（2019年TAC予想問題集）：電子申請の事前通知の申出＝電子署名して電子証明書と送信。"],"識別情報の提供":["注意点：申請後に識別失効判明＝取り下げせず本人確認情報の追完で足りる。海外在住日本人で識別不可＝添付情報への公証人の認証必要。"],"不登法::識別情報の提供":["注意点：申請後に識別失効判明＝取り下げせず本人確認情報の追完で足りる。海外在住日本人で識別不可＝添付情報への公証人の認証必要。"],"不登法::敷地権付き区分建物についての登記":["注意点（2018年TAC予想問題集）：敷地権生じた後は、分離して差し押さえできない。不動産工事の先取特権は敷地権前後で申請可能"],"敷地権付き区分建物についての登記":["注意点（2018年TAC予想問題集）：敷地権生じた後は、分離して差し押さえできない。不動産工事の先取特権は敷地権前後で申請可能"],"工場抵当法に関する登記":["注意点：抵当権者も債務者に代位して工場財団の所有権保存登記可能。他人の権利の目的となっていないこと。差押仮差押仮処分の目的となっていないこと。他の財団に属していないこと。既登記であること。工場財団の所有権移転可能。保存登記後６ヶ月以内の抵当権設定必要。名称位置主たる営業所営業の種類必要。"],"不登法::工場抵当法に関する登記":["注意点：抵当権者も債務者に代位して工場財団の所有権保存登記可能。他人の権利の目的となっていないこと。差押仮差押仮処分の目的となっていないこと。他の財団に属していないこと。既登記であること。工場財団の所有権移転可能。保存登記後６ヶ月以内の抵当権設定必要。名称位置主たる営業所営業の種類必要。"],"原本還付":["注意点：本人確認情報に添付した司法書士の職印にかかる印鑑証明書＝原本還付請求可能。相続関係説明図添付されても、外国人の戸籍は写し提供しないと還付されない。承諾書の印鑑証明も還付できない。"],"不登法::原本還付":["注意点：本人確認情報に添付した司法書士の職印にかかる印鑑証明書＝原本還付請求可能。相続関係説明図添付されても、外国人の戸籍は写し提供しないと還付されない。承諾書の印鑑証明も還付できない。"],"区分建物の所有権の保存の登記":["注意点（2019年TAC予想問題集）：敷地権賃借権＝転得者が所有権保存＝賃貸人の承諾情報必要。敷地権ない区分＝原因日付不要。 AとBの取得原因（申請適格）違う保存登記はできない。"],"不登法::区分建物の所有権の保存の登記":["注意点（2019年TAC予想問題集）：敷地権賃借権＝転得者が所有権保存＝賃貸人の承諾情報必要。敷地権ない区分＝原因日付不要。 AとBの取得原因（申請適格）違う保存登記はできない。"],"区分建物の登記":["注意点：区分建物の地上権・賃借権の法定更新＝準共有者の一人が保存行為として地上権設定者全員と登記可能。"],"不登法::区分建物の登記":["注意点：区分建物の地上権・賃借権の法定更新＝準共有者の一人が保存行為として地上権設定者全員と登記可能。"],"同時申請の要否":["注意点：株式の譲渡制限に関する承認期間＝役会→役会廃止したら同時に承認機関変更の登記も必要。","ポイント：支店を設置したとしても必ず支配人を選任する必要はなし"],"商登法::同時申請の要否":["注意点：株式の譲渡制限に関する承認期間＝役会→役会廃止したら同時に承認機関変更の登記も必要。"],"債権者保護手続を行ったことを証する書面の添付の要否":["注意点：準備金の額減少する時＝原則債権者保護必要＝書面添付は不要。合同会社なら二重公告で組織変更の各別の催告省略可能。吸収分割で二重公告をしても不法行為の債権者に対して各別の催告省略不可。"],"商登法::債権者保護手続を行ったことを証する書面の添付の要否":["注意点：準備金の額減少する時＝原則債権者保護必要＝書面添付は不要。合同会社なら二重公告で組織変更の各別の催告省略可能。吸収分割で二重公告をしても不法行為の債権者に対して各別の催告省略不可。"],"商登法::印鑑証明書の交付請求の可否":["注意点：破産手続開始決定時・再生開始決定時の代表者＝破産・再生開始の登記ある旨付記した上で交付可能。更正決定でも可能。管財人保全管理人も可能。職務執行停止・存続期間満了なら交付不可。"],"印鑑証明書の交付請求の可否":["注意点：破産手続開始決定時・再生開始決定時の代表者＝破産・再生開始の登記ある旨付記した上で交付可能。更正決定でも可能。管財人保全管理人も可能。職務執行停止・存続期間満了なら交付不可。"],"商登法::資本金の額・株式・新株予約権に係る変更の登記":["注意点：株式分割時の基準日公告＝2週間前までに必要＝書面添付は不要。取得請求権付株式の請求と引換に新株予約権発行＝分配可能額証する書面は必要＝資本金は増加しないので資本金の額の計上に関する書面の添付は不要。完全親が完全子を吸収合併＝資本金増加しないので資本金の額が会社法第445条第5項の規定に従って計上されたことを証する書面不要。"],"資本金の額・株式・新株予約権に係る変更の登記":["注意点：株式分割時の基準日公告＝2週間前までに必要＝書面添付は不要。取得請求権付株式の請求と引換に新株予約権発行＝分配可能額証する書面は必要＝資本金は増加しないので資本金の額の計上に関する書面の添付は不要。完全親が完全子を吸収合併＝資本金増加しないので資本金の額が会社法第445条第5項の規定に従って計上されたことを証する書面不要。"],"商登法::一般社団。一般財団法人の登記":["注意点：解散後も監事を置く旨の定款定めない大規模一般財団法人以外が存続期間満了で解散した場合＝既存の監事の任期満了登記必要。"],"一般社団。一般財団法人の登記":["注意点：解散後も監事を置く旨の定款定めない大規模一般財団法人以外が存続期間満了で解散した場合＝既存の監事の任期満了登記必要。"],"民法::共同親権":["注意点（2018年TAC予想問題集）：養育財産管理費用は成年に達した際にむ財産の収益と相殺されたものとみなされる。 一方だけが単独で代理＝無権代理で無効。代理権の濫用を相手方が知っていれば効果は子に及ばない。 父母の一方が共同名義で法律行為または子がそれに同意＝相手方が知っていれば追認ない限り無効"],"共同親権":["注意点（2018年TAC予想問題集）：養育財産管理費用は成年に達した際にむ財産の収益と相殺されたものとみなされる。 一方だけが単独で代理＝無権代理で無効。代理権の濫用を相手方が知っていれば効果は子に及ばない。 父母の一方が共同名義で法律行為または子がそれに同意＝相手方が知っていれば追認ない限り無効"],"民法::隔地者間に対する意思表示":["注意点：承諾期間の定めのある契約＝申込の到達前・到達と同時なら撤回可能。"],"隔地者間に対する意思表示":["注意点：承諾期間の定めのある契約＝申込の到達前・到達と同時なら撤回可能。"],"姻族関係終了の意思表示等":["注意点：婚姻中・縁組中に祭祀財産承継して離婚・離縁する場合＝当事者の協議で承継者定めなければならない。 一方死亡後に復氏する場合・姻族関係終了する場合も同様。"],"民法::姻族関係終了の意思表示等":["注意点：婚姻中・縁組中に祭祀財産承継して離婚・離縁する場合＝当事者の協議で承継者定めなければならない。 一方死亡後に復氏する場合・姻族関係終了する場合も同様。"],"会社法::清算株式会社":["注意点：清算人に任務懈怠責任あり＝免除は総株主の同意必要。一部免除の制度ない。","ポイント：清算人に任務懈怠の免除規定なし / 合併時の反対株主の買取請求で自己株式取得は可能"],"清算株式会社":["注意点：清算人に任務懈怠責任あり＝免除は総株主の同意必要。一部免除の制度ない。","ポイント：清算人に任務懈怠の免除規定なし / 合併時の反対株主の買取請求で自己株式取得は可能"],"取締役会議事録閲覧謄写":["注意点：株主から株主名簿の閲覧・謄写請求あった場合＝競争関係事業者であること理由に拒めない。拒むと過料","ポイント：監査役会・監査等委員会・指名委員会等の株主、債権者、親会社等の社員＝裁判所の許可で役会議事録閲覧謄写可能 / 競争関係にあること理由に閲覧請求拒否不可能 / 正当な理由なく閲覧謄写拒否で過料"],"会社法::取締役会議事録閲覧謄写":["注意点：株主から株主名簿の閲覧・謄写請求あった場合＝競争関係事業者であること理由に拒めない。拒むと過料","ポイント：監査役会・監査等委員会・指名委員会等の株主、債権者、親会社等の社員＝裁判所の許可で役会議事録閲覧謄写可能 / 競争関係にあること理由に閲覧請求拒否不可能 / 正当な理由なく閲覧謄写拒否で過料"],"再審の訴え":["注意点：判決確定後再審事由知ったときから30日の不変期間と確定日から5年の期限あり。再審の訴え却下＝即時抗告可能。補助参加人も再審の訴え可能。"],"民訴法::再審の訴え":["注意点：判決確定後再審事由知ったときから30日の不変期間と確定日から5年の期限あり。再審の訴え却下＝即時抗告可能。補助参加人も再審の訴え可能。"],"司法書士":["注意点：司法書士法人は手続要さず主たる事務所の所在地の司法書士会の会員となる。移転先の司法書士会経由して書士会連合会に司法書士会の変更の登録する。懲戒権を有するのは法務大臣"],"書士法::司法書士":["注意点：司法書士法人は手続要さず主たる事務所の所在地の司法書士会の会員となる。移転先の司法書士会経由して書士会連合会に司法書士会の変更の登録する。懲戒権を有するのは法務大臣"],"オンライン供託":["注意点（2020年TAC予想問題集）：金銭・振替国債のみ。払渡請求の取り下げは、書面でもOK＝供託受理決定・払渡認可後の取下げは不可。払渡請求の取下げ＝オンラインでも書面でもOK。みなし供託書正本の交付は１回。オンラインで申請＝法人番号あれば資格情報不要"],"供託法::オンライン供託":["注意点（2020年TAC予想問題集）：金銭・振替国債のみ。払渡請求の取り下げは、書面でもOK＝供託受理決定・払渡認可後の取下げは不可。払渡請求の取下げ＝オンラインでも書面でもOK。みなし供託書正本の交付は１回。オンラインで申請＝法人番号あれば資格情報不要"],"共有不動産の登記":["注意点：代表同じXY会社で共有物分割＝双方の役会議事録必要。放棄なら放棄する側だけの議事録でOK。 A単独所有その代わりBに他の不動産＝共有物分割による交換・共有物分割による贈与。 第三者の権利あり＝株○持分一部（順位３番で登記した持分）移転。全部に及ぼす変更登記後の抹消＝最初の設定時の識別情報で足りる（及ぼす時に識別通知されないから） 第三者の権利登記あっても、相続なら一申請で所移可能。「B持分の一部４分の１処分禁止仮処分」"],"不登法::共有不動産の登記":["注意点：代表同じXY会社で共有物分割＝双方の役会議事録必要。放棄なら放棄する側だけの議事録でOK。 A単独所有その代わりBに他の不動産＝共有物分割による交換・共有物分割による贈与。 第三者の権利あり＝株○持分一部（順位３番で登記した持分）移転。全部に及ぼす変更登記後の抹消＝最初の設定時の識別情報で足りる（及ぼす時に識別通知されないから） 第三者の権利登記あっても、相続なら一申請で所移可能。「B持分の一部４分の１処分禁止仮処分」"],"仮登記の可否":["注意点：A名義不動産をB死亡始期とするCへの始期付所有権移転仮登記可能。農地法３条の許可＝条件付所有権移転仮登記。仮登記命ずる処分得た時に限り所有権保存の仮登記可能。"],"不登法::仮登記の可否":["注意点：A名義不動産をB死亡始期とするCへの始期付所有権移転仮登記可能。農地法３条の許可＝条件付所有権移転仮登記。仮登記命ずる処分得た時に限り所有権保存の仮登記可能。"],"仮登記された権利の抹消":["注意点：仮登記で保全されている請求権にも滞納処分による差押登記の嘱託可能。所有権移転請求権の移転＝移転請求権の仮登記名義人の識別提供必要。代物弁済予約で所有権移転請求権の仮登記＝保証人が代位弁済したら移転請求権の移転可能。抵当権の仮登記・後順位のために順位譲渡・放棄可能＝請求権保全の仮登記権利者は不可。共有の所有権移転請求権の保全の仮登記＝共有者の一人放棄したら移転請求権の移転可能。"],"不登法::仮登記された権利の抹消":["注意点：仮登記で保全されている請求権にも滞納処分による差押登記の嘱託可能。所有権移転請求権の移転＝移転請求権の仮登記名義人の識別提供必要。代物弁済予約で所有権移転請求権の仮登記＝保証人が代位弁済したら移転請求権の移転可能。抵当権の仮登記・後順位のために順位譲渡・放棄可能＝請求権保全の仮登記権利者は不可。共有の所有権移転請求権の保全の仮登記＝共有者の一人放棄したら移転請求権の移転可能。"],"買戻し特約の登記":["注意点：第69条の2で権利者が単独でする登記抹消＝原因情報不要。区分建物の専有部分に買戻特約＝売買代金・契約費用は建物と敷地権一括した金額記載すべき。買戻特約の売買代金・契約費用が同時申請の所移の売買契約書の記載と一致しない場合も受理される。共有不動産に買戻特約＝各別に登記必要。地上権移転と同時に買戻特約＝地上権移転→付記、買戻特約は付記の付記＝１番地上権付記１号の付記１号買戻権移転","ポイント：支払代金増額の更正＝買主が登記権利者・登記名義人が義務者。登記名義人の識別の提出必要 / 買戻特約つきの不動産に抵当権実行による差押＝抵当権者が所有権者に代位して買戻権者と共同して買戻特約の登記抹消。差押の登記で明らかなので代位原因証書不要"],"不登法::買戻し特約の登記":["注意点：第69条の2で権利者が単独でする登記抹消＝原因情報不要。区分建物の専有部分に買戻特約＝売買代金・契約費用は建物と敷地権一括した金額記載すべき。買戻特約の売買代金・契約費用が同時申請の所移の売買契約書の記載と一致しない場合も受理される。共有不動産に買戻特約＝各別に登記必要。地上権移転と同時に買戻特約＝地上権移転→付記、買戻特約は付記の付記＝１番地上権付記１号の付記１号買戻権移転"],"解散した法人の担保権に関する登記の抹消":["注意点：被担保債権の弁済期&法人解散から30年経過＝単独で先取特権・質権・抵当権抹消可能＝登記原因→弁済期証する＋解散の日＋所在判明しない情報。「不動産登記法第70条の2の規定による抹消」＝登記原因日付不要。清算人の住民票添付・不在住不在籍も取得不可＝調査報告書にその旨記載。外国法人の場合は外国の登録等の調査まで不要"],"不登法::解散した法人の担保権に関する登記の抹消":["注意点：被担保債権の弁済期&法人解散から30年経過＝単独で先取特権・質権・抵当権抹消可能＝登記原因→弁済期証する＋解散の日＋所在判明しない情報。「不動産登記法第70条の2の規定による抹消」＝登記原因日付不要。清算人の住民票添付・不在住不在籍も取得不可＝調査報告書にその旨記載。外国法人の場合は外国の登録等の調査まで不要"],"商登法::登記簿等の公開および保存":["注意点：要約書は何人も交付請求できるが送付請求はできない。附属書類は利害関係にのみ閲覧請求可。利害関係書面の添付必要。閉鎖登記簿の保存期間20年。申請書は10年間保存。電子証明書に係る申請書類及び電磁的記録は受付から13年保存。"],"登記簿等の公開および保存":["注意点：要約書は何人も交付請求できるが送付請求はできない。附属書類は利害関係にのみ閲覧請求可。利害関係書面の添付必要。閉鎖登記簿の保存期間20年。申請書は10年間保存。電子証明書に係る申請書類及び電磁的記録は受付から13年保存。"],"商登法::登記の抹消":["注意点：抹消申請書には無効原因証書の添付必要＝作成者とその他添付書面作成者異なる場合、裁判所謄本や公務員作成書面必要。資本金計上書面なら例外的に作成者異なっても対応可能。印鑑違う場合も印鑑証明書添付するか抹消の証明受理されない。届出印での押印も必要。抹消は1件2万"],"商登法::設立登記の申請手続":["注意点：創立総会議事録は発起人が設立に関する事項を総会に報告した旨ないと受理されない。創立総会で選任した調査者の調査報告書は検査役じゃないから添付書面にならない。種類株式の内容として取得条項付株式の内容に関する定款変更した場合、引き受けた種類株主全員の同意書必要。種類株式に譲渡制限や全部取得条項を付す総会決議の日から2週間を経過した日から2週間以内"],"設立登記の申請手続":["注意点：創立総会議事録は発起人が設立に関する事項を総会に報告した旨ないと受理されない。創立総会で選任した調査者の調査報告書は検査役じゃないから添付書面にならない。種類株式の内容として取得条項付株式の内容に関する定款変更した場合、引き受けた種類株主全員の同意書必要。種類株式に譲渡制限や全部取得条項を付す総会決議の日から2週間を経過した日から2週間以内"],"株式の譲渡制限":["注意点：種類として譲渡制限＝総会の定款変更は特別決議、損害種類・当該種類対価とする取得請求権付株式または取得条項付株式の種類株主総会の特殊決議が必要。従業員から等譲渡元理由にする譲渡制限規定は許されない。株券発行会社が1ヶ月前の提供公告する場合、株主総会決議に先立ち提供公告開始することは可能。譲渡制限後効力発生前に募集株式発行決議＝募集株式発行の効果は生じるが譲渡制限の効果は発生しない。変更・廃止で株券提供公告は不要。","注意点：相続人に対する定款による買取請求→相続人の承諾不要。公開会社でも譲渡制限株式なら売渡請求可能。承認請求２週間無視したら承認とみなす","ポイント：種類株式の内容で譲渡制限設定＝総会の特別決議＋損害及ぼす種株の特別決議＋該当種株・対価目的の取得請求、取得条項の特殊決議。（すべての種類に譲渡制限付する場合も） / 譲渡制限＝株券提供公告必要 / 譲渡制限決議後、効力発生前に募集株式発行＝募集株式の発行は受理。譲渡制限は受理されない / 譲渡制限の変更・廃止＝特別決議＋損害種類の特別決議"],"商登法::株式の譲渡制限":["注意点：種類として譲渡制限＝総会の定款変更は特別決議、損害種類・当該種類対価とする取得請求権付株式または取得条項付株式の種類株主総会の特殊決議が必要。従業員から等譲渡元理由にする譲渡制限規定は許されない。株券発行会社が1ヶ月前の提供公告する場合、株主総会決議に先立ち提供公告開始することは可能。譲渡制限後効力発生前に募集株式発行決議＝募集株式発行の効果は生じるが譲渡制限の効果は発生しない。変更・廃止で株券提供公告は不要。"],"募集株式の発行による変更登記":["注意点：株主割当て＝申込み期日の2週間前 function findTemplatesForEntry(entry){
 const text=[entry?.subject||'', entry?.topic||'', entry?.memo||''].join(' ');
 const norm=text.toLowerCase();
 const scored=TEMPLATE_ITEMS.map(t=>{
   const hay=[t.type||'', t.cat||'', t.title||'', t.keys||'', t.body||''].join(' ').toLowerCase();
   let score=0;
   [entry?.subject, entry?.topic].filter(Boolean).forEach(w=>{ if(hay.includes(String(w).toLowerCase())) score+=4; });
   String(t.keys||'').split(/[、,\s]+/).filter(Boolean).forEach(k=>{ if(norm.includes(k.toLowerCase())) score+=3; });
   String(t.title||'').split(/[・のによる変更登記申請]+/).filter(x=>x.length>=2).forEach(k=>{ if(norm.includes(k.toLowerCase())) score+=1; });
   return {t,score};
 }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).map(x=>x.t);
 if(scored.length) return scored;
 if(String(entry?.subject||'').includes('不動産')) return TEMPLATE_ITEMS.filter(t=>t.type==='不動産登記').slice(0,3);
 if(String(entry?.subject||'').includes('商業')) return TEMPLATE_ITEMS.filter(t=>t.type==='商業登記').slice(0,3);
 return TEMPLATE_ITEMS.slice(0,3);
}

 const topic=matched?.topic || "苦手分野";
 const levelLabel=matched ? lv(matched.level).label : "未設定";
 const knowledge=matched ? relatedKnowledge(matched).slice(0,6) : [];
 const templates=(matched ? findTemplatesForEntry(matched).slice(0,3) : []).map(t=>`・${t.title}`).join("\n");
 let mode="克服方法";
 if(q.includes("優先") || q.includes("順番")) mode="優先順位";
 if(q.includes("覚え") || q.includes("暗記")) mode="覚え方";
 if(q.includes("今日") || q.includes("復習")) mode="今日の復習";
 if(q.includes("条文")) mode="条文・要件";
 let body="";
 if(mode==="優先順位"){
   const ranked=[...list].sort((a,b)=>(a.level-b.level)||String(a.subject).localeCompare(String(b.subject),'ja')).slice(0,8);
   body=`優先順位は、理解度が低いものから処理するのがおすすめです。\n\n${ranked.map((x,i)=>`${i+1}. ${x.subject}：${x.topic}（${lv(x.level).label}）`).join("\n")}\n\n進め方：未理解を1つ選ぶ→関連知識を読む→ひな形や条文を確認→メモに「何を間違えたか」を1行で残す、の順で回してください。`;
 }else if(mode==="覚え方"){
   body=`${subject}「${topic}」の覚え方です。\n\n1. まず言葉を分解する\nテーマ名をそのまま覚えず、「誰が・何を・どの場面で・どんな効果があるか」に分けます。\n\n2. 要件と効果をセットにする\n要件だけ、効果だけで覚えると崩れやすいので、必ず「成立すると何ができるか」まで結びつけます。\n\n3. 反対例を1つ作る\n成立する場合だけでなく、成立しない場合を1つ作ると記憶に残ります。\n\n${knowledge.length?`関連知識：\n${knowledge.map(x=>`・${x}`).join("\n")}`:""}`;
 }else if(mode==="今日の復習"){
   body=`今日の復習メニューです。\n\n1. 5分：${subject}「${topic}」の関連知識を読む\n2. 10分：要件・効果・例外をメモに書き出す\n3. 10分：過去問や肢を1〜3問だけ確認する\n4. 3分：理解度を変更する\n\nポイント：今日は完璧にしようとせず、「次に見たときに思い出せる状態」を作ればOKです。\n\n現在の理解度：${levelLabel}`;
 }else if(mode==="条文・要件"){
   body=`${subject}「${topic}」の確認ポイントです。\n\n${knowledge.length?knowledge.map(x=>`・${x}`).join("\n"):"・関連する条文番号、要件、効果、例外をセットで確認してください。"}\n\n学習時は、条文そのもの→要件→効果→登記・手続への影響、の順で見ると整理しやすいです。`;
 }else{
   body=`${subject}「${topic}」の克服方針です。\n\n1. つまずきやすい理由\nこのテーマは、要件・効果・例外・手続が混ざると混乱しやすいです。まずは「何が成立する話か」「成立すると何が変わるか」を分けてください。\n\n2. 覚えるべきポイント\n${knowledge.length?knowledge.map(x=>`・${x}`).join("\n"):"・条文、要件、効果、例外、登記申請とのつながりを確認してください。"}\n\n3. 今日やること\n関連知識を読む→該当テーマのメモを1行修正→理解度を1段階だけ見直す、の順で進めるのがおすすめです。`;
 }
 if(templates){ body += `\n\n関連ひな形候補：\n${templates}`; }
 body += `\n\n※この機能はAPIを使わない内蔵型の学習アシストです。自由な生成AIではなく、登録データ・関連知識・ひな形候補から回答を組み立てています。`;
 return body;
}
function renderAi(){ $("aiView").innerHTML=`<div class="card"><h2 style="margin:0 0 12px;font-size:16px;color:#7aa3d4;letter-spacing:1px">無料AI質問</h2>
 <div class="warn">APIキー不要・課金なしで使える内蔵型の学習アシストです。登録済みデータ、関連知識、ひな形候補をもとに回答を作ります。</div>
 <div class="quick"><button class="smallBtn" data-q="今日やるべき復習メニューを作って">今日の復習</button><button class="smallBtn" data-q="登録した苦手分野を優先順位順に並べて">優先順位</button><button class="smallBtn" data-q="司法書士試験で記憶に残りやすい覚え方を提案して">覚え方</button><button class="smallBtn" data-q="このテーマの条文と要件を整理して">条文・要件</button></div>
 <div class="field"><div class="label">質問</div><textarea id="question" class="input textarea" style="min-height:140px" placeholder="例：留置権の要件を整理して">${esc(ai.question)}</textarea></div>
 <button id="askBtn" class="aiBtn">回答を表示する</button>
 ${ai.answer?`<div class="answer">${esc(ai.answer)}</div>`:""}
 <div class="footerNote">外部通信はしません。スマホ内だけで動きます。</div></div>`;
 $("question").oninput=e=>ai.question=e.target.value;
 document.querySelectorAll(".smallBtn").forEach(b=>b.onclick=()=>{ai.question=b.dataset.q;renderAi()});
 $("askBtn").onclick=askAI;
}
function askAI(){
 const qEl=$("question");
 ai.question=(qEl?qEl.value:ai.question||"").trim();
 if(!ai.question){alert("質問を入力してください");return}
 try{
   ai.answer=buildOfflineAnswer(ai.question);
 }catch(err){
   ai.answer="回答の生成中にエラーが出ました。\n\n対処：質問にテーマ名を入れてもう一度押してください。\n例：留置権の要件を整理して\n\nエラー内容："+(err&&err.message?err.message:String(err));
 }
 renderAi();
 setTimeout(()=>{ const a=document.querySelector('.answer'); if(a) a.scrollIntoView({behavior:'smooth',block:'start'}); },0);
}
function render(){renderStats();renderHeader();renderNav();["listView","addView","detailView","editView","aiView","templatesView","compareView"].forEach(id=>$(id).classList.add("hidden"));$(view+"View").classList.remove("hidden"); if(view==="list")renderList(); if(view==="add")renderAdd(); if(view==="detail")renderDetail(); if(view==="edit")renderEdit(); if(view==="ai")renderAi(); if(view==="templates")renderTemplates(); if(view==="compare")renderCompare()}
load();render();
</script>
