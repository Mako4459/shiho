:1,"memo":"【ソース】令和４年予備短答模試レイワネンヨビタントウモシ\n\n当事者が法令で正本謄本の交付請求できる場合除き、所持者に文書の送付嘱託を申し立てることができる。文書成立否認＝理由明らかにする必要ある\n当事者または代理人が故意過失で真実に反して文書成立真正を争った時＝決定で10万以下の過料トウジシャホウレイセイホントウホンコウフセイキュウバアイノゾショジシャブンショソウフショクタクモウタブンショセイリツヒニンリユウアキヒツヨウトウジシャダイリニンコイカシツシンジツハンブンショセイリツシンセイアラソトキケッテイマンイカカリョウ","date":"Excel取込"},{"id":1800000000739,"subject":"民事訴訟法","topic":"書証ショショウ","level":1,"memo":"【ソース】伊藤塾2022プレ模試\n\n文書の意味内容。存在自体や外形は文書の検証。ブンショイミナイヨウソンザイジタイガイケイブンショケンショウ","date":"Excel取込"},{"id":1800000000740,"subject":"民事訴訟法","topic":"証人尋問及び当事者尋問ショウニンジンモンオヨトウジシャジンモン","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n当事者の宣誓は任意＝た宣誓した当事者が虚偽＝決定で過料。離婚請求訴訟でも請求の放棄可能。トウジシャセンセイニンイセンセイトウジシャキョギケッテイカリョウリコンセイキュウソショウセイキュウホウキカノウ","date":"Excel取込"},{"id":1800000000741,"subject":"民事訴訟法","topic":"証拠調べショウコシラ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n文書送付嘱託＝任意なので従わなくても第三者罰則なし。ブンショソウフショクタクニンイシタガダイサンシャバッソク","date":"Excel取込"},{"id":1800000000742,"subject":"民事訴訟法","topic":"上告または上告受理ジョウコクジョウコクジュリ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n原裁判所自ら上告受理却下は不可。事実判断して差戻＝裁判所拘束。控訴しない合意無効ゲンサイバンショミズカジョウコクジュリキャッカフカジジツハンダンサシモドシサイバンショコウソクコウソゴウイムコウ","date":"Excel取込"},{"id":1800000000743,"subject":"民事訴訟法","topic":"裁判所等の裁量サイバンショトウサイリョウ","level":1,"memo":"【ソース】令和４年予備短答模試レイワネンヨビタントウモシ\n\n一部敗訴の訴訟費用＝裁判所の裁量で定める。決定完結事件＝口頭弁論しない場合審尋も裁量で可能。付郵便送達＝書記官の裁量。イチブハイソソショウヒヨウサイバンショサイリョウサダケッテイカンケツジケンコウトウベンロンバアイシンジンサイリョウカノウフユウビンソウタツショキカンサイリョウ","date":"Excel取込"},{"id":1800000000744,"subject":"民事訴訟法","topic":"債権者代位訴訟サイケンシャダイイソショウ","level":1,"memo":"【ソース】令和４年予備短答模試レイワネンヨビタントウモシ\n\n訴訟告知欠いたら裁判所は訴え却下。債権者代位訴訟で被担当者である債務者死んでも訴訟中断しない。債権ない場合裁判所は訴え却下。ソショウコクチカサイバンショウッタキャッカサイケンシャダイイソショウヒタントウシャサイムシャシソショウチュウダンサイケンバアイサイバンショウッタキャッカ","date":"Excel取込"},{"id":1800000000745,"subject":"民事訴訟法","topic":"控訴コウソ","level":1,"memo":"【ソース】令和４年予備短答模試レイワネンヨビタントウモシ\n\n株主代表訴訟＝類似必要的共同訴訟＝控訴しなかった株主にも効果及ぶが、控訴人にはならない。\n相殺の抗弁を理由とする請求棄却から他の理由による請求棄却になる場合、控訴裁判所は第一審判決取り消し、改めて請求棄却判決するべきカブヌシダイヒョウソショウルイジヒツヨウテキキョウドウソショウコウソカブヌシコウカオヨコウソニンソウサイコウベンリユウ","date":"Excel取込"},{"id":1800000000746,"subject":"民事訴訟法","topic":"共同訴訟キョウドウソショウ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n土地の共有＝一人取下げで全員取下げ。 訴訟人の一人が上告をした後に，さらに他の共同訴訟人が上告をした場合，後の上.告は二重上告となり不適法。\n土地の所有者がその所有権に基づいて地上の建物の所有者である共同相続人を相手方とし、建物収去土地明渡を請求する訴訟は、いわゆる固有必要的共同訴訟ではないトチキョウユウヒトリトサゼンイントリサ","date":"Excel取込"},{"id":1800000000747,"subject":"民事訴訟法","topic":"管轄カンカツ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n不法行為の損賠＝原告の住所地OK。フホウコウイソンバイゲンコクジュウショチ","date":"Excel取込"},{"id":1800000000748,"subject":"民事訴訟法","topic":"管轄カンカツ","level":1,"memo":"【ソース】令和４年予備短答模試レイワネンヨビタントウモシ\n\nネットの書き込み＝受信地も発信地も不法行為地。不動産の売買代金や賃料支払請求は不動産に関する訴えにあたらない。控訴裁判所が第一審管轄違い取消する場合＝判決で必ず管轄裁判所に移送カコジュシンチコウソサイバンショハッシンチフホウコウイチフドウサンバイバイダイキンチンリョウシハラセイキュウフドウサンカンウッタコウソサイバンショダイイッシンカンカツチガトリケシバアイハンケツカナラカンカツサイバンショイソウ","date":"Excel取込"},{"id":1800000000749,"subject":"民事訴訟法","topic":"確定判決カクテイハンケツ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n口頭弁論終結前なら判決の効力及ぶ。自ら認知した子を被告として認知無効の訴え提起＝請求棄却判決は推定相続人にも及ぶコウトウベンロンシュウケツマエハンケツコウリョクオヨミズカニンチコヒコクニンチムコウウッタテイキセイキュウキキャクハンケツスイテイソウゾクニンオヨ","date":"Excel取込"},{"id":1800000000750,"subject":"民事訴訟法","topic":"確定判決カクテイハンケツ","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n口頭弁論終結後の第三者・当事者のために請求の目的物を所持する者にも既判力及ぶ。＝賃貸人は所持者にあたらない。既判力の時的限界＝事実審の口頭弁論終結時。\n事実審口頭弁論終結時まで建物買取請求権行使しないまま判決確定＝その後建物買取請求権行使＆強制執行不許の訴え提起し、買取請求権の効果を異議事由として主張可能。（瑕疵の事由異なるからOK）コウトウベンロンシュウケツゴダイサンシャトウジシャセイキュウモクテキブツショジモノキハンリョクオヨチンタイニンショジシャキハンリョクトキテキゲンカイジジツシンコウトウベンロンシュウケツジジジツシンコウトウベンロンシュウケツジタテモノカイトリセイキュウケンコウシハンケツカクテイゴタテモノカイトリセイキュウケンコウシキョウセイシッコウフキョウッタテイキカイトリセイキュウケンコウカイギジユウシュチョウカノウカシジユウコト","date":"Excel取込"},{"id":1800000000751,"subject":"民事訴訟法","topic":"訴えの利益ウッタリエキ","level":1,"memo":"【ソース】令和４年予備短答模試レイワネンヨビタントウモシ\n\n計算書類承認取消の訴え＝再決議された特段の事情ない限り訴えの利益失われない。\n遺言者心神喪失でも生存中の遺言無効確認の訴えは認められない。ケイサンショルイショウニントリケシウッタサイケツギトクダンジジョウカギウッタリエキウシナユイゴンシャシンシンソウシツセイゾンチュウイゴンムコウカクニンウッタミト","date":"Excel取込"},{"id":1800000000752,"subject":"民事訴訟法","topic":"訴えの変更ウッタヘンコウ","level":1,"memo":"【ソース】令和４年予備短答模試レイワネンヨビタントウモシ\n\n変更不当なら申立または職権で許さない旨の決定しなければならない。\n変更書面提出時に時効の完成猶予に必要な請求あったとみなされる。控訴審でも相手方の同意不要。全部勝訴でも附帯控訴で追加可能。ヘンコウフトウモウシタテショッケンユルムネケッテイヘンコウショメンテイシュツジジコウカンセイユウヨヒツヨウセイキュウコウソシンアイテガタドウイフヨウゼンブショウソフタイコウソツイカカノウ","date":"Excel取込"},{"id":1800000000753,"subject":"民事訴訟法","topic":"訴えの提起ウッタテイキ","level":1,"memo":"【ソース】伊藤塾2022プレ模試\n\n不備補正不可＝判決で却下フビホセイフカハンケツキャッカ","date":"Excel取込"},{"id":1800000000754,"subject":"不動産登記法","topic":"裁判所の許可を証する情報","level":1,"memo":"【ソース】伊藤塾2023プレ模試\n\n特別縁故者不存在確定の持分移転＝家裁の許可不要。不在者の財産管理人・破産管財人＝遺産分割参加時は家裁の許可必要。不在者の財産管理人＝時効取得は家裁の許可必要。清算人が不動産売買＝不要。相続財産管理人が時効取得＝必要。家裁許可提供で移転＝識別不要","date":"Excel取込"},{"id":1800000000755,"subject":"不動産登記法","topic":"債権者代位による登記","level":1,"memo":"国税滞納処分のために「滞納処分の差押」を代位原因にして「真正な登記名義の回復」原因の所有権移転可能。\n抵当権者＝競売開始決定に基づく差押あるなら買戻権者と共同して買戻し特約抹消可能","date":"Excel取込"},{"id":1800000000756,"subject":"不動産登記法","topic":"根抵当権設定登記","level":1,"memo":"極度額必ず日本の通貨。電子記録債権OK。","date":"Excel取込"},{"id":1800000000757,"subject":"不動産登記法","topic":"根抵当権の登記全般","level":1,"memo":"【ソース】LEC2023実力診断模試\n\n確定していることを確認する判決＝単独で確定申請不可＝確定の登記命ずる判決必要。\n民法392条第2項の代位の付記登記＝前提として元本確定の登記必要。代位弁済を原因とする移転の登記＝前提として元本確定登記必要\n根抵当権で担保されるべき債権の質権者がした競売の申立て＝確定事由。債務者について会社分割＝設定者は確定請求できるが、しなかったら確定してない。転根抵当権者のした申立＝確定事由。一部譲渡受けたものが競売＝当事者。\n根抵当権者が第三者によりされた担保不動産収益執行による差押知ったこと＝確定事由じゃない。","date":"Excel取込"},{"id":1800000000758,"subject":"不動産登記法","topic":"根抵当権の登記","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n共有の根抵当権者の一部が分割→共有者の権利の一部移転の登記\n優先の定め廃止＝抹消じゃなく廃止変更の登記。\n一部譲渡＝分割せず共有＝極度額変更ないので転抵当権者の承諾不要。\n根抵当権の準共有者全員で一体として分割譲渡一部譲渡は可能。一人の権利を数人に全部譲渡もNG\n債務者権設定者を未成年が相続＝指定債務者の合意しても利益相反に該当しない。質入れ債権は特定が必要。\nリース等取引契約可能。根抵当権者死亡で消滅する定め登記可能。","date":"Excel取込"},{"id":1800000000759,"subject":"不動産登記法","topic":"根抵当権の債務者の変更の登記","level":1,"memo":"債務者の住所のみの変更＝変更後の事項は住所と氏名記載。抵当権なら不要。\n債務者の縮減的変更で識別あるなら根抵当権者の印鑑証明不要","date":"Excel取込"},{"id":1800000000760,"subject":"不動産登記法","topic":"根抵当権の極度額の変更","level":1,"memo":"根抵当権の減額請求＝減額請求が根抵当権者に到達で効力発生（形成権）＝請求証する書面と到達証する書面必要。","date":"Excel取込"},{"id":1800000000761,"subject":"不動産登記法","topic":"根抵当権の確定期日","level":1,"memo":"新設なら登記原因新設、それ以外は変更。確定期日廃止は「確定期日　廃止」","date":"Excel取込"},{"id":1800000000762,"subject":"不動産登記法","topic":"根抵当権に関する登記","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n確定前の債務者消滅会社とする合併＝債務者でない設定者が知った日から2週間以内or合併から1ヶ月以内に確定請求＝合併の日に確定。\n共同根抵当権で片方だけ差押えの登記＝もう一方も確定だが前提として元本確定登記は必要。\n債務者の破産開始決定＝債権者単独申請可能だが、元本確定のみはNG。\n根抵当権の債権質入れ登記OK（確定前後問わず）\n準共有根抵当権につき、根抵当権者へ共有持分移転登記あっても混同で消滅しない。\n共有不動産＝根抵当権者は全員に確定請求通知必要。元本確定の同時単独申請＝準共有者の一部の権利移転でもOK\n根抵当権者が強制競売開始・滞納処分差押知ってから2週間で権利取得と合わせて単独元本確定申請→民事執行法49条2項の債権届出の催告受けた証する書面必要。確定前＝極度額➗準共有者✖️2/1000。債権の範囲変更＝関係ない準共有者も登記義務負う。銀行取引→年月日貸付金という特定債権のみとする変更可能。\n確定後根抵当権の被担保債権一部弁済されても極度額減額変更登記は不可。","date":"Excel取込"},{"id":1800000000763,"subject":"不動産登記法","topic":"原本還付の可否","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n第三者の承諾に添付する印鑑証明還付不可","date":"Excel取込"},{"id":1800000000764,"subject":"不動産登記法","topic":"建物のみに関する旨の記録が付記される登記","level":1,"memo":"建物のみに抵当権設定＝建物のみ付記。敷地権後でも不動産保存の先取特権保存登記可能＝性質上建物のみなので付記されない。","date":"Excel取込"},{"id":1800000000765,"subject":"不動産登記法","topic":"区分地上権の登記","level":1,"memo":"区分地上権の存続期間短縮の変更登記＝抵当権者の同意あれば付記、なければ主登記","date":"Excel取込"},{"id":1800000000766,"subject":"不動産登記法","topic":"区分建物に関する登記","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n敷地権前に建物のみに抵当権→敷地権表示後担保権の実行としての競売開始決定に基づく差押登記可能\n建物に所有権以外の権利の登記→敷地権表示されたら建物のみ付記（買戻とか）特定担保権も。敷地権と共同担保なら敷地権側の特定担保を職権で抹消。所有権移転仮登記＝敷地権の表示不要。\n強制競売開始決定による差押え及びその登記＝敷地権登記後は不可。\n賃借権建物のみに登記可能＝建物のみ記載されない。土地のみは関係ない。\n敷地権である土地のみに区分地上権設定可能。一般先取特権は総財産上なので分離不可。\n敷地権の目的となる土地所在・地番・地目地積表示必要＝賃借権なら不要。\n所有権移転請求権保全の仮登記→敷地権表示されたら職権で建物のみ付記される。\n仮登記付着した所有権を敷地権にできない。存続期間法廷更新なら、地上権の準共有者が保存行為として地上権設定者全員と存続期間変更の共同申請可能","date":"Excel取込"},{"id":1800000000767,"subject":"司法書士法","topic":"司法書士法人シホウショシホウジン","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n定款の定めで社員の過半数で定款変更可能テイカンサダシャインカハンスウテイカンヘンコウカノウ","date":"Excel取込"},{"id":1800000000768,"subject":"司法書士法","topic":"司法書士の業務および義務シホウショシギョウムギム","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n公認会計士登録抹消または土地家屋調査士・弁理士・税理士行政書士の業務禁止＝欠格事由コウニンカイケイシトウロクマッショウトチカオクチョウサシベンリシゼイリシギョウセイショシギョウムキンシケッカクジユウ","date":"Excel取込"},{"id":1800000000769,"subject":"商法・会社法","topic":"約束手形ヤクソクテガタ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n原因関係上の債務と約束手形上の債務が併存する場合、原因関係履行されたら手形金請求拒める。手形は相対的構成。約束手形返還と引換の主張OKゲンインカンケイジョウサイムヤクソクテガタジョウサイムヘイゾンバアイゲンインカンケイリコウテガタキンセイキュウコバテガタソウタイテキコウセイヤクソクテガタヘンカンヒキカエシュチョウ","date":"Excel取込"},{"id":1800000000770,"subject":"商法・会社法","topic":"登記事項トウキジコウ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n登記官の過誤で内容誤り＝第三者に対抗可能トウキカンカゴナイヨウアヤマダイサンシャタイコウカノウ","date":"Excel取込"},{"id":1800000000771,"subject":"商法・会社法","topic":"訴訟ソショウ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n監査役設置会社が取締役であったものに訴え提起＝監査役が会社代表カンサヤクセッチガイシャトリシマリヤクウッタテイキカンサヤクカイシャダイヒョウ","date":"Excel取込"},{"id":1800000000772,"subject":"商法・会社法","topic":"責任セキニン","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n場屋営業者は、注意していたことを証明できたとしても、不可抗力が原因でない場合は、損害賠償責任を負う","date":"Excel取込"},{"id":1800000000773,"subject":"商法・会社法","topic":"商行為ショウコウイ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n自己の営業として婚姻の媒介＝商行為。商法５１６条\n商行為によって生じた債務の履行をすべき場所がその行為の性質又は当事者の意思表示によって定まらないときは、特定物の引渡しはその行為の時にその物が存在した場所において、その他の債務の履行は債権者の現在の営業所（営業所がない場合にあっては、その住所）において、それぞれしなければならない。ジコエイギョウコンインバイカイショウコウイ","date":"Excel取込"},{"id":1800000000774,"subject":"商法・会社法","topic":"商行為ショウコウイ","level":1,"memo":"【ソース】令和４年予備短答模試レイワネンヨビタントウモシ\n\n平常取引をしていない相手方からの申込みも、遅滞なく諾否通知しないと承諾とみなされる。\n保管義務は物品の価額が保管費用より低いなら負わないヘイジョウトリヒキアイテガタモウシコミチタイダクヒツウチショウダクホカンギムブッピンカガクホカンヒヨウヒクオ","date":"Excel取込"},{"id":1800000000775,"subject":"商法・会社法","topic":"社債シャサイ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n無記名社債は社債券の発行が必要。申込者が社債権者となるのは、会社が割り当てた段階、総額引受の場合は、総額引受契 約が成立した段階。取締役に委任することができない事項は、募集社債の総額の上限や募集社債の利率の上限、募集社債の払込金額の総額の最低金額な（会社法施行規則９９条）。ムキメイシャサイシャサイケンハッコウヒツヨウ","date":"Excel取込"},{"id":1800000000776,"subject":"商法・会社法","topic":"個人商人の責任コジンショウニンセキニン","level":1,"memo":"【ソース】令和４年予備短答模試レイワネンヨビタントウモシ\n\n売買契約の合意解除に際し買主に手付金返還約した場合、商号利用許諾商人も手付返還債務にちて連帯して責任負う。バイバイケイヤクゴウイカイジョサイカイヌシテツケキンヘンカンヤクバアイショウゴウリヨウキョダクショウニンテツケヘンカンサイムレンタイセキニンオ","date":"Excel取込"},{"id":1800000000777,"subject":"商法・会社法","topic":"業務執行取締役ギョウムシッコウトリシマリヤク","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n業務執行取締役も使用人に再委任可能。監視義務ありギョウムシッコウトリシマリヤクシヨウニンサイイニンカノウカンシギム","date":"Excel取込"},{"id":1800000000778,"subject":"商法・会社法","topic":"株主提案権カブヌシテイアンケン","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n監査委員会設置と監査役・監査役会廃止は一つの議案とみなされる。議案提案は8週間前までカンサイインカイセッチカンサヤクカンサヤクカイハイシヒトギアンギアンテイアンシュウカンマエ","date":"Excel取込"},{"id":1800000000779,"subject":"商業登記法","topic":"役員変更の登記ヤクインヘンコウトウキ","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n指名委員会等設置会社以外の役会設置会社は特別取締役による議決の定めOK。\n監査等委員会設置以外なら取締役６名以上かつそのうち１名社外取締役の必要あり＝社外取締役である旨登記。シメイイインカイトウセッチガイシャイガイヤクカイセッチガイシャトクベツトリシマリヤクギケツサダカンサトウイインカイセッチイガイトリシマリヤクメイイジョウメイシャガイトリシマリヤクヒツヨウシャガイトリシマリヤクムネトウキ","date":"Excel取込"},{"id":1800000000780,"subject":"商業登記法","topic":"持分会社の登記モチブンカイシャトウキ","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n合名会社は社員全員名称と住所登記。ゴウメイガイシャシャインゼンインメイショウジュウショトウキ","date":"Excel取込"},{"id":1800000000781,"subject":"商業登記法","topic":"未成年者の登記ミセイネンシャトウキ","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n未成年者の登記は未成年者自身が申請。消滅は未成年者も法定代理人も可能。\n成年消滅は登記官の職権可能。ミセイネンシャトウキミセイネンシャジシンシンセイショウメツミセイネンシャホウテイダイリニンカノウセイネンショウメツトウキカンショッケンカノウ","date":"Excel取込"},{"id":1800000000782,"subject":"商業登記法","topic":"募集株式の発行による変更の登記ボシュウカブシキハッコウヘンコウトウキ","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n出資金銭のみでも、資本金計上書面必要。（設立の時は不要）\n会計帳簿の記載から弁済期の到来確認できなくてもOK。（期限の利益放棄すればいいから）シュッシキンセンシホンキンケイジョウショメンヒツヨウセツリツトキフヨウカイケイチョウボキサイベンサイキトウライカクニンキゲンリエキホウキ","date":"Excel取込"},{"id":1800000000783,"subject":"商業登記法","topic":"募集株式の発行による変更の登記ボシュウカブシキハッコウヘンコウトウキ","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n募集株式引受人会社の利益相反承認の書面は不要。\n非公開原則総会特別だが、取締役決定定款あるなら定款添付必要。ボシュウカブシキヒキウケニンカイシャリエキソウハンショウニンショメンフヨウヒコウカイゲンソクソウカイトクベツトリシマリヤクケッテイテイカンテイカンテンプヒツヨウ","date":"Excel取込"},{"id":1800000000784,"subject":"商業登記法","topic":"同時申請ドウジシンセイ","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n合名で代表しない社員退社＝退社と代表社員抹消は同時申請。ゴウメイダイヒョウシャインタイシャタイシャダイヒョウシャインマッショウドウジシンセイ","date":"Excel取込"},{"id":1800000000785,"subject":"商業登記法","topic":"清算株式会社の登記セイサンカブシキガイシャトウキ","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n継続の登記した時＝登記官が清算人抹消する。利害関係人の申立てで一時清算人選任→書記官によって嘱託。\n監査等委員が監査役→自分で監査役登記。解任の裁判→書記官によって解任嘱託。ケイゾクトウキトキトウキカンセイサンニンマッショウリガイカンケイニンモウシタイチジセイサンニンセンニンショキカンショクタクカンサトウイインカンサヤクジブンカンサヤクトウキカイニンサイバンショキカンカイニンショクタク","date":"Excel取込"},{"id":1800000000786,"subject":"商業登記法","topic":"申請または嘱託シンセイショクタク","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n登記の嘱託もオンラインで可能。登記期間過ぎていることを理由に却下にはならない。\n登記官またはその配偶者もしくは４親等内の親族（であったもの）が申請人＝当該登記官は登記できない。トウキショクタクカノウトウキキカンスリユウキャッカトウキカンハイグウシャシントウナイシンゾクシンセイニントウガイトウキカントウキ","date":"Excel取込"},{"id":1800000000787,"subject":"商業登記法","topic":"嘱託・職権による登記ショクタクショッケントウキ","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n訴えをもってのみ無効主張できる登記＝申請で抹消できない。\n官庁嘱託でも受領証交付請求可能。支配人が破産して代理権消滅＝代表が申請。\n一時取締役＝裁判所の嘱託。名称・裁判年月日確定年月日記録。ウッタムコウシュチョウトウキシンセイマッショウカンチョウショクタクジュリョウショウコウフセイキュウカノウシハイニンハサンダイリケンショウメツダイヒョウシンセイイチジトリシマリヤクサイバンショショクタクメイショウサイバンネンガッピカクテイネンガッピキロク","date":"Excel取込"},{"id":1800000000788,"subject":"商業登記法","topic":"指名委員会等設置会社の登記シメイイインカイトウセッチガイシャトウキ","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n各委員の名称は取締役区分とは別に表記される。指名委員会は特別取締役の定め不可。\n代表執行役の選任＝取締役会。カクイインメイショウトリシマリヤククブンベツヒョウキシメイイインカイトクベツトリシマリヤクサダフカダイヒョウシッコウヤクセンニントリシマリヤクカイ","date":"Excel取込"},{"id":1800000000789,"subject":"商業登記法","topic":"合名会社の設立の登記ゴウメイガイシャセツリツトウキ","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n設立は一律６万円。業務執行しないもの含め、社員全員の氏名・住所必要。代表社員の印鑑証明提出する場面なし。法人社員が合名会社を代表しない時、職務代行者の登記不要。セツリツイチリツマンエンギョウムシッコウフクシャインゼンインシメイジュウショヒツヨウダイヒョウシャインインカンショウメイテイシュツバメンホウジンシャインゴウメイガイシャダイヒョウトキショクムダイコウシャトウキフヨウ","date":"Excel取込"},{"id":1800000000790,"subject":"商業登記法","topic":"株式会社の設立の登記カブシキガイシャセツリツトウキ","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n発起人が受ける報酬を定款で定めた時、検査役の調査省略不可能＋設立時調査報告書＋附属書類。\n①創立総会終結日②種類総会決議の日③引受けの取消可能決議の日から２週間を経過した日④引受け取消可能種類創立総会決議の日から２週間経過した日⑤設立時種類株主に損害及ぼす可能性ある場合の種類創立総会決議の日＝これらの日のうちもっとも遅い日から２週間以内に設立登記。ホッキニンウホウシュウテイカンサダトキケンサヤクチョウサショウリャクフカノウセツリツジチョウサホウコクショフゾクショルイソウリツソウカイシュウケツビシュルイソウカイケツギヒヒキウケトリケシカノウケツギヒシュウカンケイカヒヒキウケトリケシカノウシュルイソウリツソウカイケツギヒシュウカンケイカヒセツリツジシュルイカブヌシソンガイオヨカノウセイバアイシュルイソウリツソウカイケツギヒヒオソヒシュウカンイナイセツリツトウキ","date":"Excel取込"},{"id":1800000000791,"subject":"商業登記法","topic":"株式会社の設立の登記カブシキカイシャセツリツトウキ","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n株式会社の負担する設立費用（定款手数料除く）＝検査役の調査で報告書附属書類添付。\n本店ない定款後から認証受けても無効。定款作成代理人証する書面不要。\n譲渡制限か全部取得条項付種類株式とする創立総会決議＝設立時種類株式の引受取消可能だから、決議の日から２週間経過まで設立登記申請できない。カブシキガイシャフタンセツリツヒヨウテイカンテスウリョウノゾケンサヤクチョウサホウコクショフゾクショルイテンプホンテンテイカンアトニンショウウムコウテイカンサクセイダイリニンショウショメンフヨウジョウトセイゲンゼンブシュトクジョウコウツシュルイカブシキソウリツソウカイケツギセツリツジシュルイカブシキヒキウケトリケシカノウケツギヒシュウカンセツリツトウキシンセイ","date":"Excel取込"},{"id":1800000000792,"subject":"商業登記法","topic":"会社以外の商人全般の登記カイシャイガイショウニンゼンパントウキ","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n氏名登記されるものは住所も登記される。後見人の登記の印鑑提出者＝法人代表・職務代行者＝氏名登記されない。未成年・後見人・支配人＝電子証明書発行認められない。\n会社法人番号＝会社以外の商人にも付される（後見人の登記は被後見人に）。家裁の嘱託で商業登記はない。シメイトウキジュウショトウキコウケンニントウキインカンテイシュツシャホウジンダイヒョウショクムダイコウシャシメイトウキミセイネンコウケンニンシハイニンデンシショウメイショハッコウミトカイシャホウジンバンゴウカイシャイガイショウニンフコウケンニントウキヒコウケンニンカサイショクタクショウギョウトウキ","date":"Excel取込"},{"id":1800000000793,"subject":"商業登記法","topic":"一般社団法人の登記イッパンシャダンホウジントウキ","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n名称区に会社法人等番号記録される。評議員おけない。資産の総額は貸借対照表を公告。非業務執行理事が負う責任の限度に関する契約の締結についての定款の定めも登記事項。支配人の選任不可。メイショウクカイシャホウジントウバンゴウキロクヒョウギインシサンソウガクタイシャクタイショウヒョウコウコクヒギョウムシッコウリジオセキニンゲンドカンケイヤクテイケツテイカンサダトウキジコウシハイニンセンニンフカ","date":"Excel取込"},{"id":1800000000794,"subject":"憲法","topic":"労働基本権ロウドウキホンケン","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n他組合に加入した者又は新たな組合を結成した者に対してなされたユニオン・ショップ協定を理由とする解雇は、民法第90条（公序良俗違反）により無効となる","date":"Excel取込"},{"id":1800000000795,"subject":"憲法","topic":"立法リッポウ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n内閣は政令で国民の権利義務に関する定めできないナイカクセイレイコクミンケンリギムカンサダ","date":"Excel取込"},{"id":1800000000796,"subject":"憲法","topic":"平等権ビョウドウケン","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n嫡出でない子の別の記載は憲法に違反しない。チャクシュツコベツキサイケンポウイハン","date":"Excel取込"},{"id":1800000000797,"subject":"憲法","topic":"内閣ナイカク","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n参議院の問責決議で総辞職の規定ない。総理の当選無効＝総辞職必要。サンギインモンセキケツギソウジショクキテイソウリトウセンムコウソウジショクヒツヨウ","date":"Excel取込"},{"id":1800000000798,"subject":"憲法","topic":"当事者適格トウジシャテキカク","level":1,"memo":"【ソース】LEC直前予想模試2022\n\n被告が時効取得＝筆界特定の原告適格欠く\n口頭弁論終結後の承継人は再審の原告適格あり。","date":"Excel取込"},{"id":1800000000799,"subject":"憲法","topic":"天皇の公的行為テンノウコウテキコウイ","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n国事行為説＝摂政もおことば可能。コクジコウイセツセッショウカノウ","date":"Excel取込"},{"id":1800000000800,"subject":"憲法","topic":"選挙制度センキョセイド","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n衆議院議員選挙の比例代表の場合、小選挙区と重複して立候補できると規定されており（公職選挙法第86条の2第4項）、立候補する際に所属政党の許可が得られれば、立候補者が「小選挙区選挙」と「比例代表選挙」に重複して立候補できる。ただし、公職選挙法上の政党要件を満たしていない「その他の政治団体」から立候補した場合、重複はできない。","date":"Excel取込"},{"id":1800000000801,"subject":"憲法","topic":"人身の自由ジンシンジユウ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n黙秘権を規定した日本国憲法第38条第1項の法意は何人も自己が刑事上の責任を問われるおそれのある事項について供述を強要されないことを保障したものと解すべきで、道路交通取締法施行令第67条第2項により事故報告を命ずることは、憲法第38条第1項にいう自己に不利益な供述の強要にあたらない。","date":"Excel取込"},{"id":1800000000802,"subject":"憲法","topic":"職業選択の自由 問４ショクギョウセンタクジユウトイ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n許可制は、職業の自由に対する強力な制限であるから、その合憲性を肯定しうるためには、原則として、重要な公共の利益のために必要かつ合理的な措置であることを要し、また、それが社会政策ないしは経済政策上の積極的な目的のための措置ではなく、自由な職業活動が社会公共に対してもたらす弊害を防止するための消極的、警察的措置である場合には、許可制に比べて職業の自由に対するよりゆるやかな制限である職業活動の内容及び態様に対する規制によつては右の目的を十分に達成することができないと認められることを要する","date":"Excel取込"},{"id":1800000000803,"subject":"憲法","topic":"条約ジョウヤク","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n予算、条約又は内閣総理大臣の指名については、両院協議会を開いても意見が一致しないときは、衆議院の議決が国会の議決。参議院が衆議院の議決した予算又は条約を受け取った後３０日以内に議決しないとき、及び衆議院が内閣総理大臣の指名の議決をした後１０日以内に参議院が指名の議決をしないときは、衆議院の議決が国会の議決となる。\n法律案については、衆議院で可決し、参議院でこれと異なった議決をした場合に、衆議院が出席議員の３分の２以上の多数で再び可決すれば、法律となる。ただし、衆議院から両院協議会を求めることもできる","date":"Excel取込"},{"id":1800000000804,"subject":"憲法","topic":"集会の自由シュウカイジユウ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n皇居外苑使用不許可事件＝国民が皇居外苑に集合し利用することは、その利用の許否（許可するか否か）は厚生大臣の自由裁量ではなく、公園としての使命を達成させるよう考慮した上で決しなければならない。","date":"Excel取込"},{"id":1800000000805,"subject":"憲法","topic":"司法権シホウケン","level":1,"memo":"【ソース】LEC直前予想模試2022\n\n制限行為能力を理由に自ら取り消すことはできない。\n一個の営業の一部の許可NG。\n時効の承認＝管理能力必要。未成年は法定代理人の同意必要セイゲンコウイノウリョクリユウミズカトケイッコエイギョウイチブキョカジコウショウニンカンリノウリョクヒツヨウミセイネンホウテイダイリニンドウイヒツヨウ","date":"Excel取込"},{"id":1800000000806,"subject":"憲法","topic":"司法権シホウケン","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n民衆訴訟は具体的な事件性を事件性を前提とせずに出訴する制度ミンシュウソショウグタイテキジケンセイジケンセイゼンテイシュッソセイド","date":"Excel取込"},{"id":1800000000807,"subject":"憲法","topic":"思想及び良心の自由シソウオヨリョウシンジユウ","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n君が代伴奏＝通常想定されるもの→19条に違反しない。キミヨバンソウツウジョウソウテイジョウイハン","date":"Excel取込"},{"id":1800000000809,"subject":"憲法","topic":"国会コッカイ","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n両議院の会議＝出席議員の3分の2で秘密会。秘密会の秘密以外は一般に頒布必要。\n必要的両院協議会①予算案の承認②条約の承認③内閣総理大臣の指名\n内閣はいずれかの議員の総議員の4分の1の要求あれば臨時会召集の法的義務ありリョウギインカイギシュッセキギインブンヒミツカイヒミツカイヒミツイガイイッパンハンプヒツヨウヒツヨウテキリョウインキョウギカイヨサンアンショウニンジョウヤクショウニンナイカクソウリダイジンシメイナイカクギインソウギインブンヨウキュウリンジカイショウシュウホウテキギム","date":"Excel取込"},{"id":1800000000810,"subject":"憲法","topic":"国会コッカイ","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n資格争訟裁判に不服あるものは裁判所に救済求められる。シカクソウショウサイバンフフクサイバンショキュウサイモト","date":"Excel取込"},{"id":1800000000811,"subject":"憲法","topic":"幸福追求権コウフクツイキュウケン","level":1,"memo":"【ソース】LEC直前予想模試2022\n\n裁判官の一時的な故障は重大であっても罷免自由にあたらない。家裁の遺産分割＝公開の法廷で行う必要がない。\n行政事件の裁判含め通常裁判に属するものとする。\n弁護士の資格要件は法律で決める。裁判所規則不可。サイバンカンイチジテキコショウジュウダイヒメンジユウカサイイサンブンカツコウカイホウテイオコナヒツヨウギョウセイジケンサイバンフクツウジョウサイバンゾクベンゴシシカクヨウケンホウリツキサイバンショキソクフカ","date":"Excel取込"},{"id":1800000000812,"subject":"刑法","topic":"未遂及び既遂ミスイオヨキスイ","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n殺人＝他人の生命侵害現実的危険発生＝青酸カリ米→未遂。\n窃盗＝警戒管理されている構内＝警戒突破して構外搬出で既遂。自転車手をかけ方向転換→既遂\n事後強盗罪＝財物得て取り返すの防ぐために暴行脅迫→財物得たかで既遂決まる。サツジンタニンセイメイシンガイゲンジツテキキケンハッセイセイサンコメミスイセットウケイカイカンリコウナイケイカイトッパコウガイハンシュツキスイジテンシャテホウコウテンカンキスイジゴゴウトウザイザイブツエトカエフセボウコウキョウハクザイブツエキスイキ","date":"Excel取込"},{"id":1800000000813,"subject":"刑法","topic":"放火の罪ホウカツミ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n保険金確認ホケンキンカクニン","date":"Excel取込"},{"id":1800000000814,"subject":"刑法","topic":"賭博の罪トバクツミ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n賭博罪・賭博場開帳図利罪トバクザイトバクジョウカイチョウトリザイ","date":"Excel取込"},{"id":1800000000815,"subject":"刑法","topic":"盗品等に関する罪トウヒントウカンツミ","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n強盗教唆罪と盗品等無償譲受け罪は併合罪ゴウトウキョウサザイトウヒントウムショウユズリウザイヘイゴウザイ","date":"Excel取込"},{"id":1800000000816,"subject":"刑法","topic":"窃盗罪セットウザイ","level":1,"memo":"【ソース】LEC直前予想模試2022\n\n設立時委員の選定は設立時取締役の過半数で決定セツリツジイインセンテイセツリツジトリシマリヤクカハンスウケッテイ","date":"Excel取込"},{"id":1800000000817,"subject":"刑法","topic":"実行の着手ジッコウチャクシュ","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n隔離犯（毒物）＝到達主義。通貨偽造等は原材料である金属切り出し時カクリハンドクブツトウタツシュギツウカギゾウトウゲンザイリョウキンゾクキダジ","date":"Excel取込"},{"id":1800000000818,"subject":"刑法","topic":"強盗罪と強盗殺人罪ゴウトウザイゴウトウサツジンザイ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n要復習ヨウフクシュウ","date":"Excel取込"},{"id":1800000000819,"subject":"刑法","topic":"刑の執行猶予ケイシッコウユウヨ","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n前に禁錮以上の刑に処せられたことがない者が3年以下の懲役または禁固＝1年以上5年以下一部の執行猶予可能。\n禁固以上かせられたことがあっても、執行終わった（免除終わった）日から5年以内に禁錮かせられてないものが3年以下懲役・禁固または50万以下の罰金→1年以上5年未満全部執行猶予OK。余罪についてさらに執行猶予OK。\n禁固以上でも全部執行猶予者が1年以下の懲役または禁錮＝全部執行猶予OK。マエケイショモノネンイカチョウエキキンコネンイジョウネンイカイチブシッコウユウヨカノウキンコイジョウシッコウオメンジョオヒネンイナイキンコネンイカチョウエキキンコマンイカバッキンネンイジョウネンミマンゼンブシッコウユウヨヨザイシッコウユウヨキンコイジョウゼンブシッコウユウヨシャネンイカチョウエキキンコゼンブシッコウユウヨ","date":"Excel取込"},{"id":1800000000821,"subject":"刑法","topic":"共犯キョウハン","level":1,"memo":"【ソース】LEC直前予想模試2022\n\n受託者が内容物のみ抜き取った場合、窃盗罪。共同保管者が自己の占有に移す行為＝窃盗。ジュタクシャナイヨウブツヌトバアイセットウザイザイキョウドウホカンシャジコセンユウウツコウイセットウ","date":"Excel取込"},{"id":1800000000822,"subject":"刑法","topic":"共犯キョウハン","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n教唆されたものが教唆された犯罪事実を実行したら処罰関係なく成立。\n教唆行為あきらめて新たな意思で犯罪＝因果関係なし。キョウサキョウサハンザイジジツジッコウショバツカンケイセイリツキョウサコウイアライシハンザイインガカンケイ","date":"Excel取込"},{"id":1800000000823,"subject":"刑法","topic":"毀棄及び隠匿キキオヨイントク","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n卒業証書＝事実証明に関する文書。隠したら物の効用害するので器物損壊罪の客体。\n不動産登記ファイル＝公務所にて管理支配→公用文書等毀棄罪の客体ソツギョウショウショジジツショウメイカンブンショカクモノコウヨウガイキブツソンカイザイキャクタイフドウサントウキコウムショカンリシハイコウヨウブンショトウキキザイキャクタイ","date":"Excel取込"},{"id":1800000000824,"subject":"刑法","topic":"違法性イホウセイ","level":1,"memo":"【ソース】LEC直前予想模試2022\n\n殺人予備罪の共同正犯ありサツジンヨビザイキョウドウセイハン","date":"Excel取込"},{"id":1800000000825,"subject":"刑事訴訟法","topic":"弁護人の活動ベンゴニンカツドウ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n弁護人は検察官のした接見日時指定に不満あれば裁判所に変更取消請求可能\n保釈は検察官によって公訴提起・公判請求された後に、裁判官又は裁判所に対して請求。その前は準抗告ベンゴニンケンサツカンセッケンニチジシテイフマンサイバンショヘンコウトリケシセイキュウカノウホシャクケンサツカンコウソテイキコウハンセイキュウアトサイバンカンマタサイバンショタイセイキュウマエジュンコウコク","date":"Excel取込"},{"id":1800000000826,"subject":"刑事訴訟法","topic":"証人尋問ショウニンジンモン","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n被疑者の共犯者にも証人尋問可能・第一回公判期日後に証人尋問できない。尋問請求先は裁判官ヒギシャキョウハンシャショウニンジンモンカノウダイイッカイコウハンキジツゴショウニンジンモンジンモンセイキュウサキサイバンカン","date":"Excel取込"},{"id":1800000000827,"subject":"刑事訴訟法","topic":"公判前整理手続コウハンマエセイリテツヅキ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n公判前整理手続でも黙秘権の告知必要。コウハンマエセイリテツヅキモクヒケンコクチヒツヨウ","date":"Excel取込"},{"id":1800000000828,"subject":"刑事訴訟法","topic":"公判手続コウハンテツヅキ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n冒頭手続＝人定質問→起訴状朗読→黙秘権告知→被告人と弁護人の陳述\n証拠調手続＝冒頭陳述→立証→被告人質問","date":"Excel取込"},{"id":1800000000829,"subject":"供託法","topic":"担保供託タンポ キョウタク","level":1,"memo":"供託物取戻請求権に処分制限＝差替え不可。担保取消決定に承継人記載されていても取戻時に書面添付省略不可。\n被供託者を特定できる時は氏名等を供託書に記載しなければならない。キョウタクブツ トリモドシ セイキュウケ ケンショブンセイゲン サシカエ フカ タンポ トリケシケッテイ ショウケイニｎ キサイ トリモドシ ショメンテンプ ショウリャク フカ ヒキョウタクトクテイ トキハ 🈯️トウヲ キョウタクショ ショ キサイ","date":"Excel取込"},{"id":1800000000830,"subject":"行政法","topic":"争訟の種類ソウショウシュルイ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n起業者を被告として土地所有権の確認を求める訴え。教職員の義務不存在確認\n国外居住日本人の選挙権確認。長の公開決定に国が取消訴訟キギョウシャヒコクトチショユウケンカクニンモトウッタキョウショクインギムフソンザイカクニンコクガイキョジュウニホンジンセンキョケンカクニンチョウコウカイケッテイクニトリケシソショウ","date":"Excel取込"},{"id":1800000000831,"subject":"行政法","topic":"情報の公開ジョウホウコウカイ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n人の生命等に関わり公にすることが必要な情報＝法人の利益害しても不開示にできない\n開示請求の方法確認ヒトセイメイトウカカホウジンリエキガイフカイジカイジセイキュウホウホウカクニン","date":"Excel取込"},{"id":1800000000832,"subject":"行政法","topic":"抗告訴訟コウコクソショウ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n差止の訴えの第三者効確認。取消判決の行政庁＝事実認定及び法律行為に従う義務はない。サシトメウッタダイサンシャコウカクニントリケシハンケツギョウセイチョウジジツニンテイオヨホウリツコウイシタガギム","date":"Excel取込"},{"id":1800000000833,"subject":"行政法","topic":"原告適格ゲンコクテキカク","level":1,"memo":"【ソース】令和５ ic":"合同会社ゴウドウガイシャ","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n合同会社で資本金減少＝債権者異議終了時に効力生じるので効力発生日定めなくてよい。\n社員は死亡によって退社。定款ないと持分相続しない。支店設置は業務執行社員。支配人の選解任は社員。\n合同会社は払い込み場所に制限ない。ゴウドウガイシャシホンキンゲンショウサイケンシャイギシュウリョウジコウリョクショウコウリョクハッセイビサダシャインシボウタイシャテイカンモブンソウゾクシテンセッチギョウムシッコウシャインシハイニンセンカイニンシャインゴウドウカイシャハラコバショセイゲン","date":"Excel取込"},{"id":1800000000858,"subject":"商法・会社法","topic":"合同会社ゴウドウガイシャ","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n金銭以外が出資の目的でも裁判所の選任する検査役の調査不要。持分尾の払戻が剰余金額超える場合も払戻可能＝債権者異議必要。違反した場合、注意怠らなかったこと照明したこと除き、業務執行社員は連帯して会社に金銭支払義務負う。社員全員の同意で自己取引及び事業の部類に属する取引＆他社役員OK。\n持分会社と取引・利益相反＝社員の過半数キンセンイガイシュッシモクテキサイバンショセンニンケンサヤクチョウサフヨウモチブンオハライモドシジョウヨキンガクコバアイハライモドシカノウサイケンシャイギヒツヨウイハンバアイチュウイオコタショウメイノゾギョウムシッコウシャインレンタイカイシャキンセンシハラギムオシャインゼンインドウイジコトリヒキオヨジギョウブルイゾクトリヒキタシャヤクインモチブンカイシャトリヒキリエキソウハンシャインカハンスウ","date":"Excel取込"},{"id":1800000000859,"subject":"商法・会社法","topic":"吸収型組織再編行為キュウシュウガタソシキサイヘンコウイ","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n吸収合併・分割無効になったら存続が連帯して債務負担。（株式交換なら子会社債務負わない）\n吸収分割で総株主の同意必要なケースなし。交換契約で親会社以外のものが有する子会社の株一部を取得させることはできない。消滅株式会社の新株予約権者に株式交付することはできない。キュウシュウガッペイブンカツムコウソンゾクレンタイサイムフタンカブシキコウカンコガイシャサイムオキュウシュウブンカツソウカブヌシドウイヒツヨウコウカンケイヤクオヤガイシャイガイユウコガイシャカブイチブシュトクショウメツカブシキガイシャシンカブヨヤクケンシャカブシキコウフ","date":"Excel取込"},{"id":1800000000860,"subject":"商法・会社法","topic":"監査等委員会設置会社と指名委員会等設置会社の比較カンサトウイインカイセッチカイシャシメイイインカイトウセッチガイシャヒカク","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n監査等委員以外の取締役＝１年・監査等委員２年。委員会の委員は役会決議で決める。\n定款で定めあっても、監査等委員が選定する監査等委員・指名委員会等が選定するものは役会召集可能。\n指名委員会等の取締役＝原則業務執行できない。カンサトウイインイガイトリシマリヤクネンカンサトウイインネンイインカイイインヤクカイケツギキテイカンサダカンサトウイインセンテイカンサトウイインシメイイイントウセンテイヤクカイショウシュウカノウシメイイイン","date":"Excel取込"},{"id":1800000000862,"subject":"商法・会社法","topic":"監査等委員会カンサトウイインカイ","level":1,"memo":"【ソース】令和４年予備短答模試レイワネンヨビタントウモシ\n\n常勤の監査等委員は不要。監査役会は取締役の人事・報酬に口出し不可（監査等委員は可能）ジョウキンカンサトウイインフヨウカンサヤクカイトリシマリヤクジンジホウシュウクチダフカカンサトウイインカノウ","date":"Excel取込"},{"id":1800000000863,"subject":"商法・会社法","topic":"株主平等原則カブヌシビョウドウゲンソク","level":1,"memo":"【ソース】令和４年予備短答模試レイワネンヨビタントウモシ\n\n新株予約権無償割当も株主平等原則 縁組及び特別養子縁組フツウヨウシエングミオヨトクベツヨウシエングミ","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n後見人が被後見人を養子・未成年＝両方家裁の許可必要。特別養子後に認知不可。被後見人を養子とする場合、直系卑属でも家裁の許可必要。配偶者の嫡出子を養子にする場合も配偶者の同意は必要。\n15歳未満の子の代諾＝監護者と親権停止されてる父母の同意も必要。\nコウケンニンヒコウケンニンヨウシミセイネンリョウホウカサイキョカヒツヨウトクベツヨウシゴニンチフカ","date":"Excel取込"},{"id":1800000000879,"subject":"民法","topic":"表見代理ヒョウケンダイリ","level":1,"memo":"表見代理に転得者保護なし。112条の表見代理成立も、代理権消滅後の表見代理成立も代理権消滅前の取引不要。ヒョウケンダイリ テントクシャ ホゴナシ ジョウノ ヒョウケンダイリ セイリツ ダイリケンショウメツゴノ ヒョウケンダイリ セイリツ ダイリケンショウメツマエノ トリヒキ フヨウ","date":"Excel取込"},{"id":1800000000880,"subject":"商法・会社法","topic":"創立総会","level":1,"memo":"累積投票可能。議決権制限株主も会社廃止には議決権行使可能","date":"Excel取込"},{"id":1800000000881,"subject":"商法・会社法","topic":"株式等売渡請求カブシキトウウリワタシセイキュウ","level":1,"memo":"新株予約権のみの売渡請求は不可。シンカブヨヤクケンウリワタシセイキュウフカ","date":"Excel取込"},{"id":1800000000882,"subject":"商法・会社法","topic":"社債シャサイ","level":1,"memo":"会社側からも社債の相殺可能。自己社債も決議なく取得可能カイシャガワシャサイソウサイカノウジコシャサイケツギシュトクカノウ","date":"Excel取込"},{"id":1800000000883,"subject":"商法・会社法","topic":"組織再編手続ソシキサイヘンテツヅキ","level":1,"memo":"役会も合併契約の決定は執行役に委任不可。合併無効＝設立会社を被告。ヤクカイガッペイケイヤクケッテイシッコウヤクイニンフカガッペイムコウセツリツガイシャヒコク","date":"Excel取込"},{"id":1800000000884,"subject":"民事訴訟法","topic":"確認の訴えの利益","level":1,"memo":"建物賃貸借契約における敷金返還請求権も確認の訴えの対象。過去の事実の報告偽造確認＝利益なし","date":"Excel取込"},{"id":1800000000885,"subject":"民事訴訟法","topic":"書証ショショウ","level":1,"memo":"文書提出命令に対する提出＝検証物提示命令ブンショテイシュツメイレイタイテイシュツケンショウブツテイジメイレイ","date":"Excel取込"},{"id":1800000000886,"subject":"民事保全法","topic":"不動産の処分禁止の仮処分","level":1,"memo":"保全執行裁判所＝仮処分命令発した裁判所。所有権以外の保存設定変更＝仮処分登記必要。移転消滅は不要。\n債務者以外のものに占有移転禁止の仮処分命令＝執行文の付与に対する意義申し立て可能。\n処分禁止の登記後に建物譲り受けたものに建物の収去土地明渡請求できるが、占有移転した場合は建物退去土地明渡請求訴訟を提起する必要あり","date":"Excel取込"},{"id":1800000000887,"subject":"民事執行法","topic":"不動産の強制競売","level":1,"memo":"裁判所書記官により差押登記の嘱託と配当要求の終期決定、物件明細書作成、売却実施命令、代金納付期限の指定、配当表の作成","date":"Excel取込"},{"id":1800000000888,"subject":"司法書士法","topic":"書士会と連合会","level":1,"memo":"連合会は直接法務大臣に認可申請書、建議諮問答申可能。書士会のみ注意勧告・紛議調停可能。","date":"Excel取込"},{"id":1800000000889,"subject":"不動産登記法","topic":"近時の先例等","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n遺言書保管官作成の遺言書情報証明書を提供必要＝死亡情報としては扱えない。\n受託者Aが信託財産とA固有財産拠出して土地取得＝Aが所有者及び受託者として記載＝識別は１通。","date":"Excel取込"},{"id":1800000000890,"subject":"不動産登記法","topic":"共有の不動産に関する登記","level":1,"memo":"【ソース】2023年TAC予想問題集\n\nAB各2分の1所有地＝同一の契約でCに4分の1ずつ移転＝「A持分4分の1、B持分4分の1移転」","date":"Excel取込"},{"id":1800000000891,"subject":"不動産登記法","topic":"共有の登記","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n根抵当権の準共有者一人の債権の範囲変更でも準共有者全員登記権利者として関与必要。","date":"Excel取込"},{"id":1800000000892,"subject":"不動産登記法","topic":"共同抵当の登記","level":1,"memo":"立木と土地の共同抵当可能。抵当権なら一部弁済後の債権額で追加設定可能。根は不可。","date":"Excel取込"},{"id":1800000000893,"subject":"不動産登記法","topic":"共同抵当・根抵当権の登記","level":1,"memo":"債務者の住所変更＝抵当なら省略追加設定可能。根は不可。","date":"Excel取込"},{"id":1800000000894,"subject":"不動産登記法","topic":"共同根抵当権の登記","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n片方だけ債権の範囲変更登記済みでも双方極度額の変更登記可能→登記しないまま元本確定したら登記した方も範囲変更効力なし。","date":"Excel取込"},{"id":1800000000895,"subject":"不動産登記法","topic":"共同根抵当権の登記","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n優先の定めの内容異なる場合、格別に登記。","date":"Excel取込"},{"id":1800000000896,"subject":"不動産登記法","topic":"期日や期間の登記事項","level":1,"memo":"登記記録上存続期間満了している敷地権地上権の建物の所移=消滅してないなら受理される。","date":"Excel取込"},{"id":1800000000897,"subject":"不動産登記法","topic":"会社法人等番号","level":1,"memo":"資格証する登記事項証明書＝作成後1ヶ月以内。支配人がする場合も１ヶ月。電子証明書も法人番号に変えられる。","date":"Excel取込"},{"id":1800000000898,"subject":"不動産登記法","topic":"会社の利益相反に関する登記","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n会社所有不動産に取締役を債務者とする根抵当＝全部譲渡の設定者の承諾は利益相反に該当＝承認役会議事録必要\n会社と取締役の取引＝利益相反承認は日付には影響しない\n会社所有不動産・債務者代表の根抵当権全部譲渡＝設定者の会社承諾情報＋役会の利益相反承認必要。","date":"Excel取込"},{"id":1800000000899,"subject":"商業登記法","topic":"登記事項証明書の添付","level":1,"memo":"会計参与の書類等備置場所の変更・株主名簿管理人の氏名、営業所変更＝登記簿添付不要","date":"Excel取込"},{"id":1800000000900,"subject":"商業登記法","topic":"登録免許税","level":1,"memo":"本支店移転＝ツで３万円。会社継続＝ソで３万円。合同会社の社員加入と資本金増加＝変更分と増加分両方必要","date":"Excel取込"},{"id":1800000000901,"subject":"商業登記法","topic":"個人商人の商号の登記","level":1,"memo":"商号の譲渡・相続による変更の登記＝３万円。屋号のみ譲渡しても免責の登記可能\n正当な事由なく２年間〜同一の商号使用しようとするものである書面添付必要。","date":"Excel取込"},{"id":1800000000902,"subject":"商業登記法","topic":"新株予約権の登記","level":1,"memo":"割当より前に払込期日＝払込証する書面必要。新株予約権の放棄＝変更登記に放棄書面不要。行使が金銭のみでも払込証する書面必要","date":"Excel取込"},{"id":1800000000903,"subject":"商業登記法","topic":"指名委員会等設置会社に関する登記","level":1,"memo":"発起設立＝設立時代表執行役が設立時取締役から通知を受けた日又は発起人が定めた日のいずれか遅い日から２週間以内。指名委員会等廃止しても会計監査人の任期満了しない＝別途監査役設置会社の定めの設定と変更登記必要。\n執行役も就任承諾書面に住民票とかの添付必要。指名は重太のししし製麺ない416条で規定＝役会委任で支店設置可能。","date":"Excel取込"},{"id":1800000000904,"subject":"商業登記法","topic":"持分会社の種類変更の登記","level":1,"memo":"合資→合同＝合同の定款添付。合名→合同＝一部未履行による効力発生日の変更について総社員の同意書不要。\n合資→社員退社でみなし合同なら出資書面不要。債権者保護なし。種類変更で合同なら最低３万。","date":"Excel取込"},{"id":1800000000905,"subject":"商業登記法","topic":"清算の異同","level":1,"memo":"清算持分会社＝最初の清算人→氏名・住所、代表しない清算人いるときは代表の氏名、法人なら職務執行者。\n合同なら定款添付不要。官報公告２ヶ月は共通。","date":"Excel取込"},{"id":1800000000906,"subject":"不動産登記法","topic":"仮登記全般","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n建物新築による不動産工事の先取特権保存＝NG。停止条件付抵当権の設定の仮登記NG\n移転請求権→移転の仮登記に変更＝識別不要。仮登記処分の所移抹消＝当事者申請","date":"Excel取込"},{"id":1800000000907,"subject":"不動産登記法","topic":"仮登記申請の可否","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n認知の訴えした者を権利者とする所有権移転請求権保全の仮登記命ずる処分＝登記不可\n譲渡担保予約の移転請求権保全仮登記は可能\n離婚停止条件とする条件付所有権移転の仮登記はOK。譲渡担保予約を原因とする所有権移転請求権保全の仮登記OK。\n会社分割原因の1号仮登記OK・2号は不可。遺言者死亡後の1号仮登記はOK。\n根抵当権の極度額増額予約＝根抵当権変更請求権保全の仮登記OK。\n譲渡担保１号・譲渡担保予約２号はOK。根抵当極度額増額予約＝仮登記でも承諾情報必要。\n仮登記根抵当権の元本確定しても元本確定の仮登記は不可。\n一筆の土地の一部の地上権＝不可。所有権保存1号仮登記は仮登記命ずる処分あったら可能。","date":"Excel取込"},{"id":1800000000908,"subject":"不動産登記法","topic":"仮登記の抹消","level":1,"memo":"【ソース】LEC2023実力診断模試\n\n仮登記抹消の前提として所有権登記名義人の住所変更必要。","date":"Excel取込"},{"id":1800000000909,"subject":"不動産登記法","topic":"仮登記の申請手続","level":1,"memo":"【ソース】伊藤塾2021プレ模試\n\n仮登記命ずる処分＝単独申請の時の原因情報は決定書正本に限られる。\n変更・更正＝仮登記でも承諾によって主登記付記登記変わる","date":"Excel取込"},{"id":1800000000910,"subject":"不動産登記法","topic":"仮登記の申請手続","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n仮登記＝変更でも識別不要。変更更正でも承諾ないと付記不可。","date":"Excel取込"},{"id":1800000000911,"subject":"不動産登記法","topic":"仮登記に基づく本登記","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\nA所有→B農地法許可条件仮登記→停止条件付所有権贈与移転付記登記→許可あったらA→C直接OK\n仮登記後の差押え＝仮登記前抵当権原因でも本登記の利害関係人にあたる。","date":"Excel取込"},{"id":1800000000912,"subject":"不動産登記法","topic":"仮登記","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n仮登記の本登記の登記義務者＝仮登記時の義務者のまま。現在の所有権名義人は利害関係有する第三者。\n移転請求権の移転請求権の仮登記で、大元の移転請求権の本登記＝後のは登記官の職権抹消されちゃうから、利害関係人になる。移転請求権の移転で住所証明情報不要（まだ所有権確定してないから）\n所有権に関する仮登記義務者なら、識別いる。所有権に関する仮登記名義人を義務者＝印鑑証明\n破産手続開始の前の仮登記の承諾＝破産管財人の許可ないと単独で仮登記不可。仮登記抵当権の順位変更不可。\n売買予約で共有の所有権移転請求権＝片方放棄→移転請求権の移転可能\n極度額増額予約変更請求権保全の仮登記＝利害関係者の承諾情報必要（本登記時も）\n所有権移転請求権保全仮登記の一部移転＝本登記は全員から必要。仮登記所有権移転請求権に抵当権設定請求権保全の仮登記不可。順位変更は仮登記抵当権含め可能。\n仮登記所有権移転登記請求権（債権）に抵当権設定請求権の保全仮登記は不可（債権は抵当権の目的にならない）\n利害関係人も承諾情報提供して仮登記単独抹消可能\n抵当権抹消の仮登記後に債権譲渡原因の抵当権移転付記＝抹消本登記の義務者は従前でも譲受人でもいい（譲受人の承諾情報は必要）単独申請時の仮登記義務者の承諾＝印鑑証明の期限なし。所有権移転請求権の移転も印鑑証明必要。\n1号→2号更正は仮登記義務者が権利者、仮登記名義人が義務者。抵当権設定仮登記の本登記＝利害関係人なし。\n本登記申請時に印鑑証明必要なら仮の時点でも義務者の印鑑証明必要・付記の承諾情報も仮の時点で主か付記か決めるために必要。\n申請な登記名義回復の1号はOK、2号は不可。ABがCに対して売買予約による所有権移転請求権保全仮登記→Aが請求権放棄=原因:放棄としてAの準共有持分の移転の付記登記可能。「年月日から年月日までの給料債権の先取特権発生」を原因とする一般先取特権保存の仮登記可能。\n条件付抵当権設定の仮登記可能。抵当権設定の仮登記の更正＝仮登記義務者の承諾情報で権利者単独更正可能。単独抹消の場合も仮登記義務者を申請情報に記載必要。２号仮登記の物権的移転＝付記の本登記\n年月日売買（条件　売買代金完済）とする停止条件付所有権移転の仮登記可能。放棄を登記原因として所有権移転請求権の準共有持分の移転の付記登記可能。代物弁済の所有権移転請求権保全仮登記＝代物弁済の予約完結権＝財産的価値あるから滞納処分による差押登記の嘱託可能。","date":"Excel取込"},{"id":1800000000913,"subject":"商業登記法","topic":"登記の更正・抹消","level":1,"memo":"登記官の過誤による錯誤・遺漏＝遅滞なく監督法務局・地方法務局長の許可を得て登記官が更正。\n本店登記完了後に移転無効＝旧所在地に新旧分の抹消申請する","date":"Excel取込"},{"id":1800000000914,"subject":"商業登記法","topic":"監査等委員会設置会社","level":1,"memo":"監査等で役会委任で取締役が決定した事項登記＝決定書面＋役会委任にかかる議事録必要。任期満了と同時に監査等委員である取締役就任＝本人確認証明書の添付不要。\n監査等委員の同意あれば監査等委員選任議案を総会に提出可能＝同意書面不要。","date":"Excel取込"},{"id":1800000000915,"subject":"商業登記法","topic":"出資に関する添付書面","level":1,"memo":"現物出資の市場価格のある有価証券＝定款認証日における市場の最終の価格＝認証後最初になされた成立価格。\n公開買付け等の対象なら、いずれか高い額基準。定款作成後認証前なら、発起人の同意あれば出資履行も設立時役員の選任可能。","date":"Excel取込"},{"id":1800000000916,"subject":"商業登記法","topic":"株式の内容に関する登記","level":1,"memo":"種類株式が種類廃止して単一株式→発行可能種類株式総数及び発行する各種類の株式の内容の廃止登記。＝内容定めたなら、廃止じゃな ct":"商法・会社法","topic":"株式会社と合同会社の比較","level":1,"memo":"持分会社は自己持分取得できないので合併等によらないで取得したら取得した時に消滅する。持分会社と同種の事業をする会社の取締役・執行役・業務執行社員になるにも承認いる。合同会社の資本金の額減少＝債権者保護手続の終了した日","date":"Excel取込"},{"id":1800000001092,"subject":"商法・会社法","topic":"株主総会と社債権者集会の異同","level":1,"memo":"社債権者集会＝定款に記載の事項の決議不可。社債権者集会に出席しない社債権者＝当然に書面決議可能。社債権者も不統一行使可能","date":"Excel取込"},{"id":1800000001093,"subject":"商法・会社法","topic":"株式会社の組織再編行為","level":1,"memo":"株式会社が組織変更＝すべての新株予約権者が買取請求可能。吸収合併後に存続会社の新株予約権もらえないなら買取請求可能。吸収分割承継会社では常に債権者保護必要。吸収分割とともに剰余金配当や全部取得条項付種類株式の取得しない場合＝債務履行請求できる債権者は保護の対象外。株式交換完全親会社の債権者＝株式交換新株予約権が新株予約権付社債に付された新株予約権OR交付する金銭等が株式以外のとき＝異議述べられる。","date":"Excel取込"},{"id":1800000001094,"subject":"民事訴訟法","topic":"弁論主義","level":1,"memo":"権利自白＝裁判所拘束されない。被告が原告の所有権認めても所有者第三者と認定可能","date":"Excel取込"},{"id":1800000001095,"subject":"民事訴訟法","topic":"弁論準備手続と書面による準備手続","level":1,"memo":"どっちも当事者の意見必要。書面による準備手続のみ提出期間の定め必要。当事者両方オンライン参加可能","date":"Excel取込"},{"id":1800000001096,"subject":"民事訴訟法","topic":"証拠","level":1,"memo":"外国での証拠調べも有効。訴え提起前＝文書送付嘱託・調査嘱託・専門家意見陳述の嘱託・執行官による現況調査。公務員であったもの証人で職務上の秘密について尋問＝監督官庁＝院や内閣の承認必要＝公共の利益害し公務遂行に著しい支障おそれない限り拒めない。証人尋問で付添あり（年齢等の要件）鑑定にテレビ会議システムあり","date":"Excel取込"},{"id":1800000001097,"subject":"民事訴訟法","topic":"相殺の抗弁","level":1,"memo":"金銭債権の数量的一部請求で敗訴した原告が残部請求の訴えていき許されない＝後に残部として請求できる部分ないこと示すに他ならないから。訴訟上の相殺の抗弁に対し訴訟上の相殺を再抗弁で主張することは許されない。継続中の別訴において訴訟物となっている債権を自働債権として他の訴訟で相殺抗弁するの許されない。明示的一部請求で残部を他の訴訟で相殺の抗弁に使うのはあり","date":"Excel取込"},{"id":1800000001098,"subject":"民事訴訟法","topic":"少額訴訟","level":1,"memo":"60万円以下の金銭債権。公示送達以外で口頭弁論期日呼出不可の場合＝裁判所職権で通常訴訟へ移行決定＝決定に不服申立不可。反訴不可だが訴えの変更はOK。即時なら人証もOK。常に判決書原本に基づかず言い渡し可能","date":"Excel取込"},{"id":1800000001099,"subject":"民事保全法","topic":"占有移転禁止の仮処分命令","level":1,"memo":"占有移転禁止の仮処分命令＝不動産で債務者特定困難＝特定しないで可能。公示書その他で公示必要。執行は占有解く際に占有者特定できない場合不可。占有解かれたものが債務者になる。保全執行は債権者に対して保全命令送達から2週間位内に必要。2週間以内に執行されなかったら債務者への送達不要。","date":"Excel取込"},{"id":1800000001100,"subject":"民事執行法","topic":"強制執行に対する不服申立て","level":1,"memo":"強制競売の開始決定＝執行異議可能。条件成就執行文に異議＝執行文付与に対する異議申立てOR執行文付与に対する異議の訴えを任意で選択。請求異議の訴え＝執行文付与前・執行開始前にも可能。執行文付与に対する訴え・請求異議の訴え＝異議の事由同時に主張必要。","date":"Excel取込"},{"id":1800000001101,"subject":"司法書士法","topic":"司法書士の欠格事由","level":1,"memo":"拘禁刑以上に処せられたもの＝欠格。禁固以上も執行猶予期間中は欠格。期間満了の翌日からセーフ。\n2年以上業務しない場合日本司法書士会連合会は登録取消可能。不動産鑑定士・弁護士・社労士・宅建士は業務禁止懲戒受けてても兼業セーフ。国籍は名簿に記載されるから住民票添付必要","date":"Excel取込"},{"id":1800000001102,"subject":"不動産登記法","topic":"抵当権の変更または更正の登記テイトウケンヘンコウコウセイトウキ","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n元本のみ返済＝元本返済・債権額　金〇円（何年何月分から何年何月分までの利息）と提供ガンポンヘンサイガンポンヘンサイサイケンガクキンエンナンネンナンガツブンナンネンナンガツブンリソクテイキョウ","date":"Excel取込"},{"id":1800000001103,"subject":"不動産登記法","topic":"抵当権抹消の登記テイトウケンノ マッショウ トウキ","level":1,"memo":"債権者死亡で債権消滅特約＝抵当権抹消は共同申請必要。抵当権消滅の定めなら債務者側が単独登記可能。弁済で抵当権抹消前に会社分割＝新設分割会社が計画で登記義務承継定めてるなら、設定者と新設会社で抹消可能。サイケンシャ シボウデ サイケンショウメツ トクヤク テイトウマッショウハ キョウドウ シンセイ ヒツヨウ テイトウケンショウメツ サダメナラ サイムシャ ガワガ タンドク トウキ カノウ","date":"Excel取込"},{"id":1800000001104,"subject":"不動産登記法","topic":"抵当権の登記テイトウケンノ トウキ","level":1,"memo":"代位弁済で準共有者になった者がさらに全額弁済した時＝登記記録上の残債権額・実際の弁済額いずれも不要。\n抵当権者が混同で抹消せずに死亡＝義務者は相続人全員必要。損害の賠償額＝定期金じゃないといけないので年10%とかじゃないとダメ（金１００万円不可）ダイイベンサイ ジュン キョウユウシャニ モノガ ゼンガク ベンサイ トキ トウキ キロクジョウノ ザンサイケンガク ジッサイノ ベンサイガク フヨウ テイトウケンシャガ コンドウデ マッショウセズニ シボウ ギムシャハ ソウゾクニｎ ゼンイン ヒツヨウ ソンガイノ バイショウガク テイキ キン ネｎ キン マンエｎ フカ","date":"Excel取込"},{"id":1800000001105,"subject":"不動産登記法","topic":"地上権または区分地上権の登記チジョウケンクブンチジョウケントウキ","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n空間の上下＝図面提供不要。すでに地上権設定されている土地の区分地上権を範囲廃止して地上権に変更できない。クウカンジョウゲズメンテイキョウフヨウチジョウケンセッテイトチクブンチジョウケンハンイハイシチジョウケンヘンコウ","date":"Excel取込"},{"id":1800000001106,"subject":"不動産登記法","topic":"地上権の登記チジョウケンノ トウキ","level":1,"memo":"地上権準共有時、共有者ごとに異なる地代登記不可。設定代金全額支払の条件付地上権設定契約後、条件成就前に地上権者の地位を承諾を得て譲渡し、成就後譲受人を地上権者とする設定登記可能。\n設定契約における地上権者となる地位の譲渡＝直接譲受人を地上権者とする設定登記可能。存続期間中地代の増額をしない旨＝登記可能。不動産質権者＝使用収益者にあたる。チジョウケｎ ジュンキョウユウジ キョウユウシャ コトナル チダイ トウキフカ セッテイダイキンゼンガク シハライ ジョウケｎ ツキ チジョウケｎ セッテイケイヤク ゴ ジョウケｎ ジョウジュマエニ チジョウケンシャノ チイ ショウダク エテ ジョウトシ ジョウジュゴ ユズリウケニン チジョウケンシャトスル セッテイトウキ カノウ","date":"Excel取込"},{"id":1800000001107,"subject":"不動産登記法","topic":"地役権の登記チエキケントウキ","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n地役権図面には地役権者が署名or記名押印必要。全部から一部＝地役権図面必要。チエキケンズメンチエキケンシャショメイキメイオウインヒツヨウゼンブイチブチエキケンズメンヒツヨウ","date":"Excel取込"},{"id":1800000001108,"subject":"不動産登記法","topic":"単独申請タンドクシンセイ","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n根抵当権者が元本確定請求したら、根抵当権者から単独申請可能。ネテイトウケンシャガンポンカクテイセイキュウネテイトウケンシャタンドクシンセイカノウ","date":"Excel取込"},{"id":1800000001109,"subject":"商業登記法","topic":"資本金の額の計上に関する書面","level":1,"memo":"設立で金銭出資のみ＝計上書面不要。募集株式の発行＝必ず計上書面必要。準備金の額資本組入れ＝減少準備金計上書面なので資本金計上書面は不要。合同会社の資本金減少＝計上書面必要。","date":"Excel取込"},{"id":1800000001110,"subject":"商業登記法","topic":"株式会社の設立の登記の申請書の添付書面","level":1,"memo":"発起設立＝定款認証後に発起人会で商号変更して全員で署名押印して公証人の認証＝変更後の定款で設立可能。募集設立で払込場所変更＝直ちに通知。現物出資あって検査役の調査要しない＝取締役の調査報告書必要。","date":"Excel取込"},{"id":1800000001111,"subject":"商業登記法","topic":"取得請求権付株式の取得と引換えにする株式等の発行の登記","level":1,"memo":"取得請求権付株式1株と引換に新株予約権交付＝請求日に新株予約権者になる＝分配可能額証する書面必要ある→資本金計上書面不要。他の株式交付なら制限ない＝資本金額も増加しない。取得条項付株式＝交付される社債等の額が分配可能額超えていると効力生じない＝対価が株式なら財源規制ない。株券発行会社なら株券提供公告も必要。全部取得条項付種類株式を全部取得したとしても株式消却されないし資本金も減少しない。","date":"Excel取込"},{"id":1800000001112,"subject":"商業登記法","topic":"株式の併合による変更の登記","level":1,"memo":"併合割合に制限なし。発行可能株式総数の定め必要。併合で種類株式に損害＝種類総会と株券提供公告必要。","date":"Excel取込"},{"id":1800000001113,"subject":"商業登記法","topic":"代表取締役の登記","level":1,"memo":"定款定めあれば総会で代取選定可能。住居表示の実施＝変更登記必要かつ非課税・役会で総会での選任決議前提としてあらかじめ代表決めることできない。","date":"Excel取込"},{"id":1800000001114,"subject":"商業登記法","topic":"株式会社と合同会社の資本金の額の登記の異同","level":1,"memo":"吸収分割会社が対価である承継会社の株式を配当財産として剰余金の配当を行うと定めた場合＝資本金の額減少するかどうかはその会社次第。合同会社の資本金の額の減少＝業務執行社員の過半数の一致。出資が金銭以外なら資本金計上書面必要。","date":"Excel取込"},{"id":1800000001115,"subject":"商業登記法","topic":"持分会社の解散・清算の登記","level":1,"memo":"社員欠けた原因の任意清算不可。清算人に権利義務なし。代表しない清算人ある時のみ代表の氏名名称登記。代表清算人の住所は登記事項じゃない。持分なら法人を清算人にできる。債権申出公告＝債権者保護手続に関する書面添付不要。","date":"Excel取込"},{"id":1800000001116,"subject":"憲法","topic":"司法権の独立","level":1,"memo":"裁判官の補職や転任は司法行政権に属し最高裁判所が権限有する。裁判の量刑についての調査は確定後であっても認められない。同一事件で下級審は上級審の判断に反せない。","date":"Excel取込"},{"id":1800000001117,"subject":"民法","topic":"所有者不明土地等ショユウシャ フメイ トチ トウ","level":1,"memo":"土地の管理不適当＋権利利益侵害のおそれ＝利害関係人の請求で管理不全土地管理命令できる。\n命令取り消し後、所有者が所有者不明土地管理人被告として供託金返還請求権の確認請求可能。\n所有者不明建物管理人は借地権を仮処分可能。所有者不明土地・建物管理人＝費用前払い・報酬受領可能トチノ カンリ フテキトウ ケンリ リエキシンガイノ リガイカンケイニン セイキュウデ カンリフゼン トチ カンリ メイレイ メイレイ トリケシｇ ゴ ショユウシャ ショユウシャ フメイ トチ カンリニｎ ヒコク キョウタクキンヘンカン セイキュウケン カクニンセイキュウ カノウ ショユウシャ フメイ タテモノ カンリニｎ シャクチケン カリショブｎ カノウ ショユウシャ フメイ トチ タテモノ カンリニ ニｎ ヒヨウ マエバライ ホウシュウ ジュリョウ カノウ","date":"Excel取込"},{"id":1800000001118,"subject":"民法","topic":"所有権一般ショユウケンイッパン","level":1,"memo":"【ソース】LEC直前予想模試2022\n\n共有物借入資金の借入金費用債務＝特別の意思表示無い限り持分の譲受人は承継しないキョウユウブツカリイレシキンカリイレキンヒヨウサイムトクベツイシヒョウジナカギモチブンユズリウケニンショウケイ","date":"Excel取込"},{"id":1800000001119,"subject":"民法","topic":"譲渡担保ジョウトタンポ","level":1,"memo":"継続的取引から生じる債務の一切を根担保として設定することも可能。被担保債権不履行後、譲渡担保権者に受戻権を放棄して清算金支払請求可能。占有改定も譲渡担保の対抗要件。被担保債権の弁済期後に譲渡担保の目的物譲り受けた第三者も清算金支払請求権の消滅時効援用可能。保険金請求権にも集合動産譲渡担保の効力及ぶが、通常の営業継続しているなら特約なきゃ無理。清算金の清算やない旨の通知ない間に受戻権放棄しても直ちに清算金請求できるわけではない。設定契約により成立し、動産の引渡しを要しない。ケイゾクテキ トリヒキ ショウジル サイムノ イッサイヲ ネタンポ セッテイ カノウ","date":"Excel取込"},{"id":1800000001120,"subject":"民法","topic":"条件および期限ジョウケンキゲン","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n始期付きまたは停止条件付でも時効更新のため占有者に承認を求められる。シキツテイシジョウケンツキジコウコウシンセンユウシャショウニンモト","date":"Excel取込"},{"id":1800000001121,"subject":"民法","topic":"実子ジッシ","level":1,"memo":"認知の訴え＝父母の死亡日から３年以内。婚姻中に懐胎＝夫の子と嫡出推定＝生物学上の父に監護されているという事情だけでは親子関係不存在確認不可（出張・受刑で性交渉なし客観的明白なら可能）ニンチノ ウッタエ フボ シボウビカラ ネｎ イナイ コンインチュウ カイタイ オットノ コト チャクシュツ スイテイ セイブツ ガク ジョウノ チチト カンゴ ジジョウ オヤコカンケイ フソンザイ カクニｎ フカ シュッチョウ ジュケイ セイコウショウ キャッカンテキ メイハク カノウ","date":"Excel取込"},{"id":1800000001122,"subject":"民法","topic":"質権シチケン","level":1,"memo":"【ソース】2018年TAC予想問題集ネンヨソウモンダイシュウ\n\n被担保債権と質入債権の両方弁済期到来しても、質権者は質入債権の処分（免除・更改）できない。不動産質権=債務者以外の不動産にも設定可能。ヒタンポサイケンシチイサイケンリョウホウベンサイキトウライシチケンシャシチイサイケンショブンメンジョコウカイ","date":"Excel取込"},{"id":1800000001123,"subject":"民法","topic":"時効の更新及び完成猶予ジコウコウシンオヨカンセイユウヨ","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n承認に行為能力の制限関係ない。裁判が権利確定することなく終了＝終了から6ヵ月時効の完成猶予ショウニンコウイノウリョクセイゲンカンケイサイバンケンリカクテイシュウリョウシュウリョウゲツジコウカンセイユウヨ","date":"Excel取込"},{"id":1800000001124,"subject":"民法","topic":"時効ジコウ","level":1,"memo":"無断転貸の賃貸借解除権の消滅時効起算点＝転貸借契約が結ばれた時点ムダンテンタイチンタイシャクカイジョケンショウメツジコウキサンテンテンタイシャクケイヤクムスジテン","date":"Excel取込"},{"id":1800000001125,"subject":"民法","topic":"先取特権サキドリトッケン","level":1,"memo":"【ソース】令和４年予備短答模試レイワネンヨビタントウモシ\n\n請負人が注文者に対して有する請負代金債権＝原則先取特権に基づく物上代位権を行使できない。先取特権占有改定含む。共益費用すべてに優先する。一般の先取と不動産質権＝登記の先後。先取特権と動産質権の競合＝動産質権は第一順位。工業労務は第三順位。一般債権者が差押登記しても、特別の担保ないので一般先取特権者が優先。ウケオイニンチュウモンシャタイユウウケオイダイキンサイケンゲンソクサキドリトッケンモトブツジョウダイイケンコウシサキドリトッケンセンユウカイテイフクキョウエキヒヨウユウセンイッパンサキドリフドウサンシチケントウキサキアト","date":"Excel取込"},{"id":1800000001126,"subject":"民法","topic":"債権譲渡サイケンジョウト","level":1,"memo":"譲渡制限の意思表示された時に悪意重過失だった譲受人の債権者が差押＝履行拒める。再売買の予約＝売買契約後にされても有効\n代金支払受けた時は引渡し前でも果実は買主に帰属ジョウト セイゲンノ イシヒョウジ トキニ アクイ ジュウカユズリウケサイケンシャガ サシオサエ リコウ コバメル","date":"Excel取込"},{"id":1800000001127,"subject":"民法","topic":"債権者代位権サイケンシャダイイケン","level":1,"memo":"【ソース】LEC直前予想模試2022\n\n債権譲渡登記への登記＝債務者以外の第三者へは確定日付による通知があったものとみなされる。代位債権者に対して主張できる抗弁をもっての対抗は不可。（あくまで債務者に対して）\n転用の場合無資力要件なし。サイケンジョウトトウキトウキサイムシャイガイダイサンシャカクテイヒヅケツウチ","date":"Excel取込"},{"id":1800000001128,"subject":"刑法","topic":"共同正犯","level":1,"memo":"順次共謀も共謀共同正犯。12歳の是非弁識能力のある長男に指示命令＝意思抑圧に足りる程度のものではなく自らの意思により強盗を決意し完遂＝母親につき共同正犯。先行者の指示のもと恐喝正犯意思有していなかった場合＝恐喝罪の幇助犯","date":"Excel取込"},{"id":1800000001129,"subject":"刑法","topic":"罪数","level":1,"memo":"時間的場所的に近接＝一連の行為＝一罪。１個の行為で殺人２人＝観念的競合。私文書偽造と詐欺＝牽連犯。恐喝と監禁は併合罪。","date":"Excel取込"},{"id":1800000001130,"subject":"刑法","topic":"毀棄及び隠匿の罪","level":1,"memo":"公務所の用に供する文書＝公務所が使用目的で保管する文書＝公務員か私人どちら作成したか問わない＝公用文書等毀棄罪。印鑑証明書＝単なる事実証明に関する文書＝私用文書等毀棄罪に当たらない。建造物損壊罪＝根抵当権の有効性が民事上争われていたとしても関係なし。保険が付された自己所有建造物の損壊＝放火じゃないなら他人所有にならない。信書にはハガキ含まれる＝正当な理由なく開封＝信書開封罪","date":"Excel取込"},{"id":1800000001131,"subject":"商法・会社法","topic":"財産引受","level":1,"memo":"財産引受契約当事者いずれも無効主張可能。追認しても常に無効。定款に記載必要。","date":"Excel取込"},{"id":1800000001132,"subject":"商法・会社法","topic":"反対株主の株式買取請求","level":1,"memo":"効力発生日の前日までに請求必要。効力発生日から60日以内に支払必要。決定あるまでは更正な価格と認める額の支払可能。効果は効力発生日に発動","date":"Excel取込"},{"id":1800000001133,"subject":"商法・会社法","topic":"株主総会全般","level":1,"memo":"会社側からも爽快に先立ち検査役の選任可能。代理人による議決権行使＝総会日から3ヶ月間代理権証する書面を本店に備え置き必要。総会前に質問状提出されても、総会で改めて質問なければ回答不要。調査役の仙人んは招集書面に記載なくても決議可能。","date":"Excel取込"},{"id":1800000001134,"subject":"商法・会社法","topic":"役員等の損害賠償責任","level":1,"memo":"利益相反＝任務懈怠推定。善意無重過失なら総会特別で最低限度額控除した額に減額可能。\n自己取引＝無過失責任。第三者のため＝過失責任。利益供与責任は総株主の同意で免除可能。分配可能額超えた業務執行者の責任＝総株主で免除可能","date":"Excel取込"},{"id":1800000001135,"subject":"商法・会社法","topic":"剰余金の配当","level":1,"memo":"監査役会あるなら監査役設置会社でも会計監査人いれば剰余金役会配当定款可能。株式の質入れ＝剰余金の配当にも効力あり。吸収分割効力発生日に承継会社の株式のみ配当とする剰余金の配当→分配可能額の制限無し。債権者は配当受けたものに分配可能額超過額の請求可能","date":"Excel取込"},{"id":1800000001136,"subject":"商法・会社法","topic":"特別清算","level":1,"memo":"債権者・清算人・監査役又は株主は債務超過の疑いがあると特別清算開始の申立てをしなければならない。\n特別清算開始の命令があった場合＝裁判所の監督に属する。特別清算開始命令あっても従前の清算人は退任しない。事業の全部譲渡、重要な一部の譲渡（5分の1ルールあり）、子会社の株式または持分の全部・一部譲渡（5分の1超えないかつ議決権の過半数有しない時＝裁判所の許可必要","date":"Excel取込"},{"id":1800000001137,"subject":"商法・会社法","topic":"社債権者集会","level":1,"memo":"特別代理人ー社債権者お管理者の利益相反したら申立てで選任必要。社債利息の弁済怠った時、社債権者集会の決議に基づき２ヶ月以内の弁済・期限の利益喪失する旨書面通知可能。発行会社の承諾あれば電磁的方法でもOK。原則＝出席社債権者の議決権の総額２分の１超える議決権の同意必要、一定の重要な事項＝議決権の総額５分の１以上かつ出席の総額３分の２以上の同意必要。無記名社債の社債権者＝集会の一週間前までに招集者に社債券の提示必要。","date":"Excel取込"},{"id":1800000001138,"subject":"商法・会社法","topic":"吸収分割","level":1,"memo":"合同が権利義務の一部を承継させる場合＝社員の過半数の一致。事後開示＝契約備置開始日から6ヶ月。分割の場合＝株券提供公告不要。不法行為債権者への各別の催告＝省略不可。","date":"Excel取込"},{"id":1800000001139,"subject":"商法・会社法","topic":"名板貸人の責任","level":1,"memo":"誤認した第三者＝重過失なら名板貸人責任免れる。手形行為上自己の商使用許諾したに過ぎないもの＝営業許諾したには該当しない。特段の事情ない限り、責任は同種の営業に限る。","date":"Excel取込"},{"id":1800000001140,"subject":"民事訴訟法","topic":"訴訟手続の中断","level":1,"memo":"判決の言渡し＝訴訟手続中断中でも可能。独立当事者参加した第三者死亡しても訴訟中断する。債権者代位訴訟で被担当者の債務者死んでも訴訟中断しない。","date":"Excel取込"},{"id":1800000001141,"subject":"民事訴訟法","topic":"争点及び証拠の整理手続","level":1,"memo":"弁論準備手続でも当事者が申出た者については支障なければ傍聴許さなければならない。受命裁判官も調査嘱託・鑑定・文書提出書証の申出嘱託・文書の送付嘱託についての裁判可能。当事者双方の申立てあれば弁論準備手続取り消さなければならない。","date":"Excel取込"} 行為に基づく損害賠償請求可能"],"民法上の留置権":["注意点（伊藤塾2019公開模試）：留置権不発生の特約も有効。留置権による競売＝換価金を留置可能"],"民法::民法上の留置権":["注意点（伊藤塾2019公開模試）：留置権不発生の特約も有効。留置権による競売＝換価金を留置可能"],"民法::民法上の組合":["注意点（2022年TAC予想問題集）：組合債権＝持分について単独行使不可。組合常務→異議述べた時除き単独可能。組合員に対する債権者は組合財産行使できない。組合債権者は可能。加入前の債務責任負わない。組合員の債務に混同生じない＝組合に全額請求可能。脱退した組合員は組合に求償可能。脱退時の払い戻しは組合財産の状況による。破産後見脱退事由","条文目安：民法667条周辺。条文番号と要件・効果をセットで確認。","ポイント：組合の業務の執行決定は1人または第三者に委任できる / 加入前に生じた組合の債務については弁済する責任ない / 脱退した組合員との計算は、脱退の時における組合財産の状況に従ってしなければならない"],"民法上の組合":["注意点（2022年TAC予想問題集）：組合債権＝持分について単独行使不可。組合常務→異議述べた時除き単独可能。組合員に対する債権者は組合財産行使できない。組合債権者は可能。加入前の債務責任負わない。組合員の債務に混同生じない＝組合に全額請求可能。脱退した組合員は組合に求償可能。脱退時の払い戻しは組合財産の状況による。破産後見脱退事由","条文目安：民法667条周辺。条文番号と要件・効果をセットで確認。","ポイント：組合の業務の執行決定は1人または第三者に委任できる / 加入前に生じた組合の債務については弁済する責任ない / 脱退した組合員との計算は、脱退の時における組合財産の状況に従ってしなければならない"],"未成年者":["注意点（令和4年LEC直前予想模試）：一切の営業許可や1個の営業の一部に限定することできない。時効の更新＝管理能力必要。未成年管理能力なし。","注意点（LEC直前予想模試2022）：予約完結権行使の時点で悪意かどうか。 他人名義の固定資産税課税台帳無視してたら、善意の第三者に対抗できない。債務の弁済受けるのも法定代理人の同意必要"],"民法::未成年者":["注意点（令和4年LEC直前予想模試）：一切の営業許可や1個の営業の一部に限定することできない。時効の更新＝管理能力必要。未成年管理能力なし。","注意点（LEC直前予想模試2022）：予約完結権行使の時点で悪意かどうか。 他人名義の固定資産税課税台帳無視してたら、善意の第三者に対抗できない。債務の弁済受けるのも法定代理人の同意必要"],"未成年後見と成年後見":["注意点（伊藤塾2020公開模試）：後見人の任務終了時＝2ヶ月以内に管理計算必要。家裁で伸長可能。未成年後見なら居住の用に供する建物第三者賃貸で家裁の許可不要。"],"民法::未成年後見と成年後見":["注意点（伊藤塾2020公開模試）：後見人の任務終了時＝2ヶ月以内に管理計算必要。家裁で伸長可能。未成年後見なら居住の用に供する建物第三者賃貸で家裁の許可不要。"],"民法::法律行為":["注意点：法律行為＝取り消し解除相殺転貸の承諾遺言。売買請負賃貸借。法人設立。準法律行為＝債権譲渡の通知承諾権利の承認・債務承認履行催促弁済受領の拒絶。","条文目安：民法549条周辺。条文番号と要件・効果をセットで確認。","ポイント：無権代理の追認拒絶債務の免除・相殺・転貸の承諾・遺言・解除・取消＝相手方のある単独行為＝法律行為 / 債権譲渡の通知・承諾・権利の承認・債務の履行の催促＝準法律行為"],"法律行為":["注意点：法律行為＝取り消し解除相殺転貸の承諾遺言。売買請負賃貸借。法人設立。準法律行為＝債権譲渡の通知承諾権利の承認・債務承認履行催促弁済受領の拒絶。","条文目安：民法549条周辺。条文番号と要件・効果をセットで確認。","ポイント：無権代理の追認拒絶債務の免除・相殺・転貸の承諾・遺言・解除・取消＝相手方のある単独行為＝法律行為 / 債権譲渡の通知・承諾・権利の承認・債務の履行の催促＝準法律行為"],"法定地上権":["注意点（2021年TAC予想問題集）：抵当権設定等時（仮差押え含む）に同一→実行までに土地・建物が第三者に譲渡→競売でも法定地上権成立。借地人が借地上建物に1番抵当権設定後に借地所有権取得し2番抵当権設定＝１番実行されたら法定地上権成立","注意点（2020年TAC予想問題集）：建物に抵当権・その後土地取得で同一人物→建物に第二抵当権。第一実行→法定地上権成立。抵当権者に不利益内から。（建物の価値上がる）","条文目安：民法388条周辺。条文番号と要件・効果をセットで確認。","ポイント：建物第一順位時に別人所有、第二順位時同一所有＝第１順位実行で法定地上権成立 / 土地に抵当権設定後建物新築、抵当権設定、さらに建物に抵当権＝建物実行で法定地上権成立するが、土地との関係では対抗できない"],"民法::法定地上権":["注意点（2021年TAC予想問題集）：抵当権設定等時（仮差押え含む）に同一→実行までに土地・建物が第三者に譲渡→競売でも法定地上権成立。借地人が借地上建物に1番抵当権設定後に借地所有権取得し2番抵当権設定＝１番実行されたら法定地上権成立","注意点（2020年TAC予想問題集）：建物に抵当権・その後土地取得で同一人物→建物に第二抵当権。第一実行→法定地上権成立。抵当権者に不利益内から。（建物の価値上がる）","条文目安：民法388条周辺。条文番号と要件・効果をセットで確認。","ポイント：建物第一順位時に別人所有、第二順位時同一所有＝第１順位実行で法定地上権成立 / 土地に抵当権設定後建物新築、抵当権設定、さらに建物に抵当権＝建物実行で法定地上権成立するが、土地との関係では対抗できない"],"民法::補助及び保佐":["注意点（伊藤塾2021公開模試）：補助人＝常に職権。補助監督人は請求または職権。保佐監督人いれば利益相反あっても臨時保佐人不要。意思表示の相手方が補助人なら対抗可能。"],"補助及び保佐":["注意点（伊藤塾2021公開模試）：補助人＝常に職権。補助監督人は請求または職権。保佐監督人いれば利益相反あっても臨時保佐人不要。意思表示の相手方が補助人なら対抗可能。"],"保証契約":["注意点：法人保証は極度額不要。賃貸借における保証人＝個人値保証契約＝主たる債務者死亡で元本確定し、死亡後の相続債務負わない。","条文目安：民法446条周辺。条文番号と要件・効果をセットで確認。","ポイント：個人根保証のみ極度額必要 / 主たる債務者にした時効の更新＝保証人に対してもその効果を生ずる / 主たる債務者が死亡した時は元本確定。"],"民法::保証契約":["注意点：法人保証は極度額不要。賃貸借における保証人＝個人値保証契約＝主たる債務者死亡で元本確定し、死亡後の相続債務負わない。","条文目安：民法446条周辺。条文番号と要件・効果をセットで確認。","ポイント：個人根保証のみ極度額必要 / 主たる債務者にした時効の更新＝保証人に対してもその効果を生ずる / 主たる債務者が死亡した時は元本確定。"],"民法::保証":["注意点（伊藤塾2020プレ模試）：取消原因を保証人が知っていた時、主たる債務取り消された時保証人独立債務推定あり。 保証人法人じゃないなら2ヶ月以内に期限の利益失った通知必要＝しなかったら遅延損害金請求不可。 委託を受けた物上保証人＝事前求償権行使不可。個人貸金等根保証契約で元本確定期日なし＝契約締結から3年経過する日。委託を受けない保証＝求償権の基準時＝保証人の債務消滅時。意思に反した保証＝求償時。 債権者の履行状況提供義務は委託を受けた保証のみ。連帯債…","注意点：原状回復義務も保証責任あり。行為能力制限知っていた時＝独立債務負担と推定。主たる債務の期限延長されれば保証債務の期限も延長される。保証債務にのみ違約金・損害賠償額の約定可能。","条文目安：民法446条周辺。条文番号と要件・効果をセットで確認。","ポイント：保証債務についてのみ違約金または損害賠償の額を予定できる / 事業のために負担した貸金等債務を主たる債務とする保証契約または主たる債務の範囲に事業のために負担する貸金等債務が含まれる根保証契約は、契約に先立ち、1ヶ月前に公正証書で保証人になろうとするものが債務履行の意思表示をしなければ効力生じない。 / ただし、保証人になろうとするものが主たる債務者が法人である時の理事・取締役・執行役、これに準ずるものであるときは、公正証書の作成を要しない","条文目安：民法466条周辺。条文番号と要件・効果をセットで確認。","ポイント：委託受けて保証、保証人の過失なく債権者へ弁済の裁判言い渡し受けたら事前求償権行使可能 / 弁済する資力＝全額ではなく、執行容易な財産の証明 / 保証人＝債権者の指名を除き、資力を有する行為能力者","ポイント：行為能力の制限を知っていた時は保証人が独立の債務を負担したと推定 / 債権者が保証人指定した時は行為能力なくてもいい / 期限延長は利益なので保証人にも効果及ぶ / 催告怠ったらその限度で保証人義務免れる"],"保証":["注意点（伊藤塾2020プレ模試）：取消原因を保証人が知っていた時、主たる債務取り消された時保証人独立債務推定あり。 保証人法人じゃないな 転しない / 建物に担保仮登記されても法定地上権成立しない。土地ならする"],"賠償額の予定":["注意点：違約金は賠償額の予定と推定する。"],"民法::賠償額の予定":["注意点：違約金は賠償額の予定と推定する。"],"民法::売買":["注意点（伊藤塾2018公開模試２）：予約完結権も譲渡可能。建物と敷地賃借権売買＝賃貸人が負担すべき敷地の修繕義務＝隠れた瑕疵じゃないので解除不可。数量指示売買＝特約なければ追加請求不可。代金減額請求＝相当の期間定めて履行の追完請求してから。競売＝数量や権利不適合＝債務不履行。種品なら行使不可。債務者の将来の資力担保＝弁済期における資力担保。種類物売買＝特定かつ引渡後＝当事者双方の責めに帰せない事由＝追完請求不可。買い受けた不動産に抵当権＝代金支払拒めるが、…","注意点：数量・権利の不適合なら競売でも契約解除・代金減額は可能。追完は不可。強制競売の目的物の瑕疵知りながら申し出なくても、損害賠償請求できない。 特定物の引渡しを除く弁済は債権者の現在の住所、引渡しと同時なら引き渡すべき場所。目的物の引渡しと同時＝引渡し場所で支払い。履行に着手＝転売契約はあたらない。","条文目安：民法555条周辺。条文番号と要件・効果をセットで確認。","ポイント：売主側からも抵当権消滅請求するように促せる / 対抗要件備えた賃借人は残存期間中１年超えない範囲で買戻権者に対抗できる。"],"売買":["注意点（伊藤塾2018公開模試２）：予約完結権も譲渡可能。建物と敷地賃借権売買＝賃貸人が負担すべき敷地の修繕義務＝隠れた瑕疵じゃないので解除不可。数量指示売買＝特約なければ追加請求不可。代金減額請求＝相当の期間定めて履行の追完請求してから。競売＝数量や権利不適合＝債務不履行。種品なら行使不可。債務者の将来の資力担保＝弁済期における資力担保。種類物売買＝特定かつ引渡後＝当事者双方の責めに帰せない事由＝追完請求不可。買い受けた不動産に抵当権＝代金支払拒めるが、…","注意点：数量・権利の不適合なら競売でも契約解除・代金減額は可能。追完は不可。強制競売の目的物の瑕疵知りながら申し出なくても、損害賠償請求できない。 特定物の引渡しを除く弁済は債権者の現在の住所、引渡しと同時なら引き渡すべき場所。目的物の引渡しと同時＝引渡し場所で支払い。履行に着手＝転売契約はあたらない。","条文目安：民法555条周辺。条文番号と要件・効果をセットで確認。","ポイント：売主側からも抵当権消滅請求するように促せる / 対抗要件備えた賃借人は残存期間中１年超えない範囲で買戻権者に対抗できる。"],"民法::配偶者短期居住権":["注意点（伊藤塾2022公開模試2）：有償で居住していた時、配偶者短期居住権成立しない。短期も普通も相続放棄しても成立＝欠格・廃除では否成立。 配偶者が通常の必要費負担。遺贈のみOK=特定財産承継遺言は不可。一部に居住していても全部に配偶者居住権及ぶ。設定登記義務あり。配偶者短期居住権は対抗力なし。短期居住権は収益不可。配偶者が持分有する場合、配偶者居住権が消滅したことを理由として返還請求不可。"],"配偶者短期居住権":["注意点（伊藤塾2022公開模試2）：有償で居住していた時、配偶者短期居住権成立しない。短期も普通も相続放棄しても成立＝欠格・廃除では否成立。 配偶者が通常の必要費負担。遺贈のみOK=特定財産承継遺言は不可。一部に居住していても全部に配偶者居住権及ぶ。設定登記義務あり。配偶者短期居住権は対抗力なし。短期居住権は収益不可。配偶者が持分有する場合、配偶者居住権が消滅したことを理由として返還請求不可。"],"民法::認知":["注意点（令和4年LEC直前予想模試）：死亡した子＝直系卑属ある場合のみ認知可能。認知後親子関係不存在確定で認知の効力なし。 認知判決正当な当事者で確定＝第三者が反対事実で無効訴え不可能。認知者死亡した後も検察相手に認知無効の訴え可能。認知無効の訴え＝父も取消できないが訴えは可能。子を代理して認知の訴え可能。子がまだ出生していない時は不可。","条文目安：民法779条周辺。条文番号と要件・効果をセットで確認。","ポイント：虚偽嫡出子出生届＝認知届としての効力あり","ポイント：強制認知＝父母の死亡から3年でできない。被告は検察官 / 認知請求権の放棄不可"],"認知":["注意点（令和4年LEC直前予想模試）：死亡した子＝直系卑属ある場合のみ認知可能。認知後親子関係不存在確定で認知の効力なし。 認知判決正当な当事者で確定＝第三者が反対事実で無効訴え不可能。認知者死亡した後も検察相手に認知無効の訴え可能。認知無効の訴え＝父も取消できないが訴えは可能。子を代理して認知の訴え可能。子がまだ出生していない時は不可。","条文目安：民法779条周辺。条文番号と要件・効果をセットで確認。","ポイント：虚偽嫡出子出生届＝認知届としての効力あり","ポイント：強制認知＝父母の死亡から3年でできない。被告は検察官 / 認知請求権の放棄不可"],"内縁配偶者と第三者との関係":["注意点：相続人の賃借権を援用して居住権主張できるが、賃借人ではないから賃貸人ではないから賃料支払義務を負わない。内縁夫婦共有名義なら、一方死亡後に単独使用しても不当利得に当たらない。内縁配偶者も固有の慰謝料請求可能＝将来の扶養利益も。内縁夫婦にも連帯責任準用。"],"民法::内縁配偶者と第三者との関係":["注意点：相続人の賃借権を援用して居住権主張できるが、賃借人ではないから賃貸人ではないから賃料支払義務を負わない。内縁夫婦共有名義なら、一方死亡後に単独使用しても不当利得に当たらない。内縁配偶者も固有の慰謝料請求可能＝将来の扶養利益も。内縁夫婦にも連帯責任準用。"],"民法::特別養子縁組":["注意点（2021年TAC予想問題集）：未成年後見人が特別養子縁組＝家裁の許可不要。15歳になるまでにやむを得ない事情あれば15歳以上でも可能。成立は原則父母の同意必要。","注意点（令和４年予備短答模試）：父母の同意＝出生から２か月経過かつ的確確認審判の審問期日にされた場合、同意から２週間経過で撤回できない。直系血族と三親等以内の傍系血族との間で婚姻不可だが、養方の傍系血族とはOK。実父母双方が死亡した場合、特別養子の離縁できない。実父が特別養子の子を認知すること許されない。特別養子は養親となる者の管轄家裁に申立て。特別養子は配偶者のあるものでなければならない。特別養子は虐待ないなら父母の同意必要。"],"特別養子縁組":["注意点（2021年TAC予想問題集）：未成年後見人が特別養子縁組＝家裁の許可不要。15歳になるまでにやむを得ない事情あれば15歳以上でも可能。成立は原則父母の同意必要。","注意点（令和４年予備短答模試）：父母の同意＝出生から２か月経過かつ的確確認審判の審問期日にされた場合、同意から２週間経過で撤回できない。直系血族と三親等以内の傍系血族との間で婚姻不可だが、養方の傍系血族とはOK。実父母双方が死亡した場合、特別養子の離縁できない。実父が特別養子の子を認知すること許されない。特別養子は養親となる者の管轄家裁に申立て。特別養子は配偶者のあるものでなければならない。特別養子は虐待ないなら父母の同意必要。"],"民法::特別の寄与":["注意点（伊藤塾2021公開模試）：相続開始及び相続人知った時から6ヶ月経過または相続から1年経過＝家裁に協議に代わる処分請求不可になる。特別寄与者が相続開始および相続人を知った時から6ヶ月を経過した時または相続開始から1年経過した時請求不可。特別寄与料の負担は算定額に相続分を乗じた額。","条文目安：民法1050条周辺。条文番号と要件・効果をセットで確認。","ポイント：特別寄与＝無償の労務提供。被相続人の親族 / 財産から遺贈の額控除した残額超えられない / 特別寄与者は相続開始及び相続人を知った時から6ヶ月経過または相続開始から1年経過したら家裁に協議に代わる処分を請求できない"],"特別の寄与":["注意点（伊藤塾2021公開模試）：相続開始及び相続人知った時から6ヶ月経過または相続から1年経過＝家裁に協議に代わる処分請求不可になる。特別寄与者が相続開始および相続人を知った時から6ヶ月を経過した時または相続開始から1年経過した時請求不可。特別寄与料の負担は算定額に相続分を乗じた額。","条文目安：民法1050条周辺。条文番号と要件・効果をセットで確認。","ポイント：特別寄与＝無償の労務提供。被相続人の親族 / 財産から遺贈の額控除した残額超えられない / 特別寄与者は相続開始及び相続人を知った時から6ヶ月経過または相続開始から1年経過したら家裁に協議に代わる処分を請求できない"],"同時履行の抗弁権":["注意点（2023年TAC予想問題集）：抵当権抹消と債務弁済は弁済が先履行。","注意点（2019年TAC予想問題集）：損害賠償の履行受けるまで報酬全額の履行拒める。弁済者は受取証書を同時請求可能だが、債権証書は弁済が先履行。"],"民法::同時履行の抗弁権":["注意点（2023年TAC予想問題集）：抵当権抹消と債務弁済は弁済が先履行。","注意点（2019年TAC予想問題集）：損害賠償の履行受けるまで報酬全額の履行拒める。弁済者は受取証書を同時請求可能だが、債権証書は弁済が先履行。"],"民法::動産先取特権":["注意点：先取特権は被担保債権移転すれば随伴する。第一順位の先取特権者は債権取得の時において第二順位または第三順位の債権者があることを知っていた時はこれらのものに対して優先弁済権を講師できない。代位目的の債権に差押前に債務者破産しても、これを差し押さえて物上代位権行使可能。","条文目安：民法311条周辺。条文番号と要件・効果をセットで確認。","ポイント：旅館の主人に旅館の宿泊の先取特権あり / 第一順位の先取特権者は、債権の取得時において第二・第三順位の先取特権者があることを知っていた時はこれらの者に優先権を行使できない / 先取特権と動産質権が競合する場合、動産質権者は第一順位の先取特権者と同一順位になる / 債務者が破産しても、動産売買先取特権に基づく物上代位権を行使できる"],"動産先取特権":["注意点：先取特権は被担保債権移転すれば随伴する。第一順位の先取特権者は債権取得の時において第二順位または第三順位の債権者があることを知っていた時はこれらのものに対して優先弁済権を講師できない。代位目的の債権に差押前に債務者破産しても、これを差し押さえて物上代位権行使可能。","条文目安：民法311条周辺。条文番号と要件・効果をセットで確認。","ポイント：旅館の主人に旅館の宿泊の先取特権あり / 第一順位の先取特権者は、債権の取得時において第二・第三順位の先取特権者があることを知っていた時はこれらの者に優先権を行使できない / 先取特権と動産質権が競合する場合、動産質権者は第一順位の先取特権者と同一順位になる / 債務者が破産しても、動産売買先取特権に基づく物上代位権を行使できる"],"民法::動産質権":["注意点（伊藤塾2018公開模試）：存続期間の定めなし。違約金・利息・実効費用・保存不履行隠れた瑕疵担保。占有改定不可。差押禁止動産にも設定可能。動産質権実行せずまず一般財産への強制執行も可能。簡易な弁済充当に要する費用＝担保される。","条文目安：民法354条周辺。条文番号と要件・効果をセットで確認。","ポイント：簡易な弁済充当に要する費用も担保 / 不法侵奪者も第三者にあたる / 設定の前後＝引渡しの前後"],"動産質権":["注意点（伊藤塾2018公開模試）：存続期間の定めなし。違約金・利息・実効費用・保存不履行隠れた瑕疵担保。占有改定不可。差押禁止動産にも設定可能。動産質権実行せずまず一般財産への強制執行も可能。簡易な弁済充当に要する費用＝担保される。","条文目安：民法354条周辺。条文番号と要件・効果をセットで確認。","ポイント：簡易な弁済充当に要する費用も担保 / 不法侵奪者も第三者にあたる / 設定の前後＝引渡しの前後"],"民法::動産の物件変動と対抗問題":["注意点（2021年TAC予想問題集）：動産強制競売された場合に占有改定でも即時取得成立（178条による考え）"],"動産の物件変動と対抗問題":["注意点（2021年TAC予想問題集）：動産強制競売された場合に占有改定でも即時取得成立（178条による考え）"],"土地利用権":["注意点（2021年TAC予想問題集）：観望地役権＝一定の行為をしない義務（分筆不要で範囲指定可能）地上権者も現状に復することができる＝土地所有者が木を買い取る請求したら、正当な理由ないと拒めない。"],"民法::土地利用権":["注意点（2021年TAC予想問題集）：観望地役権＝一定の行為をしない義務（分筆不要で範囲指定可能）地上権者も現状に復することができる＝土地所有者が木を買い取る請求したら、正当な理由ないと拒めない。"],"民法::登記をしなければ対抗できない第三者":["注意点：死因贈与で受贈者が限定承認＝相続債権者に不動産対抗できない。"],"登記をしなければ対抗できない第三者":["注意点：死因贈与で受贈者が限定承認＝相続債権者に不動産対抗できない。"],"添付":["注意点：融和で損失受けたものは償還請求可能。添付により消滅した所有権目的とする質権も消滅するが、動産所有者が取得した償還請求権に物上代位可能。請負工事＝加工","条文目安：民法242条周辺。条文番号と要件・効果をセットで確認。","ポイント：不動産の付合＝不動産所有者が動産の所有権取得 弱い付合＝原状回復可能なら所有権は動産所有権者に帰属 / 動産の付合＝損傷しなければ分離できない・過分の費用要する 混和＝固形物・流動物が融和し分離できない / 主従区別あれば主に帰属・無ければ当時の価格割合に応じて帰属 / 損失受けたら償金請求可能。所有権消失したら第三者の権利消滅。第三者の権利質権なら償金請求権に物上代位可能 / 第三者が所有権取得なら。合成物の上に存在。"],"民法::添付":["注意点：融和で損失受けたものは償還請求可能。添付により消滅した所有権目 地賃貸借＝抵当権者の同意がない限り競売で消滅 / 金銭消費貸借契約が公序良俗違反＋貸金交付が不法原因給付＝抵当権設定者は抵当権者に抵当権設定登記の抹消請求可能"],"抵当建物使用者の引渡し猶予":["注意点：抵当権者に対抗することのできない賃貸借＝建物の使用収益→競売前からOR強制管理担保不動産収益執行管理人が競売手続開始後＝買受けの時から６ヶ月経過までは猶予。現に使用収益必要。","条文目安：民法365条周辺。条文番号と要件・効果をセットで確認。","ポイント：対抗できない賃借権者＝建物買受から６か月引渡し不要 / 修繕請求不可・対価支払い必要"],"民法::抵当建物使用者の引渡し猶予":["注意点：抵当権者に対抗することのできない賃貸借＝建物の使用収益→競売前からOR強制管理担保不動産収益執行管理人が競売手続開始後＝買受けの時から６ヶ月経過までは猶予。現に使用収益必要。","条文目安：民法365条周辺。条文番号と要件・効果をセットで確認。","ポイント：対抗できない賃借権者＝建物買受から６か月引渡し不要 / 修繕請求不可・対価支払い必要"],"定型約款":["注意点（伊藤塾2020公開模試）：不特定多数との取引の全部または一部が画一的。定型約款準備者が定型約款を契約内容とする表示していた時は個別条項にも合意したとみなされる。一方的に利益害するものは合意しなかったとみなされる。 合意前含め相手方の請求あれば遅滞なく相当な方法で内容示さなければならない＝書面・電磁記録提供済みなら不要。変更は合意あったとみなし合意なく可能。"],"民法::定型約款":["注意点（伊藤塾2020公開模試）：不特定多数との取引の全部または一部が画一的。定型約款準備者が定型約款を契約内容とする表示していた時は個別条項にも合意したとみなされる。一方的に利益害するものは合意しなかったとみなされる。 合意前含め相手方の請求あれば遅滞なく相当な方法で内容示さなければならない＝書面・電磁記録提供済みなら不要。変更は合意あったとみなし合意なく可能。"],"民法::賃貸借":["注意点（伊藤塾2019プレ模試）：賃貸人と転借人が同一になっても混同生じない（契約が別だから）借地権は30年、それ以下の特約無効。有益費返還＝新賃貸人が承継。本旨に反する使用の損害賠償請求権＝賃貸人が返還を受けてから1年は時効完成しない。"],"賃貸借":["注意点（伊藤塾2019プレ模試）：賃貸人と転借人が同一になっても混同生じない（契約が別だから）借地権は30年、それ以下の特約無効。有益費返還＝新賃貸人が承継。本旨に反する使用の損害賠償請求権＝賃貸人が返還を受けてから1年は時効完成しない。"],"民法::賃借権の譲渡及び転貸":["注意点（2021年TAC予想問題集）：適法でも転借人の過失で滅失損傷＝過失有無関わらず転貸人が賃貸人に損賠責任負う"],"賃借権の譲渡及び転貸":["注意点（2021年TAC予想問題集）：適法でも転借人の過失で滅失損傷＝過失有無関わらず転貸人が賃貸人に損賠責任負う"],"民法::地役権":["注意点（伊藤塾2019プレ模試）：土地の分割その譲渡＝地役権は各部に存する。同一の土地に数個の用水地役権（承役地の水汲む権利）OK。汲水地役権の時効取得不可。有償の特約＝登記事項じゃないので対抗不可。複数の用水地役権＝可能だが前の地役権者の水の使用妨げてはならない","注意点：入会権の使用収益を行う権能＝単独で自己の使用収益権の確認・妨害の排除可能、"],"地役権":["注意点（伊藤塾2019プレ模試）：土地の分割その譲渡＝地役権は各部に存する。同一の土地に数個の用水地役権（承役地の水汲む権利）OK。汲水地役権の時効取得不可。有償の特約＝登記事項じゃないので対抗不可。複数の用水地役権＝可能だが前の地役権者の水の使用妨げてはならない","注意点：入会権の使用収益を行う権能＝単独で自己の使用収益権の確認・妨害の排除可能、"],"地上権と永小作権":["注意点（伊藤塾2019公開模試）：永小作権の譲渡禁止特約は登記で対抗要件。地上権は登記不可。"],"民法::地上権と永小作権":["注意点（伊藤塾2019公開模試）：永小作権の譲渡禁止特約は登記で対抗要件。地上権は登記不可。"],"民法::地上権":["注意点（伊藤塾2018公開模試２）：耕作性あるもの不可＝永小作権。必要費償還請求不可。解約＝有償の時は1年前or1年分地代支払い。地上権者が賃貸＝地上権合意解除しても賃貸人に対抗できず所有者が賃貸人の地位承継","注意点（令和５年予備試験）：譲渡禁止の合意があっても譲渡はその効力を妨げられない。","条文目安：民法265条周辺。条文番号と要件・効果をセットで確認。","ポイント：借地権者が地上建物に抵当権設定後、借地権放棄しても抵当権者に対抗できない。 / 地上権者は権利消滅後、土地を現状に復してその工作物及び竹木を収去することができる。土地所有者が買い取る旨請求した時は、正当な理由がなければ拒めない。"],"地上権":["注意点（伊藤塾2018公開模試２）：耕作性あるもの不可＝永小作権。必要費償還請求不可。解約＝有償の時は1年前or1年分地代支払い。地上権者が賃貸＝地上権合意解除しても賃貸人に対抗できず所有者が賃貸人の地位承継","注意点（令和５年予備試験）：譲渡禁止の合意があっても譲渡はその効力を妨げられない。","条文目安：民法265条周辺。条文番号と要件・効果をセットで確認。","ポイント：借地権者が地上建物に抵当権設定後、借地権放棄しても抵当権者に対抗できない。 / 地上権者は権利消滅後、土地を現状に復してその工作物及び竹木を収去することができる。土地所有者が買い取る旨請求した時は、正当な理由がなければ拒めない。"],"民法::担保物件一般":["注意点（令和5年LEC直前予想模試）：動産質権の責任転質＝質権消滅請求不可。委託を受けた物上保証人＝事前求償権NG。"],"担保物件一般":["注意点（令和5年LEC直前予想模試）：動産質権の責任転質＝質権消滅請求不可。委託を受けた物上保証人＝事前求償権NG。"],"担保物件":["注意点：不動産質権者＝原則利息請求できないが別段の合意により請求可能＝民法375条準用され、最後の2年分に限定される。質権＝被担保債権が譲渡されると目的物の引渡しなくても譲受人に質権移転ー第三者に対抗できないだけ。"],"民法::担保物件":["注意点：不動産質権者＝原則利息請求できないが別段の合意により請求可能＝民法375条準用され、最後の2年分に限定される。質権＝被担保債権が譲渡されると目的物の引渡しなくても譲受人に質権移転ー第三者に対抗できないだけ。"],"民法::第三者のためにする契約":["注意点（伊藤塾2018公開模試）：要約者の詐欺で諾約者が取消＝利益受ける第三者は保護されない。債権者が受益の意思表示の代位行使・請求可能"],"第三者のためにする契約":["注意点（伊藤塾2018公開模試）：要約者の詐欺で諾約者が取消＝利益受ける第三者は保護されない。債権者が受益の意思表示の代位行使・請求可能"],"代理受領と債権質の比較":["注意点：債権譲渡が特約で禁止＝質権無効。代理受領なら譲渡・質入禁止特約債権でも可能。代理受領は直接自己の名で取り立てることまで認められない。代理受領は第三者対抗要件なし。代理受領は委任契約。質権は非担保債務相続される。"],"民法::代理受領と債権質の比較":["注意点：債権譲渡が特約で禁止＝質権無効。代理受領なら譲渡・質入禁止特約債権でも可能。代理受領は直接自己の名で取り立てることまで認められない。代理受領は第三者対抗要件なし。代理受領は委任契約。質権は非担保債務相続される。"],"民法::代理受領":["注意点（伊藤塾2023公開模試）：代理受領権者が消滅時効の完成猶予の催告不可。代理受領＝優先弁済的効力なし＝非典型担保","注意点：代理受領根拠として差押排除や優先権の主張不可。弁済により代理受領権を失った場合、十分な視力有する連帯保証人いても損害生じている。第三債務者が代理受領受諾しても直接債務負担したとは解せない。 第三債務者が承認したら、代理受領侵害しない義務生まれ、債務者に弁済したら不法行為成立。 特約違反は担保価値減少行為＝債務者は債権者に対する期限の利益喪失。"],"代理受領":["注意点（伊藤塾2023公開模試）：代理受領権者が消滅時効の完成猶予の催告不可。代理受領＝優先弁済的効力なし＝非典型担保","注意点：代理受領根拠として差押排除や優先権の主張不可。弁済により代理受領権を失った場合、十分な視力有する連帯保証人いても損害生じている。第三債務者が代理受領受諾しても直接債務負担したとは解せない。 第三債務者が承認したら、代理受領侵害しない義務生まれ、債務者に弁済したら不法行為成立。 特約違反は担保価値減少行為＝債務者は債権者に対する期限の利益喪失。"],"代理":["注意点（令和4年LEC直前予想模試）：制限行為能力者が他の制限行為能力者の法定代理人としてした行為は取り消すことができる。委任者死亡しても代理権消滅しない定め有効。本人装い本人のために権限内行為＝本人に有効。委任・受任者どっち破産しても終了。無利息での貸付＝保存にも管理にもあたらないので無権代理。無権代理人の責任＝善意無過失必要。ただし無権代理人が無権代理を知っていた場合は過失セーフ。行為能力制限も除外。代理人による詐欺＝相手方は常に取消し可能"," で不能＝代金支払債務消滅のためには契約の解除必要。安全配慮義務違反＝遺族固有の慰謝料請求不可。期限の定めのない債務。債務不履行にかかる弁護士報酬の損賠請求不可＝安全配慮義務違反・不法行為なら可能。…","条文目安：民法415条周辺。条文番号と要件・効果をセットで確認。","ポイント：債務履行の成立時の不能は売買契約の効力に影響しない / 債務消滅＝契約解除 / 履行に代わる損害賠償請求可能 / 債務不履行でに基づく損害賠償請求に、遺族固有の慰謝料請求は不可能 / 安全配慮義務違反＝履行請求受けた時から、履行地帯","条文目安：民法420条周辺。条文番号と要件・効果をセットで確認。","ポイント：損害賠償の予定があっても裁判所は過失斟酌可能"],"債務不履行":["注意点（伊藤塾2019プレ模試）：履行不能に基づく損賠＝期限の定めの無い債務＝履行請求時から遅滞。損賠予定額定めたら裁判所増減できない。 債権者一部支払い受けた時は債務者は代位しない。金銭以外のもの返還する場合＝受領の時以降の利息および果実の返還必要。契約成立時点で不能＝代金支払債務消滅のためには契約の解除必要。安全配慮義務違反＝遺族固有の慰謝料請求不可。期限の定めのない債務。債務不履行にかかる弁護士報酬の損賠請求不可＝安全配慮義務違反・不法行為なら可能。…","条文目安：民法415条周辺。条文番号と要件・効果をセットで確認。","ポイント：債務履行の成立時の不能は売買契約の効力に影響しない / 債務消滅＝契約解除 / 履行に代わる損害賠償請求可能 / 債務不履行でに基づく損害賠償請求に、遺族固有の慰謝料請求は不可能 / 安全配慮義務違反＝履行請求受けた時から、履行地帯","条文目安：民法420条周辺。条文番号と要件・効果をセットで確認。","ポイント：損害賠償の予定があっても裁判所は過失斟酌可能"],"債務引受":["注意点（令和5年LEC直前予想模試）：免責的債務引受＝債権者が債務者に通知した時に効果発生。解除権・取消権の行使不可＝履行拒否は可能。免責的債務引受の引受人＝売買の目的達成できない時も契約解除不可。債務者の意思に基づかない債務引受NG。免責的債務引受されたら、元の債務担保のための第三者の質権も消滅する。"],"民法::債務引受":["注意点（令和5年LEC直前予想模試）：免責的債務引受＝債権者が債務者に通知した時に効果発生。解除権・取消権の行使不可＝履行拒否は可能。免責的債務引受の引受人＝売買の目的達成できない時も契約解除不可。債務者の意思に基づかない債務引受NG。免責的債務引受されたら、元の債務担保のための第三者の質権も消滅する。"],"民法::債権譲渡":["注意点（令和4年LEC直前予想模試）：将来債権譲渡＝債務者対抗要件具備前に譲渡制限特約→譲受人は特約悪意となって、債務者に対抗できない。 譲渡制限債権に強制執行＝善悪に関係なく対抗不可。債権譲渡後、対抗要件備える前でも譲渡人は債務者に請求できない。譲渡禁止特約の善意無過失＝譲渡時点で判断（対抗要件時点関係無し）債務者が異議留めない承諾＝譲渡人に対抗事由あること譲受人過失で知らなかった場合→債務者対抗可能 譲渡制限特約付きの預貯金債権の譲渡は、悪意又は重過失…","注意点：譲渡制限の意思表示された時に悪意重過失だった譲受人の債権者が差押＝履行拒める。再売買の予約＝売買契約後にされても有効 代金支払受けた時は引渡し前でも果実は買主に帰属","条文目安：民法466条周辺。条文番号と要件・効果をセットで確認。","ポイント：法人がする金銭債権の譲渡＝第三者への確定日付のある証書による通知＝債権譲渡登記で代替可能。債務者への対抗は登記通知または承諾必要。 / 譲渡人に破産手続き開始決定＝譲受人（全額譲受け、第三者に対抗出来るもの）は、譲渡制限特約について悪意重過失でも、全額供託させられる。 / 債務者は善意の第三者に債権譲渡の通謀虚偽表示対抗できない"],"債権譲渡":["注意点（令和4年LEC直前予想模試）：将来債権譲渡＝債務者対抗要件具備前に譲渡制限特約→譲受人は特約悪意となって、債務者に対抗できない。 譲渡制限債権に強制執行＝善悪に関係なく対抗不可。債権譲渡後、対抗要件備える前でも譲渡人は債務者に請求できない。譲渡禁止特約の善意無過失＝譲渡時点で判断（対抗要件時点関係無し）債務者が異議留めない承諾＝譲渡人に対抗事由あること譲受人過失で知らなかった場合→債務者対抗可能 譲渡制限特約付きの預貯金債権の譲渡は、悪意又は重過失…","注意点：譲渡制限の意思表示された時に悪意重過失だった譲受人の債権者が差押＝履行拒める。再売買の予約＝売買契約後にされても有効 代金支払受けた時は引渡し前でも果実は買主に帰属" 。給排水設備利用OK。障壁の高さ増した部分は、工事したものの単独所有。井戸等は１・２メートル距離必要。注意必要。相続人が限定承認＝抵当権消滅しない。第三者の権利目的でない時は、普通に混同で債権消滅。"],"根抵当権":["注意点：登記なくても確定期日当事者間では有効。目的不動産の第三取得者が破産開始決定受けた場合も元本確定。物上代位権行使で差押え＝元本確定。信用金庫取引による債権＝根抵当債務者に対する保証債権含む。保証委託取引により生ずる債権＝保証協会の保証債権含まない。","注意点（2020年TAC予想問題集）：極度額減額請求権＝設定者のみに認められる。一部譲渡受けた片方が競売の申立て＝申立て時に元本確定。 元本確定後は、転抵当権者の承諾を得ないでした根抵当権者に対する弁済を対抗できない。377↓ 転抵当、抵当権の譲渡・放棄、抵当権の順位の譲渡・放棄をした場合、債務者や物上保証人などに対抗するためには、その登記をするだけでは足りず、債務者に対して譲渡等の通知をするか、承諾を得なければならない。 ②主たる債務者が、抵当権の処分の…","条文目安：民法398条周辺。条文番号と要件・効果をセットで確認。","ポイント：根抵当権減額請求＝金額の明示不要 / 第三取得者も確定前に消滅請求できる"],"民法::根抵当権":["注意点：登記なくても確定期日当事者間では有効。目的不動産の第三取得者が破産開始決定受けた場合も元本確定。物上代位権行使で差押え＝元本確定。信用金庫取引による債権＝根抵当債務者に対する保証債権含む。保証委託取引により生ずる債権＝保証協会の保証債権含まない。","注意点（2020年TAC予想問題集）：極度額減額請求権＝設定者のみに認められる。一部譲渡受けた片方が競売の申立て＝申立て時に元本確定。 元本確定後は、転抵当権者の承諾を得ないでした根抵当権者に対する弁済を対抗できない。377↓ 転抵当、抵当権の譲渡・放棄、抵当権の順位の譲渡・放棄をした場合、債務者や物上保証人などに対抗するためには、その登記をするだけでは足りず、債務者に対して譲渡等の通知をするか、承諾を得なければならない。 ②主たる債務者が、抵当権の処分の…","条文目安：民法398条周辺。条文番号と要件・効果をセットで確認。","ポイント：根抵当権減額請求＝金額の明示不要 / 第三取得者も確定前に消滅請求できる"],"民法::婚姻と内縁の比較":["注意点（2022年TAC予想問題集）：夫婦間契約いつでも取消可能→実質破綻してたら不可。内縁でも共有不動産は特段の事情ない限り従前同様無償使用可能。不法行為の慰謝料請求＝内縁配偶者も含まれる。"],"婚姻と内縁の比較":["注意点（2022年TAC予想問題集）：夫婦間契約いつでも取消可能→実質破綻してたら不可。内縁でも共有不動産は特段の事情ない限り従前同様無償使用可能。不法行為の慰謝料請求＝内縁配偶者も含まれる。"],"婚姻":["注意点（伊藤塾2023公開模試）：養子・配偶者・養子直系卑属・その配偶者＝養親・直系尊属＝婚姻不可。"],"民法::婚姻":["注意点（伊藤塾2023公開模試）：養子・配偶者・養子直系卑属・その配偶者＝養親・直系尊属＝婚姻不可。"],"後見人":["注意点：後見開始審判と選任は一緒に必要。未成年後見は職権なし。特別養子縁組で後見人＝被後見人・未成年後見のための家裁の許可は不要"],"民法::後見人":["注意点：後見開始審判と選任は一緒に必要。未成年後見は職権なし。特別養子縁組で後見人＝被後見人・未成年後見のための家裁の許可は不要"],"元本確定前の根抵当権":["注意点（伊藤塾2018公開模試）：元本確定前に転抵当あっても債務者は自由に弁済可能。分割譲渡の登記は対抗要件で効力要件じゃない。"],"民法::元本確定前の根抵当権":["注意点（伊藤塾2018公開模試）：元本確定前に転抵当あっても債務者は自由に弁済可能。分割譲渡の登記は対抗要件で効力要件じゃない。"],"民法::権利能力なき社団と民法上の組合":["注意点（伊藤塾2023プレ模試）：権利能力なき社団も組合も親睦図ること目的OK。権利能力なき社団は個人で債務負わない＝組合は個人で負う。 構成員の脱退＝権利能力なき社団は持分払戻不可。民法上の組合は可能"],"権利能力なき社団と民法上の組合":["注意点（伊藤塾2023プレ模試）：権利能力なき社団も組合も親睦図ること目的OK。権利能力なき社団は個人で債務負わない＝組合は個人で負う。 構成員の脱退＝権利能力なき社団は持分払戻不可。民法上の組合は可能"],"権利質":["注意点（伊藤塾2018公開模試２）：地上権者は質権者に引渡し必要。存続期間10年。債権に質権設定でも譲渡可能。 執行可能。","注意点（2022年TAC予想問題集）：手続裁判は口頭弁論不要。書証提出されても認否なく資料にできる。保全異議＝申立期限なし。 保全抗告＝理由有無判断せず抗告裁判所へ送付。（保全抗告＝保全異議・保全取消しについての不服申立て）","注意点（2023年TAC予想問題集）：占有移転禁止の仮処分命令＝不動産で債務者特定困難→特定しないでOK 保全異議の申立てについての決定＝審級同一なので認可・変更・取消し必要。","注意点（令和4年LEC直前予想模試）：執行官が行う保全執行の執行処分＝執行官所属の地裁が保全執行裁判所 民保法＝すべて専属管轄。急迫の事情あれば裁判長が保全命令の決定可能（裁判所もオール決定主義）。 保全すべき権利・必要性・趣旨すべて疎明必要","注意点（伊藤塾2019プレ模試）：原裁判所＝保全抗告受けたら抗告裁判所へ送付（再度の考案禁止）保全執行＝当事者以外へは執行文の付与。","注意点（伊藤塾2019公開模試2）：保全命令の申立＝簡裁でも書面で必要。発令裁判所に保全異議。","注意点（伊藤塾2020公開模試2）：金銭債権不執行の合意＝仮差押命令不可。必要性あれば同一被保全債権に更に仮差押可能。 債務者の申立あれば、保全異議で仮処分取り消す場合に債権者へ仮処分命令で得たものの返還請求可能。 動産で著しい価格減少・不相応な費用かかる場合、売却して供託しなければならない","注意点（伊藤塾2020ファイナル模試）：占有移転禁止の仮処分命令＝特別の事情あれば債務者特定しないで可能。簡裁への保全命令申立も書面必要","注意点（伊藤塾2022公開模試2）：係争物に関する仮処分命令＝権利実行できなくなるおそれ・著しい困難おそれで可能。 仮差押解放金供託しても仮差押命令の効力がなくなるわけではない＝効力が供託金取戻請求権に移行するだけ。 保全異議＝利益あればいつでも可能。保全抗告＝原裁判所再度の考案不可。不動産占有移転禁止＝占有者特定しないとできない。"],"民事保全":["注意点（2020年TAC予想問題集）：処分禁止の仮処分命令＝請求認容判決で債務名義取得→処分禁止の登記後の承継人に承継執行文を受けて建物収去土地明渡の強制執行可能 。 占有移転禁止の仮処分命令執行後、善意の占有承継者に対し強制執行可能。 債権者以外の利害関係人＝記録閲覧請求に時期的制限あり。保全執行は申立てで行う（職権なし）","注意点（2021年TAC予想問題集）：利害関係人も事件記録閲覧請求可能→時期についての制限あり。 仮の地位を定める仮処分→審尋必要。ただし目的達成できない場合は不要。保全異議申立ての決定＝送達必要。 占有移転禁止の仮処分命令執行後は、善悪問わず占有承継者に明渡しの強制執行可能。","注意点（2022年TAC予想問題集）：手続裁判は口頭弁論不要。書証提出されても認否なく資料にできる。保全異議＝申立期限なし。 保全抗告＝理由有無判断せず抗告裁判所へ送付。（保全抗告＝保全異議・保全取消しについての不服申立て）","注意点（2023年TAC予想問題集）：占有移転禁止の仮処分命令＝不動産で債務者特定困難→特定しないでOK 保全異議の申立てについての決定＝審級同一なので認可・変更・取消し必要。","注意点（令和4年LEC直前予想模試）：執行官が行う保全執行の執行処分＝執行官所属の地裁が保全執行裁判所 民保法＝すべて専属管轄。急迫の事情あれば裁判長が保全命令の決定可能（裁判所もオール決定主義）。 保全すべき権利・必要性・趣旨すべて疎明必要","注意点（伊藤塾2019プレ模試）：原裁判所＝保全抗告受けたら抗告裁判所へ送付（再度の考案禁止）保全執行＝当事者以外へは執行文の付与。","注意点（伊藤塾2019公開模試2）：保全命令の申立＝簡裁でも書面で必要。発令裁判所に保全異議。","注意点（伊藤塾2020公開模試2）：金銭債権不執行の合意＝仮差押命令不可。必要性あれば同一被保全債権に更に仮差押可能。 債務者の申立あれば、保全異議で仮処分取り消す場合に債権者へ仮処分命令で得たものの返還請求可能。 動産で著しい価格減少・不相応な費用かかる場合、売却して供託しなければならない","注意点（伊藤塾2020ファイナル模試）：占有移転禁止の仮処分命令＝特別の事情あれば債務者特定しないで可能。簡裁への保全命令申立も書面必要","注意点（伊藤塾2022公開模試2）：係争物に関する仮処分命令＝権利実行できなくなるおそれ・著しい困難おそれで可能。 仮差押解放金供託しても仮差押命令の効力がなくなるわけではない＝効力が供託金取戻請求権に移行するだけ。 保全異議＝利益あればいつでも可能。保全抗告＝原裁判所再度の考案不可。不動産占有移転禁止＝占有者特定しないとできない。"],"民保法::保全命令":["注意点（伊藤塾2018公開模試２）：仮差押命令・仮処分命令＝被保全債権が条件期限付でも可能。 取下げは口頭弁論・審尋期日以外は書面で","注意点（伊藤塾2020公開模試）：決定には理由付す必要＝口頭弁論得ないなら理由要旨を示せば足りる"],"保全命令":["注意点（伊藤塾2018公開模試２）：仮差押命令・仮処分命令＝被保全債権が条件期限付でも可能。 取下げは口頭弁論・審尋期日以外は書面で","注意点（伊藤塾2020公開模試）：決定には理由付す必要＝口頭弁論得ないなら理由要旨を示せば足りる"],"民保法::保全執行":["注意点（伊藤塾2021公開模試）：原則執行文不要。当事者以外の承継人にする場合必要。金銭債権に対する仮差押＝第三債務者に弁済禁止する命令を発する。仮処分前に権利取得しても仮処分登記後に登記したら対抗不可。"],"保全執行":["注意点（伊藤塾2021公開模試）：原則執行文不要。当事者以外の承継人にする場合必要。金銭債権に対する仮差押＝第三債務者に弁済禁止する命令を発する。仮処分前に権利取得しても仮処分登記後に登記したら対抗不可。"],"保全異議・保全取消":["注意点（令和5年LEC直前予想模試）：執行停止＝担保条件で保全執行・既にした処分の取消可能＝保全命令の取消明らかな事情と償うことできない損害の疎明必要。保全命令取消す決定＝2週間以内の期間経過しなければ決定効力ない旨宣言可能。 仮処分命令で償うことできない損害＝債務者の申立てで担保条件で仮処分命令の取消可能。 債務者の申立てで本案の訴え提起&係属書面提出命令あり。仲裁判断も本案に該当。 保全命令＝保全異議申立て可能。保全命令発令前に戻り、再度必要性審理する…"],"民保法::保全異議・保全取消":["注意点（令和5年LEC直前予想模試）：執行停止＝担保条件で保全執行・既にした処分の取消可能＝保全命令の取消明らかな事情と償うことできない損害の疎明必要。保全命令取消す決定＝2週間以内の期間経過しなければ決定効力ない旨宣言可能。 仮処分命令で償うことできない損害＝債務者の申立てで担保条件で仮処分命令の取消可能。 債務者の申立てで本案の訴え提起&係属書面提出命令あり。仲裁判断も本案に該当。 保全命令＝保全異議申立て可能。保全命令発令前に戻り、再度必要性審理する…"],"保全異議":["注意点（伊藤塾2019公開模試）：保全異議＝保全命令を発した裁判所が必要性再審理。いつでも可能。当事者双方期日なければ決定不可。取下げに債権者の同意不要。"],"民保法::保全異議":["注意点（伊藤塾2019公開模試）：保全異議＝保全命令を発した裁判所が必要性再審理。いつでも可能。当事者双方期日なければ決定不可。取下げに債権者の同意不要。"],"仮差押えの執行":["注意点（伊藤塾2018公開模試）：裏書禁止の有価証券＝債権に対する仮差押えの執行→第三債務者に債務者への弁済を禁止する方法＝給付訴訟を保存行為として行うことはできる。不動産に対する仮差押えの効力は登記時。"],"民保法::仮差押えの執行":["注意点（伊藤塾2018公開模試）：裏書禁止の有価証券＝債権に対する仮差押えの執行→第三債務者に債務者への弁済を禁止する方法＝給付訴訟を保存行為として行うことはできる。不動産に対する仮差押えの効力は登記時。"],"民保法::不動産担保権の実行":["注意点（2018年TAC予想問題集）：債務名義なくても実行可能（確定判決・公正証書・登記・一般先取特権証明書）不動産担保権の実行の開始決定に対する執行抗告及び執行異議の申立＝担保権の不存在消滅理由にしてOK。（民執35と182の対比）"],"不動産担保権の実行":["注意点（2018年TAC予想問題集）：債務名義なくても実行可能（確定判決・公正証書・登記・一般先取特権証明書）不動産担保権の実行の開始決定に対する執行抗告及び執行異議の申立＝担保権の不存在消滅理由にしてOK。（民執35と182の対比）","注意点（伊藤塾2019公開模試）：担保不動産上の留置権は買受人引受となり消滅しない。抵当権に基づく不動産競売→不存在・消滅を売却許可決定に対する執行抗告の理由とすることができない＝開始決定時に執行異議あるから。 違法執行に対して法律の定めあり＝執行抗告（上級裁判所）。なし＝執行異議（原裁判所）。 不当執行に対して請求異議の訴え・第三者意義の訴え"],"民保法::仮差押命令":["注意点（2019年TAC予想問題集）：仮差押解放金供託証明＝執行取消。命令自体の取消は保全異議や保全取消し。 執行は申立てにより裁判所または執行官が行う。","注意点：強制執行をすることができなくなる恐れ・著しい困難生ずる恐れある時いん可能＝事後求償権を被保全権利として仮差押え可能。動産の仮差押＝目的物特定せずに可能＝執行官がその場で確認すればいいから。債務者は特定せずに発することはできない。占有移転禁止の仮処分なら可能。"],"仮差押命令":["注意点（2019年TAC予想問題集）：仮差押解放金供託証明＝執行取消。命令自体の取消は保全異議や保全取消し。 執行は申立てにより裁判所または執行官が行う。","注意点（2018年TAC予想問題集）：被保全権利が期限・条件付きでも可能。動産の仮差押え命令なら目的物特定せずにOK。 仮処分なら償うことができない損害で命令取消あり（仮執行はNG）","注意点：強制執行をすることができなくなる恐れ・著しい困難生ずる恐れある時いん可能＝事後求償権を被保全権利として仮差押え可能。動産の仮差押＝目的物特定せずに可能＝執行官がその場で確認すればいいから。債務者は特定せずに発することはできない。占有移転禁止の仮処分なら可能。"],"民事訴訟における証拠収集手続":["注意点（伊藤塾2021公開模試）：証人尋問＝職権不可。鑑定＝職権可能。訴訟継続中職権で証拠保全の決定可能＝不服申立て不可。"],"民訴法::民事訴訟における証拠収集手続":["注意点（伊藤塾2021公開模試）：証人尋問＝職権不可。鑑定＝職権可能。訴訟継続中職権で証拠保全の決定可能＝不服申立て不可。"],"民訴法::補助参加及び訴訟告知":["注意点（伊藤塾2022公開模試2）：判決確定後も補助参加申出とともに再審の訴え提起して訴訟再会可能。 訴訟外で相殺の意思表示＝参加人も主張可能。被参加人が補助参加人のできない訴訟行為を故意過失でしなかった時＝補助参加人に裁判の効力生じない。補助参加しなくても参加的効力受ける。"],"補助参加及び訴訟告知":["注意点（伊藤塾2022公開模試2）：判決確定後も補助参加申出とともに再審の訴え提起して訴訟再会可能。 訴訟外で相殺の意思表示＝参加人も主張可能。被参加人が補助参加人のできない訴訟行為を故意過失でしなかった時＝補助参加人に裁判の効力生じない。補助参加しなくても参加的効力受ける。"],"弁論準備手続":["注意点（伊藤塾2021プレ模試）：分離可能。当事者双方の申立てで取消必要。証拠の申出の裁判可能","注意点（伊藤塾2023公開模試2）：弁論準備手続の証拠調べ＝文書・準文書（図面・写真・録音テープ・ビデオテープ）"],"民訴法::弁論準備手続":["注意点（伊藤塾2021プレ模試）：分離可能。当事者双方の申立てで取消必要。証拠の申出の裁判可能","注意点（伊藤塾2023公開模試2）：弁論準備手続の証拠調べ＝文書・準文書（図面・写真・録音テープ・ビデオテープ）"],"弁論主義・釈明権":["注意点（伊藤塾2022公開模試2）：当事者尋問＝証拠資料＝口頭弁論で主張したものとはみなされない。当事者ではなく代理人がしたと認定＝弁論主義に反しない。"],"民訴法::弁論主義・釈明権":["注意点（伊藤塾2022公開模試2）：当事者尋問＝証拠資料＝口頭弁論で主張したものとはみなされない。当事者ではなく代理人がしたと認定＝弁論主義に反しない。"],"民訴法::弁論主義":["注意点（伊藤塾2019公開模試）：ABの履行請求訴訟＝Aの代理人CとB間の契約と認定＝弁論主義に反しない。債権者に過失があった事実＝債務者において主張立証責任負う。書証の成立真正＝補助事実。","注意点：権利自白＝裁判所拘束されない。被告が原告の所有権認めても所有者第三者と認定可能"],"弁論主義":["注意点（伊藤塾2019公開模試）：ABの履行請求訴訟＝Aの代理人CとB間の契約と認定＝弁論主義に反しない。債権者に過失があった事実＝債務者において主張立証責任負う。書証の成立真正＝補助事実。","注意点：権利自白＝裁判所拘束されない。被告が原告の所有権認めても所有者第三者と認定可能"],"民訴法::文書提出命令":["注意点（伊藤塾2021プレ模試）：決定に対して即時抗告可能"],"文書提出命令":["注意点（伊藤塾2021プレ模試）：決定に対して即時抗告可能"],"民訴法::複数請求訴訟":["注意点（伊藤塾2023公開模試2）：訴えの変更の新請求による時効の完成猶予＝変更書面の裁判所への提出時。 中間確認の訴え＝請求の先決関係にある権利法律関係の存否＝訴訟要件の存否は対象外。 引渡と代償請求＝請求の単純併合＝全ての請求について審理・判決必要"],"複数請求訴訟":["注意点（伊藤塾2023公開模試2）：訴えの変更の新請求による時効の完成猶予＝変更書面の裁判所への提出時。 中間確認の訴え＝請求の先決関係にある権利法律関係の存否＝訴訟要件の存否は対象外。 引渡と代償請求＝請求の単純併合＝全ての請求について審理・判決必要"],"民訴法::必要的共同訴訟":["注意点（伊藤塾2019公開模試）：類似なら一部のものだけ取下可能。一人が上訴したら全員に遮断効発生。 参加承継＝独立当事者訴訟。片面的な参加も可能。相手型一人に訴訟行為で全員に効果発生。"],"必要的共同訴訟":["注意点（伊藤塾2019公開模試）：類似なら一部のものだけ取下可能。一人が上訴したら全員に遮断効発生。 参加承継＝独立当事者訴訟。片面的な参加も可能。相手型一人に訴訟行為で全員に効果発生。"],"民訴法::反訴":["注意点（伊藤塾2018公開模試）：本訴の目的請求または防御の方法と関連ある場合のみ提起可能。再反訴OK。併合要件欠く場合終局判決をもって却下される","注意点（伊藤塾2020ファイナル模試）：再反訴可能。併合要件欠く時は終局判決で却下すべき"],"反訴":["注意点（伊藤塾2018公開模試）：本訴の目的請求または防御の方法と関連ある場合のみ提起可能。再反訴OK。併合要件欠く場合終局判決をもって却下される","注意点（伊藤塾2020ファイナル模試）：再反訴可能。併合要件欠く時は終局判決で却下すべき"],"判決手続":["注意点（2021年TAC予想問題集）：判決の誤記訂正＝更正決定→即時抗告が可能。適法な控訴あったらできない。"],"民訴法::判決手続":["注意点（2021年TAC予想問題集）：判決の誤記訂正＝更正決定→即時抗告が可能。適法な控訴あったらできない。"],"判決":["注意点（伊藤塾2020公開模試2）：判決書＝口頭弁論の終結日記載必要。実在しない当事者に対する判決＝無効判決だが自ら取消不可能。 更正決定に対して即時抗告可能。","注意点（伊藤塾2023公開模試）：請求の一部に脱漏あっても追加判決申立てで補充できるから上訴不可。","注意点：片方欠席＝出頭当事者の申出あれば終局判決可能。中間確認の訴えにも不服申立て可能。弁論分離＝独立して上訴可能。上訴審では仮執行の結果考慮してはいけない。","ポイント：被告欠席・争わない＝認容なら判決原本不要で判決OK / 中間確認に不服OK / 弁論分離＝独立上訴可能 / 仮執行の結果考慮不可"],"民訴法::判決":["注意点（伊藤塾2020公開模試2）：判決書＝口頭弁論の終結日記載必要。実在しない当事者に対する判決＝無効判決だが自ら取消不可能。 更正決定に対して即時抗告可能。","注意点（伊藤塾2023公開模試）：請求の一部に脱漏あっても追加判決申立てで補充できるから上訴不可。","注意点：片方欠席＝出頭当事者の申出あれば終局判決可能。中間確認の訴えにも不服申立て可能。弁論分離＝独立して上訴可能。上訴審では仮執行の結果考慮してはいけない。"],"二重起訴の禁止":["注意点（伊藤塾2018公開模試）：貸金債権残部を自動債権として相殺の抗弁主張は可能。手形金支払請求権と代金支払債務不存在確認は訴訟物違うからセーフ","注意点（伊藤塾2022公開模試）：貸金返還請求訴訟→反訴→貸金訴訟で相殺抗弁主張は不可。"],"民訴法::二重起訴の禁止":["注意点（伊藤塾2018公開模試）：貸金債権残部を自動債権として相殺の抗弁主張は可能。手形金支払請求権と代金支払債務不存在確認は訴訟物違うからセーフ","注意点（伊藤塾2022公開模試）：貸金返還請求訴訟→反訴→貸金訴訟で相殺抗弁主張は不可。"],"当時者能力":["注意点（伊藤塾2021公開模試2）：当事者能力欠缺を看過して本案判決確定＝再審不可。被保佐人が訴訟上の和解＝保佐人の特別の授権必要。"],"民訴法::当時者能力":["注意点（伊藤塾2021公開模試2）：当事者能力欠缺を看過して本案判決確定＝再審不可。被保佐人が訴訟上の和解＝保佐人の特別の授権必要。"],"当事者適格":["注意点（令和4年LEC直前予想模試）：境界確定＝被告が時効で原告土地取得＝原告適格なし。口頭弁論終結後の承継人も再審の訴え可能。 給付の訴えの被告適格は個別判断。相続分全部譲渡したもの＝遺産確認の訴えの当事者適格なし。","注意点（伊藤塾2023公開模試）：給付義務者になり得なくても却下されない。権利能力ない社団＝代表個人名義に求める原告適格あり。 業務執行組合員＝自己の名で訴訟OK。代位債権者＝保全債権消滅したら却下","注意点（LEC直前予想模試2022）：被告が時効取得＝筆界特定の原告適格欠く 口頭弁論終結後の承継人は再審の原告適格あり。"],"民訴法::当事者適格":["注意点（令和4年LEC直前予想模試）：境界確定＝被告が時効で原告土地取得＝原告適格なし。口頭弁論終結後の承継人も再審の訴え可能。 給付の訴えの被告適格は個別判断。相続分全部譲渡したもの＝遺産確認の訴えの当事者適格なし。","注意点（伊藤塾2023公開模試）：給付義務者になり得なくても却下されない。権利能力ない社団＝代表個人名義に求める原告適格あり。 業務執行組合員＝自己の名で訴訟OK。代位債権者＝保全債権消滅したら却下"],"当事者尋問":["注意点（伊藤塾2021公開模試2）：当事者尋問＝自白成立しない。宣誓させることができる。法定代理人に尋問しても、さらに未成年に尋問可能。"],"民訴法::当事者尋問":["注意点（伊藤塾2021公開模試2）：当事者尋問＝自白成立しない。宣誓させることができる。法定代理人に尋問しても、さらに未成年に尋問可能。"],"当事者及び裁判所の訴訟行為":["注意点（伊藤塾2020公開模試）：終結した口頭弁論の再開＝職権でOK。弁論の更新放棄不可（放棄は責問権の喪失） 訴訟遅滞おこしたら勝訴でも遅滞で生じた訴訟費用支払わせられる。","注意点（伊藤塾2023プレ模試）：口頭弁論の指揮に関する裁判所の命令・処置に異議＝裁判所は決定で異議について裁判する＝受訴裁判所が単独体の時は適用されない。弁論の更新＝責問権喪失の対象外。"],"民訴法::当事者及び裁判所の訴訟行為":["注意点（伊藤塾2020公開模試）：終結した口頭弁論の再開＝職権でOK。弁論の更新放棄不可（放棄は責問権の喪失） 訴訟遅滞おこしたら勝訴でも遅滞で生じた訴訟費用支払わせられる。","注意点（伊藤塾2023プレ模試）：口頭弁論の指揮に関する裁判所の命令・処置に異議＝裁判所は決定で異議について裁判する＝受訴裁判所が単独体の時は適用されない。弁論の更新＝責問権喪失の対象外。"],"当事者への意見聴取の要否":["注意点（伊藤塾2023プレ模試）：証拠保全の決定＝不要。弁論準備手続・書面による準備手続・専門委員の関与・控訴審での請求追加の期間＝必要。"],"民訴法::当事者への意見聴取の要否":["注意点（伊藤塾2023プレ模試）：証拠保全の決定＝不要。弁論準備手続・書面による準備手続・専門委員の関与・控訴審での請求追加の期間＝必要。"],"当事者の訴訟行為":["注意点（伊藤塾2018公開模試２）：責に帰さない事由で不変期間遵守できなかった場合、事由消滅後1週間以内に追完可能→期間延長不可能"],"民訴法::当事者の訴訟行為":["注意点（伊藤塾2018公開模試２）：責に帰さない事由で不変期間遵守できなかった場合、事由消滅後1週間以内に追完可能→期間延長不可能"],"当事者の申立権":["注意点（伊藤塾2023公開模試）：支払う能力ない者＝訴訟上の救助の決定可能。口頭弁論の併合・終了した口頭弁論の再開＝当事者の申立権ない。 裁判長に釈明権、当事者は期日外含め求問権あり"],"民訴法::当事者の申立権":["注意点（伊藤塾2023公開模試）：支払う能力ない者＝訴訟上の救助の決定可能。口頭弁論の併合・終了した口頭弁論の再開＝当事者の申立権ない。 裁判長に釈明権、当事者は期日外含め求問権あり"],"民訴法::提訴予告通知制度":["注意点（伊藤塾2020公開模試）：請求の要旨・紛争の要点で足りる。予告通知をした日から4ヶ月以内に書面で照会可能→営業秘密は不可＝通知受けたものも照会可能。裁判所は文書の送付嘱託・調査の嘱託・専門的な知見に基づく意見陳述の嘱託・執行官による現況調査可能＝文書の提出命令は不可（訴え提起前の証拠収集処分）"],"提訴予告通知制度":["注意点（伊藤塾2020公開模試）：請求の要旨・紛争の要点で足りる。予告通知をした日から4ヶ月以内に書面で照会可能→営業秘密は不可＝通知受けたものも照会可能。裁判所は文書の送付嘱託・調査の嘱託・専門的な知見に基づく意見陳述の嘱託・執行官による現況調査可能＝文書の提出命令は不可（訴え提起前の証拠収集処分）"],"民訴法::直接主義":["注意点（令和4年LEC直前予想模試）：大規模訴訟（当事者や証人が著しく多数）でも受命裁判官に証人・当事者尋問させられる。","注意点：裁判所外での当事者尋問＝当事者に異議がないこと必要。合議体の3人のうち1人が変わった場合も弁論の更新必要。"],"直接主義":["注意点（令和4年LEC直前予想模試）：大規模訴訟（当事者や証人が著しく多数）でも受命裁判官に証人・当事者尋問させられる。","注意点：裁判所外での当事者尋問＝当事者に異議がないこと必要。合議体の3人のうち1人が変わった場合も弁論の更新必要。"],"民訴法::調査の嘱託":["注意点（伊藤塾2023公開模試）：被嘱託者は団体＝権利能力なき社団もOK。報告書＝当事者の援用不要。手形訴訟で調査嘱託不可"],"調査の嘱託":["注意点（伊藤塾2023公開模試）：被嘱託者は団体＝権利能力なき社団もOK。報告書＝当事者の援用不要。手形訴訟で調査嘱託不可"],"即時抗告":["注意点（令和5年LEC直前予想模試）：訴え変更許さない旨決定・文書の所持者でない本案被告・少額訴訟→通常訴訟決定＝即時抗告不可。 督促意義の却下・命令による訴状却下＝即時抗告可能"],"民訴法::即時抗告":["注意点（令和5年LEC直前予想模試）：訴え変更許さない旨決定・文書の所持者でない本案被告・少額訴訟→通常訴訟決定＝即時抗告不可。 督促意義の却下・命令による訴状却下＝即時抗告可能"],"送達":["注意点（伊藤塾2023プレ模試）：被保佐人に対して送達する。書留郵便＝発送の時に送達あったとみなされる。送達報告書作成必要だが、作成・提出しなくても効力に影響なし。","注意点（令和５年予備試験）：同居者と受送達者に利害対立あっても送達の効力発生。被告への最初にすべき口頭弁論期日の呼び出しが公示送達である場合は通常の訴訟手続きに移行する。 1回目の公示送達は、原則として当事者の申立てにより、裁判所書記官が行う。２回目は書記官の職権","注意点：出会送達＝出会った場所で書類交付。公示送達＝原則掲示日から２週間経過、２回目以降は掲載翌日。 書記官も出頭者に対しては自ら送達可能。訴訟無能力者に対してはその法定代理人に送達。"],"民訴法::送達":["注意点（伊藤塾2023プレ模試）：被保佐人に対して送達する。書留郵便＝発送の時に送達あったとみなされる。送達報告書作成必要だが、作成・提出しなくても効力に影響なし。","注意点（令和５年予備試験）：同居者と受送達者に利害対立あっても送達の効力発生。被告への最初にすべき口頭弁論期日の呼び出しが公示送達である場合は通常の訴訟手続きに移行する。 1回目の公示送達は、原則として当事者の申立てにより、裁判所書記官が行う。２回目は書記官の職権","注意点：出会送達＝出会った場所で書類交付。公示送達＝原則掲示日から２週間経過、２回目以降は掲載翌日。 書記官も出頭者に対しては自ら送達可能。訴訟無能力者に対してはその法定代理人に送達。"],"民訴法::訴訟要件":["注意点（伊藤塾2020公開模試）：抗弁事項（仲裁の合意・不起訴の合意・原告の訴訟費用の担保提供）は主張必要。給付が事実上不可能判明しても訴えの利益は消滅しない。"],"訴訟要件":["注意点（伊藤塾2020公開模試）：抗弁事項（仲裁の合意・不起訴の合意・原告の訴訟費用の担保提供）は主張必要。給付が事実上不可能判明しても訴えの利益は消滅しない。"],"訴訟行為":["注意点（伊藤塾2019公開模試2）：不起訴の合意OK。口頭弁論の指揮に関する裁判所の命令・処置に対し異議を述べた時、裁判所は決定でその異議について裁判する。釈明権に対し異議可能。"],"民訴法::訴訟行為":["注意点（伊藤塾2019公開模試2）：不起訴の合意OK。口頭弁論の指揮に関する裁判所の命令・処置に対し異議を述べた時、裁判所は決定でその異議について裁判する。釈明権に対し異議可能。"],"訴え提起前の和解":["注意点（令和4年LEC直前予想模試）：請求の趣旨&争いの実情提示で相手方の簡裁に和解の申立て可能。裁判所は提起前の和解で和解条項定められない。 当事者双方の申立てじゃなくていい。和解申立時に訴え提起とみなされる。"],"民訴法::訴え提起前の和解":["注意点（令和4年LEC直前予想模試）：請求の趣旨&争いの実情提示で相手方の簡裁に和解の申立て可能。裁判所は提起前の和解で和解条項定められない。 当事者双方の申立てじゃなくていい。和解申立時に訴え提起とみなされる。"],"訴え提起前における証拠収集":["注意点（伊藤塾2022公開模試2）：訴え提起前の証拠保全可能＝特別代理人選任OK。証拠保全却下＝抗告可能。予告通知書＝請求の要旨・紛争の要点。 4ヶ月以内に限り回答照会請求可能。裁判所に証拠収集処分申立て可能。"],"民訴法::訴え提起前における証拠収集":["注意点（伊藤塾2022公開模試2）：訴え提起前の証拠保全可能＝特別代理人選任OK。証拠保全却下＝抗告可能。予告通知書＝請求の要旨・紛争の要点。 4ヶ月以内に限り回答照会請求可能。裁判所に証拠収集処分申立て可能。"],"民訴法::訴えの利益":["注意点（伊藤塾2021公開模試）：給付判決事実上実現不可能でも訴えの利益あり。","注意点（令和４年予備短答模試）：計算書類承認取消の訴え＝再決議された特段の事情ない限り訴えの利益失われない。 遺言者心神喪失でも生存中の遺言無効確認の訴えは認められない。"],"訴えの利益":["注意点（伊藤塾2021公開模試）：給付判決事実上実現不可能でも訴えの利益あり。","注 求放棄可能・被告認諾不可。","注意点：訴えの利益欠いても訴訟上の和解無効にならない。控訴審で請求の放棄＝第一審判決は当然に効力を失う。","注意点：訴えの取下げ＝同意いらないなら通知の方法自由。一審判決が控訴裁で破棄差戻し＝再祚禁止にならない。和解条項案の書面による受諾もOK。"],"控訴及び上告":["注意点（伊藤塾2020公開模試2）：訴え不適法の却下判決＝被告も控訴可能。相殺の抗弁で請求棄却＝被告側の相殺以外の理由求めて控訴可能。 上告裁判所は口頭弁論得ないで判決で上告棄却可能。"],"民訴法::控訴及び上告":["注意点（伊藤塾2020公開模試2）：訴え不適法の却下判決＝被告も控訴可能。相殺の抗弁で請求棄却＝被告側の相殺以外の理由求めて控訴可能。 上告裁判所は口頭弁論得ないで判決で上告棄却可能。"],"口頭弁論の準備":["注意点（伊藤塾2023公開模試）：意見を求める照会は不可。弁論準備手続も傍聴あり。当事者双方とテレビ電話OK。申立てなく専門委員関与可能。"],"民訴法::口頭弁論の準備":["注意点（伊藤塾2023公開模試）：意見を求める照会は不可。弁論準備手続も傍聴あり。当事者双方とテレビ電話OK。申立てなく専門委員関与可能。"],"民訴法::口頭弁論における直接主義":["注意点（伊藤塾2020公開模試2）：弁論更新しないで判決＝絶対的上告理由"],"口頭弁論における直接主義":["注意点（伊藤塾2020公開模試2）：弁論更新しないで判決＝絶対的上告理由"],"民訴法::口頭弁論":["注意点（伊藤塾2020ファイナル模試）：専門委員の説明＝証拠資料とならない。鑑定人の意見＝証拠資料。期日ごとに調書必要。訴訟で引用した文書の提出命令＝従わなくても制裁なし。同時審判の申出がある共同訴訟＝分離不可"],"口頭弁論":["注意点（伊藤塾2020ファイナル模試）：専門委員の説明＝証拠資料とならない。鑑定人の意見＝証拠資料。期日ごとに調書必要。訴訟で引用した文書の提出命令＝従わなくても制裁なし。同時審判の申出がある共同訴訟＝分離不可"],"検証":["注意点（伊藤塾2023公開模試2）：文書の外形・存在は検証。当事者の申出必要。職権不可。鑑定は職権で可能。決定で検証目的物の提示送付命じれる。大気汚染や騒音などの無体物も検証可能"],"民訴法::検証":["注意点（伊藤塾2023公開模試2）：文書の外形・存在は検証。当事者の申出必要。職権不可。鑑定は職権で可能。決定で検証目的物の提示送付命じれる。大気汚染や騒音などの無体物も検証可能"],"民訴法::計画審理":["注意点（令和5年LEC直前予想模試）：裁判所と当事者が協議して審理計画＝証人尋問期間・口頭弁論判決予定定める必要ある。"],"計画審理":["注意点（令和5年LEC直前予想模試）：裁判所と当事者が協議して審理計画＝証人尋問期間・口頭弁論判決予定定める必要ある。"],"共同訴訟":["注意点（2021年TAC予想問題集）：共同訴訟人間の証拠共通の原則。申出で分離せずに裁判。なければ弁論・裁判の分離は裁判所の裁量。","注意点（伊藤塾2020公開模試2）：通常共同訴訟＝各共同訴訟人単独で訴訟上の和解可能。必要的共同訴訟で上訴期間経過した訴訟人→全員の上訴期間経過前でも上訴できない","注意点（伊藤塾2021公開模試2）：被保佐人・被補助人＝同意えずに上訴について訴訟行為可能","注意点（伊藤塾2022公開模試）：土地所有者が建物共同相続人に建物収去土地明渡請求＝同時に判決得ること要しない。","注意点（令和５年予備試験）：土地の共有＝一人取下げで全員取下げ。 訴訟人の一人が上告をした後に，さらに他の共同訴訟人が上告をした場合，後の上.告は二重上告となり不適法。 土地の所有者がその所有権に基づいて地上の建物の所有者である共同相続人を相手方とし、建物収去土地明渡を請求する訴訟は、いわゆる固有必要的共同訴訟ではない"],"民訴法::共同訴訟":["注意点（2021年TAC予想問題集）：共同訴訟人間の証拠共通の原則。申出で分離せずに裁判。なければ弁論・裁判の分離は裁判所の裁量。","注意点（伊藤塾2020公開模試2）：通常共同訴訟＝各共同訴訟人単独で訴訟上の和解可能。必要的共同訴訟で上訴期間経過した訴訟人→全員の上訴期間経過前でも上訴できない","注意点（伊藤塾2021公開模試2）：被保佐人・被補助人＝同意えずに上訴について訴訟行為可能","注意点（伊藤塾2022公開模試）：土地所有者が建物共同相続人に建物収去土地明渡請求＝同時に判決得ること要しない。","注意点（令和５年予備試験）：土地の共有＝一人取下げで全員取下げ。 訴訟人の一人が上告をした後に，さらに他の共同訴訟
