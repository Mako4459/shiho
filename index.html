bject":"商業登記法","topic":"登記期間","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n官庁の許可書が株式会社に到達した日に効力発生。外国会社＝本国で登記事項発生＝日本における代表者に到達してから3週間以内に登記","date":"Excel取込"},{"id":1800000000351,"subject":"商業登記法","topic":"登記の更正・抹消","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n吸収分割の無効の訴え認容＝裁判所書記官の嘱託で抹消","date":"Excel取込"},{"id":1800000000352,"subject":"商業登記法","topic":"定款の添付","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\n取得請求権付株式の取得と引換にする新株予約権の発行＝初めてなら定款添付必要。\n株主名簿管理人設置・非公開の株主割当を役会で＝定款必要。","date":"Excel取込"},{"id":1800000000353,"subject":"商業登記法","topic":"組織変更の登記","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n名資会社が組織変更＝債権者異議を二重公告による省略不可。合同会社の効力発生日変更＝社員の過半数","date":"Excel取込"},{"id":1800000000354,"subject":"商業登記法","topic":"組織変更の登記","level":1,"memo":"【ソース】伊藤塾2022プレ模試\n\n株→合同＝変更直前における資産負債額並びに合同が株主に交付する財産価額記載した合同代表作成の書類の添付が必要になる。","date":"Excel取込"},{"id":1800000000355,"subject":"商業登記法","topic":"組織変更の登記","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n効力発生日の20日前までに登録株式質権者に対して通知または公告。持分→株式変更＝役員選定は変更後のルールで行う。株式→合資＝資本金の計上書面不要","date":"Excel取込"},{"id":1800000000356,"subject":"商業登記法","topic":"組織変更に関する登記","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n組織変更に伴う設立＝設立時代表者等の印鑑証明書不要。","date":"Excel取込"},{"id":1800000000357,"subject":"商業登記法","topic":"組織再編の登記","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n経由申請。管轄同一なら吸収分割と商号の変更一括登記可能。新株発行会社が組織変更＝提供公告or証券発行してない書面必要。資本金の額増加＝資本金計上書面必要","date":"Excel取込"},{"id":1800000000358,"subject":"商業登記法","topic":"組織再編の登記","level":1,"memo":"【ソース】伊藤塾2022公開模試\n\n新設分割＝管轄外なら設立経由して変更登記必要。","date":"Excel取込"},{"id":1800000000359,"subject":"商業登記法","topic":"組織再編の登記","level":1,"memo":"【ソース】伊藤塾2023プレ模試\n\n株式交付の効力発生日＝当初から3ヶ月以内の日なら可能","date":"Excel取込"},{"id":1800000000360,"subject":"商業登記法","topic":"組織再編に関する登記","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n公正取引委員会関わる合併＝届出受理書面不要。","date":"Excel取込"},{"id":1800000000361,"subject":"商業登記法","topic":"設立登記の添付書面","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n創立総会の招集期間短縮＝議事録で全員出席確認できるなら同意書添付不要。\n設立時執行役の就任承諾に対する本人確認証明必要。払込証する書面＝全員日本に住所ないなら発起人・設立時代表取締役以外の名義の口座でもいい（権限委任の書面添付必要）\n定款で報酬定めたら必ず検査役の調査必要。","date":"Excel取込"},{"id":1800000000362,"subject":"商業登記法","topic":"設立に関する登記","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n内閣総理大臣の認可受けた外国の銀行も邦銀海外支店として払込証する書面に利用可能。","date":"Excel取込"},{"id":1800000000363,"subject":"商業登記法","topic":"清算結了等の登記","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n残余財産あって清算結了無効なら抹消必要。存続期間の定め廃止しないと継続登記不可。\nみなし解散から３年以内に継続したなら登記自体はいつでも受理される。","date":"Excel取込"},{"id":1800000000364,"subject":"商業登記法","topic":"清算株式会社の登記","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n監査役＝譲渡制限設けても退任しない","date":"Excel取込"},{"id":1800000000365,"subject":"商業登記法","topic":"新設分割の登記","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n新設分割設立の定款＝新設分割会社が作成。権利義務全部承継なら総社員の同意、その他は業務執行社員の過半数の同意。不法行為債務の債権者には二重公告で省略できない。新設分割新株予約権じゃないなら提供公告不要。\n複数の会社が新設分割＝登記全部同時に必要","date":"Excel取込"},{"id":1800000000366,"subject":"商業登記法","topic":"新株予約権の登記","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n新株予約権行使書面＝払込取扱金融機関作成の新株予約権行使請求取扱証明書\n資本金に計上しない額あるなら、その議事録添付。組織変更時、提供公告必要だが新株予約権消滅証明は不要。","date":"Excel取込"},{"id":1800000000367,"subject":"商業登記法","topic":"新株予約権の登記","level":1,"memo":"【ソース】伊藤塾2021プレ模試\n\n行使に際して社債出資＝目的の数算定方法の一部として、社債の額面金額の総額記載必要。\n払込金額確定していれば払込金額を登記。","date":"Excel取込"},{"id":1800000000368,"subject":"商業登記法","topic":"新株予約権の登記","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n現物出資の検査役の調査＝1個ごとに判断","date":"Excel取込"},{"id":1800000000369,"subject":"商業登記法","topic":"新株予約権の登記","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n取得請求権付株式の取得対価＝自己新株予約権以外の新株予約権→発行の変更登記に定款添付必要。","date":"Excel取込"},{"id":1800000000370,"subject":"商業登記法","topic":"新株予約権に関する登記","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n募集新株予約権の払込期日が割当日より前＝払込証する書面必要。","date":"Excel取込"},{"id":1800000000371,"subject":"商業登記法","topic":"商人の商号の登記","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n免責の登記＝譲渡人の承諾書面必要。譲受証する書面不要。商号の廃止は代理権限書面以外不要。","date":"Excel取込"},{"id":1800000000372,"subject":"商業登記法","topic":"商号変更による特例有限会社の通常の株式会社への移行","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n役会置く旨の定款の定めあっても商号変更前に選任不可。資本金の額増加以外の免許税加算不要。\n設立と本店移転は別登記。商号変更設立＝半数以上かつ4分の3以上","date":"Excel取込"},{"id":1800000000373,"subject":"商業登記法","topic":"商業登記の抹消","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n抹消手続命ずる判決確定したら、自分で申請（嘱託されない）抹消＝2万円\n資本金の額の減少は訴え以外でもできるので、嘱託されない。申請権限ないものがした登記も抹消できない。","date":"Excel取込"},{"id":1800000000374,"subject":"商業登記法","topic":"商業登記の申請の却下","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n商号の譲渡による変更の登記＝譲渡人の承諾書必要→印鑑提出印と同一である必要あり\n無効原因証明書の作成者異なる時却下。無効取消原因あっても不提訴証明書で登記可能","date":"Excel取込"},{"id":1800000000375,"subject":"商業登記法","topic":"商業登記の更正・抹消","level":1,"memo":"【ソース】LEC2023実力診断模試\n\n商号の抹消登記手続を命ずる仮処分決定に基づく商号登記の抹消＝受理されない。解任→ほんとは辞任でも抹消不可。登記官の過誤＝通知不要で監督長の許可で更正","date":"Excel取込"},{"id":1800000000376,"subject":"商業登記法","topic":"商業登記の更正","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n地方法務局長の許可を得て更正＝「○年○月許可」","date":"Excel取込"},{"id":1800000000377,"subject":"商業登記法","topic":"商業登記の効力","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n商号の譲渡は登記しないと悪意にも対抗できない","date":"Excel取込"},{"id":1800000000378,"subject":"商業登記法","topic":"商業登記の効力","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n発起人＝詐欺・脅迫・錯誤で引受取消不可、行為能力制限なら可。持分会社の組織変更＝定款変更時に効力発生。","date":"Excel取込"},{"id":1800000000379,"subject":"商業登記法","topic":"商業登記の効力","level":1,"memo":"【ソース】伊藤塾2023プレ模試\n\n持分会社の債務＝解散登記5年以内に請求または予告しない債権者に対しては解散登記から5年後に消滅","date":"Excel取込"},{"id":1800000000380,"subject":"商業登記法","topic":"種類変更の登記","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n持分会社種類変更＝債権者異議不要。設立に退社の証明不要。合資→退社による合同変更＝変更は退社の日に効力発生なので払込書面不要。\n種類変更設立の設立日は変更前の設立日。種類変更解散→一切の添付書類不要。","date":"Excel取込"},{"id":1800000000381,"subject":"商業登記法","topic":"種類株式発行会社がする株式の登記","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n全部取得条項付種類株式＝全部取得時は309②。種類株式発行会社になる＝発行する株式の内容登記抹消記号。\n取得請求権付で新株予約権交付→分配可能額証する書面必要。","date":"Excel取込"},{"id":1800000000382,"subject":"商業登記法","topic":"取締役及び代表取締役に関する登記","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n取締役2名の場合には代表取締役1名を互選で〜＝1名死亡時、代表権付与の登記で定款添付必要。\n定款変更前の代表取締役を定款変更後の方法で再選任した場合、重任登記不要。\n役会ない会社の定款・総会で決まった代表＝辞任時は総会承認or定款変更必要","date":"Excel取込"},{"id":1800000000383,"subject":"商業登記法","topic":"持分会社の登記","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n設立無効認容＝無効原因社員以外で継続→判決謄本添付必要。\n社員が合併消滅→定款で承継定めてない場合、退社で終了。総社員の同意で定款変更して代表社員選出→総社員の同意書必要・定款不要。→定款に基づく互選なら定款と互選証する書面必要。\n清算持分会社→代表しないやついる場合のみ代表清算人登記必要。","date":"Excel取込"},{"id":1800000000384,"subject":"商業登記法","topic":"持分会社の登記","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n清算人＝必ず住所登記。名資＝代表社員以外いるなら登記。いなくなったら「社員が1名となったため抹消」\n無限責任社員の持分は登記事項じゃない。","date":"Excel取込"},{"id":1800000000385,"subject":"商業登記法","topic":"持分会社の登記","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n加入時の就任承諾書面不要。支配人の選解任＝別段の定めない限り社員の過半数。業務執行社員の一致じゃなく社員の過半数の一致。社員の互選で代表社員＝辞任時は定款と辞任証する書面必要。\n清算持分会社＝代表しないやついる場合のみ代表清算人登記","date":"Excel取込"},{"id":1800000000386,"subject":"商業登記法","topic":"持分会社の登記","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n社員加入時＝総社員の同意必要・就任承諾不要。有限責任社員の出資の価額＝定款なければ総社員の同意で変更。\n継続に反対したら、継続日に退社。","date":"Excel取込"},{"id":1800000000387,"subject":"商業登記法","topic":"持分会社の登記","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n無限責任社員＝相続放棄または限定承認で定款の定めあっても社員にならないことできる（有限は相続放棄のみ）\n定款代表互選＝定款・互選・承諾セット提供。清算＝代表が法人なら職務執行者選任と就任承諾必要。","date":"Excel取込"},{"id":1800000000388,"subject":"商業登記法","topic":"持分会社の登記","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n合同会社の業務執行しない社員が新たに加入する業務執行しない社員へ持分譲渡＝登記事項や資本金に変更ないので登記不要。","date":"Excel取込"},{"id":1800000000389,"subject":"商業登記法","topic":"持分会社の登記","level":1,"memo":"【ソース】伊藤塾2021プレ模試\n\n唯一の社員が法人＝業務執行にかかる意思表示＝職務執行者。定款の変更に係る意思表示＝法人の代表者\n法人代表者の定款変更と職務執行者が所在決定したこと証する書面必要。","date":"Excel取込"},{"id":1800000000390,"subject":"商業登記法","topic":"持分会社の登記","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n唯一の社員が法人＝法人代表者が定款変更したこと&職務執行者が本店所在場所決定したことを証する書面添付","date":"Excel取込"},{"id":1800000000391,"subject":"商業登記法","topic":"持分会社の種類変更の登記","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n合名会社の種類変更による解散＝添付書面０。社員の互選で代表社員＝定款・社員互選書面・就任承諾セット添付。\n責任変更しても2年責任負うから債権者保護いらない。名→資＝有限の既に出資価額証する書面必要。\n解散&設立は同時申請","date":"Excel取込"},{"id":1800000000392,"subject":"商業登記法","topic":"持分会社の解散及び清算人の登記","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n裁判所が選任した清算人の登記＝定款添付不要。解散10年経過で登記閉鎖可能。\n名資会社は清算人登記時に代表抹消記号。いずれも解散事由定めたら登記事項。","date":"Excel取込"},{"id":1800000000393,"subject":"商業登記法","topic":"資本金の額の減少の登記","level":1,"memo":"【ソース】伊藤塾2021プレ模試\n\n普通決議＝一定の欠損額証する書面添付必要。","date":"Excel取込"},{"id":1800000000394,"subject":"商業登記法","topic":"資本金の額の計上に関する証明書","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n募集株式発行＝必ず必要。取得条項付株式の取得と引換に新株予約権発行＝資本金増えないので不要（株式ならいる）準備金の資本組入れ＝減少にかかる資本金の計上書面添付するので不要。合資会社不要。\n合同会社の資本金減少なら必要","date":"Excel取込"},{"id":1800000000395,"subject":"商業登記法","topic":"資本金の額の計上に関する証明書","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n合資→同・株式会社、募集株式の発行、取得条項付新株予約権の取得と引換に株式発行＝書面必要。完全親の合併＝対価ないので書面不要。","date":"Excel取込"},{"id":1800000000396,"subject":"商業登記法","topic":"資本金の額に関する登記","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n準備金の額減少で債権者保護しても添付は不要（準備金登記事項じゃないから）\n剰余金の額減少＝剰余金計上書面必要→監査役作成の証明書で構わない","date":"Excel取込"},{"id":1800000000397,"subject":"商業登記法","topic":"債権者異議手続に関する書面の添付","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n解散後の合名会社の債権者＝財産の処分方法に異議OK。株式交付＝対価が親の株式以外→債権者異議必要。\n外国会社＝営業所の閉鎖について異議できない。日本における代表全員退任は異議必要。\n吸収分割で全部取得も剰余金の配当もしない場合、異議OKなのは債務履行請求できないもののみ。","date":"Excel取込"},{"id":1800000000398,"subject":"商業登記法","topic":"合同会社の登記","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n業務執行しない社員の加入＝登記なし。「令和○年○月○日業務執行権付与」\n職務執行者の印鑑証明書不要。就任承諾書は必要。業務執行社員任期満了後直ちに再加入＝登記不要","date":"Excel取込"},{"id":1800000000399,"subject":"商業登記法","topic":"合同会社の登記","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n合同設立で社員が法人＝職執行者の選任に関する書面添付必要＝一般財団法人の理事会議事録。\n業務執行社員定めてる合同が支店廃止＝過半数の同意＝定款添付は不要。出資が金銭のみなら資本金計上書面不要。\n合資会社の社員が有限のみ＝合同会社定款変更とみなされる＝1ヶ月以内に払込給付必要＝解散設立の申請書に履行証する書面不要。合同代表社員に印鑑証明不要。","date":"Excel取込"},{"id":1800000000400,"subject":"商業登記法","topic":"個人商人の登記","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n未成年者の登記は未成年者がしなければならない。後見人の営業開始の登記＝後見監督人がないことを証明する書面添付必要。個人商人なら支配人の選任証する書面不要。","date":"Excel取込"},{"id":1800000000401,"subject":"商業登記法","topic":"個人商人の登記","level":1,"memo":"【ソース】伊藤塾2022公開模試\n\n未成年者の登記＝営業所移転したら旧所在地に営業所移転登記と新所在地に未成年者の登記＝経由同時申請不可。","date":"Excel取込"},{"id":1800000000402,"subject":"商業登記法","topic":"吸収分割の登記","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n分割承継と分割後の役員選任は別決議必要＝吸収分割による変更・取締役の変更\n債権者保護書面添付必要。管轄別なら、資本金の額の減少一括申請できない。効力発生日の変更＝役会議事録及び変更に関する契約書添付","date":"Excel取込"},{"id":1800000000403,"subject":"商業登記法","topic":"吸収合併の登記","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n解散の登記＝存続会社代表が行う。新株予約権発行してるなら計画時点で代わり決めないといけない→新株予約権消滅の登記不要。資本金の額が増加しない時は資本金の額の計上書面不要。どっちの債権者も異議OK。","date":"Excel取込"},{"id":1800000000404,"subject":"商業登記法","topic":"監査等委員会設置会社の登記","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n取締役・監査等委員（社外取締役）○。仮取締役・監査等委員。\n重要な業務執行の決定の取締役への委任についての定款の定め＝特別取締役にようる議決の定め当然に廃止。","date":"Excel取込"},{"id":1800000000405,"subject":"商業登記法","topic":"監査等委員会設置会社・指名委員会等設置会社","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n監査等委員会置く旨＝監査役設置会社の定めの廃止&監査役の退任による変更申請必要。\n社外取締役の旨抹消＝委任状以外いらない。重要な業務執行の委任後、委任に基づく決定＝取締役の決定証する書面及び委任した取締役会の議事録添付必要。変更前の代表執行役が取締役兼ねてないなら、印鑑証明必要。","date":"Excel取込"},{"id":1800000000406,"subject":"商業登記法","topic":"株主リスト","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n特例有限が監査役置く旨廃止＝監査役退任するが株主リスト不要。\n新株予約権の行使による変更登記＝募集事項定めた株主総会議事録必要→株主リストは不要。解散時の決算報告承認した議事録＝株主リスト必要。","date":"Excel取込"},{"id":1800000000407,"subject":"商業登記法","topic":"株主リスト","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n募集株式の申込み期日短縮＝総会議事録にリスト必要。","date":"Excel取込"},{"id":1800000000408,"subject":"商業登記法","topic":"株式交付の登記","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n対価5分の1なら原則計画承認不要＝親が非公開なら総会決議で承認必要\n取得が譲渡制限なら子の役会承認必要（書面添付は不要）","date":"Excel取込"},{"id":1800000000409,"subject":"商業登記法","topic":"株式会社の役員等の登記","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n税理士法人合併＝会計参与の退任による変更登記&就任による変更の登記","date":"Excel取込"},{"id":1800000000410,"subject":"商業登記法","topic":"株式会社の役員等に関する登記","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n特別取締役の要件満たさなくなった場合も、すぐに後任就任した場合は議決の定め廃止されない。\n非公開＝公開でも監査等委員会設置会社及び指名委員会等設置会社の取締役の任期満了しない。","date":"Excel取込"},{"id":1800000000411,"subject":"商業登記法","topic":"株式会社の設立の登記","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n創立総会選任調査者でも、設立登記に調査報告書添付不要。","date":"Excel取込"},{"id":1800000000412,"subject":"商業登記法","topic":"株式会社の設立の登記","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n設立前に死亡＝死亡書面と残存役員のみで登記可能。","date":"Excel取込"},{"id":1800000000413,"subject":"商業登記法","topic":"株式会社の設立の登記","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n発起設立＝認証後の定款の商号を全員の同意で変更＝変更書面に全員記名押印し再認証で足りる。設立時執行役＝設立時取締役が選任。定款で決めてないなら発起人の過半数で特別取締役選任。","date":"Excel取込"},{"id":1800000000414,"subject":"商業登記法","topic":"株式会社の設立の登記","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n設立時取締役の就任承諾＝発起人の記名押印ある定款添付","date":"Excel取込"},{"id":1800000000415,"subject":"商業登記法","topic":"株式会社の設立","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n現物出資で変更→変更にかかる裁判の謄本が必要。成立後の資本金・準備金＝発起人全員の同意","date":"Excel取込"},{"id":1800000000416,"subject":"商業登記法","topic":"株式移転の登記","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\n株式移転・新設分割なら設立時の就任承諾書に印鑑証明必要。子会社管轄区域外なら代表の印鑑証明必要","date":"Excel取込"},{"id":1800000000417,"subject":"商業登記法","topic":"株式の登記","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n取締役等選解任権付種類株式発行会社が譲渡制限撤廃＝取締役等選解任権付種類株式の定め廃止による変更登記必要。株主名簿管理人を事実上置いた日（事務委託契約締結日）から2週間以内に変更登記必要\n損害及ぼすおそれあっても種類総会要しない変更＝種類株主全員の同意","date":"Excel取込"},{"id":1800000000418,"subject":"商業登記法","topic":"株式の登記","level":1,"memo":"【ソース】伊藤塾2022公開模試\n\n取得請求権＝対価株式なら分配可能額問題にならない。\n株券発行会社が譲渡制限＝1ヶ月前までに公告かつ通知。株券発行廃止＝2週間前までに無効になる公告及び通知。","date":"Excel取込"},{"id":1800000000419,"subject":"商業登記法","topic":"株式の登記","level":1,"memo":"【ソース】伊藤塾2023プレ模試\n\n非公開の第三者割当て＝通知・公告不要（総会決議ある）だから期間短縮問題にならない。","date":"Excel取込"},{"id":1800000000420,"subject":"商業登記法","topic":"株式に関する登記","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n株券発行会社＝譲渡制限なら1ヶ月前に提供広告必要。種類発行後に種類総会要しない変更＝種類全員の同意必要\n株式の併合＝20日前までに通知または公告。金銭債権の弁済期到来確認できなくても、期限の利益放棄明らかじゃなければ受理される。","date":"Excel取込"},{"id":1800000000421,"subject":"商業登記法","topic":"株式、新株予約権及び資本金の額に関する登記","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n取得条項付株式の取得と引換に株式発行＝資本金増加しない。","date":"Excel取込"},{"id":1800000000422,"subject":"商業登記法","topic":"外国会社の登記","level":1,"memo":"【ソース】LEC2023実力診断模試\n\n全員の退任＝清算以外なら債権者保護必要＝全員退任証する書面添付した時除き債権者保護証する書面添付必要。\n持分会社の社員になる時も前提としての外国会社の登記不要。支配人設置＝全ての営業所で登記必要","date":"Excel取込"},{"id":1800000000423,"subject":"商業登記法","topic":"外国会社の登記","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n継続して取引＝日本に住所有する代表ひとり必要。代表法人でも可能。日本における代表者が登記できない時は新たに代表決めなきゃいけない。","date":"Excel取込"},{"id":1800000000424,"subject":"商業登記法","topic":"解散に関する登記","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n数ヶ月先の解散決議NG。3日程度であればOK。みなし解散からの継続＝新たに選定する代表（従前の届出印関係なく印鑑証明提出必要）","date":"Excel取込"},{"id":1800000000425,"subject":"商業登記法","topic":"解散した会社の登記","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n同時廃止なら会社継続不可。破産債権者の同意による廃止決定なら継続され、廃止時に管財人登記抹消される。","date":"Excel取込"},{"id":1800000000426,"subject":"商業登記法","topic":"解散・清算に関する登記","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n定款で決めた清算人＝就任承諾書面必要。解散前に監査役設置会社だったら解散後も監査役設置会社。","date":"Excel取込"},{"id":1800000000427,"subject":"商業登記法","topic":"会社分割の登記","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n吸収分割承継の資本金＝対価株式の時のみ吸収分割契約の定めに伴い増加。承継の株式全部を剰余金として配当交付する場合のみ、承継会社の資本金増加可能。\n組織変更でも新設分割・株式移転なら設立時代表執行役の就任承諾に対する印鑑証明必要。","date":"Excel取込"},{"id":1800000000428,"subject":"商業登記法","topic":"会社分割に関する登記","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n吸収分割合同会社＝権利義務全部承継なら総社員の同意・一部なら過半数。新設分割＝1000分の7。新設合併1.5","date":"Excel取込"},{"id":1800000000429,"subject":"商業登記法","topic":"会社以外の商人の商号の登記","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n同一の商号使用しようとするもの＝抹消の登記申請可能。商号の相続による変更＝被相続人の記録閉鎖するとともに新しい登記記録起こす。商号譲渡による変更の登記は譲受人がする（譲渡証する書面必要）\n免責の登記同時じゃなくていい。","date":"Excel取込"},{"id":1800000000430,"subject":"商業登記法","topic":"会計参与及び会計監査人に関する登記","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n会計参与の後見開始＝委任の規定に従い退任による変更登記必要。会計監査人の任期満了時の定時株主総会が開かれなかった時＝退任の変更登記必要（仮会計監査人の選任もとめるのが適切）職務違反は監査役全員の同意で解任可能","date":"Excel取込"},{"id":1800000000431,"subject":"商業登記法","topic":"会計参与に関する登記","level":1,"memo":"【ソース】伊藤塾2020プレ模試\n\n子会社の監査役＝会計参与になれない。法定相続情報一覧図も死亡証する書面にできる。\n裁判所書記官の職権で仮会計参与の登記嘱託される。","date":"Excel取込"},{"id":1800000000432,"subject":"商業登記法","topic":"会計監査人の登記","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n業務停止処分＝欠格事由なので、業務一時停止日を日付で退任登記必要。","date":"Excel取込"},{"id":1800000000433,"subject":"商業登記法","topic":"仮会計監査人の登記","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n現に会計監査人が欠けていないと選任不可。監査役が独自に選任可能。抹消は登記官が職権で。","date":"Excel取込"},{"id":1800000000434,"subject":"商業登記法","topic":"印鑑の提出等","level":1,"memo":"【ソース】伊藤塾2022公開模試\n\n印鑑未提出の商人選任の支配人＝印鑑提出時は3ヶ月以内の印鑑証明必要。氏名婚姻変更＝印鑑記録は登記官が変更。破産開始決定当時の代表は印鑑証明書の交付請求可能","date":"Excel取込"},{"id":1800000000435,"subject":"商業登記法","topic":"一般社団法人及び一般財団法人の登記","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n一般財団の評議員＝定款で選解任。社団は社員名登記しない。","date":"Excel取込"},{"id":1800000000436,"subject":"商業登記法","topic":"一般社団法人の登記","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n休眠一般社団法人＝最後の登記から5年。監事＝住所登記不要。","date":"Excel取込"},{"id":1800000000437,"subject":"商業登記法","topic":"一般社団法人の登記","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n設立時理事＝法令定款違反調査。電磁的方法で5年提供すれば貸借対照表の公告不要。","date":"Excel取込"},{"id":1800000000438,"subject":"商業登記法","topic":"一般社団法人・一般財団法人の登記","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n社団＝社員欠けると解散→証する書面不要。設立時代表理事が登記。\n決算承認の清算人会の議事録不要＝評議委員会の書類が必要。社員総会設置・社員氏名住所は登記事項じゃない。\n財団の評議員は氏名登記","date":"Excel取込"},{"id":1800000000439,"subject":"商業登記法","topic":"一般社団法人・一般財団法人の登記","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n一般社団法人＝理事＝社員総会決議で選任。社員総会議事録&就任承諾→財団法人の評議員は定款で定める方法で選任＝定めた方法で選任証する書面&就任承諾&定款必要。理事会じゃなく定款に基づく社員総会で代表理事決めたら定款添付必要。\n一般財団法人＝目的・評議員の選解任の方法に係る定款変更不可＝設立時定款で評議員会で変更できる旨あれば変更可能。特別の事情運営継続不可能困難＝評議員会の決議・裁判所の許可書で目的変更可能。","date":"Excel取込"},{"id":1800000000440,"subject":"商業登記法","topic":"一般社団法人・一般財団法人の登記","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n一般財団法人＝定款にのみ拠出財産記載。監事就任承諾書面必要。貸借対照表に係る情報の提供を受けるために必要な事項の設定＝書面不要。設立時代表理事の就任承諾に印鑑証明必要。","date":"Excel取込"},{"id":1800000000441,"subject":"商業登記法","topic":"一般社団法人・一般財団法人の登記","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\n設立時監事＝本人確認必要だが印鑑証明不要。負債200億以上で会計監査人必要。","date":"Excel取込"},{"id":1800000000442,"subject":"商業登記法","topic":"一般社団・財団法人の登記","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n財団理事＝評議員が選任・評議員は定款。","date":"Excel取込"},{"id":1800000000443,"subject":"商業登記法","topic":"一般財団法人の登記","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n調査終了日または設立者が定めた日の遅い日から2週間以内に設立登記。清算一般社団が監事置く時は登記事項。６万円。支配人選任不可。評議員について印鑑はいらないけど本人確認は必要。","date":"Excel取込"},{"id":1800000000444,"subject":"商業登記法","topic":"オンラインによる商業法人登記手続","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n医療法人設立＝資産総額証する書面添付必要。裁判所による登記の嘱託＝オンライン不可。\n印鑑提出＝申請と同時ならオンラインで可能","date":"Excel取込"},{"id":1800000000445,"subject":"商業登記法","topic":"オンラインによる商業登記手続","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\nオンラインで登記すべき事項記録した電磁記録提出＝申請書に登記すべき事項の記載不要。\n裁判所による登記の嘱託＝オンライン不可。","date":"Excel取込"},{"id":1800000000446,"subject":"司法書士法","topic":"日本司法書士連合会・公共嘱託登記司法書士協会","level":1,"memo":"【ソース】伊藤塾2022公開模試\n\n会則＝法務大臣の認可必要。情報公開に関する規定変更は認可不要。\n業務制度について法務大臣に建議・諮問答申可能。公共嘱託の事件簿は5年。供託はできない。\n他の公共嘱託の社員なら業務取扱OK","date":"Excel取込"},{"id":1800000000447,"subject":"司法書士法","topic":"懲戒処分","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n聴聞原則非公開。懲戒処分しようとする場合日本司法書士連合会に通告。通告の権限は法務局または地方法務局長に委任されている。","date":"Excel取込"},{"id":1800000000448,"subject":"司法書士法","topic":"懲戒処分","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n懲戒処分＝官報公告。書士会に入会してなくても懲戒処分可能。","date":"Excel取込"},{"id":1800000000449,"subject":"司法書士法","topic":"司法書士法人の業務","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n他の社員の同意あっても業務の範囲に属する業務・他の法人社員になるのNG。その半数以上が裁判書類作成関係業務行えない事件＝簡裁訴訟代理等関係業務不可。法人で使用人が被告の簡裁訴訟関係受任している場合、原告の同意あっても裁判所関係書類作成することNG。","date":"Excel取込"},{"id":1800000000450,"subject":"司法書士法","topic":"司法書士法人の業務","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n社員全員出資・業務執行必要。","date":"Excel取込"},{"id":1800000000451,"subject":"司法書士法","topic":"司法書士法人の業務","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n簡裁訴訟代理関係等業務受任している相手方から別事件の簡裁訴訟代理関係等業務依頼＝依頼者同意したらOK。","date":"Excel取込"},{"id":1800000000452,"subject":"司法書士法","topic":"司法書士法人","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n解散または業務全部停止受けた以前30日に社員であった者＝3年（or業務全部停止期間）経過しないものは他の司法書士法人社員になれない。定款変更＝書士会と連合会に届出。一部社員に業務執行権限除く旨定款NG。\n社員1人になった後6ヶ月増えなかったら6ヶ月経過時に解散。他の専門資格との合併不可","date":"Excel取込"},{"id":1800000000453,"subject":"司法書士法","topic":"司法書士法人","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n脱退した特定社員＝負担債務が脱退後の事由証明した場合責任負わない。\n解散・業務全部停止30日以内に社員＝3年他の法人社員になれない。従たる事務所の違反＝従たる事務所も解散以外の懲戒処分可能。","date":"Excel取込"},{"id":1800000000454,"subject":"司法書士法","topic":"司法書士及び司法書士法人","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n脱退後の特定社員＝脱退後の事由での債務証明で責任負わない。\n訴訟代理事務で注意怠らなかったこと証明すれば依頼者に対し損害賠償責任負わない。\n解散処分ｶから30日以内に社員＝3年経過するまで他の法人社員になれない。","date":"Excel取込"},{"id":1800000000455,"subject":"司法書士法","topic":"司法書士の懲戒","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n懲戒＝①戒告②2年以内の業務停止③業務禁止＝③のみ連合会にも通知。その他は書士会のみ。\n懲戒処分は聴聞必要。違反すると思料するときは、法務大臣に報告。","date":"Excel取込"},{"id":1800000000456,"subject":"司法書士法","topic":"司法書士の欠格事由","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n法務事務官による認定司法書士あり。公務員＝懲戒免職受けて処分の日から3年経過してないもの＝欠格事由\n禁錮以上の刑から3年以内。","date":"Excel取込"},{"id":1800000000457,"subject":"司法書士法","topic":"司法書士の業務","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n弁護士法に違反しても裁判外和解は無効にはならない。筆界特定＝3条2項書士のみ。\n表題部所有者の表示変更更正は可能。簡裁訴訟代理等関係業務の依頼者同意あれば相手方の別事件の簡裁訴訟代理等関係業務可能","date":"Excel取込"},{"id":1800000000458,"subject":"司法書士法","topic":"司法書士の業務","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n法人の社員なら競業禁止で個人として司法書士業務できない。","date":"Excel取込"},{"id":1800000000459,"subject":"司法書士法","topic":"司法書士の義務","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n簡裁訴訟代理等関係業務断る場合、請求あっても理由書交付しなくて良い。","date":"Excel取込"},{"id":1800000000460,"subject":"司法書士法","topic":"司法書士・法人の業務","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n告訴状・告発状・掲示確定記録の閲覧請求書作成可能。法人は3条1項1号から5号すべての業務目的としなきゃいけない。民事は証言拒絶可能。刑事は同意なくても司法警察職員に資料閲覧させられる。","date":"Excel取込"},{"id":1800000000461,"subject":"司法書士法","topic":"司法書士の業務シホウショシギョウム","level":1,"memo":"【ソース】伊藤塾2022プレ模試\n\n遺言書の保管、遺言書情報証明書・遺言書保管事実証明書の交付請求。\n上訴提起代理は可能だが、上訴審での手続代理は不可。領収書3年保管イゴンショジョウホウショウメイショイゴンショホカンジジツショウメイショコウフセイキュウジョウソテイキダイリカノウジョウソシンテツヅダイリフカリョウシュウショネンホカン","date":"Excel取込"},{"id":1800000000462,"subject":"憲法","topic":"内閣","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n内閣は執行命令・委任命令可能＝代行命令は不可。内閣総理大臣の指名＝両院協議会不一致or衆議院議決後10以内に参議院が議決しない時＝衆議院の議決が国会の議決。国務大臣が議員資格失っても罷免する必要ない。","date":"Excel取込"},{"id":1800000000463,"subject":"憲法","topic":"内閣","level":1,"memo":"【ソース】伊藤塾2020プレ模試\n\n総理は自由に国務大臣罷免可能。内閣自ら違憲と判断しても執行必要。","date":"Excel取込"},{"id":1800000000464,"subject":"憲法","topic":"内閣","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n総理と国務大臣は議席有無に関係なく議院に出席可能。出席求められたら出席しなければならない。\n衆議院議員総選挙の後初めて国会の招集あったら総辞職。","date":"Excel取込"},{"id":1800000000465,"subject":"憲法","topic":"内閣","level":1,"memo":"【ソース】TAC2024予想問題集\n\n臨時会＝いずれかの議院の4分の1の要求で内閣招集決定。署名・連署なくても影響なし。","date":"Excel取込"},{"id":1800000000466,"subject":"憲法","topic":"天皇","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n議員規則・最高裁判所規則＝公布不要。儀式を行うこと＝内閣の助言承認必要。国庫からの内廷費＝皇室の財産受験に関する議決不要","date":"Excel取込"},{"id":1800000000467,"subject":"憲法","topic":"天皇","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n即位の礼・大喪の礼＝天皇主宰儀式。国事行為委任＝内閣の助言承認必要。","date":"Excel取込"},{"id":1800000000468,"subject":"憲法","topic":"天皇","level":1,"memo":"【ソース】伊藤塾2022プレ模試\n\n国事行為＝法律で新たに定めること不可。皇室の費用＝衆院の優越あり","date":"Excel取込"},{"id":1800000000469,"subject":"憲法","topic":"地方自治","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n東京都特別区＝地方公共団体にあたらない。条例＝規則含む。法律で地方公共団体そのものを廃止することは許されない。","date":"Excel取込"},{"id":1800000000470,"subject":"憲法","topic":"地方自治","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n出席停止処分も裁判所が適否判断可能。","date":"Excel取込"},{"id":1800000000471,"subject":"憲法","topic":"地方自治","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n司法に関する事務処理不可。","date":"Excel取込"},{"id":1800000000472,"subject":"憲法","topic":"選挙権・参政権","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n無効投票確認でも投票用紙取調べ不可。投票権制限にによる慰謝料請求可能","date":"Excel取込"},{"id":1800000000473,"subject":"憲法","topic":"精神的自由権","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n具体的な成文法ないのに反論文掲載請求権たやすく認められない。公立図書館で思想信条理由で廃除は利益侵害。起立斉唱は間接的制約。","date":"Excel取込"},{"id":1800000000474,"subject":"憲法","topic":"生存権","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n生存権で具体的給付できる訳ではない。","date":"Excel取込"},{"id":1800000000475,"subject":"憲法","topic":"信教の自由および政教分離","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n20条1項＝宗教的結社の自由含む。地蔵像の運営維持＝違反しない。","date":"Excel取込"},{"id":1800000000476,"subject":"憲法","topic":"自由権","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n氏の変更強制されない自由＝人格権の内容ではない。","date":"Excel取込"},{"id":1800000000477,"subject":"憲法","topic":"市議会議員に対する厳重注意処分","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n法律上の争訟にあたるが厳重注意処分は議会の内部規律の問題＝違法な公権力の行使にあたらない。","date":"Excel取込"},{"id":1800000000478,"subject":"憲法","topic":"司法権の限界","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n法律の議事手続＝裁判所は有効無効判断不可。高度の政治性有する条約・衆議院の解散・政党の処分＝審査対象とならない。地方議会＝出席停止は判断不可。除名処分はOK。","date":"Excel取込"},{"id":1800000000479,"subject":"憲法","topic":"司法権","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n最高裁判所は下級裁判所の規則制定権を下級裁判所に委任可能。","date":"Excel取込"},{"id":1800000000480,"subject":"憲法","topic":"司法","level":1,"memo":"【ソース】伊藤塾2021プレ模試\n\n最高裁は下級裁を指揮監督できない。心身故障で罷免される。裁判官弾劾裁判所＝特別裁判所","date":"Excel取込"},{"id":1800000000481,"subject":"憲法","topic":"司法","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n議場荒れたまま可決しても裁判所の審理範囲外。衆院解散無効前提とする訴訟審査外。条約違憲審査の対象外。","date":"Excel取込"},{"id":1800000000482,"subject":"憲法","topic":"参政権","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n立候補の自由＝憲法15条で保障。","date":"Excel取込"},{"id":1800000000483,"subject":"憲法","topic":"財政","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n国会の決算審査＝国会が修正不可。不承認でもすでにされた収支に影響なし。皇室の費用＝衆議院の優越あり。\n予備費＝事後に国会の承認必要。内閣＝年１で財政報告。予算＝両院協議会で成案なければそのまま衆議院という形。","date":"Excel取込"},{"id":1800000000484,"subject":"憲法","topic":"財政","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n通達機縁で課税もセーフ。予備費支出についても支出後に承諾必要。皇室費用も国会議決必要。\n決算は財務大臣が作成し、閣議によって成立する。国会による承認は決算の監督を意味する","date":"Excel取込"},{"id":1800000000485,"subject":"憲法","topic":"裁判所及び裁判官","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n裁判官の懲戒＝行政機関・立法機関は行えない。裁判所規則は法律でも定められる。下級裁判所の人気は10年。労働裁判所設置しても特別裁判所に当たらない。弾劾裁判所は特別裁判所だがセーフ","date":"Excel取込"},{"id":1800000000486,"subject":"憲法","topic":"裁判所","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n労働裁判所設置しても上訴認められるなら特別裁判所にあたらない。現行法改正せずに二審制導入可能","date":"Excel取込"},{"id":1800000000487,"subject":"憲法","topic":"裁判の公開","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n裁判官に対する懲戒＝対審公開しなくてもいい。裁判官全員の一致。政治犯罪出版＝必ず公開\n純然たる訴訟事件の判決の言渡し＝常に公開","date":"Excel取込"},{"id":1800000000488,"subject":"憲法","topic":"裁判の公開","level":1,"memo":"【ソース】伊藤塾2022公開模試\n\n傍聴請求を権利として要求できることまで認めてない。ビデオリンク証人尋問＝セーフ。","date":"Excel取込"},{"id":1800000000489,"subject":"憲法","topic":"国務請求権","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n在外審査制度怠ったこと＝国賠上違法（最新判例）","date":"Excel取込"},{"id":1800000000490,"subject":"憲法","topic":"国会議員及び地方議会議員","level":1,"memo":"【ソース】伊藤塾2022公開模試\n\n質疑等で名用信用低下発言＝国賠には特別の事情必要。地方議会議員に免責特権保障されていない。\n地方＝歳費なし。会期外（閉会中）不逮捕特権なし。","date":"Excel取込"},{"id":1800000000491,"subject":"憲法","topic":"国会と議員の権能","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n弾劾裁判所を衆院のみで組織しても憲法上セーフ。証人出頭請求可能だが勾引は不可。","date":"Excel取込"},{"id":1800000000492,"subject":"憲法","topic":"国会・政党及び議院","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n憲法は政党の存在当然予定している。臨時会＝いずれか議院総議員の4分の1以上の請求\n法律案→60日以内に議決しない時＝否決とみなす。その後衆議院出席の3分の2で再可決すれば法律成立。","date":"Excel取込"},{"id":1800000000493,"subject":"憲法","topic":"国会","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n予算＝30日以内に参議院が議決しない時、衆議院の案で自然成立。特定個人の犯罪行為発見のため国政調査権不可。\n参議院の緊急集会＝国会開会後10日以内に衆議院の同意なければ効力失う（将来効）","date":"Excel取込"},{"id":1800000000494,"subject":"憲法","topic":"国会","level":1,"memo":"【ソース】伊藤塾2023プレ模試\n\n予算の自然成立（30日以内に参議院が議決しない時）参議院の緊急集会＝10日以内に同意ない時将来効で失効。\n証人の勾引不可","date":"Excel取込"},{"id":1800000000495,"subject":"憲法","topic":"憲法改正","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n国民の承認を得た時は天皇は国民の名で憲法と一体をなすものとして直ちに公布する","date":"Excel取込"},{"id":1800000000496,"subject":"憲法","topic":"議院","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n両議院国政調査権で刑事事件調査可能＝起訴事件に関係する事項公訴追行対象・重大な支障許されない。\n条約承認＝両院協議会不一致または参議院が30日以内に議決しないとき＝衆議院の議決。\n議員除名・秘密会＝出席の3分の2。衆議院解散＝参議院閉会＝緊急集会の権限は内閣に専属","date":"Excel取込"},{"id":1800000000498,"subject":"刑法","topic":"毀棄及び隠匿の罪","level":1,"memo":"【ソース】伊藤塾2022公開模試\n\n住居玄関のドア＝損壊せずに取り外せるとしても建造物損壊罪の客体にあたる。","date":"Excel取込"},{"id":1800000000499,"subject":"刑法","topic":"略取誘拐罪","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n未成年者略取誘拐罪＝不法に離脱・自己第三者の実力的支配に移すこと。暴行脅迫＝略取。欺罔誘惑＝誘拐\n監護権者に対して行なっても成立。わいせつ目的誘拐罪のみ成立。身代金目的略取誘拐＝法人代表なら幹部も安否憂慮するものにあたる","date":"Excel取込"},{"id":1800000000500,"subject":"刑法","topic":"未遂犯","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n玄関時点で見つかって逃走＝窃盗未遂にならない。","date":"Excel取込"},{"id":1800000000501,"subject":"刑法","topic":"放火の罪","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n火災の際に隠匿＝消化妨害罪。消火栓工作＝消火の際じゃないから不成立。\n他人所有現住建造物放火の意思で他人所有非現住建造物に放火＝現住建造物放火未遂に包含。","date":"Excel取込"},{"id":1800000000502,"subject":"刑法","topic":"文書偽造及び有価証券偽造の罪","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n郵便貯金通帳＝有価証券にあたらない。偽造有価証券交付罪＝行使目的で情を知った他人に交付すること","date":"Excel取込"},{"id":1800000000503,"subject":"刑法","topic":"不動産を客体とする罪","level":1,"memo":"【ソース】伊藤塾2021プレ模試\n\n強盗の客体に不動産含まれないが、暴行・脅迫して不動産侵奪したら強盗利得罪成立。","date":"Excel取込"},{"id":1800000000504,"subject":"刑法","topic":"不真正不作為犯","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n作為可能性・容易性・結果回避可能性・特定の構成要件実現する現実的危険性がないと成立しない。放火でも成立","date":"Excel取込"},{"id":1800000000505,"subject":"刑法","topic":"被害者の承諾","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n他人所有の非現住建造物→承諾で自己所有非現住建造物扱い。\n不同意性交等罪・不同意わいせつ罪（改正）第176条\n次に掲げる行為又は事由その他これらに類する行為又は事由により、同意しない意思を形成し、表明し若しくは全うすることが困難な状態にさせ又はその状態にあることに乗じて、わいせつな行為をした者は、婚姻関係の有無にかかわらず、6月以上10年以下の拘禁刑に処する。\n・暴行若しくは脅迫を用いること又はそれらを受けたこと。\n・心身の障害を生じさせること又はそれがあること。\n・アルコール若しくは薬物を摂取させること又はそれらの影響があること。\n・睡眠その他の意識が明瞭でない状態にさせること又はその状態にあること。\n・同意しない意思を形成し、表明し又は全うするいとまがないこと。\n・予想と異なる事態に直面させて恐怖させ、若しくは驚愕させること又はその事態に直面して恐怖し、若しくは驚愕していること。\n・虐待に起因する心理的反応を生じさせること又はそれがあること。\n・経済的又は社会的関係上の地位に基づく影響力によって受ける不利益を憂慮させること又はそれを憂慮していること。\n・行為がわいせつなものではないとの誤信をさせ、若しくは行為をする者について人違いをさせ、又はそれらの誤信若しくは人違いをしていることに乗じて、わいせつな行為をした者も、前項と同様とする。\n・16歳未満の者に対し、わいせつな行為をした者（当該16歳未満の者が13歳以上である場合については、その者が生まれた日より5年以上前の日に生まれた者に限る。）も、第1項と同様とする。","date":"Excel取込"},{"id":1800000000506,"subject":"刑法","topic":"背任罪","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n他人のためにその事務を処理するもの。経済的な財産上の損害＝十分な担保取らず融資。ソフトウェアのコピー＝事実行為も背任に含まれる。二重抵当背任","date":"Excel取込"},{"id":1800000000507,"subject":"刑法","topic":"盗品等に関する罪","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n窃盗教唆と譲受＝教唆犯と盗品等有償譲受罪は併合罪\n横領されたモノと知って譲り受けても盗品等有償譲受罪にならない（盗品じゃないから）","date":"Excel取込"},{"id":1800000000508,"subject":"刑法","topic":"盗品等に関する罪","level":1,"memo":"【ソース】伊藤塾2021プレ模試\n\n窃盗教唆罪・盗品等保管罪は併合罪。親族から盗品譲り受けたら減刑。途中で盗品と知っても知情後の盗品等保管罪成立。本犯詐欺罪で詐欺取り消し前に有償で譲受＝盗品等有償譲受罪","date":"Excel取込"},{"id":1800000000509,"subject":"刑法","topic":"通貨偽造の罪","level":1,"memo":"【ソース】伊藤塾2020プレ模試\n\n収得後知情行使罪＝偽造変造と知った後使用・交付で成立。偽造通貨等準備罪＝機器・原料準備で成立＝工員集める行為は関係なし。","date":"Excel取込"},{"id":1800000000510,"subject":"刑法","topic":"中止未遂","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n住居侵入と窃盗未遂犯は科刑上一罪の牽連犯。","date":"Excel取込"},{"id":1800000000511,"subject":"刑法","topic":"窃盗罪","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n情報コピー用紙にしたら全体として財物になる。","date":"Excel取込"},{"id":1800000000512,"subject":"刑法","topic":"窃盗の罪","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n排除意思と利用処分意思必要＝自首目的で利用意思なく窃盗しても窃盗罪にならない。\n6階から地下1階に10分忘れた＝占有なしなので遺失物等横領になる。賃貸借終了後も占有＝他人の占有侵奪してないから不動産侵奪罪にならない。","date":"Excel取込"},{"id":1800000000513,"subject":"刑法","topic":"責任","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n責任能力＝実行行為の時にあれば足りる（結果的加重犯の時に責任能力不要）","date":"Excel取込"},{"id":1800000000514,"subject":"刑法","topic":"正当防衛","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n喧嘩の最中ナイフに対して拳＝正当防衛","date":"Excel取込"},{"id":1800000000515,"subject":"刑法","topic":"人の生命・身体に対する罪","level":1,"memo":"【ソース】伊藤塾2021公開模試\n\n赤ちゃん栄養失調にしたら生命危険なくても保護責任者遺棄罪成立。","date":"Excel取込"},{"id":1800000000516,"subject":"刑法","topic":"信用及び業務に対する罪","level":1,"memo":"【ソース】伊藤塾2022公開模試\n\n信用毀損罪＝虚偽の風説流布・偽計を用いて人の信用を毀損。業務妨害の業務は適法でなくても該当。\n信用毀損罪＝法人や商品品質に対する社会的信頼含む。警察官による捜索差押え＝公務執行妨害のみ。","date":"Excel取込"},{"id":1800000000517,"subject":"刑法","topic":"傷害罪","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n暴行＝人の身体に向けた不法な有形力の行使。具体的危険。同時暴行＝傷害致死なら共同正犯。\n暴行の意思で障害→傷害罪。生理的機能に障害。","date":"Excel取込"},{"id":1800000000518,"subject":"刑法","topic":"傷害の罪","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\nストレス＝生理的機能傷害。暴行＝有形力行使。現場助勢罪＝もっとやれで片方だけ助勢→傷害罪の従犯（幇助犯）。両方囃し立てなら成立。","date":"Excel取込"},{"id":1800000000519,"subject":"刑法","topic":"自由及び私生活の平穏に対する罪","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n不同意わいせつ等致死傷＝逃走のための暴行でも適用・殺意持って殺した場合は観念的競合。\n監禁＝脱出できないよう自由拘束。偽計で錯誤利用する場合も含む。\n営業活動妨害告知＝生命・身体・自由・名誉・財産じゃないから脅迫にあたらない。家出人＝他人扱い","date":"Excel取込"},{"id":1800000000520,"subject":"刑法","topic":"事実の錯誤","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\nB殺害の意思でBC死亡＝数故意犯説＝観念的競合。住居侵入窃盗教唆で暴行のみ＝住居侵入と強盗致傷成立→牽連犯。住居侵入と窃盗未遂の教唆犯成立。Bに殺意で動物殺害＝殺人未遂のみ成立。","date":"Excel取込"},{"id":1800000000521,"subject":"刑法","topic":"司法作用に対する罪","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n他人が犯人に証拠隠滅教唆しても教唆犯成立しない＝犯人が他人で成立。","date":"Excel取込"},{"id":1800000000522,"subject":"刑法","topic":"殺人または傷害の罪","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n髪切断＝暴行","date":"Excel取込"},{"id":1800000000523,"subject":"刑法","topic":"罪数","level":1,"memo":"【ソース】伊藤塾2023プレ模試\n\n観念的競合＝1個の行為が2個以上の罪名に触れる場合。窃盗と銃刀法剣類所持取締法違反＝併合罪。\n牽連犯＝犯罪の手段結果である行為が他の罪名に触れる時。他方の手段・結果となること＝私文書偽造と偽造私文書行使罪は牽連犯。住居侵入と殺人＝牽連犯（かすがい現象）\n包括一罪＝数個の行為が構成要件的に包括して評価され一罪となる場合。業務上過失致死と殺人罪は併合罪。\n窃取したキャッシュカード使って払い戻し＝新たな法益侵害→窃盗罪の併合罪。","date":"Excel取込"},{"id":1800000000524,"subject":"刑法","topic":"詐欺罪","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n登記官に不動産処分する権限無い→登記書類偽造＝公正証書原本不実記載罪。\n他人乗せるのに搭乗券請求＝詐欺。健康保険証なりすまし請求＝詐欺。パスポート＝免状等不実記載罪のみ。","date":"Excel取込"},{"id":1800000000525,"subject":"刑法","topic":"詐欺の罪","level":1,"memo":"【ソース】伊藤塾2020プレ模試\n\n横領の他詐欺利得罪は成立しない。","date":"Excel取込"},{"id":1800000000526,"subject":"刑法","topic":"国家的法益に対する罪","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\n公務員からの恐喝＝恐喝と収賄の観念的競合。被恐喝者も贈賄罪成立。休憩宣言時点では職務現に執行だから殴ったら公務執行妨害","date":"Excel取込"},{"id":1800000000527,"subject":"刑法","topic":"公務執行妨害罪","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n外国大使館の職員＝公務員に当たらない。補助者に対しても適用。税務調査で検査章持ってなくても妨害したら公務執行妨害成立。事後強盗罪と公務執行妨害＝観念的競合。","date":"Excel取込"},{"id":1800000000528,"subject":"刑法","topic":"刑法における故意または過失","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n殺人の故意で発砲→犬に命中＝殺人未遂のみ成立","date":"Excel取込"},{"id":1800000000529,"subject":"刑法","topic":"緊急避難","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\nやむを得ずにした行為＝唯一の方法。業務上特別の義務があるもの＝義務の趣旨に反しないなら緊急避難成立","date":"Excel取込"},{"id":1800000000530,"subject":"刑法","topic":"強盗の罪","level":1,"memo":"【ソース】伊藤塾2023プレ模試\n\n暴行脅迫後に被害者が犯行不能＝財物奪取の意思生じて奪った＝窃盗罪成立。強盗予備に中止犯なし。\n財物取り返されること・逮捕防ぐ目的で暴行・脅迫＝事後強盗罪。あわせて公務執行妨害も成立する。\n事後強盗の既遂未遂は財物奪取の有無で決まる。強盗致傷の成立検討。強盗殺人＝財物ではなく死傷の結果で決まる。","date":"Excel取込"},{"id":1800000000531,"subject":"刑法","topic":"共犯","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n盗品等有償処分あっせん罪＝盗品の運搬、保管、購入について、後段は盗品を買ってくれる人を探す行為を処罰","date":"Excel取込"},{"id":1800000000532,"subject":"刑法","topic":"共犯","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n是非善悪判断可能な幼女利用して窃盗＝間接正犯。得意先が陳列すると知りながらわいせつフィルム貸与＝猥褻物陳列罪の幇助犯","date":"Excel取込"},{"id":1800000000533,"subject":"刑法","topic":"偽造の罪","level":1,"memo":"【ソース】2023年TAC予想問題集\n\nコピーのコピーでも公文書偽造成立。虚偽の登記申請＝電磁的公正証書原本不実記録罪。\n虚偽診断書等作成罪＝公務所に提出するものだけ。医師が公務員なら虚偽公文書作成等罪。偽造手形を見せ手形＝偽造有価証券行使罪。友人に器用さ自慢で偽造幣紙作成＝セーフ","date":"Excel取込"},{"id":1800000000534,"subject":"刑法","topic":"横領罪等","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n横領罪の保護法益は所有権＝質物という担保物件侵害＝背任罪。抵当権設定・所有権移転＝それぞれ横領罪","date":"Excel取込"},{"id":1800000000535,"subject":"刑法","topic":"横領罪","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n登記上自己の他人所有＝本人から移転登記求められて自己所有権主張は横領罪。不実の抵当権仮登記＝横領罪\n所有権の侵害必要＝質権者から委託質物保管中、所有権者に変換しても所有権侵害してない。\n抵当権設定後売却＝横領罪","date":"Excel取込"},{"id":1800000000536,"subject":"刑法","topic":"横領の罪","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n預金通帳と印鑑盗んで預金引き出し＝預金に占有ないので銀行に対する詐欺。組合自身のためなら独断でも横領にあたらない。抵当権設定・売却＝それぞれ横領。未成年後見・成年後見に親族相盗例は非適用","date":"Excel取込"},{"id":1800000000537,"subject":"刑法","topic":"横領の罪","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n農地の売買契約＝譲受人の委託で第三者名義で許可取得、所有権移転＝第三者が不法領得したら横領罪。\n質物の返還＝横領じゃなく背任。","date":"Excel取込"},{"id":1800000000538,"subject":"刑法","topic":"因果関係","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\n弾2発＝業務上過失障害罪と殺人罪＝併合罪。特殊事情あっても因果関係あり。","date":"Excel取込"},{"id":1800000000539,"subject":"刑法","topic":"証拠隠滅罪ショウコインメツザイ","level":1,"memo":"【ソース】伊藤塾2022プレ模試\n\n捜査開始前の刑事事件も含む。参考人として虚偽の供述し、調書に録取されても直ちに証拠偽造にあたる訳ではないソウサカイシマエケイジジケンフクサンコウニンキョギキョウジュツチョウショロクシュタダショウコギゾウワケ","date":"Excel取込"},{"id":1800000000540,"subject":"刑法","topic":"殺人の罪サツジンツミ","level":1,"memo":"【ソース】伊藤塾2022プレ模試\n\n殺害目的で毒入り飲料を道路に置く＝殺人予備。サツガイモクテキドクイインリョウドウロオサツジンヨビ","date":"Excel取込"},{"id":1800000000541,"subject":"刑法","topic":"過失犯カシツハン","level":1,"memo":"【ソース】伊藤塾2022プレ模試\n\n行為者自身が法令違反してても信頼の原則は適用可能。過失による教唆・幇助は処罰されない。コウイシャジシンホウレイイハンシンライゲンソクテキヨウカノウカシツキョウサホウジョショバツ","date":"Excel取込"},{"id":1800000000542,"subject":"供託法","topic":"利息の払渡手続","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n供託金利息＝0.0012パーセント。譲渡通知書提出前日までの利息は譲渡人に払渡。","date":"Excel取込"},{"id":1800000000543,"subject":"供託法","topic":"保証供託","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n営業保証供託＝取引・損害OK。訴訟費用担保＝非担保債権証明して供託書に直接還付請求。\n担保変換決定＝新たな供託後、従前の供託取り戻す\n訴訟費用の担保＝直接還付請求必要（被担保債権証する書面必要）。宅建業者の営業保証金に差押・転付命令あっても、取引債権有するものは営業保証金の還付受けられる。","date":"Excel取込"},{"id":1800000000544,"subject":"供託法","topic":"弁済供託の供託額","level":1,"memo":"弁済の提供までの延滞利息必要＝供託日じゃない。利息制限内に引き直した供託は受理される。敷金控除した滞納家賃供託はできないー敷金は賃貸借契約終了時に清算されるものだから。","date":"Excel取込"},{"id":1800000000545,"subject":"供託法","topic":"弁済供託の管轄","level":1,"memo":"持参債務で住所不明で受領不能＝債権者の最後の住所地の供託所が管轄。銀行に振り込まない給料債務＝取立債務＝従業員の勤務地の最寄りの供託所。債権者の住所地を債務履行地として家賃弁済供託で債権者が住所移転＝以降は供託者の住所地最寄りの供託所に供託可能。休眠担保権抹消登記申請のための供託＝持参債務なら債権者住所地の最寄りの供託所に供託OK。","date":"Excel取込"},{"id":1800000000546,"subject":"供託法","topic":"弁済供託","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n未成年者に法定代理人いない時＝受領不能で供託OK。弁済供託後の賃上げ再三＝受領意思なしとしての今後供託は不可能。修理代金と家賃債務相殺して受領拒否→相殺後の金額供託可能。\n10ヶ月分滞納家賃のうち1ヶ月分とその遅延損害金＝受領拒否なら提供した家賃と遅延損害金のみ供託可能。\n未登記建物の賃借人＝新賃貸人からの請求に対し供託不可（従前の賃貸人に払えばいいから）\n銀行の取立て債務＝銀行の住所地の供託書に供託\n譲渡制限意思表示ある債権譲渡されたら無条件で供託可能（債務履行地or譲渡人住所）\n譲渡制限金銭＝譲受人悪意重過失でも供託請求権あり＝債権の一部譲受人は不可。管轄外無効だし移送もないが、被供託者が受諾したら有効。売主の怠慢で所有権移転登記できなかった場合も、買主は受領不能原因として売買代金供託不可。自己算定扶養料受領拒否されても供託不可。滞納処分の差押えと確定日付債権譲渡通知の先後不明＝債権者不確知で供託可能。賃料と修理費用相殺した額拒否＝相殺後の残額供託可能","date":"Excel取込"},{"id":1800000000547,"subject":"供託法","topic":"払渡請求全般","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n供託受託意思撤回不可能。被供託者２人の弁済供託＝持分割合不明なら平等割合で還付請求可能。\n代位債権者＝無資力証明書面必要。請求事由違うと一括請求できない。","date":"Excel取込"},{"id":1800000000548,"subject":"供託法","topic":"受領不能理由とする弁済供託","level":1,"memo":"国税滞納者の所在不明＝受領不能理由として国税滞納処分による不動産公売代金の残余金を税務署の所在地の供託所に供託可能。破産開始決定でても管財人に支払えるから供託不可。未成年者に法定代理人いない場合＝受領不能で供託可能。取立債務で銀行遅延損害金なく供託可能。債権者の所在不明で持参債務受領不能＝債権者の最後の住所地に供託。","date":"Excel取込"},{"id":1800000000549,"subject":"供託法","topic":"執行供託","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n金銭債権の全額に対する強制執行による差押え＝第三債務者は権利供託→事情届を執行裁判所へ→配当。\n滞納処分と強制執行の差押え競合＝権利供託→徴収職員還付請求可能。残余は配当→徴収職員へ事情届。\n通常差押競合＝義務供託。同時履行の抗弁で義務生じない。\n利息も支払委託→配当実施で債権確定後は委託によらず債権者の請求で払渡し。\n第三債務者が供託＝事情届が必要。仮処分開放金供託＝被供託者の氏名・住所記載必要\n全額・一部に対する差押え＝権利供託。差押え及んでいない部分＝第三債務者も供託不受託で取戻し可能。\n金銭債権の一部に差押命令送達後、取立訴訟の訴状送達前に配当要求あった文書送達受ける＝差押金額相当供託必要。給与債権一部に差押えでも、第三債務者は全額供託可能。\n配当受けるべき債権者＝仮差押債権者なら執行官配当相当額の供託必要。\n強制競売で債権者が不出頭＝裁判所書記官は執行裁判所所在地に配当額供託必要。\n仮差押解放金・仮処分解放金＝有価証券NG。仮差押債権者が本案勝訴＝仮差押解放金の取戻請求権差押えても、他に差押あれば取立権に基づく払渡請求不可。執行裁判所作成の供託原因消滅証明書の添付で取戻し可能。\n本案勝訴で執行文なく直接供託所に還付請求可能。\n全額または差押金額供託＝事件の表示・債権者及び債務者氏名・供託事由供託金額を記載した事情届に供託所正本を添付。執行債務者＝差押命令取消書面添付して供託所に直接供託金払渡請求可能\n仮差押解放金＝仮差押命令・保全執行裁判所の地裁の供託所。解放金は金銭。\n保全権利が詐害行為に基づく返還請求＝被供託者欄に債務者の氏名住所記載必要。\n第三債務者＝一部差押えで全額供託＝被供託者の氏名住所記載必要。添付命令確定＝供託不可。\n執行供託＝被供託者の記載要しない。供託所の記載から転付命令確定明らか場合除き受理される。差押命令失効＝原則配当の支払委託。差押債務者は直接払渡請求可能。\n仮差押と差押競合＝義務供託。本案勝訴＝執行分不要で直接払い渡しOK\n義務供託＝被供託者の住所氏名に執行債務者の住所氏名不要＝配当だから還付者特定されていない。\n仮差押競合なら、仮差押債務者を被供託者にする。","date":"Excel取込"},{"id":1800000000550,"subject":"供託法","topic":"供託法上の特殊な手続","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n代供託＝有価証券の償還を行いその金銭を供託継続。附属供託＝利息配当金を附属\n差押え後の差替え・保管替え不可。有価証券の時保管替え不可。差替えの供託は他の供託所にも可能。\n差替えのための新たな供託＝事前に裁判所の担保変換決定必要＝保証供託差替えは金銭→有価証券や1000万のうち300万などOK。ホショウキョウタク サシカエハ キンセｎ ユウカショウケン マンノ マン","date":"Excel取込"},{"id":1800000000551,"subject":"供託法","topic":"供託物払渡請求書の添付書類","level":1,"memo":"錯誤取戻し＝錯誤書面必要。副本ファイルで取戻権明らかなら取戻権証する書面不要＝弁済供託の不受託。\n利害関係人の承諾書＝承諾書の作成前3ヶ月以内または作成後の印鑑証明書必要。本人確認書類提示しコピー提出で印鑑証明書省略可能＝パスポートは住所記載ないから不可。登記ある法人印鑑証明書の添付省略不可","date":"Excel取込"},{"id":1800000000552,"subject":"供託法","topic":"供託物払渡請求","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n登記された法人なら払渡も資格書面提示で足りる。利札の償還期限到来＝利札のみ払渡請求可能。供託が錯誤無効なら供託受諾の意思表示の有無に関わらず取戻し請求可能。譲渡通知書は供託官受付したら確定日付ある書面となる。\n供託不受諾＝取戻請求に権利有する書面添付不要。取戻請求の放棄＝供託所の備考欄に記載か取戻請求権放棄書を提出。数人のうち一人受諾しても、受諾部分以外は取戻し可能。供託により保証債務消滅＝取戻し可能→供託物取戻した時保証債務復活。供託受諾の意思表示＝様式なし・印鑑証明不要。電子で払渡請求＝預貯金振込みor国庫金振替\n管轄違い＝錯誤書面不要。質権者＝直接供託金払渡請求権行使可能。\n裁判上の保証供託＝還付請求権証する書面で供託者作成の債務承認書私文書（印鑑証明付）添付可能。\n売買契約で弁済供託＝売買合意解除→供託原因消滅で取戻請求OK\n代理人口座への振込＝払渡請求書添付の委任状に受領権限必要。供託通知書は提示不要。\n錯誤＝錯誤の事実書面添付で超過額取戻し可能。供託者本人作成の反対給付書面もOK\n有価証券・振替国債なら請求書2通提出。供託不受諾による取戻請求＝権利書面不要。\n官公署作成書面を本人が提出＝印鑑証明添付不要になる。執行供託＝支払証明書を払渡請求書に添付\n地代の弁済供託＝本件供託金と記載ある遺産分割審判書または遺産分割協議書添付での還付請求OK。他の被供託者の承諾書OK、供託者の承諾書NG。本人確認資料は提示＋写し添付。代理人に対する振込＝供託金払渡請求書に添付された代理人権限書面に押印された印鑑証明書の添付必要。\n反対給付の証明書＝登記や供託者作成の被供託者の同意書。代表者・管理人の資格称する書面＝３か月以内シチケンシャ チョクセツ キョウタクキｎ ハライワタシ セイキュウケン コウシカノウ","date":"Excel取込"},{"id":1800000000553,"subject":"供託法","topic":"供託物","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n特別の定めなければ、弁済供託は保管者に対して行う。営業保証供託＝金銭・国債証券・有価証券・振替国債\n有価証券はオンライン不可。\n日本国内に住所・営業所ない＝被告申立てで担保命じる＝有価証券OK。支払確実な小切手OK。\n保全命令担保供託＝有価証券・振替国債可能。有価証券・振替国債＝営業保証供託OK","date":"Excel取込"},{"id":1800000000554,"subject":"供託法","topic":"供託当事者","level":1,"memo":"被後見人可能。未成年不可。保佐人単独で弁済供託可能。執行供託でも弁済供託の性質有する場合、債務者を被供託者として記載必要・相続財産管理人が財産管理で供託＝管理人が供託者。保佐人は単独で供託可能。意思無能力者も当事者OK。仮差押解放金＝本人のみ。成年被後見人がした供託行為＝当然に無効\n権利能力なき社団もOK。管財人もOK。被後見人はNG。営業許可受けた未成年者は弁済供託可能。\n被保佐人は単独で可能。権利能力ない社団＝自治会・PTA町内会・設立中の会社。弁済供託第三者可能。\n仮差押解放金＝第三者による供託不可。弁済供託なら正当な利益有する第三者も供託可能＝当事者が反対の意思示してたら不可。意思無能力者も当事者になれる。権利能力なき社団も代表者管理者あれば供託当事者になれる。\n組合長の名義による供託可能。死亡者あての供託も有効。合意解除後の適法な転借人が提供する地代＝賃貸人・賃借人いずれも拒否なら賃貸人を被供託者として供託可能。","date":"Excel取込"},{"id":1800000000555,"subject":"供託法","topic":"供託成立後の権利変動","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\n供託払渡請求権の一部差押＝執行裁判所に事情届不要。\n弁済供託の取戻請求権を滞納処分で差し押えても供託受諾されたら取戻し不可。\n供託金払渡請求権の一部が差押＝供託官＝執行裁判所へ事情届不要。債権者不確知＝還付請求権の消滅時効起算点＝還付受ける者確定した時から。\n受領不能原因＝基礎となる事実関係紛争解決により払渡請求権の行使現実に期待することができることとなった時点から10年起算。\n供託物払渡請求権の質権者＝質権実行として差押え・添付命令受けて払渡請求可能＝直接取立てOK。反対給付未了でも供託受諾OK。供託金還付請求権の差押え債権者＝差押命令送達から1週間経過したら直接取立てOK。\n供託物還付請求権の仮差押え債権者は供託受諾不可（差押え債権者は可能）\n弁済供託の取戻請求権に国税滞納処分による差押え＝供託受諾された後は取戻し認可されない。\n質権者は直接供託物払渡請求可能\n譲渡・質入れ・差押えに優劣なし＝先後で決まる。取戻しと還付請求同時＝還付請求優先。\n供託物払渡請求権の譲渡通知＝印鑑証明なくても有効。ただし払渡時に必要になる。質権者に供託書正本交付不要ジュリョウ フノウ ゲンイン キソトンラウ ジジツカンケイ フンソウ カイケツ ハライワｔセイキュウケン コウシ ゲンジツニ キタイスルコトガ ジテンカラ ネｎ キサン","date":"Excel取込"},{"id":1800000000556,"subject":"供託法","topic":"供託の目的物","level":1,"memo":"労務を金銭に換算しての供託は不可。裁判書書記官のする供託＝金銭に限る。公職選挙法の供託＝国債証券OK、地方債NG。","date":"Excel取込"},{"id":1800000000557,"subject":"供託法","topic":"供託の払渡手続","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n供託有価証券利札請求書2通作成。執行供託＝執行裁判所の書記官が支払委託書を供託所に送付、支払証明書を交付の流れ。支払委託書に受けるべきもの明らかじゃない時＝証明書の添付必要。\n供託受諾後も錯誤なら取り戻し可能。保証債務証明しても取戻し請求可能。利害関係人の承諾書3ヶ月以内のもの","date":"Excel取込"},{"id":1800000000558,"subject":"供託法","topic":"供託の申請手続","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n登記された法人＝代表者の資格書面不要。委任状は提示で足りる。\n供託官の告知した納付情報→金銭のみ。供託書・通知書・代供託附属供託＝契印不要。供託原因の存否等の実体的要件に審査及ぶ。明白な誤記も受理するが、供託書訂正申請書2通提出させる\n最後に供託カード提示から2年経過した場合＝供託カードで供託不可。被供託者の氏名判明で住所不明＝被供託者の最後の住所地記載。押印不要・反対給付の内容記載・振替国債の銘柄利息支払時期償還期限の資料提供。\n当事者・供託原因異なる数個の供託も供託官相当と認めれば１通の供託所で可能。\n法人でない社団・財団＝定款・寄付行為及び資格証する書面必要。登記された法人＝被供託者なら代表者氏名不要\n供託書に記名押印不要。継続的給付にかかる供託＝カード交付申出可能。\n破産管財人が供託＝選任書面の添付必要。代理人によって書類の還付請求＝代理人の権限証する書面提示必要。\n被供託者法人特定できるなら代表者の記載は不要。破産管財人＝選任証明書添付。供託者が国＝国庫内の移換可能。\n供託書正本の電磁記録提供＝1回のみ書面交付請求可能（期間なし）\nオンライン供託に対する供託書正本の交付＝請求なければ供託書電子正本じゃなく書面による供託書正本。\n金銭・有価証券供託＝法令の条項記載必要。\n解雇された外交販売員→顧客から受け取った品物代金を未払給料退職金の給付条件として弁済供託は不可。\n供託通知書の発送請求＝切手封筒必要だが供託通知書添付不要。供託時は代理権限証明は提示でOK、印鑑証明も不要","date":"Excel取込"},{"id":1800000000559,"subject":"供託法","topic":"供託の管轄","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n不法行為損害賠償債務＝住所不明受領不能→被害者の最後の住所地可能。賃借人が相続人いずれかの住所地に供託不可＝各相続人の住所地に供託必要。供託管轄区域外の移送不可。","date":"Excel取込"},{"id":1800000000560,"subject":"供託法","topic":"弁済供託の供託原因ベンサイキョウタクキョウタクゲンイン","level":1,"memo":"あらかじめ受領拒まれても口頭の提供必要。質権設定されても受領不能とならない。確定日付のない証書による解除と別人への譲渡通知＝債権者不確知OK。\n譲渡禁止特約のある債権譲渡＝債務者に確定日付ある証書通知されたら＝受領不能原因とする弁済供託可能。\n未登記の賃貸人からの請求＝従前の賃貸人に支払えばいいので債権者不確知不可。\n振替国際＝弁済供託の目的にできない\n供託する賃料欄の３月→４月＝訂正することできない。振替国債＝担保供託・没収供託の供託物\n土地の一部について明渡請求受け、当該部分の賃料受領拒否＝賃料全額の供託申請受理される。家賃10ヶ月分滞納＝1ヶ月分とその遅延損害金の供託可能。電気料金に不服＝値上げ前のみの提供は不可。ジュリョウコバコウトウテイキョウヒツヨウシチケンセッテイジュリョウフノウカクテイヒヅケショウショカイジョベツジンジョウトツウチサイケンシャフカクチ","date":"Excel取込"},{"id":1800000000561,"subject":"供託法","topic":"配当留保供託又は不出頭供託ハイトウ リュウホ キョウタク マタハ フシュットウ キョウタク","level":1,"memo":"配当額金銭供託し、障害事由消滅時に配当するため裁判所書記官によりなされる供託＝配当留保供託→停止条件又は不確定期限付・仮差押債権者の債権・配当異議の訴え提起時。強制管理開始＝債権者が停止条件付＝管理人が配当留保供託して事情を執行裁判所に届け出る＝供託事由消滅したら、執行裁判所は配当実施必要。債権者不出頭＝配当金銭供託必要＝不出頭供託＝管轄は執行裁判所の管轄供託所。不出頭供託＝直接債権者が供託所に還付請求可能。ハイトウガク ガク キンセン キョウタクシ ショウガイ ジユウショウメツジニ ハイトウスルタメ サイバンショ ショキカンニ キョウタク ハイトウ リュウホ キョウタク テイシジョウケン マタハ フカクテイキゲンツキ カリサシサイケンシャノ サイケン ハイトウイギノ ウッタエ テイキジ キョウセイカンリ カイシ サイケンシャガ テイシジョウケンツキ カンリニンガ ハイトウリュウホ キョウタク ジジョウ シッコウサイバンショ トドケデル キョウタク ジユウショウメツシタラ シッコウサイバｎハイトウ ジッシ ヒツヨウ サイケンシャ フシュットウ ハイトウキンセｎ キョウタク ヒツヨウ フシュットウ キョウタク カンカツハ シッコウサイバンショ カンカツ キョウタクショ フシュットウキョウタク チョクセツ サイケンシャガ キョウタクショニ カンプ セイキュウカノウ","date":"Excel取込"},{"id":1800000000562,"subject":"供託法","topic":"取戻請求権トリモドシ セイキュウケン","level":1,"memo":"法人の清算結了後も供託金還付取戻し可能＝清算人だったものがする。法人でない社団＝取戻し請求する時は払渡請求書に定款添付筆必要。ホウジンノ セイサン ケツリョウ ゴモ キョウタクキｎ カンプ トリモドシ カノウ セイサンニｎ ホウジンデナイシャダｎ トリモドシ セイキュウ ハライワタシ セイキュウショ テイカン テンプ ヒツオユ ヒツヨウ","date":"Excel取込"},{"id":1800000000563,"subject":"供託法","topic":"電子申請デンシ シンセイ","level":1,"memo":"供託有価証券の払渡し請求は不可。供託の段階で電子署名・電子証明書は不要。供託通知書の発送希望の場合は封筒・郵券を供託所に提出必要。供託者は電磁的記録に記載された事項を記載して供託官が記名押印した書面交付請求可能\n供託申請時は電子署名不要。電子申請で金銭払い込む場合、電子納付に限られる。\n電子で払渡請求＝預貯金or国庫振替のみ\n供託所電子正本＝受信期限30日。みなし供託書正本の交付依頼も可能。キョウタクユカ ユウカ ショウケｎ ハライワセイキュウハ フカ キョウタクノ ダンカイデ デンシショメイ デンシショウメイショウ フヨウ キョウタクツウチショノ ハッソウ キボウ バアイハ フウトウ ユウケン キョウタクショ テイシュツ ヒツヨウ キョウタクシャハ デンジテキキロク キサイ ジコウヲ キサイシイェ キョウタクカン カン キメイオウショメン コウフ セイキュウ カノウ","date":"Excel取込"},{"id":1800000000564,"subject":"商法・会社法","topic":"役員等の報酬等","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n各会計参与の報酬＝定款・総会決議なければ会計参与の協議で決める。取締役の退職慰労金＝定款・総会決議→役会のみで決められない。会計監査人の報酬＝取締役が定める。執行役兼支配人の報酬＝報酬委員会が定める。","date":"Excel取込"},{"id":1800000000565,"subject":"商法・会社法","topic":"役員の兼任禁止","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n監査等委員以外の取締役＝支配人兼任可能。指名委員会の監査委員は子会社の監査役OK","date":"Excel取込"},{"id":1800000000566,"subject":"商法・会社法","topic":"募集株式の発行の登記","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n社員の半数以上が現物出資財産を給付する募集株式の引受人＝弁護士・外国法務事務弁護士共同法人でも証明不可","date":"Excel取込"},{"id":1800000000567,"subject":"商法・会社法","topic":"募集株式の発行","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n株主割当で決議用しない旨ある場合＝損害恐れある種類株主は反対買取請求可能（第三者割当ては不可能）\n株主割当てなら有利発行の説明義務なし。非公開の第三者割当て＝募集事項の通知公告不要。","date":"Excel取込"},{"id":1800000000568,"subject":"商法・会社法","topic":"募集株式の発行","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n役会非設置＝株主割当＝定款ある時のみ取締役に委任可能（総会で委任できない）\n株主割当て＝募集事項の決定不要","date":"Excel取込"},{"id":1800000000569,"subject":"商法・会社法","topic":"募集株式の発行","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n非公開の総会募集事項委任＝1年以内＝払込期間の末日までなら有効","date":"Excel取込"},{"id":1800000000570,"subject":"商法・会社法","topic":"反対株主の株式買取請求","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n譲渡承認で承認必要とする定款変更＝買取請求可能。組織変更で買取なし（総株主の同意）\n吸収合併での買取＝吸収合併効力発生日に買取効力発生","date":"Excel取込"},{"id":1800000000571,"subject":"商法・会社法","topic":"発行可能株式総数等","level":1,"memo":"【ソース】伊藤塾2021プレ模試\n\n株式の償却＝公開会社でも4倍ルールなし","date":"Excel取込"},{"id":1800000000572,"subject":"商法・会社法","topic":"発起設立及び募集設立","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n発起＝公証人認証後、公告方法の定款変更不可。募集＝創立総会＝定足数なし。","date":"Excel取込"},{"id":1800000000573,"subject":"商法・会社法","topic":"単元株式数","level":1,"memo":"【ソース】伊藤塾2020プレ模試\n\n剰余金の配当・残余財産の分配を単元未満株主に制限するの不可。買取請求は定款なくてもOK、売渡は定款必要。","date":"Excel取込"},{"id":1800000000574,"subject":"商法・会社法","topic":"代理商","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n2ヶ月前に予告解除。やむを得ない時はいつでもOK。承認の許可なければ同種事業の取締役系なれない＝監査役はOK。弁済まで留置OK","date":"Excel取込"},{"id":1800000000575,"subject":"商法・会社法","topic":"組織変更","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n合同会社のみ二重公告で債権者保護省略可能。新株予約権者の買取請求あり。組織変更に事後開示なし。","date":"Excel取込"},{"id":1800000000576,"subject":"商法・会社法","topic":"組織変更","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n吸収合併・株式交換＝子が公開で対価が譲渡制限＝309③の承認必要。吸収分割は不法行為債権者には催告省略不可","date":"Excel取込"},{"id":1800000000577,"subject":"商法・会社法","topic":"組織再編行為","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n合併消滅＝非種類株式発行会社かつ対価が持分→反対買取なし。\n株式移転＝完全子が単一公開かつ対価が譲渡制限→移転計画309③での承認必要。","date":"Excel取込"},{"id":1800000000578,"subject":"商法・会社法","topic":"全部取得条項付種類株式","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n全部取得する時＝買取請求なし＝取得価格決定の申立ては可能。取得後半年の事後開示あり。\n全部取得条項付種類株式への変更＝種類総会でOK。取得条項付なら種類全員の同意必要。","date":"Excel取込"},{"id":1800000000579,"subject":"商法・会社法","topic":"全部取得条項付種類株式","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n定款＝取得対価の価額の決定方法を定める。取得時は価格決定申立てのみ可能＝定めを設ける時は買取請求あり。\n6ヶ月の事後開示あり","date":"Excel取込"},{"id":1800000000580,"subject":"商法・会社法","topic":"新設分割","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n設立持分会社の定款は分割株式会社が作成＝署名記名押印は不要。分割会社の不法行為除き、承継も分割も2重公告省略可能。権利義務全部承継じゃないなら総社員の同意不要。","date":"Excel取込"},{"id":1800000000581,"subject":"商法・会社法","topic":"新設分割","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n簡易＝5分の1（公開とか譲渡制限とか関係ない）。新設分割だけ簡易可能（合併・移転不可）。詐害行為の取消対象。","date":"Excel取込"},{"id":1800000000582,"subject":"商法・会社法","topic":"新設分割","level":1,"memo":"【ソース】LEC2023実力診断模試\n\n新設分割の無効の訴え＝被告＝新設分割と設立の両方必要。新設分割の債権者・取得対価が設立の株の全部取得条項の取得・設立株式のみの剰余金の配当＝異議可能","date":"Excel取込"},{"id":1800000000583,"subject":"商法・会社法","topic":"新設合併・新設分割・株式移転","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n指名委員会等設置会社＝簡易分割→役会で新設分割計画の決定を執行役に委任可能。\n株式移転無効の訴え＝管財人・反対債権者も可能。害すること知って破産したら残存債権者も履行請求不可→全部取得の対価・剰余金配当として設立会社の株式のみの時も請求不可。\n合併設立が持分なら総株主の同意必要。新設分割なら不要。","date":"Excel取込"},{"id":1800000000584,"subject":"商法・会社法","topic":"新設型組織再編","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n消滅会社の通知＝承認決議前か承認後2週間以内。設立が持分なら通知不要。\n略式＝吸収型のみ。簡易＝新設型は分割のみ。\n株式買取請求が効力失った場合、株主名簿記載請求可能。","date":"Excel取込"},{"id":1800000000585,"subject":"商法・会社法","topic":"新設型組織再編","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n種類発行してない公開かつ対価が譲渡制限＝合併消滅or完全子の309③必要。\n分割で債務請求できない債権者・移転計画新株予約権が社債付されてる社債権者は異議OK","date":"Excel取込"},{"id":1800000000586,"subject":"商法・会社法","topic":"新設型組織再編","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n新設分割は対価の種類にかかわらず特別決議で承認。公開の合併・移転は対価譲渡制限なら309③。\nいずれも反対株主は株式買取請求可能＝会社成立の日に効力発生。特例有限の株式移転不可。債務承継は合併のみ。","date":"Excel取込"},{"id":1800000000587,"subject":"商法・会社法","topic":"新株予約権","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n新株予約権証券なら公開会社でも請求あるまで発行不要。\n第三者割当ての取締役委任は総会のみ。株主割当なら定款でOK。","date":"Excel取込"},{"id":1800000000588,"subject":"商法・会社法","topic":"新株予約権","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n新株予約権に分配可能額制限なし。新株予約権は混在不可（第一回自己〜と第二回など）\n第三者割当て＝役会設置してないなら、定款で募集事項取締役の決定にできる。非公開の第三者割当ては、特別機決議による委任なければ総会特別決議必要。新株の譲渡承認は登記事項じゃない。","date":"Excel取込"},{"id":1800000000589,"subject":"商法・会社法","topic":"新株予約権","level":1,"memo":"【ソース】伊藤塾2020プレ模試\n\n行使の目的＝金銭以外（社債）OK。","date":"Excel取込"},{"id":1800000000590,"subject":"商法・会社法","topic":"新株予約権","level":1,"memo":"【ソース】伊藤塾2021公開模試\n\n非公開第三者割当て＝取締役に新株予約権募集事項委任してても内容は総会で決定。","date":"Excel取込"},{"id":1800000000591,"subject":"商法・会社法","topic":"譲渡制限株式の譲渡承認請求","level":1,"memo":"【ソース】伊藤塾2021プレ模試\n\n譲渡承認否決した場合の買取事項＝総会で決議（承認請求者は議決権行使不可）\n承認請求から2週間経過で承認したものとみなす","date":"Excel取込"},{"id":1800000000592,"subject":"商法・会社法","topic":"剰余金の配当","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n新設分割設立成立の日に設立会社の株式のみ配当＝財源規制なし。取締役会での配当＝必ず定款必要。\n減少する剰余金✖️10分の1を準備金として計上必要。準備金が資本金✖️4分の1以上なら不要。","date":"Excel取込"},{"id":1800000000593,"subject":"商法・会社法","topic":"商人","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n代理商＝平常取引代理媒介し、使用人じゃないもの。不特定多数NG（仲立人・問屋はOK）\n代理商の留置権は牽連関係不要。締約代理商＝特定商人のためのみ。媒介代理商＝特定商人のために媒介のみ＝どっちも商人と相手方の契約になる。","date":"Excel取込"},{"id":1800000000594,"subject":"商法・会社法","topic":"商事売買","level":1,"memo":"【ソース】伊藤塾2023プレ模試\n\n相当の期間定めず競売可能。競売代金供託せず、売買代金に充当も可能。定期売買＝特定の日時に履行しなければ目的達成できないやつ。履行なく期間経過＝契約解除の意思表示なく解除とみなされる。営業所同一の区域内以外は、売買買主は契約の解除した場合も目的物保管供託必要。滅失損傷おそれあれば裁判所の許可得て競売","date":"Excel取込"},{"id":1800000000595,"subject":"商法・会社法","topic":"商行為の特則","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n譲渡が効力を生じたタイミングで悪意判断。残存債権者を害することを知って譲渡した時から2年以内に請求予告しないor譲渡効力日から10年で責任消滅。","date":"Excel取込"},{"id":1800000000596,"subject":"商法・会社法","topic":"種類株式等","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n種類を譲渡制限＝309②&種類の特殊決議。種類決議不要の定款あっても、種類の追加は総会決議必要になる。\nイ 株式の種類の追加　ロ 株式の内容の変更　ハ 発行可能株式総数又は発行可能種類株式総数の増加","date":"Excel取込"},{"id":1800000000597,"subject":"商法・会社法","topic":"取得請求権付株式・取得条項付株式・全部取得条項付種類株式","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n種類株式発行会社＝取得請求権・取得条項付は対価を定款で定める必要あり。\n全部取得条項の取得日は総会で決定。","date":"Excel取込"},{"id":1800000000598,"subject":"商法・会社法","topic":"取締役の利益相反取引","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n会社が代表に債務履行＝セーフ。利益相反も株主全員の合意あれば役会の承認不要。会社が代表に約束手形を裏書譲渡＝代表が同額の金額を融資する時以外役会の承認必要","date":"Excel取込"},{"id":1800000000599,"subject":"商法・会社法","topic":"社債管理者及び社債管理補助者","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n社債管理者は共同で行為。補助者は各自行為（迅速）社債管理者を要しない場合に限り社債管理補助者OK。\n社債原簿管理人がいる。一切の裁判上の行為OK。社債管理補助者との利益相反＝社債権者集会の申立てで特別代理人選任必要","date":"Excel取込"},{"id":1800000000600,"subject":"商法・会社法","topic":"社債管理者及び社債管理補助者","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n担保付社債以外なら社債管理補助者OK。委託にかかる別段の定めあれば補助者も債権弁済受けられる。\n10分の1以上の社債権者集会請求またがは同意得て辞任する必要がある場合。社債管理者＝共同して行為。補助者＝各自行為","date":"Excel取込"},{"id":1800000000601,"subject":"商法・会社法","topic":"社債","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n者債権者集会＝全部猶予・責任免除和解→議決権総額5分の1以上かつ出席の3分の2の同意必要\n裁判所の許可あれば補助者もやむを得ない事由で辞任可能。","date":"Excel取込"},{"id":1800000000602,"subject":"商法・会社法","topic":"社債","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n役会設置は委任不可。監査等委員会設置会社＝過半数が社外取締役&定款&役会決議＝取締役に委任可能。指名委員会等は役会決議で執行役に委任可能。社債償還請求10年時効・利息請求＝5年。\n社債権者集会の目的である事項について提案がされた場合に、当該提案につき議決権者の全員が書面又は電磁的記録により同意の意思表示をしたときは、当該提案を可決する旨の社債権者集会の決議があったとみなされる。\n社債権者集会の決議があったとみなされた場合は、当該社債権者集会の決議について裁判所の認可を受けることを要しない。","date":"Excel取込"},{"id":1800000000603,"subject":"商法・会社法","topic":"社債","level":1,"memo":"【ソース】LEC2023実力診断模試\n\n社債償還請求＝10年で時効。利息請求権は5年。代表社債権者いつでも解任可能。","date":"Excel取込"},{"id":1800000000604,"subject":"商法・会社法","topic":"社外取締役","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n10年間業務執行取締役でないこと。二親等内の親族でないこと。","date":"Excel取込"},{"id":1800000000605,"subject":"商法・会社法","topic":"自己株式の取得","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\nすべての株主に譲渡機会提供し合意により有償取得＝普通決議で取事項定める。\n役会設置会社は市場取引取得を役会決議でできる定款OK。売主追加請求は同じ種類だけ。\n特定株主以外不要ケース①市場価格以下②子会社から③定款\n売主追加請求NGを定款に追加＝株主全員の同意","date":"Excel取込"},{"id":1800000000606,"subject":"商法・会社法","topic":"自己株式の取得","level":1,"memo":"【ソース】LEC2023実力診断模試\n\n子会社の株取得＝あらかじめ総会or役会で取得事項決定必要＝定款で決議機構総会にできる。\n売主追加請求権不可の定め＝総株主の同意。全部取得条項付種類株式の対価で株式発行＝資本金増えない","date":"Excel取込"},{"id":1800000000607,"subject":"商法・会社法","topic":"持分会社","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n定款＝社員全員が署名","date":"Excel取込"},{"id":1800000000608,"subject":"商法・会社法","topic":"持分会社","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n定款＝必ず社員の氏名住所記載","date":"Excel取込"},{"id":1800000000609,"subject":"商法・会社法","topic":"持分会社","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n退社した時に定款変更。名資で出資怠ったら損賠必要。6ヶ月前予告で事業年度の終了時に退社\n債権者害する設立＝2年以内訴えで設立取消し","date":"Excel取込"},{"id":1800000000610,"subject":"商法・会社法","topic":"持分会社","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n事業の部類に属する自己取引＝社員全員の同意必要","date":"Excel取込"},{"id":1800000000611,"subject":"商法・会社法","topic":"持分会社","level":1,"memo":"【ソース】伊藤塾2022公開模試\n\n業務執行しない社員＝利益相反取引は承認不要。","date":"Excel取込"},{"id":1800000000612,"subject":"商法・会社法","topic":"事業譲渡等","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n全部譲渡なら原則反対株主買取請求可能。同時に解散なら不可能。事業譲渡はやめろ請求不可。","date":"Excel取込"},{"id":1800000000613,"subject":"商法・会社法","topic":"事業譲渡等","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n免責的債務引受＝債権者の同意必要。事前事後承認得てない場合、事業譲渡契約無効。\n持分全部譲渡でも総株主の同意が必要になるケースはない。","date":"Excel取込"},{"id":1800000000614,"subject":"商法・会社法","topic":"事業譲渡等","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n他人と事業上損益の全部を共通する契約の解約・事業の全部譲渡・外国会社含む全部譲受＝特別決議","date":"Excel取込"},{"id":1800000000615,"subject":"商法・会社法","topic":"事業譲渡","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n訴え以外でも無効主張は可能（やめろ請求は不可）","date":"Excel取込"},{"id":1800000000616,"subject":"商法・会社法","topic":"資本金または準備金","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n資本金・準備金減少ともに反対株主買取請求なし。剰余金減少・準備金増加＝役会有無にかかわらず総会決議必要。\n資本金にしなかった額＝必ず資本準備金にしなければならない。","date":"Excel取込"},{"id":1800000000617,"subject":"商法・会社法","topic":"資本金の額","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n募集社債の発行＝資本金増加しない。吸収分割＝対価が承継の株式（自己株式含む）である場合に限り、株主資本等変動額の範囲で吸収分割契約の定めた額増加する","date":"Excel取込"},{"id":1800000000618,"subject":"商法・会社法","topic":"指名委員会等設置会社","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n執行役は支配人・使用人兼ねられる（取締役は監督のイメージ）監査等委員会の取締役は兼任OK。","date":"Excel取込"},{"id":1800000000619,"subject":"商法・会社法","topic":"指名委員会等設置会社","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n指名委員会・報酬委員会は役員兼任OK。監査委員会はほぼ兼任NG。","date":"Excel取込"},{"id":1800000000620,"subject":"商法・会社法","topic":"指名委員会等設置会社","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n監査委員である取締役＝子会社の監査等委員である取締役になれる（業務執行取締役じゃないから）","date":"Excel取込"},{"id":1800000000621,"subject":"商法・会社法","topic":"合名会社の業務を執行しない社員","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n持分の譲渡＝他の社員全員の承諾。代表社員の互選＝業務執行社員のみ代表になれる。\n業務執行社員定めたら各社員が業務財産調査権有する。","date":"Excel取込"},{"id":1800000000622,"subject":"商法・会社法","topic":"合併","level":1,"memo":"【ソース】伊藤塾2020プレ模試\n\n対価交付せずに吸収合併可能。第三者所有権移転登記しなくても合併存続会社に対抗可能。","date":"Excel取込"},{"id":1800000000623,"subject":"商法・会社法","topic":"合併","level":1,"memo":"【ソース】伊藤塾2020ファイナル模試\n\n新設合併設立株式会社の設立時取締役＝役会じゃなくて設立時利子まり役との過半数の一致で決定。\n新株予約権は効力発生日に消滅する。新設合併で債務承継しないこととすることできない","date":"Excel取込"},{"id":1800000000624,"subject":"商法・会社法","topic":"合併","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n新設合併＝略式合併なし。吸収合併消滅の新株予約権者＝条件合致しない場合買取請求。\n新設合併＝不法行為債権者省略不可。無効は将来効。","date":"Excel取込"},{"id":1800000000625,"subject":"商法・会社法","topic":"合同会社の計算","level":1,"memo":"【ソース】伊藤塾2023プレ模試\n\n資本金の額減少＝債権者保護終了時に効力発生。合同会社も現物出資してても金銭出資可能。","date":"Excel取込"},{"id":1800000000626,"subject":"商法・会社法","topic":"合同会社","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n業務執行しない有限責任社員の持分は業務執行社員全員の同意で譲渡可能。合同会社は利益配当拒める。","date":"Excel取込"},{"id":1800000000627,"subject":"商法・会社法","topic":"交互計算","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n商人間または商人と素人の一定期間取引で期間内取引を相殺し残額支払う契約。\n個々に相殺不可・時効・履行遅滞にかからない。錯誤遺漏除き異議不可。譲受債権・不法行為・不当利得事務管理＝通常取引じゃないので含まない。商業証券債務者が弁済しない場合、項目除外可能。素人同士不可。","date":"Excel取込"},{"id":1800000000628,"subject":"商法・会社法","topic":"交互計算","level":1,"memo":"【ソース】伊藤塾2021プレ模試\n\n意思表示で成立。相殺期間定めなかったら6ヶ月。いつでも解除可能。","date":"Excel取込"},{"id":1800000000629,"subject":"商法・会社法","topic":"交互計算","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n当事者の合意あれば書面なくても成立。各債権譲渡不可。期間定めない時6ヶ月。承認後異議不可。期間経過前でもいつでも当事者が解除可能","date":"Excel取込"},{"id":1800000000630,"subject":"商法・会社法","topic":"吸収分割","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n原則債務履行請求できない債権者のみ異議可能＝人的分割（対価が承継の株式のみの剰余金配当する）場合、全ての債権者が異議可能＝人的分割に財源規制なし。人的分割あったら害される残存債権者も履行請求不可＝その代わり効力発生日前の債権者保護手続で異議述べることになる。登記しないと第三者に対抗不可。","date":"Excel取込"},{"id":1800000000631,"subject":"商法・会社法","topic":"吸収型組織分割","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n吸収分割は対価が譲渡制限でも309②で足りる。株券提供広告も不要。異議＝合併全て・分割＝履行不可・交換＝新株予約付社債。","date":"Excel取込"},{"id":1800000000632,"subject":"商法・会社法","topic":"監査役会及び監査等委員会","level":1,"memo":"【ソース】伊藤塾2021公開模試2\n\n監査役会＝過半数。監査等委員会＝議決に加われる過半数の出席のうち過半数。\n職務執行の監査＝監査役。監査等委員会。","date":"Excel取込"},{"id":1800000000633,"subject":"商法・会社法","topic":"監査役会","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n監査役会に招集権者なし。定足数なし。債権者は裁判所の許可を得て監査役会議事録の閲覧可能。決議省略なし＝異議留めない・招集手続省略はあり","date":"Excel取込"},{"id":1800000000634,"subject":"商法・会社法","topic":"監査役","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n大会社＝会計監査人いるから389置けない。","date":"Excel取込"},{"id":1800000000635,"subject":"商法・会社法","topic":"監査役","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n389も前払請求・利息請求・担保提供請求可能。","date":"Excel取込"},{"id":1800000000636,"subject":"商法・会社法","topic":"監査等委員会設置会社及び指名委員会等設置会社","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n指名委員会の監査委員＝選任後1年。\n重要な業務執行の取締役への委任＝監査等委員は定款。指名委員会は常に可能。\n利益相反取引の承認＝監査等＝承認で任務懈怠解除推定。指名委員会は任務懈怠解除推定なし。","date":"Excel取込"},{"id":1800000000637,"subject":"商法・会社法","topic":"監査等委員会設置会社","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n監査等委員の任期を定款や決議で短縮できない。選任議案＝議決に加われる監査等委員の過半数の過半数で行う。","date":"Excel取込"},{"id":1800000000638,"subject":"商法・会社法","topic":"監査等委員会設置会社","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n監査等委員である取締役＝業務執行取締役・支配人使用人・子会社の会計参与執行役NG。\n選定する委員のみ意見OK（委員会の意見）。監査等委員以外の取締役は自己取引承認受けたら任務懈怠推定されない。","date":"Excel取込"},{"id":1800000000639,"subject":"商法・会社法","topic":"株主総会等の決議の取消しの訴え","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n取消しの訴え＝法令違反でも事実重大でなくかつ決議に影響なし＝裁判所棄却可能。\n役会とかの取消しの訴えなし。","date":"Excel取込"},{"id":1800000000640,"subject":"商法・会社法","topic":"株主総会決議取消の訴え","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n取締役選任決議取消の訴え継続中＝任期満了で全員退任＝利益欠くので訴え却下。","date":"Excel取込"},{"id":1800000000641,"subject":"商法・会社法","topic":"株主総会の招集の手続","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n役会設置会社＝書面でしなければならない＝承諾得たら電磁的方法でも可能。参考書類も同意あれば電磁的方法で提供可能","date":"Excel取込"},{"id":1800000000642,"subject":"商法・会社法","topic":"株主総会","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n役会設置＝不統一行使は3日前までに適宜の方法で通知。","date":"Excel取込"},{"id":1800000000643,"subject":"商法・会社法","topic":"株主総会","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n非公開の剰余金の配当異なる取扱い＝半数以上4分の3（309④）事後設立承認＝309②\n非公開の議決権異なる定め廃止＝309②でOK。累積投票＝309②","date":"Excel取込"},{"id":1800000000644,"subject":"商法・会社法","topic":"株式買取請求","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n全部取得条項付株式の取得・特別支配株主の売渡請求＝買取請求なし。価格決定の申立て可能＝種類との対比（種類株なら買取あり）事業全部譲渡＝買取請求あり。\n株式交換・吸収合併＝反対買取あり。略式・簡易にはなし。","date":"Excel取込"},{"id":1800000000645,"subject":"商法・会社法","topic":"株式買取請求","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n吸収分割＝特別支配会社以外の株主は反対買取請求可能。","date":"Excel取込"},{"id":1800000000646,"subject":"商法・会社法","topic":"株式買取請求","level":1,"memo":"【ソース】伊藤塾2021公開模試\n\n特別支配株主以外は略式株式で反対買取請求可能。","date":"Excel取込"},{"id":1800000000647,"subject":"商法・会社法","topic":"株式交付","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n変更後の効力発生日＝当初の日から3ヶ月以内。前日までに公告必要。","date":"Excel取込"},{"id":1800000000648,"subject":"商法・会社法","topic":"株式交換及び株式交付","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n株式交付＝親子ともに株式会社のみ。子会社は株券発行なら一ヶ月前までに公告かつ通知。\n株式交換完全子が特別支配株主＝親は承認不要→ただし、交付が譲渡制限で親が非公開なら、原則通り総会決議必要。","date":"Excel取込"},{"id":1800000000649,"subject":"商法・会社法","topic":"株式交換","level":1,"memo":"【ソース】伊藤塾2023プレ模試\n\n無対価可能。対価で親会社株式交付したら資本金契約範囲内で増加する。","date":"Excel取込"},{"id":1800000000650,"subject":"商法・会社法","topic":"株式及び新株予約権","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n新株予約権の発行＝金銭の払込要しないことOK。新株予約権者が不利益受ける恐れあっても株主じゃないからやめろ請求不可。割当日に株主になる。","date":"Excel取込"},{"id":1800000000651,"subject":"商法・会社法","topic":"株式会社の役員等の選任","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n監査等委員でない取締役＝支配人OK","date":"Excel取込"},{"id":1800000000652,"subject":"商法・会社法","topic":"株式会社の訴訟","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n合併比率の不公正＝無効原因にならない。非公開で第三者割当ての総会なし＝無効原因。\n仮処分命令違反のボカブ発行＝無効の訴え可能。","date":"Excel取込"},{"id":1800000000653,"subject":"商法・会社法","topic":"株式会社の設立手続","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n設立時取締役の一部でも発起人がいれば、創立総会決議で調査者選任可能。発起で種類なし＝設立時監査役解任は発起人の議決権の3分の2。設立の無効は2年以内に訴えをもってのみ（公開非公開関係ない）。","date":"Excel取込"},{"id":1800000000654,"subject":"商法・会社法","topic":"株式会社の設立","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n本店外国はNG。設立無効は将来効＝有効期間中の剰余金配当無効にならない","date":"Excel取込"},{"id":1800000000655,"subject":"商法・会社法","topic":"株式会社の設立","level":1,"memo":"【ソース】LEC2023実力診断模試\n\n変態設立事項の変更＝1週間以内なら発起人が定款変更可能＝募集設立は裁判所決定あっても創立総会で変更","date":"Excel取込"},{"id":1800000000656,"subject":"商法・会社法","topic":"株式会社の設立","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n発起人は日本に住所なくてOK。被保佐人＝代理権の審判で保佐人代理する時除き被保佐人が就任承諾必要。","date":"Excel取込"},{"id":1800000000657,"subject":"商法・会社法","topic":"株式会社の資本金の額等","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n剰余金の額減少＝総会普通決議。資本金の額の効力発生日＝発生日前はいつでも変更可能かつ公告不要。","date":"Excel取込"},{"id":1800000000658,"subject":"商法・会社法","topic":"株式移転","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n取締役会の決議で計画承認できない。対価金銭は不可。","date":"Excel取込"},{"id":1800000000659,"subject":"商法・会社法","topic":"株式の併合・分割・無償割当","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n分割を定款の定めで代表取締役の決定にすることは不可能。無償割当ては可能。\n株式の併合＝単元なしor1端数でる会社のみやめろ請求可能。分割・無償割当ては不可能。","date":"Excel取込"},{"id":1800000000660,"subject":"商法・会社法","topic":"株式の併合・株式の分割","level":1,"memo":"【ソース】伊藤塾2019プレ模試\n\n損害及ぼす種類株主の総会不要の定款ある時だけ反対買取あり。併合のみ事後開示あり。分割はなし。","date":"Excel取込"},{"id":1800000000661,"subject":"商法・会社法","topic":"株式の併合","level":1,"memo":"【ソース】2021年TAC予想問題集\n\n株主であったものも資料閲覧可能。反対株主は全部の買取請求必要（一部は煩雑）","date":"Excel取込"},{"id":1800000000662,"subject":"商法・会社法","topic":"株式の併合","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n1株未満の端数が生じる場合は、効力発生日の2週間前でなく、20日前の通知または公告が必要。","date":"Excel取込"},{"id":1800000000663,"subject":"商法・会社法","topic":"株式の併合","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n単元定めている場合、通知または公告は20日前。それ以外は2週間前。","date":"Excel取込"},{"id":1800000000664,"subject":"商法・会社法","topic":"株式の併合","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n併合端数20日。反対株主は端数のみ買取請求可能","date":"Excel取込"},{"id":1800000000665,"subject":"商法・会社法","topic":"株式の分割及び株式無償割当","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n株式分割＝別段の定め不可。無償割当て＝定款で取締役の決定によること可能。","date":"Excel取込"},{"id":1800000000666,"subject":"商法・会社法","topic":"株式の売渡等","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n売渡株式の全部の取得の無効＝取得日から6ヶ月（非公開1年）に訴えをのってのみ主張\n悪意重過失なく募集株式譲り受けた者＝仮装払込なくても権利行使可能。株式交換＝譲渡制限も効力発生日に子会社が譲渡承認したとみなされる","date":"Excel取込"},{"id":1800000000667,"subject":"商法・会社法","topic":"株式の譲渡等","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n振替株式の譲渡の会社に対する対抗要件＝少数株主権行使除き、株主名簿への記載。第三者へ＝譲受人の口座保有欄への記載。株券もってたら単独で譲渡承認請求可能。買取通知から20日以内に、裁判所に売買価格決定申立てOK。\n譲渡承認せず買取決定＝309②必要","date":"Excel取込"},{"id":1800000000668,"subject":"商法・会社法","topic":"株式の譲渡等","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n子会社の株式・持分の全部または一部譲渡（5分の1超える・過半数ない）場合、特別決議で承認。\n相続人に対する売渡請求＝譲渡制限に限るかつ定款必要。","date":"Excel取込"},{"id":1800000000669,"subject":"商法・会社法","topic":"株式の譲渡等","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n株券株主に交付前に第三者が取得＝悪意重過失なくても紙切れ。子会社の株式・持分譲渡の承認＝309②。","date":"Excel取込"},{"id":1800000000670,"subject":"商法・会社法","topic":"株式の譲渡等","level":1,"memo":"【ソース】伊藤塾2022公開模試\n\n株券全て発行していない場合も株券交付請求してから譲渡必要。譲渡制限株式は相続人に売渡請求可能（定款必要）","date":"Excel取込"},{"id":1800000000671,"subject":"商法・会社法","topic":"会社の組織に関する訴え","level":1,"memo":"【ソース】伊藤塾2021公開模試\n\n新株予約権発行の無効の訴え＝効力発生日から6ヶ月以内・非公開なら1年。\n資本金の額の減少＝破産管財人・承認しなかった債権者＝公開非公開ともに６ヶ月以内。\n株式移転無効の訴え＝子の株主だったもの親会社株主・破産管財人・承認しなかった債権者＝6ヶ月以内。","date":"Excel取込"},{"id":1800000000672,"subject":"商法・会社法","topic":"会社の計算","level":1,"memo":"【ソース】伊藤塾2018公開模試\n\n配当が金銭以外かつ金銭分配請求権なし＝309②必要。分配可能額に違反してされた剰余金配当の株主＝善意でも支払い必要（業務執行者からの求償には応じなくていい）。合同会社債権者はいつでも計算書類確認可能","date":"Excel取込"},{"id":1800000000673,"subject":"商法・会社法","topic":"会社の解散","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n持分会社の継続に同意しなかった社員＝継続日に退社。清算持分会社＝裁判所選任以外、いつでも社員の過半数の決定で清算人解任可能","date":"Excel取込"},{"id":1800000000674,"subject":"商法・会社法","topic":"会計帳簿等","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n計算書類は承認必要。事業報告内容は役会が総会に報告すれば足りる。\n389が事業報告書類受領したら、事業報告権限ない旨の監査報告作成必要。10年保存。総株主(or発行済株式)の100分の3以上＝いつでも会計帳簿等閲覧謄写請求可能","date":"Excel取込"},{"id":1800000000675,"subject":"商法・会社法","topic":"会計参与","level":1,"memo":"【ソース】伊藤塾2021公開模試\n\n取締役・監査役・執行役・支配人・使用人は会計参与兼任不可。業務財産状況調査可能。\n計算書類の承認役会には参加し意見述べる義務あり。意見を異にする時は総会で意見述べられる","date":"Excel取込"},{"id":1800000000676,"subject":"商法・会社法","topic":"仮装払込みによる募集株式の発行等","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n仮装払込株式の払込完了前に募集株式譲り受けたら＝悪意重過失なければ権利行使可能。","date":"Excel取込"},{"id":1800000000677,"subject":"商法・会社法","topic":"営業譲渡","level":1,"memo":"【ソース】伊藤塾2019公開模試\n\n30年特約＝地域関係なし。","date":"Excel取込"},{"id":1800000000678,"subject":"商法・会社法","topic":"特別支配株主の株式等売渡請求トクベツヌシカブシキトウウリワタシセイキュウ","level":1,"memo":"【ソース】2020年TAC予想問題集ネンヨソウモンダイシュウ\n\n法令違反のみやめろ請求可能。売渡請求＝全員に取得請求する制度。\n新株予約権者も書面交付請求可能。","date":"Excel取込"},{"id":1800000000679,"subject":"商法・会社法","topic":"商行為の特則ショウコウイトクソク","level":1,"memo":"【ソース】2019年TAC予想問題集ネンヨソウモンダイシュウ\n\n商人間の隔地取引＝相当の期間内に承諾通知なし＝申込みは効力失うショウニンカンカクチトリヒキソウトウキカンナイショウダクツウチモウココウリョクウシナ","date":"Excel取込"},{"id":1800000000680,"subject":"民法","topic":"具体的相続分","level":1,"memo":"不動産評価時＝相続開始時の額基準。","date":"Excel取込"},{"id":1800000000681,"subject":"民法","topic":"金銭債権","level":1,"memo":"【ソース】伊藤塾2022公開模試2\n\n後見人・被後見人＝相互に変換すべき金額は後見計算終了時からの利息付さなければならない","date":"Excel取込"},{"id":1800000000682,"subject":"民法","topic":"共有物分割ブンカツ","level":1,"memo":"共有物について権利を有するもの及び各共有者の債権者＝自己の費用で分割に参加可能だがその者ん同意までは不要。\n相続財産は10年経過で共有物分割訴訟可能＝異議でたら不可。分割の効果は遡及しない。キョウユウブツ ケンリ ユウスル オヨビ カク キョウユウシャノ サイケンシャア ジコノ ヒヨウデ ブンカツニ サンカ カノウ モノ ドウイマデハフヨウ ソウゾク ザイサン ネｎ ケイカデ キョウユウブンカツソショウ カノウ イギデタラ フカ ブンカツノ コウカハ ソキュウ","date":"Excel取込"},{"id":1800000000683,"subject":"民法","topic":"共有者の単独行為","level":1,"memo":"賃貸借・使用貸借は管理行為＝持ち分の過半数。共有持分の第三取得者が全体の抵当権消滅請求不可。","date":"Excel取込"},{"id":1800000000684,"subject":"民法","topic":"共有関係の解消","level":1,"memo":"【ソース】伊藤塾2023公開模試2\n\n裁判による分割＝遺産に属する土地＝相続開始の時から10年経過したら共有物分割請求可能＝2ヶ月以内に裁判所に異議可能","date":"Excel取込"},{"id":1800000000685,"subject":"民法","topic":"共有の対外的関係","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n共有地の地役権設定登記請求＝保存行為として単独で提起可能。共有関係確認＝固有必要的共同訴訟。\n自己の持分超える部分勝手に売買しても、他人物売買で有効。","date":"Excel取込"},{"id":1800000000686,"subject":"民法","topic":"共有の使用・管理・変更","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n自己の持分超える対価の償還義務ある。所在等不明共有者いたら、裁判所が変更加える裁判。\n持分価格に従い所在不明以外の過半数で変更できる裁判可能。樹木の伐採山林賃借10年。左記以外土地5年。建物3年。動産6ヶ月＝各共有者の持分価格の過半数","date":"Excel取込"},{"id":1800000000687,"subject":"民法","topic":"共有","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n共有物買入資金の債務＝持分権の譲受人に承継されない。\n土地の持分に設定された抵当権＝現物分割あっても設定者の持分割合に応じて共有物全部の上に存在。共有分割禁止でも持分譲渡は可能。管理費用1年支払ってなかったら、償金払って持分取得可能＝管理費用払った者に限られない。\n不実の登記あっても他者持分の更正まで単独は不可（抹消は可能）。持分処分禁止は債権的効果なので、悪意の譲受人も持分取得できる。共有物の管理者いても共有者は管理事項決定可能。5年の賃貸契約＝管理者が賃貸人（代理権授与で共有者にすることも可能）裁判所は登記義務も履行命じること可能。他の共有者の承諾ないと土地に地上権設定不可。共有持分と遺産共有持分併存＝共有物分割訴訟。共有に関する債権＝管理・保存・購入物立替金含む＝共有物売却して弁済充当可能。分割に関する参加請求＝通知までは不要＝参加請求無視したら対抗できない。分割完了した時は取得したものに関する証書の保存必要＝最大の部分取得したものが保存。","date":"Excel取込"},{"id":1800000000688,"subject":"民法","topic":"共同抵当","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n債務者所有と物上保証人所有＝物上保証を放棄しても、後順位は代位できない。\n債務者所有と物上保証が同時配当→結局異時配当と同じになる（債務者所有優先）\nどっちも物上保証で放棄＝代位できた範囲で優先不可。物上保証人も代位するが、後順位が優先する（あまったら配当される）","date":"Excel取込"},{"id":1800000000689,"subject":"民法","topic":"共同相続の効力","level":1,"memo":"【ソース】伊藤塾2020公開模試2\n\n遺産に属する預貯金債権＝遺産分割対象＝債権額の3分の1✖️決まった額は単独で権利行使可能（当面の生活費や葬式費用）→行使したら当該共同相続人が分割取得したとみなされる。\n認知された分割請求＝積極財産のみで算定。","date":"Excel取込"},{"id":1800000000690,"subject":"民法","topic":"寄託","level":1,"memo":"【ソース】伊藤塾2023プレ模試\n\n寄託物を寄託者に返還して第三者に損害与えても責任負わない。\n受寄者が過失なく瑕疵損害知らなかった場合も賠償責任ない。","date":"Excel取込"},{"id":1800000000691,"subject":"民法","topic":"解除","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n無報酬の受寄者＝寄託物受取りまで任意に解除可能。履行の催告期間が不相当に短かった場合でも、催告の時と解除の意思表示に相当期間経過していれば、解除有効","date":"Excel取込"},{"id":1800000000692,"subject":"民法","topic":"永小作権","level":1,"memo":"【ソース】伊藤塾2021公開模試\n\n不可抗力で損失受けても小作料の免除・減額請求不可。","date":"Excel取込"},{"id":1800000000693,"subject":"民法","topic":"一括競売","level":1,"memo":"抵当権設定後に建物築造＝土地とともに一括競売可能。更地に抵当権設定後、建物所有目的で借地権登記＝一括競売不可。一括競売でも優先弁済権は土地のみ。","date":"Excel取込"},{"id":1800000000694,"subject":"民法","topic":"遺留分","level":1,"memo":"【ソース】伊藤塾2020公開模試\n\n受遺者・受贈者が遺留分侵害に相当する支払い受けたら＝現物返還請求不可＝代物弁済として現物返還契約はOK。\n受贈者複数＝後の受贈者から順次遺留分侵害額負担。相続開始及び遺留分侵害知って1年or相続時から10年で時効。請求受けた受遺者・受贈者＝目的物返還を選択できない。代物弁済契約は可能。死亡保険金の受取人変更は遺留分対象外。持戻し免除の意思表示あっても、遺留分算定の基礎となる財産額に参入される。","date":"Excel取込"},{"id":1800000000695,"subject":"民法","topic":"遺贈","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n負担付遺贈の受遺者が負担しない場合＝効力は生じるが、相続人は家裁に催告でき、相当期間に履行なければ取消請求可能。弁済期前に相当担保請求可能。包括受遺者も遺産分割参加可能。15歳達しても第三者に特定遺贈の代理依頼は不可。相続の欠格事由＝受遺者にもなれなくなる。負担付遺贈放棄されたら、負担の利益得た者は許可なく自ら受遺者になれる。負担付遺贈＝遺贈の目的価額を超えない限度でのみ負担履行責任あり。遺贈は代理不可。","date":"Excel取込"},{"id":1800000000696,"subject":"民法","topic":"遺産分割","level":1,"memo":"【ソース】伊藤塾2019公開模試2\n\n相続回復請求権＝除外知った時から5年・相続から20年で時効。\n認知の価額の基準＝価額支払請求時。分割前の処分も全員の同意で遺産としてみなすことができる。共同相続人が処分したなら同意不要。\n債権の相続＝①分割当時の資力担保②弁済期にない・停止条件付きでも、弁済すべき時における債務者の資力担保する（債権は回収できると限らないものだから、回収できなかった分を各相続人がカバーするってこと）","date":"Excel取込"},{"id":1800000000697,"subject":"民法","topic":"遺言執行者","level":1,"memo":"【ソース】伊藤塾2020プレ模試\n\n自己の責任で第三者に任務依頼可能。受遺者は遺言執行者いても妨害排除可能。家裁は報酬定められる。","date":"Excel取込"},{"id":1800000000698,"subject":"民法","topic":"遺言の執行","level":1,"memo":"【ソース】伊藤塾2023公開模試\n\n遺言執行者いたら受遺者からの被告適格＝遺言執行者のみ。預貯金債権が特定財産承継遺言＝払戻請求可能。解約は全部が特定財産承継遺言の目的の場合のみ。確答しない時就職承諾。","date":"Excel取込"},{"id":1800000000699,"subject":"民法","topic":"遺言","level":1,"memo":"【ソース】令和5年LEC直前予想模試\n\n遺言書の保管の申請＝自ら出頭必要。未成年者・推定相続人・受遺者これらの配偶者直系血族・公証人の配偶者・四親等内の親族・書記使用人は遺言の証人または立会人になれない。後見人が後見人・後見人の配偶者もしくは直系卑属の利益になる遺言無効＝兄弟姉妹ならセーフ。日付が他の証拠で明らかであっても記載なければ無効。未成年後見監督人は複数OKなので撤回にあたらない。被後見人の直系血族・配偶者・兄弟姉妹以外の後見人に遺言＝後見の計算終了前なら無効。相続財産目録の加除は署名押印必要。秘密証書遺言＝全文や日付の自署は不要。証書への署名押印が必要。","date":"Excel取込"},{"id":1800000000700,"subject":"民法","topic":"意思表示","level":1,"memo":"【ソース】2022年TAC予想問題集\n\n到達妨げた時＝通常到達すべき時に到達したと擬制。公示＝官報掲載から2週間経過した時に到達。過失あれば到達しない。強制執行免れるために仮装譲渡しても、当然に不法原因給付で返還請求できなくなる訳じゃない。電子メール＝到達時。一人が詐欺で代物弁済した場合の他の連帯債務者＝第三者に当たらない。個々の行為の結果を認識判断する能力＝有無は意思表示をした時点で判断。被保佐人が負担付贈与＝保佐人の同意必要。\n子が意思能力有していても母は子を代理して認知の訴え提起可能。相手方は承諾の通知まで知ったとき効力生じない。行為の時に意思能力を有しなかったもの＝現に利益受けている限度のみ返還義務あり。","date":"Excel取込"},{"id":1800000000701,"subject":"民法","topic":"委任契約","level":1,"memo":"【ソース】2023年TAC予想問題集\n\n引渡要する場合は報酬は同時履行。","date":"Excel取込"},{"id":1800000000702,"subject":"民法","topic":"委任・寄託・事務管理","level":1,"memo":"【ソース】令和4年LEC直前予想模試\n\n承諾をやむを得ない事由で第三者保管可能。\n寄託物の一部滅失損傷・受寄者費用償還＝返還から1年以内に請求必要。","date":"Excel取込"},{"id":1800000000703,"subject":"民法","topic":"囲繞地通行権","level":1,"memo":"【ソース】伊藤塾2018公開模試２\n\n償金支払い怠っても消滅しない。通路開設に承諾不要（償金は一括払い）分割によって生じた場合は無償。","date":"Excel取込"},{"id":1800000000704,"subject":"民法","topic":"連帯債務等レンタイ サイムトウ","level":1,"memo":"不可分債務者の１人と債権者との混同は他の不可分債務者に及ばない。連帯債務者の一人がした時効更新の効力は他の連帯債務者に及ばない。フ カブン サイムシャノ ニｎ サイケンシャトノ コンドウ タノ フカブン サイムシャニ オヨバナイア レンタイサイムシャノ ヒトリガ ジコウ コウシンオ コウリョクハ タノ レンタイサイムシャニ オヨバナイ","date":"Excel取込"},{"id":1800000000705,"subject":"民法","topic":"留置権リュウチケン","level":1,"memo":"修繕費の償還請求権で留置権行使＝賃貸借終了後の使用利益は不当利得。敷金で留置権行使不可。相当の期限許与された有益費償還請求権に基づく留置権行使不可（弁済期到来してないことになるから）シュウゼンヒノ ショウカｎ セイキュウケン リュウチケｎ コウシ チンタイシャク シュウリョウゴ シヨウリエキハ フトウリトク","date":"Excel取込"},{"id":1800000000706,"subject":"民法","topic":"履行不能リコウフノウ","level":1,"memo":"【ソース】令和４年予備短答模試レイワネンヨビタントウモシ\n\nAB間の賃貸債務不履行＝承諾ある転借人にAが履行請求した時にBの履行不能カンチンタイサイムフリコウショウダクテンシャクニンリコウセイキュウトキリコウフノウ","date":"Excel取込"},{"id":1800000000707,"subject":"民法","topic":"履行遅滞リコウチタイ","level":1,"memo":"【ソース】令和５年予備試験レイワネンヨビシケン\n\n取立債務の確定期限ある場合、債権者の取立行為後に遅滞になるトタサイムカクテイキゲンバアイサイケンシャトリタテコウイゴチタイ","date":"Excel取込"},{"id":1800000000708,"subject":"民法","topic":"離婚リコｎ","level":1,"memo":"親権者の記載がない離婚届は受理されないが、子の監護に
