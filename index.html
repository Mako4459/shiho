<!DOCTYPE html><html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>司法書士 苦手ノート</title><style>
:root{
  --bg:#0f1923;
  --card:rgba(30,58,95,.35);
  --card2:rgba(255,255,255,.05);
  --text:#e8dcc8;
  --sub:#b9c7d8;
  --accent:#d4af37;
  --border:rgba(255,255,255,.08);
}

body.white-theme{
  --bg:#f3f3f3;
  --card:#ffffff;
  --card2:#ececec;
  --text:#222222;
  --sub:#555555;
  --accent:#b8860b;
  --border:#d0d0d0;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  transition:.25s;
}

header{
  position:sticky;
  top:0;
  z-index:10;
  backdrop-filter:blur(12px);
  background:rgba(0,0,0,.25);
  padding:12px;
  border-bottom:1px solid var(--border);
}

.topbar{
  display:flex;
  gap:8px;
  align-items:center;
}

.title{
  font-size:20px;
  font-weight:700;
  flex:1;
}

.hbtn{
  border:none;
  border-radius:12px;
  padding:10px 12px;
  background:var(--card);
  color:var(--text);
  cursor:pointer;
  font-size:16px;
}

.container{
  padding:14px;
}

.search{
  width:100%;
  padding:14px;
  border:none;
  border-radius:16px;
  background:var(--card);
  color:var(--text);
  margin-bottom:12px;
  font-size:16px;
}

.tabs{
  display:flex;
  gap:8px;
  overflow:auto;
  margin-bottom:14px;
}

.tab{
  white-space:nowrap;
  border:none;
  border-radius:999px;
  padding:10px 14px;
  background:var(--card2);
  color:var(--text);
  cursor:pointer;
}

.tab.active{
  background:var(--accent);
  color:#111;
  font-weight:700;
}

.card{
  background:var(--card);
  border-radius:18px;
  padding:16px;
  margin-bottom:14px;
  border:1px solid var(--border);
}

.subject{
  color:var(--accent);
  font-size:13px;
  margin-bottom:6px;
}

.topic{
  font-size:18px;
  font-weight:700;
  margin-bottom:8px;
}

.meta{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  color:var(--sub);
  font-size:13px;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  background:rgba(0,0,0,.35);
  backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
}

.bottom-nav button{
  flex:1;
  border:none;
  background:none;
  color:var(--text);
  padding:14px 0;
  font-size:14px;
}

.bottom-nav button.active{
  color:var(--accent);
  font-weight:700;
}

.spacer{
  height:90px;
}
</style></head><body><header>
  <div class="topbar">
    <div class="title">司法書士 苦手ノート</div>
    <button class="hbtn" onclick="toggleTheme()">☀️</button>
  </div>
</header><div class="container"><input
class="search"
placeholder="検索..."
id="searchInput"
/>

  <div class="tabs">
    <button class="tab active">全て 1255</button>
    <button class="tab">未理解 1254</button>
    <button class="tab">不安 1</button>
  </div>  <div class="card">
    <div class="subject">民法</div>
    <div class="topic">留置権</div><div class="meta">
  <div>理解度: 2</div>
  <div>ミス: 3</div>
  <div>最後: 2026/05/17</div>
</div>

  </div>  <div class="card">
    <div class="subject">不動産登記法</div>
    <div class="topic">所有権移転登記</div><div class="meta">
  <div>理解度: 1</div>
  <div>ミス: 5</div>
  <div>最後: 2026/05/16</div>
</div>

  </div>  <div class="spacer"></div></div><div class="bottom-nav">
  <button class="active">問題</button>
  <button>ひな形</button>
  <button>比較</button>
</div><script>
function toggleTheme(){
  document.body.classList.toggle("white-theme");

  const isWhite =
    document.body.classList.contains("white-theme");

  localStorage.setItem(
    "theme",
    isWhite ? "white" : "dark"
  );
}

window.addEventListener("load",()=>{
  const savedTheme =
    localStorage.getItem("theme");

  if(savedTheme==="white"){
    document.body.classList.add("white-theme");
  }
});
</script></body>
</html>
